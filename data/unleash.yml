plays:
  - title: "Open-source your internal tool, wait for enterprise demand"
    summary: "Ivar Østhus built Unleash to scratch his own itch as a developer at Finn.no in 2014, then open-sourced it on GitHub in 2015 and ran it as a pure open-source side project for roughly four years. He waited for the community to pull demand toward him: 'By late 2018, I started to see a lot of momentum in the open source adoption and people were reaching out to ask about enterprise functionality. I even got an email from a company that asked if I could just host it for them.' Only after that inbound signal did the brothers form a company (2019) and launch a hosted version. By the 2022 Series A they had 120 paying customers."
    metric_moved: "growth"
    result: "Four years of organic OSS adoption validated demand before commercializing; 120 paying customers and a $14M Series A by March 2022, growing to 500+ customers and $35M Series B by 2026."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2022/03/24/oslo-based-unleash-nabs-14m-series-a-to-build-open-source-feature-management-tool/"
    attribution: "Ivar Østhus quoted in TechCrunch, March 24, 2022"
    tags:
      - "open-source"
      - "github"
      - "bottom-up-plg"
      - "community-led"
      - "dogfooding"
  - title: "Keep core flagging free, gate governance behind enterprise"
    summary: "Unleash drew a deliberate open-core boundary: all core feature-management capabilities (creating flags, targeting rules, unlimited flags self-hosted) stay free and open source, while the features large organizations need for control and compliance, SSO, RBAC, change requests, audit logs, unlimited environments, and a 99.99% SLA, are the paid Enterprise tier ($75/seat/mo, 5-seat minimum). The free OSS edition seeds developer adoption inside companies; governance and compliance needs pull the buyer up to Enterprise. This expansion-led motion produced 140% net revenue retention."
    metric_moved: "nrr"
    result: "140% NRR; ARR doubled for three consecutive years; 500+ paying customers including Visa, Samsung, and Lloyd's Banking Group."
    tier: "Verified"
    source_type: "press"
    source_url: "https://theaiinsider.tech/2026/03/05/unleash-raises-35m-led-by-one-peak-to-help-enterprises-ship-ai-driven-software-faster-safer-and-smarter/"
    attribution: "Unleash Series B BusinessWire press release, March 4, 2026 (NRR 140%); open-core boundary per docs.getunleash.io OSS-vs-Enterprise comparison"
    tags:
      - "open-source"
      - "freemium"
      - "land-and-expand"
      - "bottom-up-plg"
      - "usage-based-pricing"
  - title: "Ship an SDK for every language to remove adoption friction"
    summary: "Unleash invests the large majority of its engineering effort into the open-source core and a broad SDK surface, shipping 12 official SDKs plus 10+ community SDKs (25+ total) so a developer in nearly any stack can drop in feature flags without friction. Breadth of language support lowers the barrier to first integration and lets adoption spread organically across heterogeneous engineering orgs, feeding the bottom-up funnel. The result is the largest open-source feature-flag project on GitHub, with 40M+ downloads, 13K+ stars, and 200+ contributors."
    metric_moved: "organic"
    result: "40M+ total downloads (18M+ via Docker), 13,300+ GitHub stars, 200+ contributors, the largest OSS feature-flag project on GitHub."
    tier: "Reported"
