plays:
  - title: "Wait for the \"can you host this for me?\" email"
    summary: "Ivar Østhus built Unleash to solve his own deploy-coupling pain at Finn.no in 2014, open-sourced it on GitHub in 2015, and ran it as a pure side project for ~4 years with no company behind it. He refused to commercialize on a hunch and instead waited for a specific buying signal: by late 2018 enterprises were emailing him asking for paid enterprise functionality, and one explicitly asked if he would just host it for them. Only after that inbound did the brothers incorporate (2019) and ship a hosted version, reaching 120 paying customers by the 2022 Series A."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Don't guess at willingness to pay: open-source the tool, then treat unsolicited \"can you host this / sell us enterprise features?\" emails as your signal to incorporate. The day a stranger offers to pay you to run it is the day demand is real."
    when_it_works: "Works when the tool solves an infrastructure pain teams already feel acutely, so adopters self-select and surface the buying signal without you prospecting."
    metric_moved: "paying customers"
    result: "Four years of organic OSS adoption validated paid demand before any commercial offering existed; 120 paying customers and a $14M Series A by March 2022, scaling to 500+ customers (Visa, Samsung, Lloyd's) and a $35M Series B by 2026."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2022/03/24/oslo-based-unleash-nabs-14m-series-a-to-build-open-source-feature-management-tool/"
    attribution: "Ivar Østhus quoted in TechCrunch, March 24, 2022"
    tags:
      - "open-source"
      - "github"
      - "bottom-up-plg"
      - "community-led"
      - "dogfooding"
  - title: "Give away unlimited flags, cap projects and environments"
    summary: "Unleash's open-core line is drawn at exactly the point where a developer's needs end and an org's governance needs begin. The Apache-2.0 self-hosted edition is genuinely generous, unlimited flags, unlimited users, no expiry, so it spreads freely inside companies, but it is capped at 1 project and 2 environments. The Enterprise tier ($75/seat/mo, 5-seat minimum) unlocks unlimited environments plus the controls regulated buyers cannot ship without: SSO/SAML, granular RBAC, change-request approvals (4-eyes), audit logs (2-year retention), SOC 2, and a 99.99% SLA. Developers adopt for free; compliance and multi-team scale force the upgrade."
    goal: "Revenue"
    learning: "Make your free tier unlimited on the dimension developers care about (flags, users) but capped on the dimensions an organization outgrows (projects, environments), and gate SSO/RBAC/audit-logs/SLA behind Enterprise, so the upgrade is driven by org scale and compliance rather than a usage wall the individual hits."
    when_it_works: "Works when your buyers are regulated or multi-team enterprises whose security and governance requirements are non-negotiable, giving you a paid line the free user never resents."
    metric_moved: "nrr"
    result: "140% net revenue retention; ARR doubled for three consecutive years; 500+ paying customers including Visa, Samsung, and Lloyd's Banking Group."
    tier: "Verified"
    source_type: "press"
    source_url: "https://theaiinsider.tech/2026/03/05/unleash-raises-35m-led-by-one-peak-to-help-enterprises-ship-ai-driven-software-faster-safer-and-smarter/"
    attribution: "NRR 140% per Unleash Series B BusinessWire press release (March 4, 2026); open-core boundary (1 project / 2 environments free; SSO, RBAC, change requests, audit logs, 99.99% SLA paid) per docs.getunleash.io security-and-compliance and pricing pages"
    tags:
      - "open-source"
      - "open-core"
      - "freemium"
      - "land-and-expand"
      - "compliance-as-feature"
  - title: "Evaluate flags locally in-memory so adoption is free and private"
    summary: "Unleash ships 12 official plus 10+ community SDKs, but the breadth isn't the real edge: the architecture is. Each SDK caches all flag config in local memory and evaluates flags as a function on local state, returning answers in nanoseconds with no per-evaluation network call. An optional Edge layer fans out to thousands of SDK connections without adding load to the Unleash server, and frontend evaluation happens without leaking user data back to Unleash. That combination removes the two objections that kill feature-flag adoption: latency/scaling cost and sending user data to a vendor, so a developer in nearly any stack can drop it in safely."
    goal: "Activation"
    learning: "When integrating your tool adds latency or sends user data to your servers, kill both objections at once: ship SDKs that cache config and evaluate locally in-memory (nanosecond, no per-call round trip, no user data leaves), so adopting you carries no performance tax and no privacy review."
    when_it_works: "Works for tools whose decisions can be computed client-side from cached config, where in-line latency and data-residency concerns would otherwise stall the first integration."
    metric_moved: "downloads"
    result: "40M+ total downloads (18M+ via Docker), 13,300+ GitHub stars, 200+ contributors, the largest open-source feature-flag project on GitHub."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.getunleash.io/blog/our-unique-architecture"
    attribution: "Download/star counts per Unleash Series B blog and BusinessWire release (March 2026); local in-memory evaluation, nanosecond latency, and privacy-by-design architecture per getunleash.io/blog/our-unique-architecture and docs.getunleash.io"
    tags:
      - "open-source"
      - "developer-experience"
      - "sdk"
      - "privacy-by-design"
      - "local-evaluation"
