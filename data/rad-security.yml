plays:
  - title: "Name the artifact, then ship the CLI that prints it"
    summary: "As KSOC, the team invented the 'Kubernetes Bill of Materials' (KBOM) concept and shipped it in May 2023 as a free Apache-2.0 CLI on GitHub instead of a whitepaper or a gated download. The repo became the canonical reference implementation of a category they named, reaching ~330 stars and 23 forks while letting any security engineer adopt RAD's worldview with one command and zero sales contact. Owning the standard's name and tooling let them frame every later commercial conversation on their terms."
    goal: "Acquisition"
    track: "Open-source"
    learning: "When your wedge is a new way of seeing a problem, coin a concrete noun for the output (a 'BOM', a 'score', a 'fingerprint') and ship a free, permissively-licensed CLI that generates it on GitHub. Adopters start speaking your vocabulary with one command, and you become the canonical citation for the category you just defined."
    when_it_works: "Works when buyers lack an accepted measurement for a real pain and no entrenched standard already occupies the space."
    metric_moved: "github_stars"
    result: "First KBOM standard; free CLI reached ~330 stars / 23 forks and anchored 'first KBOM standard' category-leadership positioning that carried into the commercial product."
    tradeoff: "You shoulder the entire cost of evangelizing a vocabulary that may never gain industry traction, and an Apache-2.0 reference CLI lets engineers and competitors adopt your \"KBOM\" standard freely without ever becoming customers."
    tier: "Verified"
    source_type: "press"
    source_url: "https://github.com/rad-security/kbom"
    attribution: "github.com/rad-security/kbom (Apache 2.0, 330 stars / 23 forks, confirmed June 2026); launch covered by Help Net Security (May 10, 2023) quoting CTO Jimmy Mesta"
    tags:
      - "open-source"
      - "github"
      - "category-creation"
      - "developer-advocacy"
  - title: "Free tier that proves the claim on public data, paid tier that runs it on theirs"
    summary: "In January 2024 RAD published the first behavioral 'workload fingerprint' standard plus a free public catalog of eBPF-derived fingerprints for popular open-source container images. Anyone could compare the catalog's expected behavior against their own runtime to spot drift and supply-chain tampering for free; the paid product is the ability to generate and enforce fingerprints on a customer's own images. The free catalog proved the differentiated approach (behavioral baselines vs. stateless signatures) by catching the XZ backdoor, which signature and anomaly tools missed."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Cut the product along the value line: let anyone verify your detection's superiority against shared public data for free (RAD's catalog caught the XZ backdoor that signature tools missed), then charge to run the same engine on their private assets. The free tier stands on its own as a working proof of differentiation."
    when_it_works: "Works when your edge is provable on public data, and the buyers who see that proof also hold private workloads worth paying to protect."
    metric_moved: "qualified_signups"
    result: "Free fingerprint catalog became the product wedge; over a dozen companies actively fingerprinting their environments within months; XZ-backdoor detection used as proof, cited as a driver of 3x YoY ARR growth (self-reported, May 2024)."
    tradeoff: "Publishing the free fingerprint catalog hands rivals a working blueprint of your behavioral-baseline method, and the free tier delivers real standalone value that converts only the subset of users who have private workloads and budget to enforce against."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://cloudnativenow.com/features/ksoc-aims-to-create-fingerprints-for-container-images/"
    attribution: "Cloud Native Now (CTO Jimmy Mesta on free catalog + commercial instance); XZ detection per blog.rad.security/blog/xz-backdoor; adoption per RAD May 2024 press release"
    tags:
      - "open-source"
      - "free-tier"
      - "product-wedge"
      - "supply-chain-security"
  - title: "Land the control they're forced to buy, expand into the mandate next to it"
    summary: "RAD sold into regulated enterprises (banking, insurance, media) with a narrow first win on a single workload-security problem, then expanded the same account into broader cloud-native coverage. By their May 2024 self-report, expansion inside existing customers drove nearly half of new ARR and grew per-customer contract value 60%, with a claimed 219% net retention. The compliance-bound buyer who proves one control is structurally easy to expand into adjacent controls."
    goal: "Expansion"
    learning: "In compliance-driven markets, land on the single control the buyer must solve this quarter, then treat each adjacent regulated requirement as a pre-qualified expansion that skips a fresh sales cycle. The proven first deployment lowers procurement and trust barriers for the next one, so the same accounts fund most of your growth."
    when_it_works: "Works when your buyer faces a stack of related mandates; fails if your product is a single point feature with no adjacent surface to grow into."
    metric_moved: "nrr"
    result: "~50% of new ARR from existing-customer expansion; 60% growth in per-customer contract value; 219% net retention claimed (all self-reported, May 2024, not independently audited)."
    tradeoff: "Funding most growth through expansion inside a thin base of regulated enterprises concentrates revenue in a handful of accounts and masks weak new-logo acquisition, so a headline 219% net retention rests on a fragile logo count."
    tier: "Estimated"
    source_type: "press"
    source_url: "https://blog.rad.security/resources/behavioral_detection_response"
    attribution: "RAD Security self-reported press release (May 6, 2024); single-source marketing figures, not independently verified, and >2 years stale"
    tags:
      - "land-and-expand"
      - "enterprise-sales"
      - "compliance"
