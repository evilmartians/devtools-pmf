plays:
  - title: "Define a new standard, ship it open source"
    summary: "As KSOC (later RAD Security), the team published the first-ever Kubernetes Bill of Materials (KBOM) standard and shipped it as a free, Apache-2.0 open-source CLI on GitHub in May 2023. Rather than gate the idea, they invited community contributions and framed it as 'getting Kubernetes into the compliance conversation.' The tool gave security practitioners an immediate, no-sales-call reason to adopt RAD's worldview, and the repo accumulated ~330 stars while seeding the category the commercial product would later sell into."
    metric_moved: "organic"
    result: "First KBOM standard; open-source CLI reached ~330 GitHub stars / 23 forks, establishing category leadership ('first KBOM standard') that anchored later positioning."
    tier: "Verified"
    source_type: "press"
    source_url: "https://github.com/rad-security/kbom"
    attribution: "github.com/rad-security/kbom (Apache 2.0, ~330 stars); launch covered by Help Net Security (May 10, 2023) quoting CTO Jimmy Mesta"
    tags:
      - "open-source"
      - "github"
      - "developer-advocacy"
      - "content-seo"
  - title: "Give away a free fingerprint catalog as wedge"
    summary: "In January 2024 RAD launched the first behavioral 'workload fingerprint' standard with a free online catalog of open-source container image fingerprints, built on eBPF. The free catalog let teams verify drift and supply-chain tampering without buying anything, demonstrating the differentiated detection approach (behavioral fingerprints vs. stateless signatures) before any commercial commitment. The commercial product then sells the ability to apply fingerprints to a customer's own images. Within months, over a dozen companies were actively creating fingerprints in their environments, and the approach proved its value by detecting the XZ backdoor."
    metric_moved: "growth"
    result: "Free open-source fingerprint standard + catalog became the product wedge; over a dozen companies actively fingerprinting their environments; differentiation credited as a driver of 3x YoY ARR growth (self-reported, May 2024)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://cloudnativenow.com/features/ksoc-aims-to-create-fingerprints-for-container-images/"
    attribution: "Cloud Native Now (CTO Jimmy Mesta on free catalog + commercial instance); corroborated by RAD blog (introducing-rad-security) and May 2024 press release"
    tags:
      - "open-source"
      - "free-tier"
      - "default-on"
      - "developer-advocacy"
  - title: "Grow inside accounts, let expansion carry ARR"
    summary: "RAD ran a land-and-expand motion through regulated enterprises (banking, insurance, media) where a single workload-security win expanded into broader cloud-native coverage. By their May 2024 self-report, nearly half of new ARR came from expansion within existing customers, customer contract value grew 60%, and they cited a 219% net retention rate alongside 3x YoY ARR growth. The lesson: in security, expanding the footprint inside proven accounts compounds faster than chasing only new logos."
    metric_moved: "nrr"
    result: "~50% of new ARR from existing-customer expansion; 60% growth in customer contract value; 219% net retention; 3x YoY ARR growth (all self-reported, May 2024, not independently audited)."
    tier: "Estimated"
    source_type: "press"
    source_url: "https://blog.rad.security/resources/behavioral_detection_response"
    attribution: "RAD Security self-reported press release (May 6, 2024); single-source marketing figures, not independently verified"
    tags:
      - "land-and-expand"
      - "founder-led-sales"
