plays:
  - title: "Make switching cost one line of YAML"
    summary: "Migrating CI runners normally means re-architecting pipelines, so teams stay on slow GitHub-hosted runners by inertia. Blacksmith built a true drop-in: customers swap `runs-on: ubuntu-latest` for a Blacksmith tag and change nothing else, because its runners boot off the identical images and pre-installed dependencies inside Firecracker microVMs (under 3 seconds, on gaming-grade CPUs). Near-zero migration cost let teams feel the 2x speedup and ~50% cost cut within minutes, fueling 4 people to $3.5M ARR and 700+ paying customers in under a year."
    goal: "Activation"
    learning: "When you replace an incumbent users invoke through a config string, be bit-for-bit compatible with its interface and environment (identical base images, tags, pre-installed deps), so adoption is one line edited on a branch. Drive the cost of trying you to zero."
    when_it_works: "Works when you replace a component the user already wires in by a standard identifier (a runner tag, a registry URL, an endpoint) and you can fully match its surface."
    metric_moved: "ttfv"
    result: "One-line migration, value in minutes. Mintlify cut CI from 8 to 4 minutes and saved ~50% on CI spend. $3.5M ARR / 700+ paying customers (1,000+ orgs) in under a year."
    tradeoff: "Bit-for-bit compatibility means Blacksmith must perpetually mirror GitHub's runner images, tags, and environment, so any change GitHub ships can silently break the drop-in promise, and the same one-line reversibility that makes adoption frictionless makes ripping Blacksmith back out just as frictionless, leaving zero switching-cost lock-in."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/blacksmith-raises-10m-to-unblock-ai-development-with-fast-ci-for-github-actions-302559870.html"
    attribution: "Blacksmith Series A press release ('migrate with just one line of code and start shipping faster within minutes'); Mintlify customer story, co-founder Hahnbee Lee: 'It really was just a few button clicks to get Blacksmith to work.' (https://www.blacksmith.sh/customer-stories/mintlify); Firecracker <3s boot / gaming-CPU mechanism per Blacksmith product page (https://www.blacksmith.sh/github-action-runners)"
    tags:
      - "default-on"
      - "bottom-up-plg"
      - "onboarding-redesign"
      - "drop-in-replacement"
  - title: "Ship the teardown of the problem the incumbent left broken"
    summary: "Blacksmith published 'Reverse engineering GitHub Actions cache to make it fast,' showing how they used Claude to sniff GitHub's undocumented Twirp/protobuf cache protocol, then transparently proxied it (VM-level NGINX, host proxy, an Azure-to-S3 SDK translator) through colocated storage. They backed the 'up to 10x faster' claim with a hard before/after benchmark: 49.8 MB/s and ~8s to download 114MB became 327.5 MB/s and ~1s. The teardown itself, front-paged on Hacker News, reached the exact senior engineers who feel CI cache pain."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Publish how you defeated a hard problem the incumbent never fixed, down to the protocol-level mechanism, then prove it with a reproducible before/after benchmark. The teardown is the ad: numbered claims get shared on HN, vague \"we're faster\" posts die."
    when_it_works: "Works when your edge rests on real engineering depth your buyers can evaluate, and you serve an audience (engineers on HN, Reddit, lobste.rs) that rewards transparency over polish."
    metric_moved: "organic signups"
    result: "HN front page: 154 points, 37 comments (Jul 2025), plus pickup on daily.dev, Devtalk, and X. Concrete benchmark: 49.8 to 327.5 MB/s, 8s to ~1s."
    tradeoff: "The teardown openly advertises that the speedup depends on GitHub's undocumented Twirp/protobuf cache protocol, which GitHub can redesign without notice or deprecation, putting Blacksmith on a treadmill of detecting and re-matching breakages the founders themselves admit (\"the ecosystem is always ready to surprise you\")."
    tier: "Verified"
    source_type: "press"
    source_url: "https://news.ycombinator.com/item?id=44658909"
    attribution: "Hacker News story linking blacksmith.sh/blog/cache (154 pts / 37 comments); post at https://www.blacksmith.sh/blog/cache (benchmark: 49.8 to 327.5 MB/s; Twirp/protobuf protocol sniffed with Claude; NGINX + host proxy + Azure-to-S3 translator)"
    tags:
      - "docs-as-marketing"
      - "hacker-news"
      - "developer-advocacy"
      - "technical-teardown"
  - title: "Size the free tier to one developer's real monthly usage"
    summary: "CI is consumed by individual developers on real workflows long before any procurement conversation, so Blacksmith offers 3,000 free runner minutes per month as a no-commitment on-ramp. A developer flips the one-line tag, watches their own pipeline get 2x faster on a branch, then pulls Blacksmith into the org. The free tier plus drop-in switch drove 30,000+ users and 1,000+ organizations, of which 700+ now pay."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Make the free allotment cover a single dev's recurring real-workflow usage, enough that they prove value alone and carry you into the org as champion. Meter it on the unit that scales with headcount (CI minutes) so crossing into paid is automatic once the team adopts."
    when_it_works: "Works when individual developers can adopt without procurement and usage naturally grows past the free allotment as the team or whole org joins."
    metric_moved: "signups / org adoption"
    result: "30,000+ users and 1,000+ organizations (700+ paying), built on a 3,000 free-minutes/month tier."
    tradeoff: "Those free minutes run on the real bare-metal compute Blacksmith pays capex to operate, so every one of the 30,000+ free users burns actual infrastructure margin to convert the 700+ that pay, a subsidy that scales with adoption rather than revenue."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.blacksmith.sh/company"
    attribution: "Blacksmith company page ('3,000 free minutes per month', 'more than 30,000 happy users'); org/customer counts corroborated by TechCrunch (Sep 17, 2025) and the Series A release"
