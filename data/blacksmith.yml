plays:
  - title: "Make adoption a one-line config change"
    summary: "CI runner switching usually means re-architecting pipelines, so most teams never try alternatives. Blacksmith built a true drop-in replacement: customers swap `runs-on: ubuntu-latest` for a Blacksmith tag and nothing else, because runners boot off the same images with the same pre-installed dependencies. The near-zero migration cost let teams realize value (2x faster, ~half the cost CI) within minutes, fueling growth from 4 people to $3.5M ARR and 700+ customers in under a year."
    metric_moved: "ttfv"
    result: "Migrate in one line, value in minutes; Mintlify cut CI from 8 to 4 minutes and saved 50% on CI spend. Grew to $3.5M ARR / 700+ customers (1,000+ orgs) in under a year."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/blacksmith-raises-10m-to-unblock-ai-development-with-fast-ci-for-github-actions-302559870.html"
    attribution: "Blacksmith Series A press release ('migrate with just one line of code and start shipping faster within minutes'); corroborated by Mintlify customer story, co-founder Hahnbee Lee: 'It really was just a few button clicks to get Blacksmith to work.' (https://www.blacksmith.sh/customer-stories/mintlify)"
    tags:
      - "default-on"
      - "bottom-up-plg"
      - "onboarding-redesign"
      - "usage-based-pricing"
  - title: "Publish a deep technical teardown to win HN"
    summary: "Rather than run generic marketing, Blacksmith published an engineering deep-dive, 'Reverse engineering GitHub Actions cache to make it fast,' detailing how they sniffed GitHub's Twirp-based cache protocol and transparently proxied it through colocated storage for up to 10x faster cache. The post landed on the Hacker News front page, reaching the exact senior-engineer audience that feels CI pain. Technical credibility, not pitch, drove the distribution."
    metric_moved: "organic"
    result: "HN front-page story: 154 points and 37 comments (Jul 2025), plus pickup on daily.dev, Devtalk, and X."
    tier: "Verified"
    source_type: "aggregator"
    source_url: "https://news.ycombinator.com/item?id=44658909"
    attribution: "Hacker News story linking blacksmith.sh/blog/cache (154 pts / 37 comments); post by Blacksmith at https://www.blacksmith.sh/blog/cache"
    tags:
      - "docs-as-marketing"
      - "hacker-news"
      - "developer-advocacy"
      - "content-seo"
  - title: "Give 3,000 free CI minutes to seed bottom-up"
    summary: "CI is consumed by individual developers and small teams before any procurement conversation, so Blacksmith offers 3,000 free runner minutes per month as a no-commitment on-ramp. Developers try it on real workflows, see the speedup, and pull it into their org. This bottom-up free-tier motion drove 30,000+ users and 1,000+ organizations onto the platform."
    metric_moved: "growth"
    result: "30,000+ users and 1,000+ organizations (700+ paying), built on a 3,000 free-minutes/month tier."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.blacksmith.sh/company"
    attribution: "Blacksmith company page ('3,000 free minutes per month', 'more than 30,000 happy users'); org/customer counts corroborated by TechCrunch (Sep 17, 2025) and Series A release"
