plays:
  - title: "Make your free tier nag the user on their own site"
    summary: "Every site on Framer's free plan ships a fixed 'Made in Framer' badge in the bottom-left corner that the user cannot hide, move, or remove. Removal is gated behind the $10/month Basic plan or connecting a custom domain, so the badge is simultaneously a referral billboard across ~500K MAU and a daily upgrade nag the user stares at on their own site. The badge links back to Framer, seeding a backlink network and word-of-mouth for free while pricing the upgrade against the user's own embarrassment."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Stamp your brand on the most visible surface of every free user's published work by default and gate removal behind your cheapest paid plan, so one badge runs a referral and backlink loop across all free users while sitting on their own site as a daily upgrade prompt they can't dismiss."
    when_it_works: "Works when free users publish something public-facing they care about looking professional."
    metric_moved: "organic referral traffic / free-to-paid conversion"
    result: "Badge runs across ~500K MAU on free subdomains as a referral and backlink loop; its removal is the trigger into the $10/mo Basic plan, feeding ~45-55K paying customers."
    tradeoff: "You stamp your brand on every free user's public-facing work without their consent, so the professionally-minded users who are your best upgrade prospects experience the free tier as something that makes their own site look unfinished, and your distribution surface is built entirely on people who would rather it weren't there."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://www.framer.com/help/articles/how-do-i-remove-the-made-in-framer-badge-from-my-website/"
    attribution: "Framer Help Center: badge appears by default on free-plan sites, removable only by upgrading to a paid plan (from $10/mo Basic) or connecting a custom domain and republishing."
    tags:
      - "viral-loop"
      - "free-tier"
      - "word-of-mouth"
      - "default-on"
  - title: "Turn your creators into a commissioned sales force"
    summary: "Framer's Creator Program lets designers sell templates, plugins, and components in the marketplace and keep 100% of the revenue, taking a 0% cut against Webflow's 5%. The real engine is the remix link: when someone duplicates a creator's template and upgrades, the creator earns 50% of that buyer's Framer subscription for 12 months. That turns thousands of independent designers into a commissioned sales force whose template content markets Framer and converts buyers into paying Framer accounts."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Take 0% of what creators sell in your marketplace, then pay them a recurring cut of every subscription their remixed work converts (Framer pays 50% for 12 months), so their selfish incentive is to keep funneling new paying accounts to you instead of monetizing the content directly."
    when_it_works: "Works when your product is something creators productize and resell (templates, components, starters) and each resale naturally seeds a new account that can upgrade."
    metric_moved: "marketplace-driven signups and paid conversions"
    result: "Marketplace grew to 2,000+ templates and 60+ plugins; top creators earn $4K-$10K+/month, building a third-party ecosystem that drives bottom-up adoption and paid conversions."
    tradeoff: "You forgo marketplace take-rate entirely and hand creators half of every referred buyer's subscription for a full year, so creator-sourced revenue runs at near-zero margin in year one and the channel only becomes profitable if those remixed accounts retain past month 12."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://www.framer.com/help/articles/how-the-creator-program-works/"
    attribution: "Framer Creator Program: creators keep 100% of marketplace sales (0% cut) and earn 50% of a buyer's subscription for 12 months when they upgrade via a template remix link."
    tags:
      - "integrations-marketplace"
      - "templates-starters"
      - "community-led"
      - "developer-advocacy"
  - title: "Let users brag about their own numbers, on your schedule"
    summary: "Framer concentrates feature announcements into recurring Spring and Fall Events, then publishes a Spotify-Wrapped-style 'Framer Wrapped' that gives users a shareable personal year-in-review. The 2024 recap reported 83 community meetups across 26 countries, 11M YouTube viewers (189.4K watch hours), 154.7K X followers, and 100K Instagram fans. The personal, shareable recap converts the user's own usage into bragging-rights content they post for you, manufacturing repeated attention spikes around the launch cadence."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Package each user's annual usage into a personal, shareable Spotify-Wrapped-style recap tied to a fixed launch cadence, so your most credible promoter (the customer talking about their own results) hands you free distribution on a predictable timetable."
    when_it_works: "Works when users accumulate visible personal stats they are proud of and your audience is social enough to reshare a recap."
    metric_moved: "user-generated reach / brand awareness"
    result: "2024: 83 meetups in 26 countries, 11M YouTube viewers / 189.4K watch hours, 154.7K X and 100K Instagram followers, alongside ~100% YoY ARR growth to $50M."
    tradeoff: "The recap is only as impressive as the user's own numbers, so light or new users get nothing worth sharing, and concentrating launches into a fixed Spring/Fall cadence trades steady momentum for spiky attention spikes you have to keep topping every cycle."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://www.framer.com/2024"
    attribution: "Framer 2024 Year in Review page and Framer Events page (Spring/Fall events, Framer Wrapped)."
    tags:
      - "launch-week"
      - "youtube"
      - "community-led"
      - "changelog-marketing"
