plays:
  - title: "Stamp a 'Made in Framer' badge on every free site"
    summary: "Every site published on Framer's free plan carries a 'Made in Framer' badge linking back to Framer, turning hundreds of thousands of free users into a distributed billboard and backlink network. The badge only disappears when the user upgrades to a paid plan or connects a custom domain, so the badge doubles as both an organic acquisition loop and an upgrade trigger. With ~500K MAU largely on free subdomains, this seeds awareness for free while nudging conversion (~10% paid)."
    metric_moved: "organic"
    result: "Free-tier badge drives continuous referral traffic across ~500K MAU; removal is gated behind upgrade/custom domain, reinforcing free-to-paid conversion (~45-55K paying customers)."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://www.framer.com/help/articles/how-do-i-remove-the-made-in-framer-badge-from-my-website/"
    attribution: "Framer Help Center: badge appears by default on free-plan sites; removed only after upgrading to paid or connecting a custom domain (then republishing)."
    tags:
      - "viral-loop"
      - "free-tier"
      - "word-of-mouth"
      - "default-on"
  - title: "Take 0% of creator template sales"
    summary: "Framer's Creator Program lets designers sell templates in the marketplace and keep 100% of the revenue, taking a 0% cut versus Webflow's 5%. Top creators reportedly earn $4K-$10K+/month, which turned thousands of independent designers into a self-funded sales and content force that markets Framer on their behalf. Template remix links also pay referral commissions when a buyer upgrades, aligning the creator economy directly with Framer's paid conversions."
    metric_moved: "community"
    result: "Marketplace grew to 2,000+ templates and 60+ plugins; top creators earn $4K-$10K+/month, building a third-party ecosystem that drives bottom-up adoption."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://www.framer.com/help/articles/how-the-creator-program-works/"
    attribution: "Framer Creator Program help docs: creators 'keep 100% of the revenue from your sales' on templates, plus referral commissions on remix-link upgrades."
    tags:
      - "integrations-marketplace"
      - "templates-starters"
      - "community-led"
      - "developer-advocacy"
  - title: "Run recurring seasonal launch events with a 'Wrapped'"
    summary: "Framer concentrates feature announcements into recurring Spring and Fall Events (Framer 3.0, Design Pages) and publishes a Spotify-style 'Framer Wrapped' year-in-review for users. The 2024 review reported 83 community meetups across 26 countries, 154.7K X followers, 100K Instagram fans, and 11M YouTube viewers (189.4K watch hours). This launch-week cadence plus shareable personal recaps manufactures repeated attention spikes and user-generated promotion."
    metric_moved: "growth"
    result: "2024: 83 meetups in 26 countries, 11M YouTube viewers / 189.4K watch hours, 154.7K X and 100K Instagram followers; supports ~100% YoY ARR growth to $50M."
    tier: "Reported"
