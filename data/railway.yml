plays:
  - title: "Pay template creators 25% of the compute they drive"
    summary: "Railway lets developers publish one-click deploy templates, then pays the creator a kickback on every other user's compute (CPU/RAM) bill: 15% base, rising to 25% if the creator actively answers deployers' questions in their Template Queue. Creators bring their own audiences and run their own support, so each template becomes a self-interested distribution and onboarding channel. By December 2025 Railway had paid ~$1M to template creators (~$730K in cash) across 1,800+ live templates, with two creators earning over $100K each."
    goal: "Acquisition"
    learning: "Turn a usage-based revenue share into your distribution engine: pay third-party creators a real cut (Railway uses 15%, 25% if they support their own users) of the recurring usage their content drives, so they recruit and onboard customers for you out of self-interest instead of you buying marketing."
    when_it_works: "Works when your product bills on ongoing usage so a percentage kickback compounds, and when there is reusable, packageable setup work (templates, integrations) that creators can own end to end."
    metric_moved: "community / signups"
    result: "~$1M paid to template creators (~$730K cash) across 1,800+ live templates by Dec 2025; two creators earned $100K+, six earned $10K+."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://docs.railway.com/templates/kickbacks"
    attribution: "Railway docs (15%/25% kickback mechanics) and Railway blog 'GIT PUSH && GET PAID' / '$1M paid to developers who built Railway templates' (Dec 5, 2025)"
    tags:
      - "templates-starters"
      - "integrations-marketplace"
      - "community-led"
      - "usage-based-pricing"
      - "viral-loop"
      - "creator-incentives"
  - title: "Personally greet every Discord signup for 18 months"
    summary: "For Railway's first 18 months, founder Jake Cooper kept Discord open on a second monitor with notifications on and personally messaged every single person who joined: 'If anybody came in, I was immediately like, Hey, how's it going?' That manual concierge motion hand-built the first ~100 users and seeded a Discord community that grew past 20K members and became Railway's primary support and engagement channel, standing in for paid marketing."
    goal: "Acquisition"
    learning: "Before you automate community, do it by hand: personally DM every new member the moment they arrive and treat that conversation as both onboarding and your fastest product-feedback loop, until volume forces you to systematize what you learned."
    when_it_works: "Pays off in the first ~100-1,000 users when signup volume is still low enough for a founder to greet each one, and when your audience already congregates in a chat channel you control."
    metric_moved: "first 100 users / community"
    result: "First ~100 users hand-acquired; Discord grew to 20K+ members and became the core support/engagement channel; Railway later reached 2M+ users with zero marketing spend."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://www.latent.space/p/railway"
    attribution: "Jake Cooper (founder/CEO), Latent Space podcast"
    tags:
      - "discord"
      - "founder-led-sales"
      - "community-led"
      - "word-of-mouth"
      - "concierge-onboarding"
  - title: "Beat the incumbent on its free-tier weakness, then kill abuse"
    summary: "When Heroku killed its free tier in November 2022, Railway countered with a $5 monthly credit that, unlike Heroku's free dynos that slept after 30 minutes of inactivity, kept small apps running 24/7. That one differentiator captured the migration wave, taking Railway past 300K users by early 2023. When the free Starter plan later started bleeding ~$500K/month to bot and crypto-miner abuse against only ~$50K of revenue, Cooper killed the free tier in June 2023 to rebuild sustainable unit economics on the path to profitability."
    goal: "Acquisition"
    learning: "When an incumbent retreats, win switchers by fixing the one painful thing it left broken (here, always-on vs. apps that sleep), but instrument abuse from day one and be willing to kill the free tier the moment losses outrun the revenue it generates."
    when_it_works: "Works during an incumbent disruption when you can ship a clearly better free experience cheaply, and only stays viable if you can measure free-tier abuse and cut it before it eats your margins."
    metric_moved: "signups / unit economics"
    result: "Grew past 300K users by early 2023 off the Heroku migration; later cut the free tier to stop ~$500K/month in abuse losses and reach profitability."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saaspricepulse.com/blog/railway-pricing-history"
    attribution: "SaaS Price Pulse pricing history; abuse-loss figures from Jake Cooper on Latent Space podcast"
