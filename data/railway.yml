plays:
  - title: "Pay template creators a usage kickback"
    summary: "Railway lets developers publish one-click deploy templates, then pays the creator up to 25% of the compute (CPU/RAM) revenue every other user generates by deploying that template (15% base plus a 10% bonus for actively supporting deployers via a Template Queue). This turns the community into a self-interested distribution and onboarding engine: creators bring their own audiences and answer support, while Railway gets 1,800+ ready-made deploy paths. By December 2025 Railway had paid ~$1M to template creators (~$730K in cash), with two creators earning $100K+ each."
    metric_moved: "community"
    result: "~$1M paid to template creators (~$730K cash) across 1,800+ live templates by Dec 2025; two creators earned $100K+, six earned $10K+."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://docs.railway.com/templates/kickbacks"
    attribution: "Railway docs (kickback mechanics) and Railway blog 'GIT PUSH && GET PAID' / '$1M paid to developers who built Railway templates' (Dec 5, 2025)"
    tags:
      - "templates-starters"
      - "integrations-marketplace"
      - "community-led"
      - "open-source"
      - "usage-based-pricing"
      - "viral-loop"
  - title: "Hand-greet every signup in Discord"
    summary: "For Railway's first 18 months Jake Cooper ran Discord on a second monitor with notifications on and personally greeted every single person who joined: 'If anybody came in, I was immediately like, Hey, how's it going?' This manual, founder-led concierge motion built the first 100 users and seeded a Discord community (now 20K+) that became Railway's primary support and engagement channel in place of marketing."
    metric_moved: "community"
    result: "First ~100 users hand-acquired; Discord grew to 20K+ members and became the core support/engagement channel; 2M+ users reached with zero marketing spend."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://www.latent.space/p/railway"
    attribution: "Jake Cooper (founder/CEO), Latent Space podcast"
    tags:
      - "discord"
      - "founder-led-sales"
      - "community-led"
      - "word-of-mouth"
  - title: "Run apps 24/7 on free credit, then paywall"
    summary: "When Heroku killed its free tier (Nov 2022), Railway offered a $5 monthly credit that, unlike Heroku's free dynos that slept after 30 minutes, kept small apps running 24/7, capturing the migration wave to 300K+ users by early 2023. When the free tier started bleeding money (~$500K/month in abuse from bots and crypto miners against ~$50K revenue), Cooper killed the free Starter plan in June 2023 to rebuild sustainable unit economics, a disciplined pricing reversal that preserved the path to profitability."
    metric_moved: "growth"
    result: "Grew to 300K+ users by early 2023 off Heroku migration; later cut the free tier to stop ~$500K/month in abuse losses, reaching profitability."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saaspricepulse.com/blog/railway-pricing-history"
    attribution: "SaaS Price Pulse pricing history; abuse-loss figures from Jake Cooper on Latent Space podcast"
    tags:
      - "free-tier"
      - "pricing-change"
      - "bottom-up-plg"
      - "freemium"
