plays:
  - title: "Be the one repository that holds every package format"
    summary: "JFrog open-sourced Artifactory in 2008, but the durable edge was not 'free,' it was being the first software-agnostic repository: one tool that stores and proxies Maven, npm, Docker, PyPI, NuGet, Helm, and 40+ formats behind a single URL via local, remote-cache, and virtual repos. A polyglot team could standardize on JFrog instead of running a separate registry per language, so it became the neutral default that no language community had a reason to reject. That universality, seeded by the free OSS edition, fed the paid SaaS and on-prem versions."
    goal: "Acquisition"
    learning: "If your category is fragmented by language or stack, win by being the single neutral tool that supports all of them under one interface, so a polyglot team can standardize on you and never needs a competing point tool. Breadth of integration, not the free tier itself, is what makes you the default."
    when_it_works: "Works when buyers run heterogeneous stacks and currently juggle one narrow tool per language or ecosystem, so consolidation onto a universal layer is itself the value."
    metric_moved: "customer count / NDR"
    result: "Grew from a free OSS tool (2008) to 5,800 customers, 139% net dollar retention, and $105M revenue by the 2019 S-1; IPO'd in 2020 raising $509M."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://blossomstreetventures.medium.com/lessons-from-jfrog-the-best-new-saas-company-298c0bf41056"
    attribution: "JFrog S-1 (2020), summarized by Blossom Street Ventures: 'universal DevOps Platform,' 'invest heavily in integrating with the major package technologies'; 139% NDR, 5,800 customers, $105M 2019 revenue"
    tags:
      - "open-source"
      - "universal-repository"
      - "integrations"
      - "freemium"
      - "bottom-up-plg"
  - title: "Make the product get bought, not sold, by developers"
    summary: "JFrog ran a strictly bottom-up motion: developers adopt the free/freemium product, become internal champions, and spread it across the org before sales ever engages. In its S-1 the company stated it had 'never made a single field sales outbound call to a prospective customer,' the product was 'always bought, never sold.' Sales existed only to expand and convert accounts that developers had already pulled in, which is what produced the land-and-expand economics."
    goal: "Expansion"
    learning: "Point your sales team only at accounts where developers have already adopted the free product, and measure reps on expanding seats/usage inside those accounts rather than cold outbound. A handful of organically-landed accounts that grow can outweigh a wide top-of-funnel."
    when_it_works: "Works when individual developers can adopt and prove value on their own without procurement, so usage spreads inside an org before a buyer is ever involved."
    metric_moved: "nrr"
    result: "139% net dollar retention at S-1; 286 customers paying over $100k ARR made up 48% of total ARR, expansion driven by developer adoption rather than outbound."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://blossomstreetventures.medium.com/lessons-from-jfrog-the-best-new-saas-company-298c0bf41056"
    attribution: "JFrog S-1: 'we've never sold it. It's always been bought... we haven't made a single field sales outbound call to a prospective customer.'"
    tags:
      - "bottom-up-plg"
      - "land-and-expand"
      - "community-led"
      - "word-of-mouth"
      - "sales-led-expansion"
