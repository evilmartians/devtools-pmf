plays:
  - title: "Ship a free open-source tool, monetize later"
    summary: "JFrog started in 2008 by releasing Artifactory as a free open-source artifact repository that developers adopted and improved themselves. The open community turned it into the de facto universal package repository before JFrog ever shipped a paid edition. Free open-source, freemium, and limited trials seeded internal champions who pulled in the paid SaaS and on-prem versions. By its 2020 IPO this funnel had produced 5,800 customers and 139% net dollar retention."
    metric_moved: "growth"
    result: "Grew from a free OSS tool (2008) to 5,800 customers, 139% NDR, and $105M revenue by the 2019 S-1; IPO'd in 2020 raising $509M."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://blossomstreetventures.medium.com/lessons-from-jfrog-the-best-new-saas-company-298c0bf41056"
    attribution: "JFrog S-1 (2020), summarized by Blossom Street Ventures; 139% NDR, 5,800 customers, $105M 2019 revenue"
    tags:
      - "open-source"
      - "freemium"
      - "bottom-up-plg"
      - "land-and-expand"
      - "free-tier"
  - title: "Let developers buy it, never field-sell it"
    summary: "JFrog deliberately ran a developer-led, bottom-up motion: developers adopt the free/freemium product, become champions, and expand it across their org before any sales conversation. The company famously never made a field sales outbound call. This 'always been bought, never sold' approach drove a land-and-expand engine where 286 customers paid over $100k and made up 48% of ARR at IPO."
    metric_moved: "nrr"
    result: "139% net dollar retention at S-1; 286 customers >$100k ARR (48% of total ARR), driven by bottom-up expansion rather than outbound sales."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://blossomstreetventures.medium.com/lessons-from-jfrog-the-best-new-saas-company-298c0bf41056"
    attribution: "JFrog S-1: 'we've never sold it. It's always been bought... we haven't made a single field sales outbound call to a prospective customer.'"
    tags:
      - "bottom-up-plg"
      - "community-led"
      - "land-and-expand"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Run an annual user conference for your community"
    summary: "JFrog launched its swampUP user conference in May 2016 as an intimate 2-day event with hands-on training and 1-on-1 sessions directly with the founders, deliberately built around relaxed community mingling (cocktail reception, gala dinner) rather than a sales pitch. It became the anchor of their developer-community flywheel, reinforcing the bottom-up motion. By 2025 it had run for 10 years, scaled to a 3-day global event, and expanded into Europe (Berlin)."
    metric_moved: "community"
    result: "swampUP grew from a small 2016 founder-led gathering into JFrog's flagship annual global DevOps conference (10th edition by 2025, now expanding to Europe)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.crunchbase.com/event/jfrog-swampup-2016523"
    attribution: "Crunchbase event profile for the inaugural SwampUP (May 2016); JFrog event pages for later editions"
