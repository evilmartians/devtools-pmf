plays:
  - title: "Open-source the core, turn adoption into inbound"
    summary: "Kafka's creators open-sourced the project at LinkedIn first, then founded Confluent around it. Jay Kreps' reasoning: heavy distributed infrastructure is rarely ripped in or out, so trying to sell it door-to-door is expensive because 'the right time may not be for some years.' Open source instead makes companies aware of the product, lets them adopt it as they get value, and flips buying into an inbound motion. Confluent then layered commercial features, support, and consulting on top because adopters 'needed a lot more' than a GitHub download. Kafka now runs in 150,000+ organizations and an estimated 35% of the Fortune 500, which became Confluent's commercial market."
    metric_moved: "growth"
    result: "Kafka adopted by 150,000+ organizations and ~35% of the Fortune 500; became the funnel for Confluent's ~$960M+ subscription business (FY2024)."
    tier: "Reported"
    source_type: "estimate"
    source_url: "https://opensourceunderdogs.com/episode-13-confluent-apache-kafka-streaming-with-jay-kreps/"
    attribution: "Jay Kreps (CEO, co-founder), Open Source Underdogs podcast Ep. 13"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
      - "developer-advocacy"
  - title: "Launch a recurring conference for your project"
    summary: "To consolidate a sprawling open-source user base into an identifiable community and sales funnel, Confluent created Kafka Summit, an annual conference for developers, architects, and decision-makers. The inaugural 2016 event in San Francisco sold out with 500+ attendees and 29 sessions led by core committers and real-world users, bookended by sold-out training. The franchise scaled to 33,000+ registrants for the 2020 virtual edition and multi-city events, becoming the anchor for developer evangelism and lead generation."
    metric_moved: "community"
    result: "Inaugural Kafka Summit (2016) sold out at 500+; grew to 33,000+ registrants by 2020 and recurring multi-city events."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.confluent.io/press-release/kafka-summit-now-sold-out-as-anticipation-for-inaugural-user-conference-mounts/"
    attribution: "Confluent press release on inaugural Kafka Summit; Jay Kreps quoted"
    tags:
      - "conference-talk"
      - "community-led"
      - "developer-advocacy"
      - "open-source"
  - title: "Meter on data flow so incentives align"
    summary: "Rather than seat-based licensing, Confluent Cloud prices on consumption: 'we meter that use by the data that flows through it or that's stored,' tying revenue directly to value delivered so 'our incentive is to make sure you're getting value out of the software.' Expansion follows as 'more applications are able to come on.' Paired with a self-service free tier and $400 in credits over the first 30 days with no sales rep required, this lets open-source Kafka users land on the managed cloud and grow spend as their data volume grows."
    metric_moved: "nrr"
    result: "Usage-based model supports 114% net retention (Q3 2025); Confluent Cloud revenue grew ~41% YoY to ~$492M (FY2024)."
    tier: "Reported"
    source_type: "estimate"
    source_url: "https://opensourceunderdogs.com/episode-13-confluent-apache-kafka-streaming-with-jay-kreps/"
    attribution: "Jay Kreps (CEO), Open Source Underdogs podcast; Confluent Cloud signup terms ($400 credits)"
    tags:
