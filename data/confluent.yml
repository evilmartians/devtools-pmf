plays:
  - title: "Infrastructure buyers re-evaluate once every few years, so stop selling and let them adopt"
    summary: "Kafka is heavy distributed infrastructure that gets ripped in or out only every few years, so Jay Kreps argued that selling it door-to-door is hopeless because 'the right time may not be for some years.' Instead, LinkedIn open-sourced Kafka, and Confluent let companies adopt it on their own clock and grow value before any sales contact, turning buying into an inbound motion. Confluent then layered commercial features, support, and consulting on top, because production adopters 'needed a lot more' than a GitHub download. Kafka now runs in 150,000+ organizations and an estimated 35% of the Fortune 500, the exact pool Confluent converts to paid."
    goal: "Acquisition"
    track: "Open-source"
    learning: "If buyers only revisit your category every few years, you can't time the sale, so open-source the core and let teams put it in production on their own clock; then monetize the operational gap they hit next, namely support, managed hosting, and enterprise features they can't run alone."
    when_it_works: "Works when your category has long, infrequent purchase cycles you can never reliably time."
    metric_moved: "growth"
    result: "Kafka adopted by 150,000+ organizations and ~35% of the Fortune 500, feeding Confluent's $922M FY2024 subscription revenue."
    tradeoff: "Giving away the Kafka engine for free means anyone, including hyperscalers like AWS who ship their own managed Kafka, can run it without paying Confluent, forcing the company to monetize a narrower hosted-and-support layer while competing against its own free download."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://opensourceunderdogs.com/episode-13-confluent-apache-kafka-streaming-with-jay-kreps/"
    attribution: "Jay Kreps (CEO, co-founder), Open Source Underdogs podcast Ep. 13"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
      - "developer-advocacy"
  - title: "Name the conference after the open-source project to gather its scattered community"
    summary: "A sprawling open-source user base has no single front door, so Confluent built Kafka Summit, an annual conference scoped to one project, to consolidate adopters into an identifiable community and lead funnel. The 2016 inaugural in San Francisco sold out at 500+ attendees with 29 sessions taught by core committers and named production users (Uber's real-time transit infra, etc.), bookended by paid training. The franchise scaled to 33,000+ registrants by 2020 across virtual and multi-city editions, becoming the anchor for developer evangelism and pipeline."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Turn scattered, anonymous downloaders into a named and contactable funnel by hosting a conference branded around the open-source project and stacking the agenda with real production users telling specific deployment stories; the project name draws the crowd your sales team then works."
    when_it_works: "Works once you have enough real production users to fill a credible speaker lineup; premature it just looks like a vendor pitch with no audience."
    metric_moved: "community"
    result: "Inaugural Kafka Summit (2016) sold out at 500+ attendees and 29 sessions; grew to 33,000+ registrants by 2020."
    tradeoff: "Branding the event around Kafka grows a community loyal to the open-source project, so adopters stay engaged while self-hosting or buying a rival's managed Kafka, and Confluent absorbs the recurring cost and operational burden of producing the conference without owning the loyalty it builds."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.confluent.io/press-release/kafka-summit-now-sold-out-as-anticipation-for-inaugural-user-conference-mounts/"
    attribution: "Confluent press release on inaugural Kafka Summit (Apr 2016); Jay Kreps quoted"
    tags:
      - "conference-talk"
      - "community-led"
      - "developer-advocacy"
      - "open-source"
  - title: "Bill on the unit that grows when the customer wins"
    summary: "Confluent Cloud rejected seat-based licensing and prices on consumption: 'we meter that use by the data that flows through it or that's stored,' so revenue rises only as customers get more value and 'more applications are able to come on.' The entry ramp is fully self-service with $400 in credits over the first 30 days and no credit card required, letting open-source Kafka users land on the managed cloud with zero sales contact and expand spend as data volume grows. This usage model drives land-and-expand without seat negotiations."
    goal: "Revenue"
    learning: "Meter the unit that scales with customer success (data processed, requests, storage) so accounts expand automatically without a seat negotiation, and front it with a no-credit-card free credit so open-source adopters self-serve onto the paid tier before they ever talk to sales."
    when_it_works: "Works when the metered unit is predictable enough that buyers do not fear surprise bills."
    metric_moved: "nrr"
    result: "Usage-based model underpins 114% net retention (Q3 2025); Confluent Cloud revenue grew ~41% YoY to ~$492M (FY2024)."
    tradeoff: "Pricing on consumption instead of seats surrenders the contracted revenue predictability investors prize, because any slowdown in a customer's data volume directly shrinks Confluent's revenue, the same dynamic that pulled net retention down from 117% to 114%."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://opensourceunderdogs.com/episode-13-confluent-apache-kafka-streaming-with-jay-kreps/"
    attribution: "Jay Kreps (CEO), Open Source Underdogs podcast; Confluent Cloud free-trial terms ($400 credits, no card) per docs.confluent.io"
    tags:
      - "usage-based-pricing"
      - "free-tier"
      - "self-service"
      - "land-and-expand"
