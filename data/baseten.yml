plays:
  - title: "Open-source the packaging format users need before they need you"
    summary: "Data scientists kept hitting the gap between a model that ran in their Jupyter notebook and one running in production, then waited in line for an overloaded infra team to deploy it. Baseten built and open-sourced Truss, a Python framework that turns any model (vLLM, transformers, diffusers, TensorRT-LLM) into a deployable container with one command, useful entirely off-platform. Truss became the wedge: developers adopt it for free to solve the dev-to-prod gap, then convert to Baseten's paid inference platform once self-hosting GPUs gets painful."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Open-source the boring, standardizing layer your users would otherwise hand-roll (a packaging format, a CLI, a config standard), make it fully useful without your paid product, and let the pain of self-hosting at scale pull them onto your platform. The tool earns adoption; the operational burden does the selling."
    when_it_works: "Works when there is real friction in getting your users' work into production AND running it at scale is genuinely hard to self-host, so the free tool builds the funnel and the scaling pain converts it."
    metric_moved: "signups / developer adoption"
    result: "Truss reached 6,000+ GitHub stars and became Baseten's grassroots acquisition engine with no traditional sales motion; the platform later hit 100x inference-volume growth in 2025 with customers including Cursor, Notion, Abridge, and Clay."
    tradeoff: "By making Truss fully useful off-platform and vendor-neutral, Baseten builds the exact abstraction that lets adopters deploy their packaged models anywhere, so it forfeits lock-in and must keep re-winning on operational pain while funding a free tool whose users may never convert."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/baseten/"
    attribution: "Sacra company profile ('the open-source Truss framework, with over 6,000 GitHub stars, fosters grassroots adoption'); Baseten blog 'Why we built and open-sourced a model serving solution'"
    tags:
      - "open-source"
      - "github"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "templates-starters"
  - title: "Be a drop-in replacement for the incumbent API, 50% cheaper"
    summary: "Most developers already write against OpenAI's API, so switching providers normally means a code rewrite. Baseten built a library of 600+ open-source models (Llama, DeepSeek) deployable behind an endpoint in two clicks and exposed them through OpenAI-compatible APIs, so migrating means changing only the base URL and key. They seed new accounts with free credits and price tokens typically over 50% below comparable access (e.g. DeepSeek V3.1 at $0.50 in / $1.50 out per 1M tokens)."
    goal: "Activation"
    learning: "When a dominant incumbent's API is already the de facto standard your buyers code against, mirror that exact interface so switching to you is a one-line base-URL change, then win on price and free credits. You convert the incumbent's lock-in into your distribution by making trying you a non-event."
    when_it_works: "Works when there is a widely-adopted incumbent API surface you can legally and faithfully clone, and you can deliver comparable output at a materially lower price."
    metric_moved: "time-to-first-value / migration cost"
    result: "Models deployable in two clicks via OpenAI-compatible endpoints at rates typically 50%+ lower than comparable access, with free credits removing onboarding friction for the large base of developers already fluent in the OpenAI SDK."
    tradeoff: "Mirroring OpenAI's interface so switching is a one-line base-URL change makes Baseten just as trivially swappable for the next cheaper clone, and pricing 50%+ below comparable access sets a thin-margin commodity floor in a business where GPU costs dominate."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/baseten/"
    attribution: "Sacra company profile ('one-click access to open-source models such as Llama and DeepSeek via OpenAI-compatible endpoints' at rates 'typically over 50% lower'); Baseten model library and docs (pricing e.g. DeepSeek V3.1 $0.50 in / $1.50 out per 1M tokens)"
    tags:
      - "free-tier"
      - "templates-starters"
      - "docs-as-marketing"
      - "bottom-up-plg"
      - "usage-based-pricing"
  - title: "Embed your engine inside a partner's installed base"
    summary: "Rather than sell inference into biotech firms one account at a time, Baseten embedded its inference stack inside Benchling, the R&D platform those biotechs already run on. The co-branded 'Benchling Inference, powered by Baseten' lets scientists train and run models from inside Benchling, preloaded with top scientific models and offering VPC/hybrid deployment so data never leaves their environment. One integration gave Baseten distribution into an entire vertical instead of a from-scratch enterprise sales motion."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "To enter a vertical you have no foothold in, OEM your engine into the platform those buyers already live in and co-brand it, so the partner's incumbency becomes your distribution. Match their trust requirements (e.g. VPC/in-environment deployment) so the embed clears procurement instead of stalling on data-sovereignty objections."
    when_it_works: "Works when a single platform already aggregates your target buyers and your capability is a feature they want but don't want to build, making you the obvious embedded supplier rather than a competitor."
    metric_moved: "enterprise distribution / new accounts reached"
    result: "Embedded inference access to Benchling's installed base of 1,300+ biotech companies, including Merck, Moderna, and Sanofi, without direct enterprise sales into each account (announced May 20, 2026)."
    tradeoff: "Routing distribution through Benchling means the partner owns the customer relationship and the co-branded surface, so Baseten stays invisible behind their brand, shares the economics, and can be swapped out or dropped without ever reaching those accounts directly."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/benchling-and-baseten-partner-to-bring-ai-inference-to-biotech-rd-302777269.html"
    attribution: "PR Newswire joint press release (May 20, 2026); Benchling blog 'Announcing Benchling Inference powered by Baseten'"
    tags:
      - "integrations-marketplace"
      - "land-and-expand"
      - "design-partners"
