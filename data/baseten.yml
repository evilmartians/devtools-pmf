plays:
  - title: "Open-source your packaging format as the funnel"
    summary: "Data scientists struggled with the 'works-on-my-machine' gap between notebook and production, waiting on infra teams to deploy models. Baseten built and open-sourced Truss, a Python framework that packages any model (vLLM, transformers, diffusers, etc.) into a deployable server with one command. Truss delivers standalone value off-platform, but as projects scale beyond self-hosting it converts into a natural funnel to Baseten's paid inference platform."
    metric_moved: "growth"
    result: "Truss grew to 6,000+ GitHub stars and became Baseten's grassroots acquisition engine, driving global developer adoption without traditional sales overhead. Platform later hit 100x inference-volume growth in 2025 with customers like Cursor, Notion, Abridge, and Clay."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/baseten/"
    attribution: "Sacra company profile ('the open-source Truss framework, with over 6,000 GitHub stars, fosters grassroots adoption'); Baseten blog 'Why we built and open-sourced a model serving solution'"
    tags:
      - "open-source"
      - "github"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "templates-starters"
  - title: "Make popular models one-click, OpenAI-compatible, with free credits"
    summary: "Most developers already speak OpenAI's API. Baseten built a model library of 600+ open-source models (Llama, DeepSeek, etc.) deployable behind an endpoint in seconds, exposed via OpenAI-compatible APIs so teams can switch with minimal code change, and seeded new accounts with free credits to experiment. This collapses time-to-first-value and undercuts incumbents on price."
    metric_moved: "ttfv"
    result: "Models deployable in 'two clicks'; OpenAI-compatible endpoints priced typically over 50% lower than comparable access; new accounts get credits to deploy for free, removing onboarding friction for developers familiar with OpenAI."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/baseten/"
    attribution: "Sacra company profile ('one-click access to open-source models such as Llama and DeepSeek via OpenAI-compatible endpoints' at rates 'typically over 50% lower'); Baseten model library and docs"
    tags:
      - "free-tier"
      - "templates-starters"
      - "docs-as-marketing"
      - "bottom-up-plg"
      - "usage-based-pricing"
  - title: "Embed your engine inside a partner's installed base"
    summary: "Rather than sell inference to biotech firms one by one, Baseten embedded its inference stack into Benchling, the R&D platform biotechs already use. The co-branded 'Benchling Inference, powered by Baseten' lets scientists deploy and run models from inside Benchling (Jupyter notebooks, SDKs, VPC/hybrid options) with no infra to manage. Baseten reaches an entire vertical through one distribution partner instead of building enterprise sales motion from scratch."
    metric_moved: "growth"
    result: "Embedded inference access to Benchling's installed base of 1,300+ biotech companies, including Merck, Moderna, and Sanofi, without direct enterprise sales into each account."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/benchling-and-baseten-partner-to-bring-ai-inference-to-biotech-rd-302777269.html"
    attribution: "PR Newswire joint press release (May 2026); Benchling blog 'Announcing Benchling Inference powered by Baseten'"
