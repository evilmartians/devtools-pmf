plays:
  - title: "Gate only the multi-team features, give the engine away"
    summary: "HashiCorp open-sourced the full working core of every tool (Terraform, Vault, Consul, Nomad) so an individual engineer could solve their own problem for free with zero procurement. It then drew the paid line precisely at the point where solo use becomes org use: collaboration, RBAC, audit logging, policy-as-code (Sentinel), namespaces, and disaster-recovery replication, the exact features a single practitioner never needs but a CISO cannot ship without. As the S-1 put it, 'when practitioners succeed with our products, we win the right to be considered a commercial partner.' ~100M OSS downloads in FY2021 fed a land-and-expand motion."
    goal: "Expansion"
    learning: "Draw your paid line at the exact feature that flips a tool from solo use to team/org use, governance, audit, RBAC, policy-as-code, replication, and ship a genuinely complete free core below it; an individual should never hit a paywall, but the moment a second team or a compliance owner is involved, paying is the only path."
    when_it_works: "Works when individual practitioners can get real standalone value from the free core, and the things an enterprise must add (security, governance, compliance) are cleanly separable features rather than the core capability itself."
    metric_moved: "nrr"
    result: "~100M OSS downloads in FY2021; net dollar retention peaked at 133% (Q1 FY23). Revenue grew from $121.3M (FY20) to $211.9M (FY21), up 75% YoY."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://strategyofsecurity.com/p/hashicorps-ipo-bottom-up-adoption-and-layering"
    attribution: "Strategy of Security analysis of HashiCorp's S-1; enterprise vs OSS feature split per HashiCorp Vault/Terraform Enterprise comparison docs (hashicorp.com)"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
      - "open-core"
      - "governance-gating"
  - title: "Turn user-group leaders into your internal champions"
    summary: "HashiCorp seeded community in person before it had a sales motion. Its first HashiConf in 2015 was planned for 150 but sold out at 350 with 200 more waitlisted, proof of latent demand. It then franchised that energy into HashiCorp User Groups (HUGs): locally-run meetups led by community members, with HashiCorp providing central support, content, and swag rather than running each event itself. Because attendees usually lack purchasing authority, the explicit play was to convert group leaders into internal advocates who carry the tools up to their own CIOs and CTOs."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Don't run every community event yourself; hand the format, content, and swag to volunteer organizers in each city and let them scale your reach for free, then deliberately coach those organizers to become the people who pitch your tool internally to their own budget-holders."
    when_it_works: "Works when your users are practitioners who cluster locally and care enough to organize, and there is an internal buyer above them you need a champion to reach; weak if your audience won't gather in person or you can't supply organizers with real support."
    metric_moved: "community reach"
    result: "HashiConf 2015 sold out at 350 (vs 150 planned), 200 waitlisted; HUGs grew to 173 groups in 61 countries reaching 49,000+ people."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-hashicorp"
    attribution: "Community Inc deep dive on HashiCorp community growth"
    tags:
      - "conference-talk"
      - "community-led"
      - "developer-advocacy"
      - "champion-building"
      - "word-of-mouth"
  - title: "Let the community write your integrations via a self-publish registry"
    summary: "Instead of building every integration in-house, HashiCorp shipped a Go-based Plugin SDK and a public Terraform Registry where anyone can publish a provider by following one convention: a public GitHub repo named terraform-provider-{NAME}, signed in with GitHub, releases auto-published via a GitHub Actions tag. That removed HashiCorp from the loop entirely. It maintained ~30 official providers while the community built 100+ verified and 1,100+ community providers, expanding coverage and lock-in without proportional headcount."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Ship a documented plugin SDK plus a self-serve registry with a single naming/release convention so outsiders can publish integrations to your users without ever talking to you; your integration surface then grows with demand instead of with your headcount, and each new provider deepens switching costs."
    when_it_works: "Works when integrations are a major part of your product's value and third parties (vendors, users) have their own incentive to connect to you; the registry only pays off once enough users exist to make publishing worthwhile."
    metric_moved: "integration coverage / community contributions"
    result: "1,100+ community providers and 100+ verified providers beyond ~30 official ones; 5,000+ external contributors; products downloaded 250M+ times."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-hashicorp"
    attribution: "Community Inc deep dive on HashiCorp community growth; Terraform Registry provider publishing docs (developer.hashicorp.com/terraform/registry/providers/publishing)"
    tags:
      - "open-source"
      - "integrations-marketplace"
