plays:
  - title: "Sell enterprise features on top of free OSS core"
    summary: "HashiCorp open-sourced every core tool (Terraform, Vault, Consul, Nomad) so individual practitioners could adopt them for free with no procurement. Once usage scaled inside an organization, the company sold proprietary enterprise editions layered on top with team, governance, and compliance features. As the S-1 framed it, 'when practitioners succeed with our products, we win the right to be considered a commercial partner.' Open-source products were downloaded ~100M times in fiscal 2021, feeding a land-and-expand motion that pushed NRR to a 133% peak (Q1 FY23)."
    metric_moved: "nrr"
    result: "~100M OSS downloads in FY2021 fed enterprise conversion; net dollar retention peaked at 133% (Q1 FY23). Revenue grew from $121.3M (FY20) to $211.9M (FY21), 75% YoY."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://strategyofsecurity.com/p/hashicorps-ipo-bottom-up-adoption-and-layering"
    attribution: "Strategy of Security analysis of HashiCorp's S-1; bottom-up adoption and layering"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
      - "freemium"
  - title: "Run a flagship conference plus local user groups"
    summary: "HashiCorp seeded developer community early with in-person events. The first HashiConf in 2015 was planned for 150 people but sold out at 350 attendees with another 200 on the waitlist. Alongside it they launched community-led HashiCorp User Groups (HUGs) that members run locally with central support. Because meetup and conference attendees often lack purchasing authority, HashiCorp turned them into internal champions who introduce the tools to their own CIOs and CTOs."
    metric_moved: "community"
    result: "HashiConf 2015 sold out at 350 (vs 150 planned) with 200 waitlisted; HUGs grew to 173 groups in 61 countries reaching 49,000+ people."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-hashicorp"
    attribution: "Community Inc deep dive on HashiCorp community growth"
    tags:
      - "conference-talk"
      - "community-led"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Make your plugin ecosystem trivial to contribute to"
    summary: "Rather than build every integration in-house, HashiCorp made it easy for outsiders to write Terraform providers and tool plugins, then let the community carry the integration load. They shipped ~30 official providers while the community contributed 100+ verified and 1,100+ community providers. More than 5,000 people have contributed to the products, mostly through the plugin ecosystem rather than core code, which expanded coverage and locked in adoption without proportional headcount."
    metric_moved: "community"
    result: "1,100+ community providers and 100+ verified providers beyond ~30 official ones; 5,000+ external contributors; products downloaded 250M+ times."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-hashicorp"
    attribution: "Community Inc deep dive on HashiCorp community growth"
