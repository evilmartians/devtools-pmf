plays:
  - title: "Put your brand inside the artifact users share"
    summary: "ngrok's core action is sharing a public URL to your localhost. By default, free users get a random ngrok.io subdomain, so every URL a developer sends to a teammate, demo audience, or webhook provider literally contains 'ngrok'. The product became its own distribution channel: each shared tunnel advertised the tool to the next developer who clicked it. Custom subdomains and bring-your-own-domain were paywalled, so the people most likely to spread the brand were exactly the free users who couldn't remove it."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Stamp your brand on the shareable output your product generates by default, then paywall removing it. Your highest-reach free users broadcast your name every time they share, turning your widest distribution into a feature only payers can switch off."
    when_it_works: "Works when your product's core action produces a shareable artifact (a URL, file, embed, or link) that lands in front of other potential users."
    metric_moved: "organic signups / word-of-mouth growth"
    result: "Reached 5M+ developers (later 6M+) over ~7 years fully bootstrapped, with 4,000+ new signups per day and the company stating it grew 'solely by word of mouth' before its first raise."
    tradeoff: "Branding the default URL means your widest-reach free users are the ones broadcasting an unremovable ngrok.io subdomain, so you train them to associate your name with the throwaway, hobbyist tier and you only capture revenue from the small slice who pay to strip the brand off, while the random subdomain also brands your product as a temporary demo tool and weakens its credibility as production infrastructure."
    tier: "Verified"
    source_type: "press"
    source_url: "https://ngrok.com/blog/ngrok-raises-50m-for-ingress-as-a-service"
    attribution: "ngrok Series A press release (Dec 2022): '5 million developers... spreading solely by word of mouth'; branded random-subdomain mechanic described by Alan Shreve (Frontlines.io / Category Visionaries interview)."
    tags:
      - "default-on"
      - "viral-loop"
      - "word-of-mouth"
      - "free-tier"
      - "bottom-up-plg"
  - title: "Own the pain that breaks other companies' live demos"
    summary: "ngrok solved one sharp, recurring pain: exposing localhost so webhooks fire and live demos work without deploying. That made it the default tool developer-evangelist teams at Slack and GitHub reached for during conference talks, demoing Slack/GitHub webhook integrations against their laptop in front of large developer audiences. The brand traveled with the demo: the moment ngrok ran on screen, every attendee saw the tool that made the demo possible, with zero marketing spend."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Solve the recurring friction that wrecks other teams' on-stage demos and webhook integrations, exposing localhost, so cleanly that their developer advocates run you in front of thousands. You inherit their audience and their credibility at zero spend."
    when_it_works: "Works when your tool removes friction from a workflow other companies must demo publicly: webhooks, integrations, local dev."
    metric_moved: "developer awareness / top-of-funnel"
    result: "Evangelists at major platforms (Slack, GitHub) folding ngrok into on-stage demos drove trusted top-of-funnel awareness Shreve described as 'viral and adopting spread.'"
    tradeoff: "Awareness that rides on other companies' demos is awareness you do not control: the exposure only happens when their evangelists choose to run you, it fluctuates with their conference schedules and integration priorities, and it cements ngrok as the convenient demo-and-webhook prop, a role teams reach for without paying to depend on it."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.frontlines.io/podcasts/alan-shreve/"
    attribution: "Alan Shreve, Category Visionaries / Frontlines.io interview: developer evangelism teams at Slack and GitHub incorporated ngrok into conference presentations."
    tags:
      - "conference-talk"
      - "developer-advocacy"
      - "word-of-mouth"
      - "community-led"
  - title: "Against identical clones, the one with zero setup wins"
    summary: "Alan Shreve built ngrok as a single self-contained Go binary you drop into your path and run, with a built-in auto-updater and zero config, so a developer goes from download to a working public tunnel in seconds. That friction-free first run made ngrok stick in daily testing and demo workflows where competing localtunnel tools (with runtimes, dependencies, or setup steps) did not. Shreve attributes ngrok taking off over functionally similar clones to obsessing over the first-run experience."
    goal: "Activation"
    learning: "Ship a single zero-dependency binary with a built-in auto-updater so first value lands in one command. When competitors are functionally identical, the one that goes from download to working in seconds takes the distribution."
    when_it_works: "Works for developer tools installed locally where setup friction (runtimes, dependencies, config) is the main thing standing between download and first value."
    metric_moved: "time-to-first-value"
    result: "Near-instant time-to-first-tunnel drove broad daily adoption; Shreve noted 'most casual users never really break out of that free tier,' keeping the top of funnel huge and self-serve."
    tradeoff: "Optimizing the first run so anyone gets a working tunnel in seconds means most casual users, by Shreve's own account, never break out of the free tier, so you fund and support an enormous non-paying top of funnel and inherit a chronically low free-to-paid conversion (~0.5%) as the price of frictionless adoption."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://changelog.com/podcast/210"
    attribution: "Alan Shreve, Changelog Interviews #210: 'just a single Go binary, you drop it into your path and it runs'; built-in auto-update; 'most casual users never really break out of that free tier.'"
    tags:
      - "developer-advocacy"
      - "bottom-up-plg"
      - "free-tier"
      - "onboarding-redesign"
