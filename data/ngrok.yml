plays:
  - title: "Brand the free tier's shared URLs"
    summary: "ngrok's core action is sharing a public URL to your localhost. For free users, ngrok hands out a random ngrok.io subdomain by default, so every URL a developer sends to a teammate, demo audience, or webhook provider literally has 'ngrok' in it. The product became its own distribution channel: each shared tunnel advertised the tool to the next developer. ngrok reached 5M+ developers spreading 'solely by word of mouth' before ever raising capital."
    metric_moved: "organic"
    result: "Reached 5M+ developers (later 6M+) bootstrapped for ~7 years, with the company stating it grew 'solely by word of mouth when developers recommend us to their peers' and was 'entirely funded with customer revenue.'"
    tier: "Verified"
    source_type: "press"
    source_url: "https://ngrok.com/blog/ngrok-raises-50m-for-ingress-as-a-service"
    attribution: "ngrok Series A press release (Dec 2022): '5 million developers... spreading solely by word of mouth when developers recommend us to their peers'; viral branded-URL mechanic described by Alan Shreve."
    tags:
      - "default-on"
      - "viral-loop"
      - "word-of-mouth"
      - "free-tier"
      - "bottom-up-plg"
  - title: "Ship a single-binary, one-command install"
    summary: "Alan Shreve built ngrok as one self-contained Go binary you drop into your path and run, with a built-in auto-updater, so a developer goes from download to a working public tunnel in seconds with zero config. The friction-free first run made ngrok stick in daily testing and demo workflows, and the generous free tier meant most casual users never needed to upgrade. Shreve credits loving 'building product experiences that people love' as why a functional localtunnel clone took off where others didn't."
    metric_moved: "ttfv"
    result: "Near-instant time-to-first-tunnel drove broad daily adoption; Shreve noted 'most casual users never really break out of that free tier,' keeping the top of funnel huge and self-serve."
    tier: "Reported"
    source_type: "estimate"
    source_url: "https://changelog.com/podcast/210"
    attribution: "Alan Shreve, Changelog Interviews #210: 'just a single Go binary, you drop it into your path and it runs'; built-in auto-update; 'most casual users never really break out of that free tier.'"
    tags:
      - "developer-advocacy"
      - "bottom-up-plg"
      - "free-tier"
      - "onboarding-redesign"
  - title: "Get evangelists to demo you on stage"
    summary: "ngrok solved a sharp pain, exposing localhost for webhook testing and live demos, which made it the natural tool to reach for during conference talks. Developer-evangelist teams at companies like Slack and GitHub started using ngrok in their on-stage demos, putting the tool in front of large developer audiences for free. Shreve describes this as a 'viral and adopting spread' that established ngrok as a default part of the developer demo stack."
    metric_moved: "growth"
    result: "Evangelists at major platforms (Slack, GitHub) demoing ngrok on stage drove trusted, top-of-funnel developer awareness with no paid marketing."
    tier: "Reported"
    source_type: "estimate"
    source_url: "https://www.frontlines.io/podcasts/alan-shreve/"
    attribution: "Alan Shreve, Category Visionaries / Frontlines.io interview: developer evangelism teams at Slack and GitHub incorporated ngrok into conference presentations, creating 'viral and adopting spread.'"
    tags:
      - "conference-talk"
      - "developer-advocacy"
      - "word-of-mouth"
      - "community-led"
