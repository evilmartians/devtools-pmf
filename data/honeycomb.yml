plays:
  - title: "Price on events, never on cardinality"
    summary: "Legacy observability tools charged per host or per unique time series, which penalized teams for adding rich context (customer IDs, build IDs) and made bills unpredictable. In May 2020 Honeycomb moved to a single event-based pricing model: one flat charge per event regardless of how many dimensions it carries, with a generous 20M-events/month free tier and burst protection for 2x daily spikes. This removed the fear of 'cardinality explosion' that blocks adoption and let usage expand naturally inside accounts."
    metric_moved: "nrr"
    result: "Volume-based-but-cardinality-free pricing underpinned 160%+ net revenue retention across 600+ customers in 2022 (138% through Sep 2023), since customers expand by sending more richly-instrumented data rather than being charged per host or per dimension."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/honeycombio-makes-it-easy-to-adopt-observability-with-new-pricing-model--plans-301060449.html"
    attribution: "Honeycomb pricing-model press release (May 2020); NRR figures from Honeycomb Series D PR (2022) and best-quarter blog (Oct 2023)"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
      - "free-tier"
      - "bottom-up-plg"
      - "land-and-expand"
  - title: "Write the category's canonical O'Reilly book"
    summary: "To create and own the 'observability' category against far larger incumbents, Honeycomb's founder/evangelists authored the O'Reilly book 'Observability Engineering' (Charity Majors, Liz Fong-Jones, George Miranda), released May 2022. Positioned as vendor-neutral education, the book legitimizes observability as a distinct discipline versus traditional monitoring and is given away as a free PDF, making Honeycomb the implicit reference implementation. They extended it with an 'Author's Cut' series and a 2nd edition with 27 net-new chapters."
    metric_moved: "organic"
    result: "Established Honeycomb as the definitional authority on observability (a term its CTO popularized for software), supporting Gartner Magic Quadrant Leader status alongside much larger competitors despite a far smaller revenue base."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.honeycomb.io/blog/honeycomb-authors-oreilly-book-on-observability-engineering"
    attribution: "Honeycomb blog announcing the O'Reilly book (2022); 2nd-edition details from honeycomb.io"
    tags:
      - "docs-as-marketing"
      - "content-seo"
      - "developer-advocacy"
      - "community-led"
  - title: "Lead the open standard to kill lock-in objections"
    summary: "The biggest blocker to adopting a smaller observability vendor is fear of proprietary lock-in. Honeycomb leaned into OpenTelemetry, the open instrumentation standard, building the product to be OTel-native and putting executives like co-founder Austin Parker on the OpenTelemetry Governance Committee. By telling buyers their data stays portable and they can leave anytime, Honeycomb turned an open standard into a sales accelerant and rode the ecosystem's growth instead of fighting it."
    metric_moved: "growth"
    result: "OpenTelemetry-native positioning gives buyers vendor portability and negotiating leverage, neutralizing the lock-in objection that favors incumbents and lowering the barrier for teams to start with Honeycomb."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.honeycomb.io/blog/much-ado-about-opentelemetry"
    attribution: "Honeycomb engineering blog on OpenTelemetry; Austin Parker (OTel co-founder / Governance Committee) role corroborated across Honeycomb materials"
