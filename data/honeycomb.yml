plays:
  - title: "Price per event, not per host or cardinality"
    summary: "Legacy observability tools billed per host or per unique time series, which punished teams for adding the rich context (customer IDs, build IDs, feature flags) that makes debugging actually work, and made bills spike unpredictably. In May 2020 Honeycomb moved to a single event-based model: one flat charge per event no matter how many dimensions it carries, with a 20M-events/month free tier and burst protection for 2x daily spikes. This killed the 'cardinality explosion' fear that blocks adoption and let accounts expand naturally as teams instrumented more deeply."
    goal: "Expansion"
    learning: "Bill on the unit that grows when customers get more value (events, runs, rows) rather than the unit that punishes them for using the product well (hosts, dimensions, seats); a pricing axis that doesn't tax the behavior you want creates the expansion. Pair it with a free tier large enough that the 'aha' happens before anyone pays."
    when_it_works: "When your product gets more valuable the more richly customers use it, so the billing unit and the value created move together."
    metric_moved: "nrr"
    result: "Cardinality-free volume pricing underpinned 160%+ net revenue retention across 600+ customers in 2022 (138% through Sep 2023); customers expand by sending richer data, not by being charged per host or per dimension."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/honeycombio-makes-it-easy-to-adopt-observability-with-new-pricing-model--plans-301060449.html"
    attribution: "Honeycomb pricing-model press release (May 2020); NRR figures from Honeycomb Series D PR (2022) and best-quarter blog (Oct 2023)"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
      - "free-tier"
      - "bottom-up-plg"
      - "land-and-expand"
  - title: "Write the category's canonical O'Reilly book"
    summary: "To create and own 'observability' against far larger incumbents, Honeycomb's founders and evangelists authored the O'Reilly book 'Observability Engineering' (Charity Majors, Liz Fong-Jones, George Miranda), released May 2022. Positioned as vendor-neutral education that legitimizes observability as a discipline distinct from monitoring, it is given away as a free PDF, making Honeycomb the implicit reference implementation. They extended it with an 'Author's Cut' series and a near-fully-rewritten 2nd edition for the AI era."
    goal: "Acquisition"
    learning: "When you are smaller than the incumbents, publish the vendor-neutral reference text that defines your category (an O'Reilly book, a definitive spec, a canonical course) and give it away; buyers learning the discipline from your words makes your product the implicit default. Teach the problem, not the product, and let your framing become the buyer's mental model."
    when_it_works: "When the category is new or contested enough that no canonical definition exists yet and you can credibly author it."
    metric_moved: "organic"
    result: "Established Honeycomb as the definitional authority on observability (a term its founders coined for software), supporting Gartner Magic Quadrant Leader status alongside competitors many times its revenue."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.honeycomb.io/blog/honeycomb-authors-oreilly-book-on-observability-engineering"
    attribution: "Honeycomb blog announcing the O'Reilly book (2022); 2nd-edition details from honeycomb.io and PR Newswire (2025)"
    tags:
      - "docs-as-marketing"
      - "content-seo"
      - "developer-advocacy"
      - "category-creation"
  - title: "Lead the open standard to kill lock-in fear"
    summary: "The biggest blocker to adopting a smaller observability vendor is fear of proprietary lock-in. Honeycomb built the product to be OpenTelemetry-native and put leaders like Austin Parker on the OpenTelemetry Governance Committee, so the open instrumentation standard buyers were already adopting routed cleanly into Honeycomb. By telling buyers their data stays portable and they can leave anytime, Honeycomb turned an open standard into a sales accelerant and rode the ecosystem's growth instead of fighting it."
    goal: "Acquisition"
    learning: "Adopt the open standard your buyers are already moving toward as your native ingest path, and put your people on its governance body; portability removes the lock-in objection that protects the incumbent, and standard-bearer status earns trust your size cannot buy. Make 'you can leave anytime' a true and prominent part of the pitch."
    when_it_works: "When an open standard exists (or is forming) in your space and incumbents rely on proprietary formats to lock customers in."
    metric_moved: "growth"
    result: "OTel-native positioning gives buyers vendor portability and negotiating leverage, neutralizing the lock-in objection that favors incumbents and lowering the barrier for teams to start with Honeycomb; its largest enterprise customers now adopt OTel across their apps."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://thenewstack.io/honeycomb-ios-austin-parker-opentelemetry-in-depth/"
    attribution: "The New Stack interview with Honeycomb's Austin Parker on OpenTelemetry; OTel Governance Committee role corroborated across Honeycomb materials"
    tags:
