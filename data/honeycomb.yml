plays:
  - title: "Bill the unit that grows when customers win"
    summary: "Legacy observability tools billed per host or per unique time series, punishing teams for adding the rich context (customer IDs, build IDs, feature flags) that makes debugging work and spiking bills unpredictably. In May 2020 Honeycomb moved to a single event-based model: one flat charge per event regardless of how many dimensions it carries, with a 20M-events/month free tier and burst protection for 2x daily spikes. This killed the 'cardinality explosion' fear that blocks adoption and let accounts expand as teams instrumented more deeply."
    goal: "Expansion"
    learning: "Meter on the unit that rises as customers extract more value (events, runs, rows) and avoid units that penalize good usage (hosts, dimensions, seats), so your billing axis stops taxing the exact behavior you want more of. Front it with a free tier big enough that the aha lands before the first invoice."
    when_it_works: "When your product gets more valuable the more richly customers use it."
    metric_moved: "nrr"
    result: "Cardinality-free volume pricing underpinned 160%+ net revenue retention across 600+ customers in 2022 (138% through Sep 2023); accounts expand as teams send richer data, with no per-host or per-dimension penalty."
    tradeoff: "By tying revenue to data volume you make your top line a line item customers are trained to minimize: they sample, drop, and tune ingestion to control spend, so the same usage axis that drives expansion also caps it and exposes you directly to any efficiency or cost-cutting cycle."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/honeycombio-makes-it-easy-to-adopt-observability-with-new-pricing-model--plans-301060449.html"
    attribution: "Honeycomb pricing-model press release (May 2020); NRR figures from Honeycomb Series D PR (2022) and best-quarter blog (Oct 2023)"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
      - "free-tier"
      - "bottom-up-plg"
      - "land-and-expand"
  - title: "Define your category in a book you give away"
    summary: "To own 'observability' against far larger incumbents, Honeycomb's founders and evangelists authored the O'Reilly book 'Observability Engineering' (Charity Majors, Liz Fong-Jones, George Miranda), released May 2022. Vendor-neutral education that frames observability as a discipline distinct from monitoring, given away as a free PDF, it makes Honeycomb the implicit reference implementation. They extended it with an 'Author's Cut' series and a near-fully-rewritten 2nd edition for the AI era."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "When you are out-sized by incumbents, author the vendor-neutral reference text for your category (O'Reilly book, definitive spec, canonical course) and hand it out free, so buyers learn the discipline in your words and your framing becomes their default mental model. Teach the problem itself, and you become the implicit reference implementation."
    when_it_works: "When the category is new or contested enough that no canonical definition exists yet and you can credibly author it."
    metric_moved: "organic"
    result: "Established Honeycomb as the definitional authority on observability (a term its founders coined for software), supporting Gartner Magic Quadrant Leader status alongside competitors many times its revenue."
    tradeoff: "Giving away a vendor-neutral category text educates the entire market, including buyers who then take that literacy to better-funded incumbents, and the neutrality that makes the book credible forbids the product hooks that would convert that attention directly to you."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.honeycomb.io/blog/honeycomb-authors-oreilly-book-on-observability-engineering"
    attribution: "Honeycomb blog announcing the O'Reilly book (2022); 2nd-edition details from honeycomb.io and PR Newswire (2025)"
    tags:
      - "docs-as-marketing"
      - "content-seo"
      - "developer-advocacy"
      - "category-creation"
  - title: "Make 'you can leave anytime' your sales pitch"
    summary: "The biggest blocker to adopting a smaller observability vendor is fear of proprietary lock-in. Honeycomb built the product OpenTelemetry-native and put leaders like Austin Parker on the OpenTelemetry Governance Committee, so the open instrumentation standard buyers were already adopting routed cleanly into Honeycomb. Telling buyers their data stays portable and they can leave anytime turned an open standard into a sales accelerant and let Honeycomb ride the ecosystem's growth."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Adopt the open standard your buyers are already migrating to as your native ingest path and seat your people on its governance body, so portability dissolves the lock-in objection that shields the incumbent and standard-bearer status buys trust your headcount cannot. Make exit-anytime true and loud, and ride the ecosystem's growth."
    when_it_works: "When an open standard exists (or is forming) in your space and incumbents rely on proprietary formats to lock customers in."
    metric_moved: "growth"
    result: "OTel-native positioning gives buyers vendor portability and negotiating leverage, neutralizing the lock-in objection that favors incumbents and lowering the barrier for teams to start with Honeycomb; its largest enterprise customers now adopt OTel across their apps."
    tradeoff: "Making data fully portable and promising 'you can leave anytime' dissolves your own switching-cost moat, forcing you to re-win every renewal on product alone while the same open standard lets far larger incumbents ingest identical OTel data and commoditize the layer you ride in on."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://thenewstack.io/honeycomb-ios-austin-parker-opentelemetry-in-depth/"
    attribution: "The New Stack interview with Honeycomb's Austin Parker on OpenTelemetry; OTel Governance Committee role corroborated across Honeycomb materials"
