plays:
  - title: "Ship zero-CVE images as drop-in replacements"
    summary: "Most security tools fail because they force developers to change their workflow. Chainguard built hardened, distroless container images (only the app and its runtime, no shell or package manager) that swap in for existing base images with no Dockerfile rewrite. This removed onboarding friction so developers could adopt secure-by-default infrastructure inside their existing build pipeline, then standardize on it across the org."
    metric_moved: "ttfv"
    result: "Frictionless drop-in adoption fueled a ~7x ARR jump to $40M in FY2025 and 600+ customers including ANZ Bank, Snowflake, HPE, and Canva."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://guruchahal.substack.com/p/from-google-to-chainguard-dan-lorenc"
    attribution: "Dan Lorenc interview, Guru Chahal Substack (From Google to Chainguard: Developer-Led Security)"
    tags:
      - "default-on"
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
  - title: "Innovate on product, outsource the GTM motion"
    summary: "Rather than reinventing enterprise sales as a developer-first company, Chainguard deliberately chose a conventional top-down motion and partnered with investors who already had relationships with thousands of enterprise buyers. Lorenc's rule: 'Innovate on your product, not your go-to-market motion.' They selected Salesforce Ventures specifically for deep, long-term relationships with key decision-makers, letting developer-led grassroots adoption create bottom-up pressure that CISO purchases then followed."
    metric_moved: "growth"
    result: "Reached a $3.5B valuation and 600+ customers; Series D of $356M (April 2025) led by Kleiner Perkins and IVP."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://salesforceventures.com/perspectives/chainguard-ceo-dan-lorenc-on-securing-open-source-resisting-the-urge-to-reinvent-enterprise-sales/"
    attribution: "Dan Lorenc, Salesforce Ventures Perspectives interview"
    tags:
      - "founder-led-sales"
      - "land-and-expand"
      - "developer-advocacy"
  - title: "Give away five free images as the entry point"
    summary: "To seed bottom-up adoption, Chainguard launched Catalog Starter: five free trusted container images of your choice (Base, Application, AI) per organization, drawn from a catalog of 2,200+ open source projects. It targets individual devs, enterprise teams prototyping before rollout, and startups running early production workloads. The free tier is explicitly framed as the gateway to land-and-expand, with teams growing beyond their initial five as they standardize on secure-by-default infrastructure."
    metric_moved: "free_to_paid"
    result: "Launched March 2026 as a free trial-to-production on-ramp; positioned as the entry point to broader enterprise adoption (no conversion rate disclosed)."
    tier: "Reported"
