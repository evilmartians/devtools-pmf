plays:
  - title: "If adopting you costs more than one edit, you lose"
    summary: "Security tools usually fail because they force developers to change their build. Chainguard shipped hardened, distroless container images (only the app and runtime, no shell or package manager) that swap into an existing Dockerfile by editing only the FROM line, or by repointing a Helm chart, with no other rewrite. To kill the last friction, they also ship a 'dev variant' of nearly every image that keeps a shell and package manager so the swap is truly drop-in. Developers could adopt secure-by-default infrastructure inside their current pipeline, then standardize across the org."
    goal: "Activation"
    learning: "When you replace something devs already run in prod, make the switch a single config line (the FROM line, one import, one env var) and ship a fully-featured variant next to the minimal one so nothing breaks on swap. Trying you should cost a single edit."
    when_it_works: "Works when teams already run the component in production and the value (here, fewer CVEs) shows up without any behavior change."
    metric_moved: "ttfv"
    result: "Drop-in adoption drove a 5X year-over-year customer-base increase and 175%+ ARR growth in the first six months of the fiscal year, contributing to ~7x ARR growth to $40M and 600+ customers including Anduril, Snowflake, HPE, and Canva."
    tradeoff: "A one-line FROM swap that adds no proprietary surface cuts both ways: the same edit that wins a customer lets them revert just as cheaply, so you compete on a commoditized layer and must re-earn the value with every CVE delta rather than locking anyone in; the 'dev' variant that ships a shell and package manager to guarantee the swap also reintroduces the attack surface the hardened image existed to remove."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/software-security-leader-chainguard-raises-140-million-in-series-c-funding-to-secure-the-next-frontier-of-ai-workloads-302206133.html"
    attribution: "Chainguard Series C press release (PR Newswire), corroborated by Chainguard Academy docs on dev variants and Dockerfile FROM-line swap"
    tags:
      - "default-on"
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
      - "time-to-value"
  - title: "Put the thing the executive is liable for behind the paywall"
    summary: "Free images get developers in, but enterprises pay for a promise. Chainguard turned 'low-CVE' from a vibe into a contract: a written remediation SLA of 7 days for critical CVEs, 14 days for high/medium/low, and 1 day for any CISA-listed Known Exploited Vulnerability, with the image guaranteed to be zero-CVE when you build with it. That contractual guarantee is what a CISO buys and what justifies the price over free base images, letting developer-led grassroots adoption convert into top-down enterprise purchases."
    goal: "Conversion"
    learning: "Take the part of your value an executive buyer is personally on the hook for and write it into an explicit SLA with hard numbers (7 days for critical CVEs, 1 day for KEV), then gate it. Free gets developers in; the contractual guarantee is what converts grassroots usage into budget."
    when_it_works: "When your buyer carries compliance or liability risk and a measurable guarantee (remediation time, uptime) is something they currently have to do manually and cannot easily self-promise."
    metric_moved: "free_to_paid"
    result: "The paid catalog (2,000+ images with version pinning and the CVE remediation SLA) underpins a land-and-expand motion reaching 600+ paying customers and a $3.5B valuation; the free tier of ~50 unauthenticated images is the on-ramp."
    tradeoff: "Turning 'low-CVE' into a written SLA (7 days critical, 1 day for KEV) converts a marketing claim into a perpetual operational liability: you must staff and sustain that remediation cadence across 2,000+ images indefinitely, and every miss is now a contractual breach you are financially and reputationally on the hook for."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.chainguard.dev/legal/cve-policy"
    attribution: "Chainguard published CVE SLA policy; KEV one-day SLA per Chainguard Unchained blog"
    tags:
      - "pricing-packaging"
      - "compliance"
      - "land-and-expand"
      - "founder-led-sales"
      - "developer-advocacy"
  - title: "Peg your free cap to the unit teams accumulate when they get serious"
    summary: "Chainguard launched Catalog Starter: five free trusted container images of your choice per organization, drawn from a catalog of 2,200+ projects, plus ~50 images you can docker pull with no login at all. The cap is deliberate. A single team prototyping hits the five-image ceiling fast once they standardize, and the free tier is explicitly framed as the gateway to land-and-expand. The zero-login pull removes even the signup barrier, while the five-image limit creates a natural, usage-driven reason to talk to sales."
    goal: "Conversion"
    learning: "Set the free ceiling on the unit usage actually grows by (distinct images here), low enough that a team trips it the moment they standardize, so the limit becomes your qualified-lead trigger. Keep entry zero-login so the cap qualifies buyers instead of blocking the top of funnel."
    when_it_works: "When usage scales by a countable unit you can meter, and hitting the cap correlates with a team being serious enough to buy rather than just kicking tires."
    metric_moved: "free_to_paid"
    result: "Launched March 2026 as a free trial-to-production on-ramp positioned as the entry point to enterprise adoption (no conversion rate disclosed)."
    tradeoff: "A deliberately tight five-image cap is friction by design, so it taxes honest evaluation as much as it qualifies leads: a team still proving the value can hit the ceiling and bounce to free public base images or a competitor before they ever feel committed enough to buy."
    tier: "Reported"
    source_type: "press"
