plays:
  - title: "Make schema changes a Git-style branch-and-PR flow"
    summary: "Schema migrations are scary, blocking, and easy to break in teams. PlanetScale wrapped its Vitess engine in a Git-native workflow: developers branch the database from production, make schema changes in isolation, then open a 'deploy request' (a pull request for the database) that runs a three-way merge and validates each change against all queued changes before it ships. This branching workflow became the killer feature that drove developer adoption and word of mouth, framed in the company's own language as the thing that lets teams 'ship things faster' without risking production."
    metric_moved: "growth"
    result: "Branching/deploy requests became PlanetScale's signature adoption driver, used by teams from startups to Fortune 500s; the platform grew to 1 trillion+ SQL queries/month by 2023."
    tier: "Verified"
    source_type: "press"
    source_url: "https://planetscale.com/blog/database-branching-three-way-merge-schema-changes"
    attribution: "PlanetScale engineering blog (database branching three-way merge)"
    tags:
      - "github"
      - "default-on"
      - "developer-advocacy"
      - "word-of-mouth"
      - "docs-as-marketing"
  - title: "Kill the free tier to force serious customers"
    summary: "PlanetScale ran a free Hobby tier as PLG top-of-funnel but found it subsidized non-paying hobbyists while a handful of large customers carried revenue. In March 2024, alongside layoffs in sales/marketing, the company sunset the Hobby plan (ending April 8) and publicly committed to profitability. CEO Sam Lambert argued 'we do not need to give away endless amounts of free resources in order to keep growing' and that an unprofitable company always has a date where it could disappear. It drew heavy 'rug pull' backlash, but Lambert later called dropping the free tier one of PlanetScale's best decisions, reframing the product as infrastructure for companies 'totaling more than $50B in market cap.'"
    metric_moved: "growth"
    result: "Lost a large share of free users but moved to prioritize profitability and enterprise revenue; CEO publicly stands by it as one of the company's best decisions (July 2025 podcast)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.theregister.com/2024/03/11/planetscale_lays_off_staff_and/"
    attribution: "The Register (Mar 11 2024); PlanetScale 'PlanetScale forever' blog; Scaling DevTools podcast with Sam Lambert (Jul 2025)"
    tags:
      - "pricing-change"
      - "free-tier"
      - "founder-led-sales"
      - "land-and-expand"
      - "transparency"
  - title: "Re-add a cheap $5 entry tier, not free"
    summary: "After removing the free Hobby plan, PlanetScale still needed an affordable on-ramp for the small-project funnel without giving away resources. In November 2025 it shipped a $5/month single-node Postgres plan, production-ready with the full developer feature set (Query Insights, schema recommendations, branching, metrics), and dropped development branches from $10 to $5. It positioned the tier explicitly for 'startups, side projects, proof of concepts, or development,' recapturing the low-end funnel as a paid, qualifying step rather than free infrastructure."
    metric_moved: "free_to_paid"
    result: "Created a low-friction $5 paid entry point for side projects and dev environments, replacing the removed free tier with a cheap paying on-ramp into the platform."
    tier: "Reported"
    source_type: "press"
    source_url: "https://planetscale.com/blog/5-dollar-planetscale-is-here"
    attribution: "PlanetScale blog ($5 PlanetScale is live, Nov 14 2025)"
    tags:
