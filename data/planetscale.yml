plays:
  - title: "Turn schema migrations into a branch-and-deploy-request flow"
    summary: "Schema changes are the scariest, most lock-prone operation in a team's database, and a bad ALTER can take production down. PlanetScale mapped the exact Git mental model onto the database: developers branch an isolated copy of the production schema, change it freely, then open a 'deploy request' that shows a semantic schema diff (CREATE TABLE, ALTER TABLE) and lints each change for compatibility before merge. On merge, it never runs raw DDL against the live table; it builds a shadow table, backfills rows in batches while binlog-streaming live writes, then does an atomic name-swap cutover for zero downtime regardless of table size. This branching workflow became the signature feature that drove developer word of mouth."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Take the single most dangerous operation in your category and wrap it in the workflow developers already trust (Git branch, diff, review, merge); a familiar safety model on a scary task becomes the feature people demo to each other."
    when_it_works: "Works when your product owns an operation users genuinely fear getting wrong, so that de-risking it (not just speeding it up) is the wedge."
    metric_moved: "developer adoption / word-of-mouth signups"
    result: "Branching/deploy requests became PlanetScale's signature adoption driver, used by startups through Fortune 500s; platform reached 1 trillion+ SQL queries/month by 2023."
    tier: "Verified"
    source_type: "press"
    source_url: "https://planetscale.com/blog/database-branching-three-way-merge-schema-changes"
    attribution: "PlanetScale engineering blog (database branching three-way merge); PlanetScale safe-migrations docs"
    tags:
      - "github"
      - "default-on"
      - "developer-advocacy"
      - "word-of-mouth"
      - "docs-as-marketing"
  - title: "Kill your free tier to force-qualify serious customers"
    summary: "PlanetScale's free Hobby tier subsidized non-paying hobbyists while a handful of large accounts carried revenue. In March 2024, alongside sales/marketing layoffs, it sunset Hobby: no new free databases as of March 6, existing free DBs put to sleep April 8, and the cheapest path became $39/month. CEO Sam Lambert publicly reframed the company as infrastructure for firms 'totaling more than $50B in market cap' and argued they didn't need to give away endless free resources to keep growing. It triggered loud 'rug pull' backlash and reportedly cost over half their user base, but pushed the company to profitability, and Lambert later called it one of PlanetScale's best decisions."
    goal: "Revenue"
    learning: "If a small set of large accounts already carries your revenue and a free tier mostly subsidizes users who will never pay, removing free can be a margin and focus win, but only with a concrete migration window and a clear 'who we are now' story to absorb the inevitable backlash."
    when_it_works: "Works when your real revenue is concentrated in paying accounts and free users aren't a meaningful pipeline into them; it backfires if free is your actual top-of-funnel."
    metric_moved: "profitability / revenue per customer"
    result: "Reportedly lost over half of users; pivoted to profitability and enterprise revenue; CEO publicly stands by it (July 2025 podcast). Cheapest plan jumped to $39/mo."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.theregister.com/2024/03/11/planetscale_lays_off_staff_and/"
    attribution: "The Register (Mar 11 2024); PlanetScale 'PlanetScale forever' blog; Scaling DevTools podcast with Sam Lambert (Jul 2025)"
    tags:
      - "pricing-change"
      - "free-tier"
      - "founder-led-sales"
      - "land-and-expand"
      - "transparency"
  - title: "Replace your free tier with a $5 qualifying entry plan"
    summary: "Killing free left PlanetScale without a low-end on-ramp for side projects and dev environments. In November 2025 it shipped a $5/month single-node Postgres plan that is production-ready and ships the full developer feature set (Query Insights, schema recommendations, branching, metrics), and cut development branches from $10 to $5. It positioned the tier explicitly for 'startups, side projects, proof of concepts, or development,' recapturing the low end as a paid, qualifying first step where every signup has a credit card attached, rather than free infrastructure."
    goal: "Conversion"
    learning: "If a true free tier is too costly, a near-zero paid tier ($5) that still ships the full feature set converts better than free: it keeps the funnel wide while filtering out users who will never enter a payment method, so every signup is already qualified."
    when_it_works: "Works when your marginal cost per low-end user is non-trivial and a credit-card requirement screens out tire-kickers without scaring off real builders."
    metric_moved: "free-to-paid entry / qualified signups"
    result: "Created a $5/mo paid entry point with full feature access, restoring a low-friction funnel after the free tier was removed, with payment required from day one."
    tier: "Reported"
    source_type: "press"
    source_url: "https://planetscale.com/blog/5-dollar-planetscale-is-here"
    attribution: "PlanetScale blog ($5 PlanetScale is live, Nov 14 2025)"
    tags:
      - "pricing-change"
      - "bottom-up-plg"
      - "land-and-expand"
      - "usage-based-pricing"
