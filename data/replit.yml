plays:
  - title: "A shaky iPhone recording out-converts a polished launch"
    summary: "Replit Agent was buggy and the team wanted more time, but Amjad Masad shipped it as an 'early preview' and posted a casual iPhone screen recording of himself prompting the Agent to write code, spin up a database, and deploy a working app end-to-end. Andrej Karpathy quote-tweeted it as the field's 'AGI moment,' and researchers at OpenAI and Anthropic reached out saying they hadn't realized their own models could do that. The unpolished, single-take demo read as genuine proof."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "If your product produces a result that is hard to fake, ship one unedited single-take screen recording of it running end-to-end on a real task and label it an 'early preview' so a high-credibility peer can amplify it as proof. The mess is the proof: it removes the suspicion that you staged the outcome."
    when_it_works: "Works when the product can produce a genuinely jaw-dropping outcome on a live task, and you have credible peers within reach who would notice."
    metric_moved: "organic"
    result: "Viral via Karpathy's quote-tweet; Replit Agent booked ~$1M ARR on day one and ~$2M on day two, more than the company's entire prior year of revenue."
    tradeoff: "Shipping a buggy product as an 'early preview' to ride a viral peak means the breakthrough demo sets an expectation the unfinished Agent could not yet reliably meet, so every new user arrives chasing the jaw-dropping single take and churns when their real task hits the rough edges."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://finance.biggo.com/news/16a242ba943c7426"
    attribution: "BigGo Finance / My First Million coverage of Replit's comeback; Karpathy 'AGI moment' quote-tweet and day-one $1M / day-two $2M ARR figures corroborated across multiple outlets"
    tags:
      - "twitter-x"
      - "founder-led-sales"
      - "developer-advocacy"
      - "word-of-mouth"
      - "launch"
  - title: "Your dormant free base is unpriced willingness-to-pay"
    summary: "Replit had ~40M registered users but a flat-subscription business stuck near $2.8M ARR, so most of that audience generated no revenue. When it shipped the Agent it added consumption-based pricing (per agent inference, autoscaling deploys, bandwidth, database usage) on top of the existing $20-$100/month plans, so the platform earned in proportion to how compute-heavily each user leaned on AI. This converted a long-dormant community into per-usage revenue without forcing a subscription tier change."
    goal: "Revenue"
    learning: "When your heaviest free or flat-subscription users also cost you the most to serve, bolt a metered consumption layer on top of existing plans and leave the current tiers untouched, so intensity-heavy users pay in proportion to the compute they burn. This captures spend you were leaving on the table."
    when_it_works: "Works when usage intensity varies widely across users and the expensive workloads also carry the highest willingness to pay (e.g. AI/compute)."
    metric_moved: "arr"
    result: "Annualized revenue grew from ~$2.8M to $150M in under a year (company-stated), with aggregators reporting ~$253M by Oct 2025; ARPU expanded sharply among developers and small teams running compute-heavy AI workloads."
    tradeoff: "Tying revenue to compute-heavy AI usage means your cost-to-serve scales with the same workloads you bill for, so overall gross margins swung between roughly 36% and negative as GPU and inference costs ate into the consumption revenue."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/replit/"
    attribution: "Sacra revenue/pricing analysis; ARR inflection ($2.8M to $150M annualized) confirmed in Replit's $250M Series C press release"
    tags:
      - "usage-based-pricing"
      - "pricing-change"
      - "bottom-up-plg"
      - "freemium"
      - "monetization"
  - title: "A flat per-action fee subsidizes your most expensive users"
    summary: "Replit Agent first charged a flat $0.25 per 'checkpoint,' which overcharged trivial edits and undercharged heavy multi-step builds, distorting both sides. In mid-2026 it switched to effort-based pricing where the charge scales with the time and computation each request actually consumes, bundling related work into a single priced unit. Cheap runs now cost as little as $0.06 while complex jobs can run several dollars, and users can dial effort up per request via 'high power model' and 'extended thinking' toggles."
    goal: "Revenue"
    learning: "When actions vary 10x in cost to serve, swap the flat per-action fee for the actual effort consumed and bundle related steps into one priced unit. Cheap tasks stay cheap enough to remain habit-forming while you recover the margin the heavy jobs were quietly eating."
    when_it_works: "Works when you can measure the underlying effort (compute/time) reliably enough to bill it transparently."
    metric_moved: "growth"
    result: "Moved from a flat ~$0.25-per-checkpoint model to variable effort-based pricing (simple runs as low as $0.06, complex runs into the dollars), keeping low-complexity usage cheap while capturing margin on expensive jobs."
    tradeoff: "Billing by actual effort and compute makes each invoice unpredictable for the user, so you trade the simple, forecastable per-action price for variable charges that can surprise customers and erode trust on expensive jobs."
    tier: "Verified"
    source_type: "press"
    source_url: "https://replit.com/blog/effort-based-pricing"
    attribution: "Replit official blog post 'Introducing Effort-Based Pricing for Replit Agent'; pricing detail corroborated by Sacra"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
      - "monetization"
      - "unit-economics"
