plays:
  - title: "Launch with a raw phone demo, not a campaign"
    summary: "Replit Agent was buggy and the team wanted more time, but Amjad Masad shipped it as an 'early preview' and posted a casual iPhone screen recording of himself prompting the Agent to write code, spin up a database, and deploy a working app end-to-end. Andrej Karpathy quote-tweeted it as the field's 'AGI moment,' and researchers at OpenAI and Anthropic reached out saying they hadn't realized their own models could do that. The unpolished, single-take demo read as proof rather than marketing."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "When your product produces a visible, hard-to-fake result, launch with one unedited screen recording of it running end-to-end on a real task, and ship it as an 'early preview' so a high-credibility peer can amplify it as proof rather than a pitch. A messy real demo out-converts a polished campaign because it removes the suspicion of staging."
    when_it_works: "Works when the product can deliver a jaw-dropping outcome in a single uncut take and you have access to credible voices who will amplify a genuine breakthrough."
    metric_moved: "organic"
    result: "Viral via Karpathy's quote-tweet; Replit Agent booked ~$1M ARR on day one and ~$2M on day two, more than the company's entire prior year of revenue."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://finance.biggo.com/news/16a242ba943c7426"
    attribution: "BigGo Finance / My First Million coverage of Replit's comeback; Karpathy 'AGI moment' quote-tweet and day-one $1M / day-two $2M ARR figures corroborated across multiple outlets"
    tags:
      - "twitter-x"
      - "founder-led-sales"
      - "developer-advocacy"
      - "word-of-mouth"
      - "launch"
  - title: "Layer consumption pricing onto a dormant free base"
    summary: "Replit had ~40M registered users but a flat-subscription business stuck near $2.8M ARR, so most of that audience generated no revenue. When it shipped the Agent it added consumption-based pricing (per agent inference, autoscaling deploys, bandwidth, database usage) on top of the existing $20-$100/month plans, so the platform earned in proportion to how compute-heavily each user leaned on AI. This converted a long-dormant community into per-usage revenue without forcing a subscription tier change."
    goal: "Revenue"
    learning: "If you sit on a large free or flat-subscription user base whose heaviest users cost you the most to serve, add a metered consumption layer on top of the existing plans rather than changing tiers, so the most intensive users pay in proportion to the value (and compute) they consume. This monetizes willingness-to-pay you were leaving on the table without disrupting existing subscribers."
    when_it_works: "Works when usage intensity varies widely across users and the expensive workloads also carry the highest willingness to pay (e.g. AI/compute), so metering captures value instead of capping it."
    metric_moved: "arr"
    result: "Annualized revenue grew from ~$2.8M to $150M in under a year (company-stated), with aggregators reporting ~$253M by Oct 2025; ARPU expanded sharply among developers and small teams running compute-heavy AI workloads."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/replit/"
    attribution: "Sacra revenue/pricing analysis; ARR inflection ($2.8M to $150M annualized) confirmed in Replit's $250M Series C press release"
    tags:
      - "usage-based-pricing"
      - "pricing-change"
      - "bottom-up-plg"
      - "freemium"
      - "monetization"
  - title: "Meter on delivered effort, not flat per-action units"
    summary: "Replit Agent first charged a flat $0.25 per 'checkpoint,' which overcharged trivial edits and undercharged heavy multi-step builds, distorting both sides. In mid-2026 it switched to effort-based pricing where the charge scales with the time and computation each request actually consumes, bundling related work into a single priced unit. Simple runs now cost as little as $0.06 while complex jobs can run several dollars, and users can dial effort up per request via 'high power model' and 'extended thinking' toggles."
    goal: "Revenue"
    learning: "When you charge per action but actions vary 10x in cost to serve, switch the billing unit from a flat per-action fee to the actual effort/compute consumed, and bundle related steps into one priced unit. This keeps cheap tasks cheap enough to stay habit-forming while recovering margin on the heavy jobs that were previously subsidized."
    when_it_works: "Works when your per-action cost-to-serve varies widely and you can measure the underlying effort (compute/time) reliably enough to bill it transparently."
    metric_moved: "growth"
    result: "Moved from a flat ~$0.25-per-checkpoint model to variable effort-based pricing (simple runs as low as $0.06, complex runs into the dollars), keeping low-complexity usage cheap while capturing margin on expensive jobs."
    tier: "Verified"
    source_type: "press"
    source_url: "https://replit.com/blog/effort-based-pricing"
    attribution: "Replit official blog post 'Introducing Effort-Based Pricing for Replit Agent'; pricing detail corroborated by Sacra"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
      - "monetization"
      - "unit-economics"
