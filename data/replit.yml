plays:
  - title: "Post a raw founder demo video at launch"
    summary: "When Replit Agent was ready in September 2024, Amjad Masad did not run a polished campaign. He posted a casual iPhone video of himself demoing the Agent writing code, creating a database, and deploying an app end-to-end from a prompt. Andrej Karpathy quote-tweeted it as the field's 'AGI moment,' and researchers at OpenAI and Anthropic reached out saying they didn't know their own models could do that. The organic amplification turned the launch into a credibility event overnight."
    metric_moved: "organic"
    result: "The demo went viral via Karpathy's quote-tweet; Replit Agent booked $1M ARR on day one and $2M on day two, more than the company's entire prior year of revenue."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://finance.biggo.com/podcast/16a242ba943c7426"
    attribution: "My First Million podcast coverage of Replit's comeback; corroborated by multiple outlets reporting Karpathy's 'AGI moment' quote-tweet and the day-one $1M / day-two $2M ARR figures"
    tags:
      - "twitter-x"
      - "founder-led-sales"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Add a usage-based agent layer onto subscriptions"
    summary: "Replit had ~40M users and a flat-subscription business stuck near $2.8M ARR. When it shipped the Agent, it introduced consumption-based pricing (paying per agent inference, autoscaling deploys, bandwidth, and database usage) layered on top of the existing $20-$100/month subscriptions. This let the platform capture value proportional to how compute-intensively each customer used AI, dramatically expanding average revenue per user instead of leaving willingness-to-pay on the table."
    metric_moved: "arr"
    result: "Annualized revenue grew from ~$2.8M to $150M in under a year (officially stated), with aggregators reporting $253M by Oct 2025; ARPU expanded sharply among developers and small teams paying for compute-heavy AI usage."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/replit/"
    attribution: "Sacra revenue/pricing analysis; ARR inflection ($2.8M to $150M annualized) confirmed in Replit's own $250M Series C press release"
    tags:
      - "usage-based-pricing"
      - "pricing-change"
      - "bottom-up-plg"
      - "freemium"
  - title: "Reprice to effort delivered, not flat checkpoints"
    summary: "Replit's initial Agent pricing charged a flat fee per 'checkpoint' (around $0.25), which mispriced simple tasks against complex ones. They moved to variable effort-based pricing where the charge scales with how much work the agent actually does, so a simple run can cost as little as $0.06 while heavy multi-step builds cost more. Aligning price with delivered effort kept low-complexity usage cheap and approachable while capturing margin on the expensive, compute-heavy jobs."
    metric_moved: "growth"
    result: "Shifted from flat ~$0.25-per-checkpoint to variable effort-based pricing (simple runs as low as $0.06), better matching price to value across a wide range of usage intensity."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/c/replit/"
    attribution: "Sacra pricing analysis of Replit Agent"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
