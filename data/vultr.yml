plays:
  - title: "Match the developer's first deposit, dollar-for-dollar"
    summary: "As a pure self-serve cloud with no sales team, Vultr needed signups to convert into paying, retained accounts on their own. They run standing promos that match a new account's first deposit dollar-for-dollar up to $100, plus large trial-credit codes ($200-$300) that expire in 12 months. The deposit match in particular rewards real commitment (you only get the bonus when you put your own money in), turning a free trial into a funded, sticky account and powering self-serve growth to $100M+ ARR with zero salespeople."
    metric_moved: "free_to_paid"
    result: "1M+ customers and $100M+ ARR (Constant/Vultr reported $125M ARR by March 2022) reached with zero salespeople; deposit-match and trial credits remain standing acquisition offers."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.vultr.com/coupons/"
    attribution: "Vultr coupons page: 'VULTRMATCH - Double your deposit! Vultr will match your first deposit dollar for dollar, up to $100'; plus FLY300VULTR ($300) and FLYTWOHUNDRED ($200) new-customer credits"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "usage-based-pricing"
      - "word-of-mouth"
  - title: "Take chip-vendor money and co-marketing to get scarce GPUs"
    summary: "Lacking the GPU supply and marketing budget of hyperscalers, Vultr made AMD both an investor and a distribution partner. AMD led part of Vultr's $333M round (Dec 2024, $3.5B valuation) and the two co-market Instinct MI300X/MI325X clouds globally. The deal is symbiotic: AMD gets a billing-scale showcase for its accelerators against Nvidia, while Vultr secures early access to scarce GPUs and credible enterprise differentiation. Cloud GPU, launched 2022, became Vultr's fastest-growing line."
    metric_moved: "funding_round"
    result: "$333M raised at a $3.5B valuation (AMD Ventures + LuminArx, Dec 2024); cloud GPU is Vultr's fastest-growing business. IDC's Dave McCarthy: AMD partnering with 'an up-and-coming cloud provider like Vultr will help them get more visibility in the market.'"
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techblog.comsoc.org/2024/12/22/ai-cloud-start-up-vultr-valued-at-3-5b-hyperscalers-gorge-on-nvidia-gpus-while-ai-semiconductor-market-booms/"
    attribution: "IEEE ComSoc Technology Blog quoting Dave McCarthy (IDC) on AMD's $333M investment and partnership with Vultr"
    tags:
      - "design-partners"
      - "integrations-marketplace"
      - "land-and-expand"
  - title: "Name and own the 'independent cloud' category"
    summary: "Vultr could never out-spend AWS, Azure, and GCP on awareness, so instead of competing feature-for-feature it framed a whole new category: the 'independent cloud' for teams who find hyperscalers overbuilt, overpriced, and overcomplicated. By focusing solely on infrastructure with simple, transparent pricing and global reach, Vultr gave developers and efficiency-driven enterprises a clear reason to switch. That positioning, not a sales org, drove acquisition to over a million customers."
    metric_moved: "growth"
    result: "1M+ customers and ~$100M+ ARR reached with zero salespeople and no conventional marketing team, an outcome shared only with Slack, Atlassian, and SolarWinds per Vultr."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cloudcomputing-news.net/news/j-j-kardwell-ceo-constant-on-building-vultr-the-independent-cloud/"
