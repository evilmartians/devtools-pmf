plays:
  - title: "Match the deposit to make them put money in first"
    summary: "As a pure self-serve cloud with no sales team, Vultr needed signups to convert into funded, retained accounts on their own. Its standing VULTRMATCH promo matches a new account's first deposit dollar-for-dollar up to $100, alongside larger one-sided trial credits ($200-$300). The match only pays out once the user puts their own money in, so it filters for real commitment instead of tire-kickers and turns a free trial into a funded, sticky balance the user is motivated to spend down."
    goal: "Conversion"
    learning: "Run two offers side by side: a one-sided trial credit for tire-kickers, and a dollar-for-dollar deposit match that only unlocks once the user funds the account. The match self-selects committed buyers and pre-loads a balance they'll burn down, which converts to paying accounts far better than free credit alone."
    when_it_works: "Works for usage-based, prepaid-balance products where a funded account predicts ongoing spend, and breaks for one-time or seat-based purchases where a balance has no pull."
    metric_moved: "free_to_paid"
    result: "Standing acquisition offer; helped power self-serve growth to 1M+ customers and $125M ARR (Constant/Vultr, March 2022) with zero salespeople."
    tradeoff: "A dollar-for-dollar match is a direct margin subsidy on exactly the funded, high-intent accounts you most want, and running it as a standing promo trains every prospect to never deposit without claiming it, so the discount becomes a permanent cost of acquisition rather than a one-time nudge."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.vultr.com/coupons/"
    attribution: "Vultr coupons page (retrieved June 2026): 'VULTRMATCH - Double your deposit! Vultr will match your first deposit dollar for dollar, up to $100'; plus FLY300VULTR ($300), 250VULTRFLY ($250), FLYTWOHUNDRED ($200) new-customer credits."
    tags:
      - "usage-based-pricing"
      - "bottom-up-plg"
      - "conversion-offer"
      - "prepaid-credits"
  - title: "When one supplier owns your scarce input, put them on your cap table"
    summary: "Lacking the GPU supply and marketing budget of hyperscalers, Vultr turned AMD into both an investor and a distribution partner. AMD Ventures co-led Vultr's $333M round (Dec 2024, $3.5B valuation) and the two now co-market Instinct MI300X/MI325X GPU clouds globally. The trade is symbiotic: AMD gets a billing-scale showcase for its accelerators against Nvidia, while Vultr secures early access to scarce GPUs and credible enterprise air cover it could never buy. Cloud GPU, launched 2022, became Vultr's fastest-growing line."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "If a single vendor controls hardware you build on, become their flagship reference deployment and trade that for strategic investment plus co-marketing. Pick the vendor fighting a market leader: they need a visible challenger, so they'll push you scarce inventory and enterprise air cover you could never buy."
    when_it_works: "Works when you sit on top of a single supplier's hardware or platform and that input is scarce; weak when the input is commodity and abundant."
    metric_moved: "funding_round"
    result: "$333M raised at a $3.5B valuation (AMD Ventures + LuminArx, Dec 2024); cloud GPU is Vultr's fastest-growing business. IDC's Dave McCarthy: AMD partnering with 'an up-and-coming cloud provider like Vultr will help them get more visibility in the market.'"
    tradeoff: "Tying your fastest-growing line and your cap table to one supplier's accelerators means your GPU roadmap, supply allocation, and go-to-market story now ride on AMD's fortunes against Nvidia, so you inherit AMD silicon's adoption risk and lose the neutrality to lean into whichever vendor's chips your customers actually demand."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techblog.comsoc.org/2024/12/22/ai-cloud-start-up-vultr-valued-at-3-5b-hyperscalers-gorge-on-nvidia-gpus-while-ai-semiconductor-market-booms/"
    attribution: "IEEE ComSoc Technology Blog quoting Dave McCarthy (IDC) on AMD Ventures' $333M investment and co-marketing partnership with Vultr."
    tags:
      - "design-partners"
      - "strategic-investor"
      - "co-marketing"
      - "land-and-expand"
  - title: "Beat an incumbent on one pain, then get an analyst to verify it"
    summary: "Vultr could never out-spend AWS/Azure/GCP on awareness, so it framed an 'independent cloud' category and made its concrete wedge radical pricing transparency: the price shown when you spin up a server or block store is exactly what you are billed, with no egress-fee surprises or SKU maze. IDC's 2025 IaaS assessment singled this out as a core strength, validating the claim independently rather than leaving it as marketing. That clarity, not a sales org, gave cost- and complexity-fatigued developers a concrete reason to switch."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Against a confusing giant, weaponize a single concrete pain (here, opaque pricing and egress fees) by making the all-in price you show equal the price you bill, then get a credible analyst to confirm it on record. The verification turns your wedge from positioning into fact a developer can check."
    when_it_works: "Works when the dominant incumbents are genuinely confusing or surprise-billing customers; it falls flat as pure positioning if your actual pricing isn't simpler."
    metric_moved: "growth"
    result: "1M+ customers and $125M+ ARR reached with zero salespeople and no conventional marketing team; IDC cited transparent, predictable pricing as a core differentiator versus hyperscalers."
    tradeoff: "Making radical pricing transparency your wedge forecloses the high-margin egress fees and SKU complexity the incumbents quietly harvest, and the differentiator evaporates the moment a hyperscaler simplifies its own pricing, leaving you to compete on a deliberately thinner margin you can't walk back."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cloudcomputing-news.net/news/j-j-kardwell-ceo-constant-on-building-vultr-the-independent-cloud/"
    attribution: "J.J. Kardwell, CEO Constant/Vultr, interview on building 'the independent cloud'; IDC 2025 IaaS assessment (via search): 'the price you see when spinning up a server or provisioning a block store is the price you're going to pay.'"
    tags:
      - "category-creation"
      - "transparent-pricing"
      - "positioning"
      - "developer-advocacy"
