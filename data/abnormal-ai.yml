plays:
  - title: "Offer a free risk assessment that exposes missed threats"
    summary: "Enterprise security buyers are skeptical of yet another email tool, especially one promising to catch what Microsoft and incumbent SEGs miss. Abnormal removed that doubt with a free Email Security Risk Assessment: a one-click API integration that connects to Microsoft 365 or Google Workspace in about 15 minutes with no MX-record or policy changes, then returns a custom report within a week showing the count of advanced attacks already sitting in employee inboxes plus compromised accounts and vendor risk. The prospect sees real threats their current stack let through before spending a dollar, turning the sales motion into a proof-of-value demonstration rather than a pitch."
    metric_moved: "ttfv"
    result: "Free, self-serve proof of value: 15-minute one-click deploy, custom risk report within one week, analyzing 45,000+ signals to surface threats incumbents missed. Backed a climb to $200M ARR and a 99% renewal rate."
    tier: "Verified"
    source_type: "press"
    source_url: "https://abnormal.ai/one-click-integration/"
    attribution: "Abnormal AI 'Email Security Risk Assessment / one-click integration' page"
    tags:
