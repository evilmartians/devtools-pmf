      - "integrations-marketplace"
  - title: "Layer on top of incumbents instead of rip-and-replace"
    summary: "Replacing a secure email gateway is a heavyweight, high-friction enterprise project that stalls deals. Abnormal positioned itself to plug in alongside Microsoft 365's native protection via a one-click API rather than displacing it, with no changes to email configuration or MX records. This let buyers 'get value from their Office 365 investment' and bolt Abnormal on 'for the clever stuff on top,' catching account takeovers and internal lateral phishing that gateways cannot see. The low-disruption augmentation model collapses deployment risk and shortens the path to yes."
    metric_moved: "growth"
    result: "API augmentation (no MX/config changes) reduced switching friction and drove ~20% Fortune 500 penetration and 3,000+ customers en route to $200M ARR at 100% YoY growth."
