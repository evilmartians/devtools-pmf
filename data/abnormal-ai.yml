plays:
  - title: "Open the sale with the breaches already in their inbox"
    summary: "Enterprise security buyers stonewall yet another email tool, especially one claiming to catch what Microsoft and legacy gateways miss. Abnormal replaced the pitch with a free Email Security Risk Assessment: a one-click, read-only API connection to Microsoft 365 or Google Workspace that takes ~15 minutes, changes no MX records or mail policies, then runs behavioral AI across 45,000+ signals and returns a custom report within a week. The report names the advanced attacks, compromised accounts, and risky vendors already sitting in the buyer's inboxes, plus dashboard access to live data. The prospect sees threats their current stack let through before spending a dollar, so the deal opens on evidence you generated."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "If your product can safely read a prospect's live environment, ship a read-only assessment that returns THEIR specific problems by name (compromised accounts, missed attacks, risky vendors) within days, so the first call argues over evidence you generated."
    when_it_works: "Works when your product can detect concrete, costly problems the incumbent demonstrably missed in a prospect's live data."
    metric_moved: "qualified pipeline / proof-of-value conversion"
    result: "Free, read-only 15-minute deploy returns a personalized threat report within a week; this proof-of-value motion backed a climb to $200M ARR (100% YoY) and a 99% renewal rate."
    tradeoff: "The motion only works while you reliably find threats the incumbent missed in every prospect's live inbox, so a clean report becomes a reason not to buy, the per-prospect custom report carries real analyst/engineering cost that a generic demo never would, and you must talk security buyers into a read-only connection to their live production mail data before they've paid a dollar."
    tier: "Verified"
    source_type: "press"
    source_url: "https://abnormal.ai/risk"
    attribution: "Abnormal AI 'Email Security Risk Assessment' page: 15-minute one-click API integration, no MX/policy changes, 45,000+ signals analyzed, custom report within one week plus dashboard access."
    tags:
      - "free-tier"
      - "proof-of-value"
      - "land-and-expand"
      - "founder-led-sales"
      - "integrations-marketplace"
      - "sales-led"
  - title: "Sit on top of the incumbent so adoption skips the rip-out"
    summary: "Ripping out a secure email gateway is a heavyweight enterprise project that stalls deals for months. Abnormal architected itself to sit alongside Microsoft 365's native protection and any existing SEG over a one-click API (OAuth grant via Microsoft Graph), with no MX, DNS, transport-rule, or mail-flow changes, fully deployed and detecting within 24-48 hours. Buyers keep their Office 365 investment and add Abnormal 'for the clever stuff on top,' catching account takeovers and internal lateral phishing that gateways cannot see. Removing the switching project collapses deployment risk and shortens the path to yes."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "When ripping out the incumbent is the dealbreaker, run additively beside it over API/OAuth with zero changes to MX, DNS, or mail-flow config, so you go live in 24-48 hours as a low-risk add-on that never needs executive sign-off for a migration."
    when_it_works: "Works when the incumbent leaves a real gap you uniquely fill and your category exposes an integration surface (here, email APIs) you can attach to."
    metric_moved: "deal velocity / switching friction"
    result: "Additive API architecture (no MX/config changes, live in 24-48 hrs) drove ~20% Fortune 500 penetration and 3,000+ customers en route to $200M ARR at 100% YoY growth."
    tradeoff: "By sitting additively on top of Microsoft 365 via Graph, you permanently depend on the API surface and goodwill of the same incumbent whose gaps you sell against, and you lock yourself into being the add-on line item that is the easiest thing to cut, never the system of record."
    tier: "Verified"
    source_type: "press"
    source_url: "https://abnormal.ai/blog/abnormal-email-security-for-microsoft-365"
    attribution: "Abnormal AI blog 'Abnormal Email Security for Microsoft 365' plus product docs: API/OAuth integration, no MX/DNS/transport-rule changes, deploys in minutes, detections within 24-48 hours, recommended to layer on top of an existing SEG."
    tags:
      - "integrations-marketplace"
      - "land-and-expand"
      - "additive-architecture"
