plays:
  - title: "Ship a wide open beta, let users self-select"
    summary: "Datadog first ran a closed alpha with a handful of handpicked 'perfect' enterprise customers and got weak signal, because timing, infrastructure readiness, and deployment bandwidth vary unpredictably across companies. They switched to a broad open beta and let the market reveal fit. Co-founder Olivier Pomel: 'It's a lot easier for users to self-select and start using your product than for you to understand for whom you're going to be the right thing.'"
    metric_moved: "growth"
    result: "Open beta surfaced the real ICP and product direction faster than the closed alpha, the foundation that carried Datadog from launch to $100M ARR and a 2019 IPO."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/the-first-100000000-arr-at-datadog-how-founder-ceo-olivier-pomel-built-a-customer-centric-monitoring-giant/"
    attribution: "Olivier Pomel (co-founder/CEO), via SaaStr 'The First $100,000,000 ARR at Datadog'"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "design-partners"
  - title: "Sell month-to-month so churn shows up immediately"
    summary: "Against investor pressure for annual term deals, Datadog deliberately sold month-to-month early on. Pomel reasoned that locking in annual contracts hides product problems: 'If you start selling term deals, you're going to have the bad news about a year later. By then you've wasted a year.' Short contracts forced product gaps to surface fast and kept the feedback loop tight while the product was still maturing."
    metric_moved: "retention"
    result: "Product problems surfaced in weeks rather than being masked for a year, enabling the fast iteration that produced 146% net dollar retention at IPO."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/the-first-100000000-arr-at-datadog-how-founder-ceo-olivier-pomel-built-a-customer-centric-monitoring-giant/"
    attribution: "Olivier Pomel (co-founder/CEO), via SaaStr 'The First $100,000,000 ARR at Datadog'"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
      - "founder-led-sales"
  - title: "Make out-of-the-box integrations the wedge"
    summary: "Datadog built breadth of turnkey integrations into the core motion: a new user connects their existing stack (AWS, containers, databases, SaaS) in minutes and immediately sees correlated signals, lowering time-to-value and pulling more of the org's tooling onto the platform. The company opened the catalog to partners, who now build roughly a third of integrations, and reinvests 30%+ of revenue into R&D, much of it on integration frameworks. The breadth itself becomes the land-and-expand surface."
    metric_moved: "growth"
    result: "Passed 1,000 integrations (about one third built by registered technology partners); organizations monitoring hosts grew 20% YoY, with 99% of container orgs relying on container integrations."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.datadoghq.com/blog/1k-integrations-milestone/"
    attribution: "Datadog engineering blog, 'Scaling Datadog observability: 1,000 integrations and counting'"
    tags:
      - "integrations-marketplace"
      - "land-and-expand"
      - "default-on"
      - "docs-as-marketing"
