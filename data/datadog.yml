plays:
  - title: "Open the beta wide instead of hand-picking alpha customers"
    summary: "Datadog ran a closed alpha with a handful of hand-picked 'perfect' enterprise accounts and got almost no usable signal: timing, infra readiness, and deployment bandwidth varied too much to learn anything. They threw it open as a wide self-serve beta and let the market reveal who showed up and stuck. Pomel: 'It's a lot easier for users to self-select and start using your product than for you to understand for whom you're going to be the right thing at the right time.'"
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Do not gate early access to a hand-picked design-partner list; ship a public self-serve beta so the market, not your guesswork, reveals who has the timing and pain to actually adopt. Watch which uninvited users stick, and treat them as your ICP."
    when_it_works: "Works when your product can be tried self-serve with low setup cost; fails for products that require heavy services or bespoke deployment before any value appears."
    metric_moved: "qualified signups / ICP discovery"
    result: "The open beta surfaced the real ICP and product direction far faster than the curated alpha, the foundation that carried Datadog from launch to ~$332M ARR at its 2019 IPO."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/the-first-100000000-arr-at-datadog-how-founder-ceo-olivier-pomel-built-a-customer-centric-monitoring-giant/"
    attribution: "Olivier Pomel (co-founder/CEO), via SaaStr 'The First $100,000,000 ARR at Datadog'"
    tags:
      - "self-serve-beta"
      - "icp-discovery"
      - "bottom-up-plg"
  - title: "Sell month-to-month so churn surfaces in weeks"
    summary: "Against investor pressure to lock in multi-year contracts, Datadog deliberately sold month-to-month early on. Pomel's logic: 'If we sell for three years, we won't have the bad news early enough. And we will be able to lie to ourselves by thinking the customer is not really using the product, but we're gonna fix it.' Monthly billing made stalled adoption and churn impossible to hide, and the feedback loop was reinforced by putting every engineer, not just support staff, on a one-week support rotation each year."
    goal: "Retention"
    learning: "While your product is still maturing, price month-to-month even when investors push for annual lock-in: short contracts force adoption problems to show up in weeks, and pair them with forcing every engineer onto support rotation so the whole team feels churn directly."
    when_it_works: "Works when the product is still finding fit and you need a tight feedback loop; once retention is proven, annual terms become worth the trade for predictable revenue."
    metric_moved: "net dollar retention"
    result: "Product gaps surfaced in weeks instead of being masked for a year, enabling the fast iteration that produced 146% net dollar retention at IPO."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/the-first-100000000-arr-at-datadog-how-founder-ceo-olivier-pomel-built-a-customer-centric-monitoring-giant/"
    attribution: "Olivier Pomel (co-founder/CEO), via SaaStr 'The First $100,000,000 ARR at Datadog'"
    tags:
      - "pricing-change"
      - "month-to-month"
      - "feedback-loop"
  - title: "Let partners build a third of your integration catalog"
    summary: "Datadog made turnkey integrations the wedge: a new user connects AWS, containers, databases, and SaaS in minutes and immediately sees correlated signals, so the platform lands fast and pulls in more of the org's tooling. The non-obvious move is that Datadog opened the catalog to outside technology partners rather than building everything in-house, so breadth scales past 1,000 integrations without Datadog hiring for each one. Integrations ship default-on, becoming the land-and-expand surface."
    goal: "Activation"
    learning: "Make connecting the user's existing stack a minutes-long, click-to-see-data step, then open an integration SDK so partners build the long tail for you, letting catalog breadth scale far past what your own headcount could ship."
    when_it_works: "Works when your product sits atop an ecosystem of tools users already run and value comes from correlating across them; less relevant for standalone products with no surrounding stack to connect."
    metric_moved: "time-to-value / integration adoption"
    result: "Passed 1,000 integrations with roughly a third built by registered technology partners; organizations monitoring hosts grew 20% YoY and 99% of container orgs rely on container integrations."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.datadoghq.com/blog/1k-integrations-milestone/"
    attribution: "Datadog engineering blog, 'Scaling Datadog observability: 1,000 integrations and counting'"
    tags:
      - "integrations-marketplace"
      - "partner-ecosystem"
      - "land-and-expand"
      - "default-on"
