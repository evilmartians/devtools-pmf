plays:
  - title: "Open-source your tiny utility, launch on Hacker News"
    summary: "After a year and a half of failed analytics products with money running low (~$100K left), co-founder Ilya suggested building a business around analytics.js, a small (~500-line) routing library they had already open-sourced. Peter Reinhardt called it 'literally the worst idea I've ever heard,' but they built a polished landing page and submitted it to Hacker News expecting failure. Instead it was an 'overnight explosion': the market pulled the product forward and they lost control, their first real product-market-fit moment, forcing them to scramble to build the hosted Segment product on top of it."
    metric_moved: "growth"
    result: "From near-death (~$100K in the bank, ~25 GitHub stars) to PMF after the HN launch; revenue grew from $0 to $2.5M in the first year after launching the hosted product."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.ycombinator.com/blog/peter-reinhardt-on-finding-product-market-fit-at-segment/"
    attribution: "Peter Reinhardt (Segment co-founder/CEO) on the Y Combinator blog"
    tags:
      - "hacker-news"
      - "open-source"
      - "github"
      - "developer-advocacy"
  - title: "Sell one snippet that routes to every tool"
    summary: "Segment's core wedge was a single API: install one JavaScript snippet once, then flip switches to send the same customer data to dozens, then hundreds, of analytics and marketing destinations with no extra integration code. Instead of wiring up each provider's API separately, customers just toggle integrations on and off. This 'one API to rule them all' positioning turned painful per-tool integration work into a one-time install and drove fast bottom-up adoption among developers."
    metric_moved: "growth"
    result: "By Oct 2015: 4,000+ active customers (each with 3+ connections), an average of 5 destinations per customer (11 for enterprise), 50B API calls/month, and revenue tripled in the prior 8 months."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2015/10/09/segment-raises-27-million-for-its-one-api-to-rule-them-all/"
    attribution: "TechCrunch, 'Segment Raises $27 Million For Its One API To Rule Them All' (Oct 2015)"
    tags:
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "land-and-expand"
  - title: "Let partners build integrations into your catalog"
    summary: "Segment grew its destination catalog into a two-sided marketplace: rather than building every integration itself, it opened the platform so analytics and marketing vendors built their own integrations to be discoverable in Segment. The catalog became a network-effect engine, more destinations made Segment more valuable to customers, while vendors got distribution by being in the catalog. By 2015 Segment offered 160 integrations across 20 categories, including 30 of the most recent added by partners themselves."
    metric_moved: "growth"
    result: "160 integrations across 20 categories by Oct 2015, with partners contributing their own (30 of the most recent), fueling the catalog flywheel; the catalog later grew past 300 destinations."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2015/10/09/segment-raises-27-million-for-its-one-api-to-rule-them-all/"
    attribution: "TechCrunch, 'Segment Raises $27 Million For Its One API To Rule Them All' (Oct 2015)"
    tags:
      - "integrations-marketplace"
      - "viral-loop"
      - "community-led"
