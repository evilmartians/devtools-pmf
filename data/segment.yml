plays:
  - title: "Launch the throwaway utility you already open-sourced"
    summary: "After 18 months of failed analytics products with ~$100K left in the bank, Segment's founders had only analytics.js sitting around: a ~500-line open-source library (~25 GitHub stars) that routed website data to tools like Google Analytics and Mixpanel. Reinhardt called building a business on it 'literally the worst idea I've ever heard,' but they wrapped it in a polished landing page with a signup form and posted it to Hacker News expecting nothing. It hit the top of HN and pulled ~1,000 GitHub stars in the first day; the market yanked the product forward and they scrambled to build the hosted Segment on top of it."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Before you pivot, inventory the small tools and scripts you built for your own use and gave away. Repackage the one developers already grab with a real landing page and signup form, then launch it where your buyers hang out; the asset that proves demand is usually one you already own."
    when_it_works: "Works when you have an existing utility with organic, unprompted usage and a launch venue full of your target developers, so the test measures real pull rather than your marketing."
    metric_moved: "signups / GitHub stars"
    result: "From ~25 GitHub stars and near-death to #1 on HN with ~1,000 stars in 24 hours; first paying customers came straight off HN, and revenue went from $0 to $2.5M in the first year of the hosted product."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.ycombinator.com/blog/peter-reinhardt-on-finding-product-market-fit-at-segment/"
    attribution: "Peter Reinhardt (Segment co-founder/CEO) on the Y Combinator blog"
    tags:
      - "hacker-news"
      - "open-source"
      - "github"
      - "developer-advocacy"
  - title: "Make one install replace every per-tool integration"
    summary: "Segment's wedge was a single JavaScript snippet installed once: after that, customers flip switches to fan the same customer-event data out to dozens, then hundreds, of analytics and marketing destinations with zero extra integration code. Instead of an engineer wiring up each provider's API, marketers toggle destinations on and off in a dashboard. This turned recurring, painful per-tool integration work into a one-time install, which drove fast bottom-up developer adoption and land-and-expand as customers added more destinations."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Find a category where your buyers re-do the same plumbing work for every vendor they adopt, and make yourself the single integration that does it once for all of them. You convert a recurring engineering tax into a one-time install, and every new destination you support raises switching costs."
    when_it_works: "Works when buyers genuinely use many fragmented downstream tools and the integration work is repetitive and undifferentiated, so consolidating it is clearly worth more than wiring each tool directly."
    metric_moved: "active customers / destinations per account"
    result: "By Oct 2015: 4,000+ active customers (each with 3+ connections), avg 5 destinations per customer (11 for enterprise), 50B API calls/month, and revenue tripled in the prior 8 months."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2015/10/09/segment-raises-27-million-for-its-one-api-to-rule-them-all/"
    attribution: "TechCrunch, 'Segment Raises $27 Million For Its One API To Rule Them All' (Oct 2015)"
    tags:
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "land-and-expand"
  - title: "Let destination vendors build their own catalog integrations"
    summary: "Rather than building every integration itself, Segment opened the platform so analytics and marketing vendors wrote their own integrations to get listed and discoverable in the catalog. That created a two-sided network effect: more destinations made Segment more valuable to customers, while vendors got distribution by appearing in front of Segment's installed base. By Oct 2015 the catalog had 160 integrations across 20 categories, and 30 of the most recent had been contributed by partners themselves."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Once you hold distribution to a buyer base, stop building integrations yourself and let the vendors who want access to that base build them for you. Each partner-built integration both widens your value to customers and recruits the partner as a channel back to their own users."
    when_it_works: "Works once you have enough installed-base traction that being in your catalog is worth a partner's engineering effort; before that, you still have to build integrations yourself to earn the audience."
    metric_moved: "catalog size / integration count"
    result: "160 integrations across 20 categories by Oct 2015 (30 most-recent built by partners), and the catalog later grew past 550+ destinations."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2015/10/09/segment-raises-27-million-for-its-one-api-to-rule-them-all/"
    attribution: "TechCrunch, 'Segment Raises $27 Million For Its One API To Rule Them All' (Oct 2015)"
    tags:
      - "integrations-marketplace"
      - "viral-loop"
      - "community-led"
