plays:
  - title: "Land with one module, sell the whole platform"
    summary: "Netskope started as a single CASB product, then deliberately built modular add-ons (SWG, ZTNA, DLP, FWaaS, SD-WAN) into one converged Netskope One platform. Sales lands a customer on one or two services, then expands as buyers consolidate their security and networking stack onto a single vendor. Management frames the 25-product platform as 'a clear opportunity to continually expand within our growing customer base as they consolidate.'"
    metric_moved: "nrr"
    result: "118% net dollar retention at IPO (S-1, July 2025), up from 113%. By Q4 FY2026, 56% of customers used 4+ products (up from 48% YoY) and 27% used 6+ (up from 22%); average products per customer rose to 4.4."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.theglobeandmail.com/investing/markets/markets-news/motley/700401/netskope-ntsk-q4-2026-earnings-call-transcript/"
    attribution: "Netskope Q4 FY2026 earnings call transcript (multi-product %); MostlyMetrics S-1 breakdown (118% NRR, modular upsell)"
    tags:
      - "land-and-expand"
      - "integrations-marketplace"
      - "usage-based-pricing"
  - title: "Build a free risk-rating index as your wedge"
    summary: "Before selling controls, Netskope published the Cloud Confidence Index: a database scoring tens of thousands of SaaS apps for enterprise readiness, security, privacy, and compliance risk. CISOs used it to see which cloud apps employees were actually running and how risky they were, which created the 'why do I need this' moment. That visibility asset was the land motion that opened the door to the CASB and the rest of the platform."
    metric_moved: "growth"
    result: "CCI grew to 36,000+ app ratings (50+ attributes) and later 54K+ apps; the CASB it seeded remained Netskope's flagship and anchored a company that disclosed 600% YoY revenue growth and 500% customer growth in 2015."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/netskope"
    attribution: "Contrary Research company report (CCI as differentiator, CASB wedge); Netskope CCI docs (rating counts)"
    tags:
      - "content-seo"
      - "docs-as-marketing"
      - "land-and-expand"
  - title: "Turn analyst-report leadership into the whole pitch"
    summary: "Netskope made Gartner Magic Quadrant placement a core GTM asset, engineering for and then heavily marketing Leader status in both SSE and SASE Platforms. It has been a Leader in the SSE Magic Quadrant every year since the report's 2022 inception and promotes being positioned furthest in Completeness of Vision in both quadrants. For a no-free-tier enterprise security buyer, third-party analyst proof de-risks seven-figure deals."
    metric_moved: "growth"
    result: "Named SSE Magic Quadrant Leader 4 years running (2022-2025) and SASE Platforms Leader 2 years; cited as the only vendor furthest in Completeness of Vision for both reports. Backed a climb to $707M ARR and a $908M IPO."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.netskope.com/press-releases/netskope-named-a-leader-in-the-gartner-magic-quadrant-for-security-service-edge-for-4th-year-in-a-row"
    attribution: "Netskope press releases on Gartner MQ leadership; corroborated by SDxCentral SSE Magic Quadrant coverage"
