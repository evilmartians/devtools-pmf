plays:
  - title: "Publish deeply technical 'how it works' blog posts for Hacker News"
    summary: "Tailscale, a developer infra/security product, needed organic distribution without a marketing-heavy push. They wrote zero-fluff, deeply technical posts (e.g. 'How Tailscale Works', 'Tailscale SSH', 'Tailscale Funnel') using a consistent framework: problem -> obvious solution -> why it doesn't work -> their product -> how it works technically, with plain factual titles and no benefit-speak. The posts repeatedly hit the Hacker News front page and resonated with developers, seeding the bottom-up adoption funnel."
    metric_moved: "organic"
    result: "Posts consistently reached the HN front page; one product announcement drew 759 upvotes. Became a core, near-zero-cost acquisition channel feeding Tailscale's PLG funnel."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.markepear.dev/blog/developer-marketing-hacker-news"
    attribution: "markepear.dev analysis of Tailscale's Hacker News marketing (blog framework, titles, 759-upvote post)"
    tags:
      - "hacker-news"
      - "docs-as-marketing"
      - "content-seo"
      - "developer-advocacy"
      - "transparency"
  - title: "Seed a generous free personal tier that walks into the enterprise"
    summary: "Tailscale committed early to 'holding the bottom' of the market: a free personal plan that individual engineers adopt at home to solve a connectivity problem, then bring to a small team, then company-wide. CEO Avery Pennarun deliberately delayed enterprise features (like device posture checks) to avoid moving upmarket too soon, reasoning 'it's easy to move up market later, it's very hard to move down market later.' Enterprise demand arrived organically: a bank CTO discovered Tailscale from a friend running it on a home Airbnb network."
    metric_moved: "free_to_paid"
    result: "Roughly half of monthly active users are on the free tier and half convert to paid, an extraordinarily high split for devtools. Reached 10,000 business customers and 500K+ weekly active users with bottom-up, low-sales-touch motion."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://stratechery.com/2025/an-interview-with-tailscale-co-founder-and-ceo-avery-pennarun/"
    attribution: "CEO Avery Pennarun, Stratechery interview (2025)"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "land-and-expand"
      - "word-of-mouth"
      - "default-on"
  - title: "Founder hand-activates early signups overnight to mine feedback"
    summary: "When Tailscale's early Hacker News post about their simple VPN hit, it generated hundreds of signups in the first night. Rather than fully automating, Pennarun stayed up personally activating accounts, which created a direct line to the earliest adopters and let him gather feedback that shaped product priorities. They later enforced the free-tier device limit with 'a polite email asking would you mind paying us' rather than a hard technical wall, keeping the human, trust-building tone."
    metric_moved: "community"
    result: "Hundreds of users in the first night from a single HN post; founder-led onboarding produced direct early-adopter feedback that shaped the roadmap and converted goodwill into paying customers."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://stratechery.com/2025/an-interview-with-tailscale-co-founder-and-ceo-avery-pennarun/"
