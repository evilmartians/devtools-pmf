plays:
  - title: "Write 'How X Works' HN posts on a fixed 5-beat structure"
    summary: "Tailscale needed organic distribution with no marketing org. They wrote deeply technical posts on a fixed structure: problem agitation -> the obvious solution a developer would reach for -> exactly why that obvious solution breaks -> their product -> how it works at the implementation level. Titles were stripped of all benefit-speak (literally 'Tailscale SSH', 'How Tailscale Works', not 'Tailscale SSH makes you faster'). The plain-fact titles plus the trust earned by explaining why naive solutions fail repeatedly landed them on the Hacker News front page."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Earn a developer audience's trust before pitching: write the problem so they feel it, name the obvious fix they'd try, then show precisely why it fails before introducing your product, and title the post as a flat statement of fact with zero benefit-speak so it reads as engineering, not marketing."
    when_it_works: "Works when your product solves a problem developers genuinely struggle with and you can explain your internals credibly; fails for products whose value is taste or polish rather than a defensible technical mechanism."
    metric_moved: "organic acquisition / HN front-page reach"
    result: "Posts consistently reached the HN front page; one product announcement drew 759 upvotes. Became a near-zero-cost top-of-funnel channel feeding the PLG motion (1M+ MAU by Nov 2025)."
    tradeoff: "Earning trust by explaining your internals demands senior engineers as authors and publicly exposes how your product actually works, while front-page reach stays unpredictable and non-repeatable, so you cannot treat it as a channel you can dial up on demand."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.markepear.dev/blog/developer-marketing-hacker-news"
    attribution: "markepear.dev analysis of Tailscale's Hacker News marketing (5-beat blog framework, fact-only titles, 759-upvote post)"
    tags:
      - "hacker-news"
      - "docs-as-marketing"
      - "developer-advocacy"
      - "transparency"
  - title: "Deliberately hold the bottom of the market with a free tier"
    summary: "Tailscale committed to 'holding the bottom': a free personal plan an engineer adopts at home, then brings to a small team, then company-wide. Pennarun deliberately delayed enterprise features like device-posture checks, reasoning 'it's easy to move up market later, it's very hard to move down market later.' Enterprise demand then arrived organically, e.g. a bank CTO who first discovered Tailscale running on a friend's home Airbnb network. They enforced the free-tier device limit with a polite email asking 'would you mind paying us,' not a hard wall."
    goal: "Conversion"
    learning: "If your product spreads by an individual bringing it to work, resist building upmarket features early: keep the free tier genuinely useful for one person and let it walk into the org, because moving down-market later to win that base is far harder than moving up."
    when_it_works: "Works when a single individual gets real standalone value and can later expand it across a team; fails when the product only delivers value at team or org scale, leaving the free tier hollow."
    metric_moved: "free-to-paid split (~50%)"
    result: "Roughly half of MAU stay free and half convert to paid, an extraordinarily high split for devtools (typical is 2-5%). Reached ~20,000 paid business customers, doubling 5K -> 10K -> 20K every ~10 months with low sales touch."
    tradeoff: "By keeping the free tier genuinely useful and deliberately delaying enterprise features, you carry roughly half your users as non-paying load and forgo early enterprise ACV to win a base whose monetization arrives only later and on the user's timeline."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://stratechery.com/2025/an-interview-with-tailscale-co-founder-and-ceo-avery-pennarun/"
    attribution: "CEO Avery Pennarun, Stratechery interview (2025)"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "land-and-expand"
      - "word-of-mouth"
  - title: "Manually activate first-night signups to mine roadmap feedback"
    summary: "When Tailscale's early HN post hit, it produced hundreds of signups the first night. Instead of fully automating, Pennarun stayed up personally activating accounts, opening a direct line to the earliest adopters and surfacing feedback that shaped product priorities. They kept the same human tone at the conversion edge, enforcing the device limit with a polite 'would you mind paying us' email rather than a technical block."
    goal: "Activation"
    learning: "In your first weeks, deliberately leave onboarding manual so the founder personally touches each early signup: the friction is the point, it gives you a direct feedback channel that automation would silence and tells you which features actually matter before you build them."
    when_it_works: "Works at the earliest stage when signup volume is still small enough for a founder to handle by hand; stop once volume outgrows one person and automate."
    metric_moved: "early-adopter feedback / activation"
    result: "Hundreds of users in the first night from one HN post; founder-led activation produced direct early-adopter feedback that shaped the roadmap and converted goodwill into early paying customers."
    tradeoff: "Founder-led activation bottlenecks onboarding on one person's time and caps how fast you can absorb signups, so the feedback channel only works at tiny volume and must be torn out the moment growth outpaces a single human."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://stratechery.com/2025/an-interview-with-tailscale-co-founder-and-ceo-avery-pennarun/"
    attribution: "CEO Avery Pennarun, Stratechery interview (2025)"
    tags:
      - "founder-led-sales"
      - "community-led"
      - "early-adopter-feedback"
  - title: "Promise backward compatibility forever, never break old clients"
    summary: "Infrastructure that breaks on upgrade forces customers to constantly re-evaluate it, and every re-evaluation is a churn opportunity. Tailscale made an explicit public promise that the platform is 'backward compatible, forever': it will never break a client release people still use, never break a coordination-server API or policy-file syntax, and will support both IPv4 and IPv6 forever. CEO Avery Pennarun framed this as deliberately stepping off the industry's 'upgrade treadmill' so that once something works on Tailscale it keeps working with no maintenance and no surprises. The design extends to runtime: the network keeps routing traffic and enforcing cached access policies even when Tailscale's own coordination servers are down."
    goal: "Retention"
    learning: "Publish an explicit, enumerated compatibility contract (which APIs, file formats, client versions, and protocols you will never break) and engineer your data plane to keep working during your own control-plane outages, so customers never face a forced upgrade or a hard dependency on your uptime that would trigger a re-evaluation of whether to keep you."
    when_it_works: "Pays off for products meant to be permanent embedded infrastructure (networking, identity, storage, protocols) where being torn out is the real threat; the cost of carrying old code paths forever is worth it only when stability is the value. It backfires for fast-moving products whose users want and tolerate frequent breaking changes for new capabilities."
    metric_moved: "retention"
    result: "Pennarun reports churn is low and growth is durable and mostly inbound; the product became 'invisible infrastructure' people 'use constantly but almost never think about,' alongside ~$45M ARR growing 100%+ YoY and ~20,000 paid business customers by late 2025. No public GRR/NRR figure is disclosed."
    tradeoff: "An enumerated never-break contract permanently forfeits your freedom to ship breaking changes and forces you to carry every old client, API, file format, and protocol code path forward indefinitely as accumulating maintenance burden."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://tailscale.com/blog/community-projects"
    attribution: "CEO Avery Pennarun, Tailscale blog 'Backward compatible, forever' ('we would never break any client release that people were still using'; 'once you get them working, they're going to keep working, no exceptions'); runtime behavior corroborated by Tailscale docs 'What happens if the coordination server is down'; low-churn/durable-growth claim from Pennarun via Globe and Mail (Nov 2025) and Stratechery interview (2025)"
    tags:
      - "backward-compatibility"
      - "data-gravity"
      - "reliability"
      - "infrastructure"
