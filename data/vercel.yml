plays:
  - title: "Give away the framework, sell the part that's hell to run"
    summary: "Vercel kept Next.js permanently free, open-source, and self-hostable, so developers never felt gated or locked in. The paid cloud only sold what Next.js makes genuinely hard to do yourself: optimized hosting, edge, and serverless scale. Cloud revenue funded more framework work, which drove more adoption, which fed more cloud signups. Rauch's rule: align the open-source project's value creation with the business that supports it."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Open-source the layer that builds developer habit, then charge only for the operational pain it creates: scale, edge, reliability. Keep the free tool's core features ungated and self-hostable so the paid product feels like operational effort you removed."
    when_it_works: "Works when your free tool produces output that is genuinely painful to host or operate at scale."
    metric_moved: "organic signups / ARR"
    result: "Next.js reached ~138K GitHub stars and 5-9M+ weekly npm downloads; the OSS-to-cloud flywheel carried Vercel to ~$200M ARR (2025) and a $9.3B Series F."
    tradeoff: "Because Next.js stays free, open, and self-hostable, Vercel can never gate the framework to capture value and must monetize only operational convenience that any rival cloud can offer for the same open framework, so it competes with Netlify, Cloudflare, and AWS to host the very thing it gives away."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/vercels-path-to-product-market-fit/"
    attribution: "First Round Review, 'Vercel's Path to Product-Market Fit'; Guillermo Rauch quoted"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "free-tier"
      - "land-and-expand"
  - title: "Engineer your docs so the LLM names you"
    summary: "Vercel noticed ChatGPT was sending under 1% of new signups and treated it as a channel to build rather than noise. They made docs server-rendered static HTML with clean H1-H2-H3 hierarchy and consistent terminology so LLMs could ingest and cite them, kept content fresh on 30/90/180-day review cycles, and seeded brand mentions in high-signal indexable places (Reddit, GitHub, Hacker News, X). Developers began arriving at booths saying ChatGPT told them to use Vercel. Rauch tracked the channel publicly on X as it compounded."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Optimize for LLMs like a search engine: ship docs as static server-rendered HTML with strict H1-H2-H3 hierarchy and consistent product naming, refresh on a fixed cadence, and seed brand mentions in the sources models train on (GitHub, HN, Reddit, Stack Overflow) so the AI recommends you by name."
    when_it_works: "Works when your buyers ask AI assistants 'what should I use for X' and your category has a nameable answer."
    metric_moved: "% of signups from AI referrals"
    result: "ChatGPT referrals grew from ~1% to ~4.8% to ~10% of new signups across roughly six months, becoming Vercel's fastest-growing acquisition channel."
    tradeoff: "Routing acquisition through AI assistants means betting a fast-growing channel on a recommendation surface Vercel does not own and cannot audit, where a single change to how OpenAI or other model makers weight or attribute sources can silently shrink the funnel overnight."
    tier: "Reported"
    source_type: "press"
    source_url: "https://vercel.com/blog/how-were-adapting-seo-for-llms-and-ai-search"
    attribution: "Vercel blog 'How we're adapting SEO for LLMs and AI search'; figures from Guillermo Rauch on X (Apr 2025)"
    tags:
      - "content-seo"
      - "geo"
      - "docs-as-marketing"
      - "word-of-mouth"
  - title: "Build the AI tool that deploys onto you by default"
    summary: "On top of the mature Next.js-to-Vercel motion, Vercel launched v0, a generative-UI tool whose free tier gives credits to build and deploy an app from a prompt. Critically, v0's output is Next.js, Tailwind, and shadcn/ui with a one-click 'Deploy to Vercel' button, so every generated app graduates straight into the paid platform instead of competing with it. The pre-launch waitlist drew 100,000 signups in three weeks."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Launch a second free product whose default output is your paid platform's native stack and whose top call-to-action is one-click deploy onto you. Its users become your users by construction; a tool that emits portable artifacts just teaches them to leave."
    when_it_works: "Works when you already own a production platform and can make the new tool emit and deploy into it natively."
    metric_moved: "new product ARR / top-of-funnel signups"
    result: "v0 reached ~$42M ARR (~21% of company total) within ~16 months and 3.5M+ users by Oct 2025; $1M to $2M ARR in 14 days; pre-launch waitlist hit 100K in 3 weeks."
    tradeoff: "v0's generative free tier runs on real inference and deploy compute and requires a separate ~60-person org with its own pricing and support, so the funnel it feeds is paid for in COGS that drags blended gross margin below pure-SaaS levels."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.lennysnewsletter.com/p/everyones-an-engineer-now-guillermo-rauch"
    attribution: "Lenny's Podcast 'Everyone's an engineer now' (Guillermo Rauch); waitlist via Vercel 'Announcing v0' blog"
    tags:
      - "free-tier"
      - "freemium"
      - "viral-loop"
      - "templates-starters"
      - "bottom-up-plg"
