plays:
  - title: "Give away the framework, sell the deployment"
    summary: "Vercel kept Next.js permanently free and fully open-source, refusing to gate features or limit self-hosting so developers never felt locked in or upsold. The paid cloud only sold the thing Next.js made painful to do yourself: optimized hosting, edge, and serverless scale. Revenue from the cloud funded more framework development, which drove more adoption, which fed more cloud signups. Rauch frames the rule as aligning the value creation of the open-source project with the business that supports it."
    metric_moved: "growth"
    result: "Next.js reached ~138K GitHub stars and 5-9M+ weekly npm downloads; the OSS-to-cloud flywheel carried Vercel to ~$200M ARR (2025) and a $9.3B Series F valuation."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/vercels-path-to-product-market-fit/"
    attribution: "First Round Review, 'Vercel's Path to Product-Market Fit'; Guillermo Rauch quoted"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "free-tier"
      - "land-and-expand"
  - title: "Optimize docs so the LLM recommends you"
    summary: "Vercel noticed ChatGPT was starting to send a trickle of signups (under 1% of new users). Instead of treating it as noise, they leaned into generative-engine optimization: keeping documentation fresh and structured so AI models would learn to recommend Vercel by name. Developers literally showed up at conference booths saying ChatGPT told them to use Vercel. Rauch tracked the channel publicly on X as it compounded."
    metric_moved: "organic"
    result: "ChatGPT referrals grew from <1% to ~10% of new Vercel signups in roughly six months, becoming the company's fastest-growing acquisition channel."
    tier: "Reported"
    source_type: "aggregator"
    source_url: "https://aiseotracker.com/case-study/vercel"
    attribution: "Guillermo Rauch on X (Apr 2025) reporting the figure, summarized by AI SEO Tracker case study"
    tags:
      - "content-seo"
      - "docs-as-marketing"
      - "word-of-mouth"
      - "twitter-x"
  - title: "Open a free top-of-funnel AI product as act two"
    summary: "On top of the mature Next.js-to-Vercel motion, Vercel launched v0, a generative-UI tool with a free credit tier that let anyone build and deploy an app from a prompt. The waitlist alone drew 100,000 signups in three weeks, and the product generated apps that naturally deploy onto Vercel, widening the existing funnel rather than competing with it. Output is Next.js/Tailwind/shadcn, so v0 users graduate straight into the paid platform."
    metric_moved: "arr"
    result: "v0 reached ~$42M ARR (~21% of company total) within ~16 months and 3.5M+ users by Oct 2025; pre-launch waitlist hit 100K signups in 3 weeks."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.lennysnewsletter.com/p/everyones-an-engineer-now-guillermo-rauch"
    attribution: "Lenny's Podcast, 'Everyone's an engineer now' (Guillermo Rauch); waitlist figure via Vercel/SaaStr coverage"
    tags:
      - "free-tier"
      - "freemium"
      - "viral-loop"
      - "templates-starters"
      - "bottom-up-plg"
