plays:
  - title: "Ship your free tier into the surface users already keep open"
    summary: "GitHub already owned the most-used editor (VS Code) and the largest developer account base. On December 18, 2024 it shipped Copilot Free integrated directly into VS Code: any developer got 2,000 completions and 50 chat messages a month just by signing in with their existing GitHub account, no credit card and nothing new to install. The free tier lived where developers already worked, so activation friction collapsed to a single sign-in and the entire installed base was dropped into a paid-conversion funnel."
    goal: "Activation"
    learning: "Embed the free tier inside the tool your users live in and gate it with the account they already have, so trying you costs one sign-in: no install, no new credential. Owning the daily surface drops your whole installed base into the funnel and beats any standalone signup page."
    when_it_works: "Works when you already control or can natively embed into a high-frequency surface your target users keep open every day."
    metric_moved: "free_to_paid"
    result: "Free tier shipped default-on in VS Code alongside the 150M-developer milestone; the free plan became top-of-funnel for ~4.7M paid Copilot subscribers (Microsoft FY26 Q2, Jan 2026)."
    tradeoff: "Dropping your entire installed base into a generous free tier means you carry the marginal inference cost of millions of non-payers indefinitely, and most of them stay free, so the ~18% conversion has to subsidize the other ~82% you can never bill."
    tier: "Verified"
    source_type: "press"
    source_url: "https://github.blog/news-insights/product-news/github-copilot-in-vscode-free/"
    attribution: "GitHub Blog, 'Announcing 150M developers and a new free tier for GitHub Copilot in VS Code' (Dec 18, 2024)"
    tags:
      - "free-tier"
      - "freemium"
      - "default-on"
      - "bottom-up-plg"
      - "distribution-leverage"
  - title: "Gate a risky new product behind a waitlist until usage data hands you the price"
    summary: "GitHub released Copilot as an invite-gated technical preview in June 2021 and ran it for a full year before charging. The waitlist made access a scarce status object developers shared and clamored to join, while the year of real usage gave GitHub telemetry to harden the product and proof points to justify a price. By general availability in June 2022, demand and credibility were already built."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Launch a novel, technically risky product invite-only and run it long enough to harvest one hard usage number that sells the paid version. The waitlist manufactures demand while the telemetry hardens the product and gives you proof to justify charging."
    when_it_works: "Works when the product is novel enough that scarce access reads as exclusivity to developers."
    metric_moved: "growth"
    result: "Over 1.2M developers used Copilot during the 12-month preview; in files where it was enabled, nearly 40% of code was written by Copilot in languages like Python, the headline proof point at GA."
    tradeoff: "Running a novel, compute-heavy product free for a full year before charging means you eat twelve months of inference and engineering cost with zero revenue, and a waitlist that builds hype also caps reach and lets a competitor ship an open public product into the demand you primed."
    tier: "Verified"
    source_type: "press"
    source_url: "https://github.blog/news-insights/product-news/github-copilot-is-generally-available-to-all-developers/"
    attribution: "GitHub Blog, 'GitHub Copilot is generally available to all developers' (June 21, 2022)"
    tags:
      - "design-partners"
      - "waitlist"
      - "scarcity"
      - "word-of-mouth"
      - "bottom-up-plg"
  - title: "Give it free to the cohorts that pay nothing but set everyone else's habits"
    summary: "At general availability GitHub made Copilot free for verified students and maintainers of popular open-source projects. Students form their tool habits before they have a budget and carry them into paid jobs; OSS maintainers are the loudest recommenders whose project READMEs and threads shape what teams adopt. Free access to these two cohorts is a land-into-the-enterprise loop disguised as goodwill: the recommendation and the habit arrive at the paying employer for free."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Hand the product free to students (who lock in lifetime tool habits before they have a budget) and visible OSS maintainers (whose READMEs and threads dictate what teams adopt), so the habit and the word-of-mouth arrive later at a paying employer. You bankroll influence now to collect conversion downstream."
    when_it_works: "When buyers at your target accounts defer to individual developers' preferences and tool habits are sticky once formed."
    metric_moved: "growth"
    result: "Copilot free for verified students and OSS maintainers from GA (June 2022); the student program alone later grew to nearly two million users."
    tradeoff: "Permanently giving the product away to your loudest, highest-usage cohorts (millions of students plus active maintainers) means you bankroll the most expensive non-paying users forever on the bet they convert later, with no contractual path to ever charge the habit you created."
    tier: "Verified"
    source_type: "press"
    source_url: "https://github.blog/news-insights/product-news/github-copilot-is-generally-available-to-all-developers/"
    attribution: "GitHub Blog, 'GitHub Copilot is generally available to all developers' (June 21, 2022)"
    tags:
      - "free-tier"
      - "open-source"
      - "students"
      - "community-led"
