plays:
  - title: "Land by ripping out legacy VDI and VPN"
    summary: "Selling a net-new browser category to CISOs is hard, so Island anchored each deal to a budget line enterprises already hated: legacy VDI and VPN infrastructure. By replacing virtual desktops and remote-access stacks with the Enterprise Browser, Island let customers decommission servers and cut tens of millions in spend, turning a security pitch into a CFO-friendly cost-takeout. One global bank decommissioned 400 servers and saved tens of millions; a pharma firm cut contractor VDI costs by 94%."
    metric_moved: "arr"
    result: "Customers replaced VDI/VPN at scale (one bank decommissioned 400 servers, saving tens of millions; pharma firm cut contractor VDI cost 94%), helping Island reach ~450 customers and an estimated $87M ARR by Oct 2024."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/island"
    attribution: "Contrary Research company report on Island; corroborated by Island's national-retailer case study"
    tags:
      - "land-and-expand"
      - "founder-led-sales"
      - "design-partners"
  - title: "Offer a low-friction extension alongside the browser"
    summary: "Asking an entire org to swap its browser is a big ask, so Island ships both a full Chromium-based Enterprise Browser and a lightweight extension that drops into Chrome, Edge, Safari, and Firefox without users switching browsers. Risk-averse enterprises can start with the extension to gain visibility and limited control inside existing workflows, then transition to the full browser once they hit use cases (sensitive data, app isolation, advanced identity) that demand deeper capabilities. The two-tier model reduces adoption friction while preserving a clear upgrade path."
    metric_moved: "ttfv"
    result: "Lower-friction entry via the extension (parity with most full-browser capabilities) gives enterprises a fast path to value before committing to a full deployment; Mattress Firm reached 2,400 stores in two weeks."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.island.io/blog/browser-extensions-in-the-enterprise"
    attribution: "Island blog on enterprise browser extensions; deployment detail from island.io deployment page"
    tags:
      - "land-and-expand"
      - "onboarding-redesign"
      - "free-tier"
  - title: "Dogfood your own product company-wide"
    summary: "Island runs its entire company on the Island Enterprise Browser, using it for SOC 2 compliance, device-posture enforcement, password management, remote onboarding without shipping laptops, and DLP. Internal use both hardens the product (they fine-tuned the Anonymizer feature on staff before release) and produces credible, lived use cases that become sales proof points. The company publishes these internal use cases as marketing content."
    metric_moved: "growth"
    result: "100% of Island's workforce uses the browser's password manager; hundreds of remote workers onboard with no laptop provisioning, and the Anonymizer feature was tuned internally before customer release."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.island.io/blog/how-island-uses-island-enterprise-browser-use-cases"
    attribution: "Island engineering/blog post 'How Island Uses Island'"
    tags:
      - "dogfooding"
      - "docs-as-marketing"
      - "transparency"
