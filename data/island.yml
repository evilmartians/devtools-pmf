plays:
  - title: "Fund a new category by ripping out VDI and VPN"
    summary: "Selling a brand-new product category (an enterprise browser) to CISOs means fighting for net-new budget that does not exist. Island instead anchored every deal to a line item enterprises already resent: legacy VDI (Citrix/virtual desktops) and VPN/remote-access stacks. By moving security controls into the browser on the endpoint, customers could decommission virtualization servers and remote-access infrastructure, so a security pitch became a CFO-friendly cost-takeout. One global bank decommissioned 400 servers and saved tens of millions; a pharma firm cut contractor VDI cost 94%."
    goal: "Acquisition"
    learning: "If you are creating a category with no budget line, do not ask for new money: position yourself as the replacement for an expensive incumbent system the buyer already pays for and resents (VDI, VPN, a legacy vault), and quantify the decommissioning in servers retired and dollars saved so the economic buyer becomes the CFO, not just the CISO."
    when_it_works: "Works when your product genuinely lets customers turn off costly existing infrastructure, so the savings are auditable; fails if you are purely additive spend with no system to retire."
    metric_moved: "arr"
    result: "Documented cost-takeout outcomes (global bank decommissioned 400 servers saving tens of millions; pharma firm cut contractor VDI cost 94%; national retailer sped POS launch 80%) helped Island reach ~450 customers and an estimated $87M ARR by Oct 2024."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/island"
    attribution: "Contrary Research company report on Island (400 servers, 94% VDI cut, 80% POS); corroborated by Island national-retailer case study"
    tags:
      - "land-and-expand"
      - "cost-takeout"
      - "category-creation"
      - "enterprise"
  - title: "Land light with a no-agent install, expand into the full product"
    summary: "Asking an org to swap its default browser is a deal-killing ask. Island made the entry near-zero-friction: contractors and BYOD users install the browser (or a Chrome/Edge/Safari/Firefox extension) on any personal device, authenticate, and get scoped access to only their apps, with no MDM, no device imaging, and no agent to push. Risk-averse buyers start with this light footprint to get visibility and basic control inside existing workflows, then upgrade to the full browser once they hit use cases (sensitive-data DLP, app isolation, advanced identity) that demand it."
    goal: "Activation"
    learning: "When your full product requires a heavyweight switch, ship a near-zero-install entry point (extension, scoped access, no agent/MDM) that proves value on the user's existing device, and reserve the deeper capabilities as the reason to expand, so adoption costs the buyer almost nothing and the upgrade path is obvious."
    when_it_works: "Works when a stripped-down footprint still delivers real value on day one and there is a clear set of advanced use cases that pulls accounts toward the full deployment; fails if the light version is too weak to prove anything."
    metric_moved: "ttfv"
    result: "Light-footprint entry (no agent, no MDM, any device) let a global hospitality company make Island the access layer for 15,000 employees and partners and retire Citrix plus a legacy password vault; deployments run from days to a couple of weeks."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.island.io/solutions/3rd-party-contractors"
    attribution: "Island third-party contractor and BYOD solution pages (no agent/MDM, install on any device); two-tier model from Island enterprise-browser-extensions blog"
    tags:
      - "land-and-expand"
      - "onboarding-redesign"
      - "low-friction-entry"
      - "byod"
