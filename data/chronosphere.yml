plays:
  - title: "Open-source the infra core, then sell the product on top"
    summary: "Mao and Skillington built and open-sourced M3 (a time-series metrics engine) while at Uber, scaling it to tens of billions of time series. When they left to found Chronosphere in 2019, M3 was already proven in the open and trusted by the community. They deliberately did not over-commercialize it: 'First, start with how you can provide value to the community.' Chronosphere built a commercial product on top, using M3's credibility and the visible demand for scalable open observability as proof the market existed."
    metric_moved: "growth"
    result: "Raised an $11M Series A directly with no seed round (Greylock, Nov 2019) on the strength of an 80-page plan and M3's open-source traction; company later reached >$160M ARR and a $3.35B exit."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://blog.pragmaticengineer.com/chronosphere/"
    attribution: "Martin Mao via The Pragmatic Engineer (Gergely Orosz); Work-Bench founding-story interview"
    tags:
      - "open-source"
      - "github"
      - "founder-led-sales"
      - "developer-advocacy"
  - title: "Lead with a quantified cost-cut promise as your wedge"
    summary: "Against incumbents like Datadog where 'pricing was out of hand at scale,' Chronosphere built its entire GTM around a single measurable promise: its Control Plane shapes telemetry so customers stop paying to store data nobody uses. The headline number is front-and-center in every marketing surface and sales motion. This reframed the buy from 'better monitoring' to a CFO-legible cost-reduction project with a fast payback."
    metric_moved: "growth"
    result: "Public claim of reducing observability data volumes by ~84-89% and troubleshooting time by 50%; Forrester TEI cited 165% ROI and <6-month payback. Backed >145% NRR and 100% logo retention (2023)."
    tier: "Verified"
    source_type: "press"
    source_url: "https://chronosphere.io/platform/control-plane/"
    attribution: "Chronosphere Control Plane product page; AlleyWatch interview with Martin Mao (NRR/logo retention)"
    tags:
      - "content-seo"
      - "land-and-expand"
      - "usage-based-pricing"
  - title: "Publish hard-numbers enterprise case studies"
    summary: "Selling enterprise observability without a free tier, Chronosphere turned marquee logos into proof by publishing case studies loaded with specific before/after metrics rather than vague testimonials. The Robinhood study quantifies every dimension: data volume, query speed, detection time, incident reduction, retention. These concrete numbers de-risk the switch for the next skeptical enterprise buyer evaluating against an incumbent."
    metric_moved: "growth"
    result: "Robinhood case study: 80%+ observability data reduction, 8x faster query latency, MTTD cut 4x (2 min to 30 sec), dashboards from 15 min to seconds, retention extended from 2 weeks to 13 months, all Sev 0/Sev 1 incidents eliminated."
    tier: "Verified"
    source_type: "press"
    source_url: "https://chronosphere.io/wp-content/uploads/2023/10/Robinhood_case_study_FINAL-1.pdf"
    attribution: "Chronosphere Robinhood case study (2023)"
    tags:
      - "docs-as-marketing"
      - "content-seo"
      - "land-and-expand"
