plays:
  - title: "The feature requests you can't justify building are your product spec"
    summary: "At Uber, Mao and Skillington built M3 (a time-series metrics engine) and open-sourced it in 2018, scaling it to tens of billions of time series and billions of datapoints/sec. The trigger to start a company was specific: the open-source community kept requesting enterprise features (rate limiting, access controls, multi-tenancy) that made no sense for Uber to build. They left in 2019 to take over the project's stewardship and sell those exact features as a hosted product on top of M3."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Maintain a widely-adopted OSS project and watch which enterprise asks (governance, access control, rate limiting, multi-tenancy) the sponsor will never fund. Leave, take stewardship, and sell exactly that gap as a hosted layer on top."
    when_it_works: "Works when your OSS project already serves users at a scale where enterprise gaps (security, cost, governance) are felt and the original sponsor will not fund them."
    metric_moved: "growth"
    result: "Raised an $11M Series A directly with no seed round (Greylock + Lux, Nov 2019) on an 80-page plan plus M3's proven open-source traction; company later reached >$160M ARR and a $3.35B exit to Palo Alto Networks (Jan 2026)."
    tradeoff: "Building the company on top of M3, an OSS engine anyone can self-host for free, means your most capable competitor is the very project you stewarded, and you are confined to monetizing only the enterprise layer the community will not build itself."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://blog.pragmaticengineer.com/chronosphere/"
    attribution: "Martin Mao via The Pragmatic Engineer (Gergely Orosz); corroborated by TechCrunch and GlobeNewswire launch coverage (Nov 2019)"
    tags:
      - "open-source"
      - "github"
      - "founder-led-sales"
      - "developer-advocacy"
  - title: "When the incumbent's pain is the bill, sell a savings project the CFO signs"
    summary: "Against Datadog, whose 'pricing got out of hand at scale,' Chronosphere reframed the entire buy from 'better observability' to a measurable cost-reduction project. Its Control Plane shapes telemetry at ingest (the Refine component drops, filters, and aggregates low-value data and reduces cardinality without losing query resolution) so customers stop paying to store data nobody queries. Every marketing surface and sales call leads with the data-volume cut and the payback window, making the deal something a CFO signs, not just a platform team."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Reframe the buy from 'better tool' to a quantified cost cut: technically reduce the incumbent's cost driver (here, telemetry volume at ingest), then put the percentage saved and the payback window on every surface so finance funds you out of budget, not discretionary spend."
    when_it_works: "Works when the incumbent's usage-based pricing punishes scale and you can technically reduce the cost driver (here, data volume) without degrading the core job."
    metric_moved: "growth"
    result: "Public claim of ~84% reduction in observability data volume and 50% faster troubleshooting on average; Forrester TEI cited 165% ROI and <6-month payback. Backed by >145% NRR and 100% logo retention (2023)."
    tradeoff: "Pitching yourself as a quantified cut to the incumbent's bill caps your contract value at a fraction of Datadog's spend, makes you a line item the same CFO can later trim, and traps you inside the comparison to Datadog instead of owning your own category."
    tier: "Verified"
    source_type: "press"
    source_url: "https://chronosphere.io/platform/control-plane/"
    attribution: "Chronosphere Control Plane product page and 'Control Costs' solution page; AlleyWatch interview with Martin Mao (NRR/logo retention); Forrester TEI"
    tags:
      - "content-seo"
      - "land-and-expand"
      - "usage-based-pricing"
      - "competitive-displacement"
  - title: "With no free tier, your case study is the trial"
    summary: "With no free tier to let enterprise buyers self-verify, Chronosphere converted marquee logos into proof by publishing case studies that quantify every dimension of the switch rather than offering vague testimonials. The Robinhood study lays out data volume, query latency, detection time, retention window, and incident counts as a clean before/after table. These hard numbers de-risk the migration for the next skeptical enterprise evaluating against an incumbent."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Turn marquee logos into before/after metric tables covering every dimension the buyer's team is graded on (latency, cost, MTTD, retention) so a skeptical evaluator copies your numbers straight into their internal business case."
    when_it_works: "Works for high-consideration enterprise sales where buyers must justify a switch internally and a recognizable reference logo carries weight."
    metric_moved: "growth"
    result: "Robinhood case study: 80%+ observability data reduction, 8x faster query latency, MTTD cut 4x (2 min to 30 sec), dashboards from 15 min to seconds, retention extended from 2 weeks to 13 months, and all Sev 0/Sev 1 incidents eliminated."
    tradeoff: "Publishing hard before/after numbers turns them into the public benchmark every prospect holds you to and competitors openly target, and it depends on marquee customers consenting to expose their internal metrics, which throttles how many proof points you can ship."
    tier: "Verified"
    source_type: "press"
    source_url: "https://chronosphere.io/wp-content/uploads/2023/10/Robinhood_case_study_FINAL-1.pdf"
    attribution: "Chronosphere Robinhood case study (2023)"
    tags:
      - "docs-as-marketing"
