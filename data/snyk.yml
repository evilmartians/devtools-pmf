plays:
  - title: "Auto-generate an SEO page per open-source package"
    summary: "Developers constantly search for whether a package is safe and well-maintained, but that intent landed on scattered third-party pages. Snyk built Advisor, programmatically generating 1M+ SEO-optimized pages, one per npm/PyPI/Docker/Go package, by indexing package registries, source repos, and its own vulnerability database. Each page scores a package on popularity, maintenance, community, and security, then funnels searching developers into the core product. Snyk's former VP of Product calls this its single biggest growth loop."
    metric_moved: "organic"
    result: "Advisor clicks grew from ~150K/month in 2021 to over 1M/month in 2022, the company's largest acquisition driver."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://www.plg.news/p/a-look-inside-snyks-biggest-growth"
    attribution: "Ben Williams, former VP Product at Snyk (led PLG and developer experience), on The Product-Led Geek"
    tags:
      - "content-seo"
      - "docs-as-marketing"
      - "viral-loop"
      - "bottom-up-plg"
  - title: "Brand your auto-fix PRs to recruit the whole team"
    summary: "After a developer connects a repo, Snyk automatically opens fix pull requests for the vulnerabilities it finds, each prefixed with '[Snyk]'. Because PRs are reviewed by teammates, every fix surfaces Snyk's branding to the entire dev team inside private repos, and links in the PR pull new users into the product. Snyk's former VP of Product describes this as a first-of-its-kind loop that uses the SCM itself as a distribution channel instead of relying on Google, and as especially effective for expanding seats within an existing customer."
    metric_moved: "growth"
    result: "Branded '[Snyk]' fix PRs exposed the product to every reviewer on a team, driving new-user signups and seat expansion within accounts (mechanism documented; counts not disclosed)."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://www.plg.news/p/the-clever-snyk-growth-loop-using"
    attribution: "Ben Williams, former VP Product at Snyk, on The Product-Led Geek (June 2023)"
    tags:
      - "github"
      - "viral-loop"
      - "default-on"
      - "land-and-expand"
  - title: "Use product usage signals to drive top-down sales"
    summary: "Snyk runs a 'pincer' motion: free, developer-first adoption from the bottom up, paired with top-down enterprise sales triggered by product-qualified leads. The growth team watches which accounts already show heavy free-product activity, then uses a plugin to pull a list of about five senior decision-makers per account for sales to target. This lets sales chase organizations the product has already proven itself inside, rather than cold enterprise outreach."
    metric_moved: "growth"
    result: "PQL-driven land-and-expand turned free developer usage into qualified enterprise sales targets; contributed to >130% net revenue retention (2022) and $300M+ ARR."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://openviewpartners.com/blog/snyk-plg-strategy/"
    attribution: "Francesca Krihely, Snyk Sr. Director of Developer Experience & Growth, interviewed by OpenView"
    tags:
      - "bottom-up-plg"
      - "land-and-expand"
      - "free-tier"
      - "founder-led-sales"
