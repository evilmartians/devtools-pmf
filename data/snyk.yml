plays:
  - title: "Generate one SEO landing page per open-source package"
    summary: "Developers constantly Google whether an npm/PyPI/Go/Docker package is safe and maintained, but that intent landed on scattered third-party pages. Snyk built Advisor, programmatically generating 1M+ pages, one per package, by indexing package registries, source repos, and its own vulnerability DB, each scoring the package on popularity, maintenance, community, and security. Each page funnels the searching developer into the core product. They grew it further with technical SEO and code-example pages for JS and Python."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Find the high-intent question your users already Google about a finite set of entities (packages, libraries, error codes, configs), then auto-generate one indexed page per entity from data you already hold, ending each page with a path into your product. The bigger the entity catalog, the bigger the moat."
    when_it_works: "Works when there is a large, enumerable catalog of things users search for and you own proprietary data that makes your page the most useful answer."
    metric_moved: "organic traffic / signups"
    result: "Advisor clicks grew from ~150K/month in 2021 to over 1M/month in 2022 (~6.7x), one of the company's largest acquisition drivers."
    tradeoff: "Hosting 1M+ thin, auto-generated pages off proprietary data means you carry permanent engineering and content-freshness debt to keep scores accurate, and you stake acquisition on Google's algorithm and willingness to keep indexing a programmatic page farm it could devalue overnight."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://www.plg.news/p/a-look-inside-snyks-biggest-growth"
    attribution: "Ben Williams, former VP Product at Snyk (led PLG and developer experience), on The Product-Led Geek"
    tags:
      - "content-seo"
      - "programmatic-seo"
      - "docs-as-marketing"
      - "bottom-up-plg"
  - title: "Brand your auto-fix PRs to recruit the whole team"
    summary: "After a developer connects a repo, Snyk opens fix pull requests for the vulnerabilities it finds, each prefixed with '[Snyk]'. Because PRs get reviewed by teammates, every fix surfaces Snyk's brand and a link to the entire dev team inside private repos, turning the SCM itself into a distribution channel instead of relying on Google. The audience is perfectly targeted (every reviewer is in the persona), and in open-source repos it spreads awareness across companies, pulling developers in who later bring it to work."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Make your product emit artifacts into a channel your users' teammates already review daily (PRs, commits, dashboards, shared docs), and brand each artifact with a clickable entry point, so a single user's action advertises you to their whole team for free. The artifact should be genuinely useful (a working fix) so the brand is welcome, not spam."
    when_it_works: "Works when your product produces output that naturally flows into a collaborative, team-visible surface and that output is valuable enough that teammates want to engage with it."
    metric_moved: "signups / seat expansion"
    result: "Branded '[Snyk]' fix PRs exposed the product to every reviewer on a team, driving new-user signups and seat expansion within accounts (mechanism documented; counts not disclosed)."
    tradeoff: "Injecting branded '[Snyk]' PRs into every reviewer's queue ties your reputation to fix quality, so any noisy, wrong, or unwanted PR reads as spam in someone's private repo and trains the team to silence the default-on loop that drives the whole motion."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://www.plg.news/p/the-clever-snyk-growth-loop-using"
    attribution: "Ben Williams, former VP Product at Snyk, on The Product-Led Geek (June 2023)"
    tags:
      - "github"
      - "viral-loop"
      - "default-on"
      - "land-and-expand"
  - title: "Pull the 5 buyers per account the product already converted"
    summary: "Snyk runs a pincer motion: free developer-first adoption from the bottom, top-down enterprise sales from the top, joined by product-qualified leads. The growth team watches which accounts show heavy free-product activity, then uses a plugin to surface roughly five senior decision-makers per account for sales to target. Sales chases organizations the product has already proven itself inside, instead of cold enterprise outreach."
    goal: "Expansion"
    learning: "Instrument your free tier so usage density per company becomes the trigger for sales, then for each hot account hand sales a short, named list of the senior buyers above the active users, so reps only ever pitch organizations where the product already has internal champions."
    when_it_works: "Works when individual developers can adopt for free without procurement and account-level usage is visible enough to rank companies by intent."
    metric_moved: "net revenue retention"
    result: "PQL-driven land-and-expand turned free developer usage into qualified enterprise targets; contributed to >130% net revenue retention (2022) and $300M+ ARR."
    tradeoff: "Letting developers adopt for free and only pursuing accounts the product has already infiltrated means you fund free usage at companies that may never convert and you cap reach at organizations where bottom-up adoption could take hold, leaving cold greenfield enterprise demand untouched."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://openviewpartners.com/blog/snyk-plg-strategy/"
    attribution: "Francesca Krihely, Snyk Sr. Director of Developer Experience & Growth, interviewed by OpenView"
    tags:
      - "bottom-up-plg"
      - "land-and-expand"
      - "pql"
      - "sales-assist"
  - title: "Define activation as a repeated fix, then chase it"
    summary: "Snyk's growth team found acquisition was no longer the constraint, retention was, so they defined a single behavioral metric: the number of unique days an account fixed a vulnerability within 30 days. Plotting accounts into engagement states (Dormant, Casual, Core, Progressive) exposed a brutal split: dormant accounts had only a ~5-7% chance of still using Snyk twelve months later, while deeply engaged accounts retained at ~80%. They then re-pointed onboarding and product nudges at one job, getting accounts to fix vulnerabilities on more days, treating that recurring habit as the leading indicator of retention rather than tracking retention directly."
    goal: "Retention"
    learning: "Pick the one recurring in-product action that correlates with staying (not a one-time setup), measure it as unique active days within a window, and rank every account by it; then aim onboarding, nudges, and product surfaces at moving accounts up that ladder, because the recurring-habit metric is the lever and retention is its downstream result."
    when_it_works: "Works when your product has a repeatable core action users return to do (fix, deploy, query, ship) so frequency is meaningful; it pays off less for one-shot or infrequent-by-nature tools where a single use is the whole job."
    metric_moved: "retention"
    result: "Engagement state predicted 12-month retention with a >10x spread: ~5-7% for dormant accounts vs ~80% for deeply engaged accounts. Snyk reached >130% NRR (2022) and $300M+ ARR on this developer-habit foundation."
    tradeoff: "Optimizing everything around one recurring action (unique fix-days within 30 days) bakes in the assumption that frequency equals value, so you over-invest in nudging accounts up the engagement ladder and risk neglecting low-frequency-but-high-value users whose single use is the whole job."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://www.news.aakashg.com/p/how-to-drive-growth-in-b2b-products"
    attribution: "Ben Williams, 2x VP Product at Snyk (led PLG/growth), interviewed on Aakash Gupta's newsletter; corroborated by reo.dev citing his \"Defining Activation at Snyk\" essay (The Product-Led Geek)"
