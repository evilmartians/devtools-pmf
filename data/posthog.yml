plays:
  - title: "Launch open-source on HN 4 weeks after first commit"
    summary: "PostHog open-sourced an Amplitude/Mixpanel alternative and posted a Launch HN just four weeks after starting to write code, deliberately optimizing for a small group who loved it over mass attention. They spent only ~$1K seeding the raw repo first to get the initial stars and populate it, then the HN traction pushed them onto GitHub's trending page, which compounded the inflow. Their own pre-set bar was modest: happy at 500 stars, delighted at 1,000."
    goal: "Acquisition"
    learning: "Ship the smallest open-source version of your tool and launch it on HN within weeks, not months: seed the bare repo with ~$1K to get the first stars so it does not look dead, then let an HN front-page slot kick you onto GitHub trending, where each surface feeds the next. Aim to find a few hundred people who love it, not the whole world."
    when_it_works: "Works when your product is genuinely open-source or self-hostable and your buyers live on HN and GitHub; a closed SaaS landing page launched the same way has no trending surface to compound into."
    metric_moved: "organic"
    result: "Over 800 GitHub stars and well over 200 sign-ups within five days, plus several businesses heavily integrating, on a product just 4 weeks old."
    tier: "Verified"
    source_type: "press"
    source_url: "https://posthog.com/blog/after-the-hn-launch"
    attribution: "PostHog blog, 'After the HN launch' (founders' own retrospective)"
    tags:
      - "hacker-news"
      - "open-source"
      - "github"
      - "bottom-up-plg"
      - "launch-seeding"
  - title: "Make your full handbook public before your second hire"
    summary: "PostHog published its entire internal handbook (strategy, roadmap, values, comp calculators, share options, even side-gig policy) on the marketing site after their first hire but before their second. The visible operating system made a four-week-old company read as established during its HN launch, converting skeptical developers who trusted the transparency over polish. About 70% of early growth came from recommendations, 30% from inbound content."
    goal: "Acquisition"
    learning: "Publish your actual operating handbook (strategy, roadmap, comp, equity) on your public site while you are still tiny: developers read radical transparency as proof you are stable enough to bet on, and a brand-new company can borrow the perceived maturity of a much larger one at near-zero cost."
    when_it_works: "Works when your audience is developers who reward honesty and your real internals are something to be proud of; broadcasting a chaotic or embarrassing internal reality just confirms the doubt."
    metric_moved: "organic"
    result: "Cited as a credibility lever that let PostHog punch above its weight at launch; ~70% of early growth came from word-of-mouth recommendations."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.howtheygrow.co/p/how-posthog-grows-the-power-of-being"
    attribution: "How They Grow, 'How PostHog Grows: The Power of Being Open-Core'; James Hawkins on ~70% growth from recommendations"
    tags:
      - "transparency"
      - "docs-as-marketing"
      - "open-source"
      - "community-led"
      - "handbook"
  - title: "Bundle products until ripping you out is too painful"
    summary: "Rather than chasing new logos, PostHog runs a 'go deeper' motion: take a team already on product analytics and layer on session replay, experiments, then error tracking until the account uses 3+ products. A single-product customer can swap PostHog out easily; analytics + experiments + replay together is a workflow no one wants to re-wire. They drive this with two concrete levers: 2-3 months of free credited usage to trial each new product, plus a sales-comp multiplier (0.7x base, +0.2x per product above one) that pays reps to deepen accounts instead of just renewing them."
    goal: "Expansion"
    learning: "Turn expansion into a switching-cost engine: give existing accounts free credited usage to trial each adjacent product, and pay your team more per additional product adopted rather than per renewal, so accounts entangle multiple workflows and become expensive to leave instead of growing seats one at a time."
    when_it_works: "Works when you have a genuine suite of adjacent products serving the same team and usage-based pricing that grows with adoption; with one product or per-seat pricing there is nothing extra to layer in."
    metric_moved: "nrr"
    result: "Median customer increases spend ~3x within 18 months (as of Sept 2025); 2+ product customers are the happiest and best-retained, including on revenue retention."
    tier: "Reported"
    source_type: "press"
    source_url: "https://posthog.com/handbook/growth/sales/expansion-strategies"
    attribution: "PostHog public handbook, 'Expansion strategies'; spend/retention figures corroborated by Contrary Research (research.contrary.com/company/posthog)"
    tags:
      - "land-and-expand"
      - "usage-based-pricing"
      - "multi-product"
      - "switching-cost"
      - "sales-comp"
