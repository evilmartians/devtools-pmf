plays:
  - title: "Launch on HN four weeks in, before the product is good"
    summary: "PostHog open-sourced an Amplitude/Mixpanel alternative and posted a Launch HN just four weeks after starting to write code, optimizing for a small group who loved it over mass attention. They spent ~$1K seeding the raw repo first for initial stars, then HN traction pushed them onto GitHub's trending page, which compounded the inflow. Their pre-set bar was modest: happy at 500 stars, delighted at 1,000."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Open-source the smallest useful version and post a Launch HN within weeks: spend ~$1K seeding the bare repo so it has stars and does not read as dead, then let an HN front-page slot push you onto GitHub trending, where each surface feeds the next. Optimize for a few hundred people who love it."
    when_it_works: "Works when your product is genuinely open-source or self-hostable and your buyers live on HN and GitHub."
    metric_moved: "organic"
    result: "Over 800 GitHub stars and well over 200 sign-ups within five days, plus several businesses heavily integrating, on a product just 4 weeks old."
    tradeoff: "Open-sourcing the core to win the HN/GitHub crowd permanently commits you to maintaining a free, self-hostable product that 90%+ of users never pay for, forcing you to monetize only the narrower hosted layer."
    tier: "Verified"
    source_type: "press"
    source_url: "https://posthog.com/blog/after-the-hn-launch"
    attribution: "PostHog blog, 'After the HN launch' (founders' own retrospective)"
    tags:
      - "hacker-news"
      - "open-source"
      - "github"
      - "bottom-up-plg"
      - "launch-seeding"
  - title: "Publish your whole handbook while you are still two people"
    summary: "PostHog published its entire internal handbook (strategy, roadmap, values, comp calculators, share options, even side-gig policy) on the marketing site after their first hire but before their second. The visible operating system made a four-week-old company read as established during its HN launch, converting skeptical developers who trusted the transparency over polish. About 70% of early growth came from recommendations, 30% from inbound content."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Put your real operating system on the public site (strategy, roadmap, comp calculators, equity, even side-gig policy) before you look established: developers read radical transparency as proof you are stable enough to bet on, so a four-week-old company borrows the perceived maturity of a much larger one at near-zero cost."
    when_it_works: "Works when your audience is developers who reward honesty and your real internals are something to be proud of; broadcasting a chaotic or embarrassing internal reality just confirms the doubt."
    metric_moved: "organic"
    result: "Cited as a credibility lever that let PostHog punch above its weight at launch; ~70% of early growth came from word-of-mouth recommendations."
    tradeoff: "Publishing your strategy, roadmap, comp, and equity in full hands competitors your entire operating playbook and locks you into publicly living up to every value and number you posted."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.howtheygrow.co/p/how-posthog-grows-the-power-of-being"
    attribution: "How They Grow, 'How PostHog Grows: The Power of Being Open-Core'; James Hawkins on ~70% growth from recommendations"
    tags:
      - "transparency"
      - "docs-as-marketing"
      - "open-source"
      - "community-led"
      - "handbook"
  - title: "Bundle products until ripping you out is too painful"
    summary: "PostHog runs a 'go deeper' motion: take a team already on product analytics and layer on session replay, experiments, then error tracking until the account uses 3+ products. A single-product customer can swap PostHog out easily; analytics, experiments, and replay together are a workflow no one wants to re-wire. Two levers drive it: 2-3 months of free credited usage to trial each new product, and a sales-comp multiplier (0.7x base, +0.2x per product above one) that rewards deepening accounts over renewing them."
    goal: "Expansion"
    learning: "Make expansion a switching-cost engine: give existing accounts 2-3 months of free credited usage to trial each adjacent product, and pay reps a per-product multiplier (0.7x base, +0.2x per product past one) that rewards depth, so accounts entangle three-plus workflows and become expensive to leave."
    when_it_works: "Works when you have a genuine suite of adjacent products serving the same team and usage-based pricing that grows with adoption; with one product or per-seat pricing there is nothing extra to layer in."
    metric_moved: "nrr"
    result: "Median customer increases spend ~3x within 18 months (as of Sept 2025); 2+ product customers are the happiest and best-retained, including on revenue retention."
    tradeoff: "Building a switching-cost moat from a multi-product suite means spreading engineering across many adjacent products, so you dominate no single category, while free credited trials and a per-product comp multiplier defer revenue and reward deepening existing accounts over winning new logos."
    tier: "Reported"
    source_type: "press"
    source_url: "https://posthog.com/handbook/growth/sales/expansion-strategies"
    attribution: "PostHog public handbook, 'Expansion strategies'; spend/retention figures corroborated by Contrary Research (research.contrary.com/company/posthog)"
    tags:
      - "land-and-expand"
      - "usage-based-pricing"
      - "multi-product"
      - "switching-cost"
      - "sales-comp"
