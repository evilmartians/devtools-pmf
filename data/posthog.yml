plays:
  - title: "Launch open-source MVP on Hacker News"
    summary: "PostHog open-sourced an Amplitude/Mixpanel alternative and posted a Launch HN just four weeks after starting to write code, with the explicit goal of finding a small group of people who loved it rather than chasing mass attention. They spent only ~$1K seeding the repo beforehand. The launch put them on GitHub's trending page and compounded from there."
    metric_moved: "organic"
    result: "Over 800 GitHub stars and well over 200 sign-ups within one week of publishing the repo; called one of the most successful B2B software HN launches, on a product just 4 weeks old."
    tier: "Verified"
    source_type: "press"
    source_url: "https://posthog.com/blog/after-the-hn-launch"
    attribution: "PostHog blog, 'After the HN launch' (founders' own retrospective); Launch HN thread news.ycombinator.com/item?id=22376732"
    tags:
      - "hacker-news"
      - "open-source"
      - "github"
      - "bottom-up-plg"
  - title: "Publish your entire company handbook publicly"
    summary: "PostHog made its full internal handbook (processes, strategy, values, even pay) public on the marketing site, created after their first hire but before their second. The transparency signaled maturity and made a brand-new company appear far more established during its Hacker News launch, building developer trust at near-zero cost."
    metric_moved: "community"
    result: "Cited by PostHog and analysts as a credibility lever that helped them punch above their weight at launch and build a passionate developer audience; ~70% of early growth came from recommendations."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.howtheygrow.co/p/how-posthog-grows-the-power-of-being"
    attribution: "How They Grow, 'How PostHog Grows: The Power of Being Open-Core'; PostHog handbook (posthog.com/handbook/story)"
    tags:
      - "transparency"
      - "docs-as-marketing"
      - "open-source"
      - "community-led"
  - title: "Cross-sell extra products into existing teams"
    summary: "Instead of acquiring new logos, PostHog runs a 'go deeper' motion: take a team already using product analytics and get them onto session replay, then experiments, then error tracking. Same users, same workload, more products. They found 2+ product customers are the happiest and best-retained, including on revenue retention, so multi-product adoption is the core expansion lever in their public handbook."
    metric_moved: "nrr"
    result: "4x increase in multi-product adoption over 18 months; median customer increases spend ~3x within 18 months (as of Sept 2025)."
    tier: "Reported"
    source_type: "press"
    source_url: "https://posthog.com/handbook/growth/sales/expansion-strategies"
    attribution: "PostHog public handbook, 'Expansion strategies'; multi-product/spend figures corroborated by Contrary Research (research.contrary.com/company/posthog)"
    tags:
      - "land-and-expand"
      - "usage-based-pricing"
      - "bottom-up-plg"
      - "free-tier"
