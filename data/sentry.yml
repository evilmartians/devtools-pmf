plays:
  - title: "Give away self-hosting, sell the convenience"
    summary: "Sentry let any company run the open-source version for free, refusing even lucrative on-prem support deals (Uber offered 'a lot of money', declined). The bet: engineers who used self-hosted Sentry at big companies would carry it to their next startup, which would then pick the hosted cloud for convenience. This created a zero-marketing, decade-long funnel where free OSS adoption commoditized competitors and fed paid cloud signups. One customer who switched from a rival's product to Sentry's free version was paying $500K/year within a year."
    metric_moved: "organic"
    result: "~70-80% of revenue is self-serve/bottom-up at $128M ARR; 4M developers and 90K orgs adopted the platform with near-zero marketing spend."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/sentrys-path-to-product-market-fit/"
    attribution: "David Cramer (co-founder/CPO) in First Round Review"
    tags:
      - "open-source"
      - "free-tier"
      - "bottom-up-plg"
      - "word-of-mouth"
      - "land-and-expand"
  - title: "Bet on the rising language ecosystem first"
    summary: "While legacy monitoring vendors obsessed over back-end Java/.NET servers, Cramer recognized the industry-wide shift to JavaScript and browser apps as 'the point zero of the entire company' and built error tracking for it first. By serving the 'Fortune 500,000' of new web projects at a deliberately low price ('seven bucks'), rather than the Fortune 500, Sentry became first-to-market and dominant in front-end error monitoring before incumbents reacted."
    metric_moved: "growth"
    result: "First-to-market dominance in JavaScript/browser error monitoring; reached $600K ARR and profitability before any VC funding, became clear market leader within a year of its Series A."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/podcast/building-sentry/"
    attribution: "David Cramer on First Round 'In Depth' podcast"
    tags:
      - "bottom-up-plg"
      - "developer-advocacy"
      - "freemium"
  - title: "Invent a license to stop free-rider competitors"
    summary: "Sentry's open-source code let cloud competitors resell its work without contributing back, threatening its commercial model. Instead of going closed, Sentry authored the Functional Source License (FSL): source stays public and converts to Apache/MIT after two years, but you can't use it to build a competing commercial Sentry. Sentry then turned this into the 'Fair Source' movement, recruiting peers (Codecov, GitButler, CodeCrafters, Keygen, PowerSync) to adopt it. The campaign generated industry press and positioned Sentry as a thought leader on sustainable open source."
    metric_moved: "community"
    result: "FSL/Fair Source adopted by multiple devtools companies; broad coverage in TechCrunch and Hacker News, reinforcing Sentry's developer-trust brand while protecting its commercial moat."
    tier: "Verified"
    source_type: "press"
    source_url: "https://blog.sentry.io/introducing-the-functional-source-license-freedom-without-free-riding/"
    attribution: "Sentry engineering blog; corroborated by TechCrunch (2024)"
    tags:
      - "open-source"
      - "transparency"
      - "developer-advocacy"
      - "community-led"
