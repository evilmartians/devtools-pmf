plays:
  - title: "Give away the whole product, sell the right to not run it"
    summary: "Sentry let any company run the full open-source version for free and deliberately refused on-prem support deals, including a lucrative one from Uber ('a lot of money', declined). The bet: engineers who ran self-hosted Sentry at big companies would carry it to their next startup, which would then pick hosted cloud rather than babysit infrastructure. One customer who migrated from a rival to free self-hosted Sentry was paying $500K/year within a year."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Open-source the entire product and let engineers self-host for free so they deploy it at their employer, then convert at their next company because the ongoing ops burden makes your hosted version the obvious buy. Refuse paid support for the free tier so you never turn into a services business cannibalizing that funnel."
    when_it_works: "Works when self-hosting carries real ongoing operational burden (storage, scaling, upgrades), and adopters move between companies frequently enough to seed new accounts."
    metric_moved: "organic"
    result: "~70% of revenue is self-serve/bottom-up at ~$128M ARR; 4M developers and 90K orgs adopted the platform with near-zero marketing spend; net expansion rate >130%."
    tradeoff: "By open-sourcing the full product and refusing paid support (including Uber's lucrative on-prem offer), Sentry walked away from real near-term revenue and bet on a multi-year, unmeasurable funnel where 90% of users never pay and conversion depends on engineers changing jobs."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/sentrys-path-to-product-market-fit/"
    attribution: "David Cramer (co-founder/CPO) in First Round Review"
    tags:
      - "open-source"
      - "free-tier"
      - "bottom-up-plg"
      - "word-of-mouth"
      - "land-and-expand"
  - title: "Win the new stack while incumbents defend the old one"
    summary: "While legacy monitoring vendors focused on back-end Java/.NET servers, Cramer treated the shift to JavaScript and browser apps as 'point zero of the entire company' and built error tracking for the front end first. He priced for the 'Fortune 500,000' of new web projects ('seven bucks'), not the Fortune 500, becoming first-to-market and dominant in front-end error monitoring before incumbents reacted. Sentry hit $600K ARR and profitability before raising any VC money."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Build the best tool for the exploding-but-underserved ecosystem incumbents are too anchored to retool for, and price for the long tail of small new projects instead of enterprise. You own the category before the incumbents register it exists."
    when_it_works: "Works during a genuine platform shift where incumbents are structurally slow to retool; fails if the new ecosystem is already crowded or the incumbent can extend its existing product cheaply."
    metric_moved: "growth"
    result: "First-to-market dominance in JavaScript/browser error monitoring; reached $600K ARR and profitability pre-funding; became clear category leader within a year of Series A."
    tradeoff: "Pricing for the long-tail 'Fortune 500,000' at seven dollars meant Sentry deliberately left enterprise ARPU on the table for years and had to fund growth on tiny per-account revenue, betting volume and a later upmarket motion would compensate."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/podcast/building-sentry/"
    attribution: "David Cramer on First Round 'In Depth' podcast"
    tags:
      - "bottom-up-plg"
      - "developer-advocacy"
      - "freemium"
      - "category-creation"
  - title: "Write a license that bans reselling you but still converts to OSS"
    summary: "Sentry's open-source code let funded competitors resell its work as a hosted service without contributing back, threatening its commercial model. Rather than going closed (and losing developer trust), Sentry authored the Functional Source License (FSL): the source stays public and you can self-host it anywhere, but you cannot sell a competing hosted Sentry; after two years the code converts to Apache/MIT. Sentry then turned FSL into the 'Fair Source' movement, recruiting Codecov, GitButler, CodeCrafters, Keygen, and PowerSync to adopt it."
    goal: "Acquisition"
    track: "Open-source"
    learning: "When open code lets funded competitors resell it as a hosted service, ship a delayed-open-source license that bans commercial competition but flips to true OSS after a fixed window (two years), then recruit peers into a named movement so the change reads as industry leadership."
    when_it_works: "Works when your moat is the hosted/operational layer, and you have enough standing to recruit other companies behind the new license."
    metric_moved: "community"
    result: "FSL/Fair Source adopted by multiple devtools companies; coverage in TechCrunch (2023, 2024) and Hacker News, reinforcing Sentry's developer-trust brand while protecting its hosted-service moat."
    tradeoff: "Inventing a non-OSI 'fair source' license sacrifices the open-source trust and clean OSS label Sentry built its brand on, drawing relicensing-controversy backlash and forcing the company to spend credibility recruiting peers to legitimize a license no foundation blesses."
    tier: "Verified"
    source_type: "press"
    source_url: "https://blog.sentry.io/introducing-the-functional-source-license-freedom-without-free-riding/"
    attribution: "Sentry engineering blog; corroborated by TechCrunch (2023, 2024)"
