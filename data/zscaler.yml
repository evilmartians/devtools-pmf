plays:
  - title: "Run a peer-CXO forum so buyers sell each other"
    summary: "Selling cloud-delivered zero trust meant convincing CISOs/CIOs to rip out the firewall appliances they personally controlled, a scary architectural bet no salesperson could de-risk for them. In April 2021 Zscaler launched CXO REvolutionaries: a peer forum where current and former CISOs/CIOs/CTOs publish their own transformation playbooks and case studies, plus invitation-only, executive-only CXO Exchange events run as low-pressure peer dialogue with no sales pitch. Buyers hear the success story from a fellow executive who already made the leap, not from a vendor."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "When your sale forces a buyer to make a scary, reputation-risking change, the most credible voice is a peer who already survived it: stand up a peer-only community where your champions publish their own playbooks and run pitch-free events, so prospects de-risk the decision through people like them instead of through you."
    when_it_works: "When the purchase is a high-stakes, identity-level decision for the buyer's role and peer proof matters more than feature lists."
    metric_moved: "pipeline / C-suite demand generation"
    result: "Became Zscaler's flagship C-suite demand engine, anchoring enterprise GTM as it scaled past $3B ARR and ~45% Fortune 500 adoption."
    tradeoff: "You surrender control of the message to executives whose praise you cannot script and whose churn or public dissatisfaction turns the same peer channel into a credible argument against you, and the forum only pays off after years of patient, expensive relationship investment that never attributes cleanly to closed pipeline."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.zscaler.com/blogs/company-news/announcing-revolutionaries-revolutionary-new-cxo-community-and-zero-trust"
    attribution: "Zscaler blog announcing CXO REvolutionaries (Apr 2021); EVP Kavitha Mariappan: 'Digital transformation requires buy-in from and deep engagement with the C-suite and IT leadership.'"
    tags:
      - "community-led"
      - "peer-influence"
      - "content-seo"
      - "founder-led-sales"
      - "enterprise-gtm"
  - title: "Sell swappable bundles and publish a full-stack cohort"
    summary: "Zscaler lands on one module (usually securing users' internet access) then expands across the platform over multi-year deals. The mechanism is 'Z-Flex', a flexible bundle that lets a customer add and swap modules as consumption shifts, removing the friction of renegotiating each new product. It then publicly tracks a 'Zero Trust Everywhere' cohort (customers running all three pillars: users, branches, cloud workloads) as the scoreboard for full-platform adoption, turning expansion into a visible status tier customers want to reach. Concrete deals: a Fortune 500 insurer grew ARR ~50% adding 6 modules; a chipmaker raised spend 60% in an 8-figure Z-Flex deal."
    goal: "Expansion"
    learning: "Package add-ons as a single flexible contract the customer can grow into without a new negotiation, then publish a named 'full-platform' cohort customers can join: the swap-friendly bundle removes per-module friction and the visible tier creates a status target that pulls accounts toward buying everything."
    when_it_works: "When you have a multi-product platform where each new module shares the same buyer and renegotiation friction is the main thing slowing expansion."
    metric_moved: "nrr"
    result: "Zero Trust Everywhere enterprises grew from over 550 (Q2 FY26) to more than 700 (Q3 FY26); land-and-expand underpins ~114% dollar-based net retention at $3B+ ARR."
    tradeoff: "Letting customers freely swap modules inside one flexible Z-Flex contract caps the upside of any single product and muddies per-module economics, while a public full-platform cohort makes the slowing of that count an externally visible miss that analysts can hold against you each quarter."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.fool.com/earnings/call-transcripts/2026/05/26/zscaler-zs-q3-2026-earnings-call-transcript/"
    attribution: "Zscaler Q3 FY2026 earnings call transcript (Motley Fool, May 26, 2026): 'We exited Q3 with more than 700 Zero Trust Everywhere enterprises versus over 550 in Q2.'"
    tags:
      - "land-and-expand"
      - "packaging"
      - "flexible-bundling"
      - "status-tier"
      - "enterprise-gtm"
  - title: "Track champions who buy you again at their next job"
    summary: "A CISO/CIO who deploys Zscaler successfully at one company brings it in when they move to the next, so Zscaler treats executive customer experience as a pipeline investment: its CXO Exchange and dedicated Customer Experience & Transformation org exist partly to make sure deploying executives become warm inbound leads at their next employer. On the Q3 FY2026 call, management cited a healthcare-tech logo that came inbound purely because a senior leader who had 'a great experience deploying Zscaler' elsewhere joined and pulled the company in."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Treat the individual who deploys you, not just their company, as the account: instrument and nurture each successful champion so that when they change jobs they pull you into the new company, and measure repeat-buyer-by-person as a first-class growth metric."
    when_it_works: "When your buyer is a specific role-holder who carries vendor preferences between employers and your deployment experience reflects directly on their reputation."
    metric_moved: "warm inbound pipeline / word-of-mouth"
    result: "Roughly 285 CXOs have purchased Zscaler at two or more different companies, a self-replenishing source of warm enterprise pipeline."
    tradeoff: "Tying pipeline to specific role-holders concentrates your growth in a small, finite pool of mobile executives whose loyalty can sour as easily as it travels, so a bad deployment or a poached champion follows you into their next employer instead of the next sale."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://www.fool.com/earnings/call-transcripts/2026/05/26/zscaler-zs-q3-2026-earnings-call-transcript/"
    attribution: "Zscaler IR (285 repeat-CXO figure in company materials); illustrated on Q3 FY2026 earnings call by a healthcare-tech inbound from a leader who 'had a great experience deploying Zscaler' at a prior employer."
    tags:
      - "word-of-mouth"
      - "champion-tracking"
      - "customer-experience"
      - "enterprise-gtm"
