plays:
  - title: "Build a peer CXO community, not vendor marketing"
    summary: "Selling cloud-delivered zero trust to enterprises meant convincing skeptical CIOs/CISOs to abandon the firewall appliances they controlled. Instead of leaning on traditional vendor marketing, Zscaler launched CXO REvolutionaries in April 2021: a peer-to-peer forum of former and current CIOs/CISOs/CTOs who publish transformation playbooks, case studies and run invitation-only CXO Exchanges. The community lets buyers hear zero trust success stories from fellow executives rather than from a salesperson, using peer influence to de-risk a scary architectural shift."
    metric_moved: "growth"
    result: "Became Zscaler's flagship demand-generation engine for the C-suite, anchoring its enterprise GTM as the company scaled past $3B ARR and ~45% Fortune 500 adoption."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.zscaler.com/blogs/company-news/announcing-revolutionaries-revolutionary-new-cxo-community-and-zero-trust"
    attribution: "Zscaler blog announcing CXO REvolutionaries (Apr 2021); EVP Kavitha Mariappan: 'Digital transformation requires buy-in from and deep engagement with the C-suite and IT leadership.'"
    tags:
      - "community-led"
      - "conference-talk"
      - "founder-led-sales"
      - "content-seo"
      - "land-and-expand"
  - title: "Land one module, expand the whole platform"
    summary: "Zscaler lands a customer on a single zero trust product (typically securing users' internet access) then expands across modules over multi-year deals, packaged via flexible 'Z-Flex' bundles that let customers swap and add modules as they consume. Management tracks a 'Zero Trust Everywhere' cohort (customers buying all three pillars: users, branches, and cloud workloads) as the proof point of full-platform expansion. Concrete deals show a Fortune 500 insurer growing ARR ~50% by adding 6 new modules, and a semiconductor maker raising spend 60% in an 8-figure Z-Flex deal."
    metric_moved: "nrr"
    result: "Zero Trust Everywhere enterprises grew from over 550 (Q2 FY26) to more than 700 (Q3 FY26); the land-and-expand motion underpins ~114% dollar-based net retention at $3B+ ARR."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.fool.com/earnings/call-transcripts/2026/05/26/zscaler-zs-q3-2026-earnings-call-transcript/"
    attribution: "Zscaler Q3 FY2026 earnings call transcript (Motley Fool, May 26, 2026): 'We exited Q3 with more than 700 Zero Trust Everywhere enterprises versus over 550 in Q2.'"
    tags:
      - "land-and-expand"
      - "usage-based-pricing"
      - "design-partners"
      - "founder-led-sales"
  - title: "Turn happy champions into multi-company repeat buyers"
    summary: "Because Zscaler delivers a strong, sticky experience to the executives who deploy it, those champions buy it again when they change jobs. Zscaler cultivates this by investing heavily in executive customer experience (its CXO Exchange and Customer Experience & Transformation org), so a CIO/CISO who succeeded with zero trust at one company becomes a warm inbound lead at the next. Management cites cases like a healthcare-tech logo that came inbound after a senior technology leader who had previously deployed Zscaler joined and pulled the company in."
    metric_moved: "growth"
    result: "Roughly 285 CXOs have purchased Zscaler at two or more different companies, one of the strongest possible enterprise endorsements and a self-replenishing source of warm pipeline."
    tier: "Reported"
