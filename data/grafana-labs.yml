plays:
  - title: "Be the neutral pane of glass over everyone's data"
    summary: "Most observability vendors lock users into their own storage and query layer. Grafana ran a 'big tent' strategy instead: stay data-source agnostic and let teams visualize data wherever it already lives, building and accepting 100+ data source plugins (Prometheus, Elasticsearch, cloud providers, even competitors). This removed the switching cost that blocks adoption, so the average user wires up 16 data sources (24 at companies over 5,000 employees) and Grafana becomes the default front-end for any stack."
    metric_moved: "organic"
    result: "35M+ users and 7,000+ customers; 100+ data sources, with the average deployment connecting 16 sources, sustain broad bottom-up adoption."
    tier: "Reported"
    source_type: "press"
    source_url: "https://grafana.com/blog/2025/06/16/prometheus-data-source-update-redefining-our-big-tent-philosophy/"
    attribution: "Grafana Labs 'big tent' blog (June 2025); corroborated by Raj Dutt interviews"
    tags:
      - "open-source"
      - "integrations-marketplace"
      - "community-led"
      - "bottom-up-plg"
  - title: "Seed the free tier for hobbyists, monetize the enterprise"
    summary: "Grafana deliberately keeps roughly 90% of its users free forever, including home-lab and hobbyist monitoring, and does not try to monetize every use case. CEO Raj Dutt frames it as being 'set up to monetize people who have more money than time': enterprises buy Cloud and Enterprise for compliance, security, and managed scale, while the massive free base seeds brand loyalty and inbound enterprise discovery. The goal is to make the overall pie as big as possible and capture a small slice of it."
    metric_moved: "free_to_paid"
    result: "~1% of users pay by design (roughly 7,000 customers against 35M+ users), yet that converted slice drove $400M+ ARR."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/scaling-to-150m-arr-and-beyond-with-grafana-labs-and-lightspeed/"
    attribution: "Raj Dutt, SaaStr x Lightspeed talk; Sacra research aggregator"
    tags:
      - "free-tier"
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
      - "word-of-mouth"
  - title: "Go multi-product to unlock enterprise willingness to pay"
    summary: "Grafana started as a visualization-only layer with founders pattern-matching what resonated. At around $5-10M ARR and ~60 employees, they bet on becoming multi-product by building open-source backends for logs (Loki), traces (Tempo), and metrics (Mimir), the 'LGTM' stack, because 'that's where the pain and money were.' Owning the full observability pipeline, not just the dashboard, made integrated enterprise deals worth paying for and powered the climb past $250M to $400M+ ARR."
    metric_moved: "arr"
    result: "Multi-product pivot scaled the business from single-digit-millions ARR to $250M+ (Aug 2024) and $400M+ ARR (Sept 2025)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/scaling-to-150m-arr-and-beyond-with-grafana-labs-and-lightspeed/"
    attribution: "Raj Dutt, SaaStr x Lightspeed talk"
