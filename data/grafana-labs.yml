plays:
  - title: "Be the read layer on top of your competitors' data"
    summary: "Observability vendors usually force you to ship data into their proprietary store before you can see it, which makes adoption a rip-and-replace decision. Grafana ran the opposite play: stay data-source agnostic and read whatever already exists, building and accepting 100+ data source plugins for Prometheus, Elasticsearch, cloud providers, and even direct competitors. Because trying Grafana required zero data migration, the average deployment wires up 16 data sources (24 at companies over 5,000 employees) and Grafana becomes the default front end for the whole stack."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "When incumbents lock customers in by owning the data store, win the surface instead: read data wherever it already lives, including rivals' stores, so adopting you costs zero migration. Ship a plugin for every source, because each one a user connects makes you their default front end and harder to rip out."
    when_it_works: "Works when buyers already have data scattered across many tools and the switching cost of consolidating storage is the real barrier to trying a new vendor."
    metric_moved: "organic adoption / users"
    result: "35M+ users and 7,000+ customers; average deployment connects 16 data sources (24 at 5,000+ employee firms) with 100+ available plugins."
    tradeoff: "By reading data wherever it lives instead of owning the store, you forfeit the storage and ingestion revenue and the lock-in your integrated competitors capture, so you can be swapped out as easily as you were swapped in and must carry the perpetual support burden of 100+ third-party plugins that break whenever any of those external sources changes."
    tier: "Reported"
    source_type: "press"
    source_url: "https://grafana.com/blog/2025/06/16/prometheus-data-source-update-redefining-our-big-tent-philosophy/"
    attribution: "Grafana Labs 'big tent' blog (June 2025); corroborated by Raj Dutt interviews"
    tags:
      - "open-source"
      - "integrations-marketplace"
      - "community-led"
      - "bottom-up-plg"
      - "zero-switching-cost"
  - title: "Charge the time-poor, give the time-rich everything free"
    summary: "Instead of feature-gating to squeeze every user, Grafana deliberately leaves ~90% of its users free forever, including home-lab and hobbyist setups. CEO Raj Dutt frames the paid product as built to 'monetize people who have more money than time': enterprises buy Cloud and Enterprise for managed scale, compliance, security, and SLAs, while the huge free base seeds brand loyalty and feeds inbound enterprise discovery. The bet is to grow the total pie and capture a thin slice of it rather than a fat slice of a small pie."
    goal: "Conversion"
    learning: "Split your tiers by who is budget-rich and time-poor, not by which feature you withhold. Hand hobbyists the full product free as permanent top-of-funnel, and reserve the bill for managed scale, compliance, and SLAs that only well-funded teams need and will pay to skip."
    when_it_works: "Works when your free users generate distribution and enterprise pipeline, and a distinct well-funded segment will pay for operating the thing at scale rather than for the features themselves."
    metric_moved: "free-to-paid conversion / ARR"
    result: "Roughly 1% of users pay by design (about 7,000 customers against 35M+ users), yet that slice produced $400M+ ARR at 125% NRR."
    tradeoff: "Choosing to leave ~90% of users free forever means your entire business rides on converting a thin ~1% slice, so you absorb the cost of serving a 35M-user free base while a single segmentation miscalculation or a free tier generous enough to satisfy mid-market teams quietly caps the revenue you can ever collect."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/scaling-to-150m-arr-and-beyond-with-grafana-labs-and-lightspeed/"
    attribution: "Raj Dutt, SaaStr x Lightspeed talk; Sacra research aggregator"
    tags:
      - "free-tier"
      - "open-source"
      - "bottom-up-plg"
      - "land-and-expand"
      - "word-of-mouth"
      - "pricing-segmentation"
  - title: "Build the expensive backend your users buy elsewhere"
    summary: "Grafana began as a visualization-only dashboard layer, with the founders pattern-matching what resonated with users. At roughly $5-10M ARR and ~60 employees, they bet on becoming multi-product by building open-source backends for logs (Loki), traces (Tempo), and metrics (Mimir), the 'LGTM' stack, because 'that's where the pain and the money were.' Owning the full observability pipeline instead of just the dashboard turned them into an integrated platform enterprises would sign large deals for."
    goal: "Expansion"
    learning: "When your single feature has pull but caps deal size, build the adjacent backend layers customers currently pay other vendors for, so one integrated platform absorbs their point tools and steps up your contract value. Time it at ~$5-10M ARR once you know which adjacency holds the budget, not before."
    when_it_works: "Works when your initial product is the visible front end for a workflow whose expensive parts (storage, processing, pipeline) are owned by other vendors you can credibly absorb."
    metric_moved: "arr / account expansion"
    result: "The multi-product pivot scaled the business from single-digit-millions ARR to $250M+ (Aug 2024) and $400M+ ARR (Sept 2025)."
    tradeoff: "Building open-source backends for logs, traces, and metrics at 60 employees splits a tiny team across four product surfaces and bets scarce engineering on adjacencies before you know which holds the budget, and shipping those backends as OSS hands cloud providers a free stack to resell, forcing you to monetize a narrower hosted-and-managed layer rather than the storage you just gave away."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/scaling-to-150m-arr-and-beyond-with-grafana-labs-and-lightspeed/"
    attribution: "Raj Dutt, SaaStr x Lightspeed talk"
    tags:
