plays:
  - title: "Launch a community file marketplace as a top-of-funnel"
    summary: "In October 2019 Figma launched Figma Community, a free platform where designers publish, remix, and monetize templates, UI kits, and plugins (Figma takes a 15% cut, runs a Creator Fund). By May 2022 members were publishing over 1,600 resources per day, each indexed by Google for organic discovery. Internally Figma found these assets are an acquisition engine: 'People with templates have higher intent, they activate higher, and the cost per acquisition is lower.'"
    metric_moved: "organic"
    result: "1,600+ resources published per day (May 2022); template users activate higher and convert at lower CAC; thousands of indexed SEO pages."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-figma"
    attribution: "Community Inc. deep dive on Figma community growth, quoting Figma on activation and CAC"
    tags:
      - "templates-starters"
      - "community-led"
      - "content-seo"
      - "viral-loop"
      - "bottom-up-plg"
  - title: "Run a community-sourced annual conference"
    summary: "Figma launched its Config user conference in February 2020, expecting ~200 attendees and getting 1,200. Rather than running corporate keynotes, Figma sources the agenda from an open call for proposals (1,000+ submissions in 2023, double the prior year), with a subcommittee of Figma designers selecting ~55 speakers so it feels authentic instead of 'a big company putting on a conference.' The virtual 2021 edition drew 60,000 registrants."
    metric_moved: "community"
    result: "Grew from 1,000 attendees (2020) to 8,500 (2023), a 750% increase; 60,000 virtual registrants in 2021."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.eventmarketer.com/article/figma-config-event-community-building/"
    attribution: "EventMarketer, 'How Figma Grew its Config Conference by 750% in Five Years'"
    tags:
      - "conference-talk"
      - "community-led"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Give the full pro plan free to students"
    summary: "Figma for Education offers students, educators, bootcamps, and online courses the equivalent of the paid Professional plan for free, plus classroom templates, a dedicated Discord, virtual events (Camp Figma), and funded student hackathons, with a Designer Advocate dedicated to the segment. The bet: seed the next generation of designers on Figma so they bring it into the enterprise when they enter the workforce, feeding the land-and-expand motion behind 130%+ NRR."
    metric_moved: "growth"
    result: "Free Professional-tier seeding of students and educators as a long-term enterprise-adoption pipeline (program scale documented; specific conversion not disclosed)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-figma"
    attribution: "Community Inc. deep dive; corroborated by figma.com/education and Figma education blog"
    tags:
      - "free-tier"
      - "land-and-expand"
      - "community-led"
      - "developer-advocacy"
