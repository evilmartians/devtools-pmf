plays:
  - title: "Make your users' artifacts your SEO surface"
    summary: "In October 2019 Figma launched Figma Community, where designers publish, remix, and sell templates, UI kits, and plugins (Figma takes a 15% cut and runs a Creator Fund that paid ~$300K to 13 creators by late 2023). By May 2022 members published 1,600+ resources per day, each getting its own Google-indexed web page. Growth lead Jesus Requena on the funnel impact: 'People with templates have higher intent, they activate higher and the cost per acquisition is lower.'"
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Let users publish reusable artifacts (templates, configs, dashboards), give each its own indexed page, and put a one-click 'open this in our product' button on it, so high-intent searchers land pre-qualified."
    when_it_works: "Works when your product produces shareable, reusable artifacts that other people search for by name."
    metric_moved: "organic signups / CAC"
    result: "1,600+ resources published per day (May 2022), thousands of Google-indexed pages; template-sourced users activate higher and convert at lower CAC."
    tradeoff: "You take on the permanent cost of running a UGC marketplace, moderation, payouts, IP and quality policing, plus a Creator Fund subsidy, and your SEO surface is built from content you don't control or vet for how it reflects on your brand."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-figma"
    attribution: "Community Inc. deep dive on Figma community growth, quoting Figma growth lead Jesus Requena on activation and CAC"
    tags:
      - "templates-starters"
      - "community-led"
      - "content-seo"
      - "viral-loop"
      - "bottom-up-plg"
  - title: "Hand your conference stage to your users"
    summary: "Figma launched Config in February 2020 expecting ~200 attendees and got 1,200. It runs an open call for proposals (1,000+ submissions in 2023, double the prior year) and has a subcommittee of its own designers and technical experts pick ~55 speakers, so as marketing lead Claire Butler put it, it feels like 'an event for designers as opposed to a big company putting on a conference.' The submissions double as market research, surfacing trends like a 3x year-over-year jump in AI mentions."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Source the agenda from an open CFP and let practitioners pick the speakers, so attendees come for peers' real use cases. Mine the submission pile as free trend research on what your users care about."
    when_it_works: "Works when you already have an engaged user base producing real work worth presenting."
    metric_moved: "community / event registrations"
    result: "Grew from 1,200 attendees (2020) to 8,500 (2023), roughly 7x; 60,000 virtual registrants in 2021."
    tradeoff: "You surrender editorial control of your own stage, so you can't guarantee your product, launches, or messaging get airtime, and someone has to screen the 1,000+ submissions down to ~55 speakers every year."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.eventmarketer.com/article/figma-config-event-community-building/"
    attribution: "EventMarketer, 'How Figma Grew its Config Conference by 750% in Five Years,' quoting Claire Butler"
    tags:
      - "conference-talk"
      - "community-led"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Give students your full paid tier for free"
    summary: "Figma for Education hands students, educators, and bootcamps the equivalent of the paid Professional plan for free, wrapped in classroom templates, a dedicated Discord, a recurring 'Camp Figma' make-a-thon, funded student hackathons, and a Designer Advocate assigned to the segment. The bet is generational: seed designers on Figma before they have buying power so they import it into employers later, feeding the bottom-up land-and-expand motion behind Figma's 136% net dollar retention."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "For bottom-up products, hand students and learners the complete paid tier for free, since marginal cost is near zero and they import the habit, and your tool, into the employer that pays you in three to five years. Wrap it in advocacy (Discord, hackathons, a dedicated advocate) so the habit sticks."
    when_it_works: "Works when your product spreads bottom-up through individual users who later influence team or enterprise purchasing."
    metric_moved: "long-term enterprise pipeline"
    result: "Free Professional-tier seeding of students and educators as a long-term enterprise-adoption pipeline feeding 136% NRR; specific student-to-enterprise conversion not disclosed."
    tradeoff: "You eat the full cost of the paid tier plus a whole advocacy operation (Discord, Camp Figma, hackathons, a dedicated advocate) for a cohort that pays nothing for three to five years, betting on a downstream conversion you can't actually measure."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-figma"
    attribution: "Community Inc. deep dive; corroborated by figma.com/education and Figma education blog"
    tags:
      - "free-tier"
      - "land-and-expand"
      - "community-led"
      - "developer-advocacy"

  - title: "Ship adjacent products as new paid seats into the org you already own"
    summary: "Figma expands by adding products around the design file, each targeting a role the core tool never monetized. FigJam (whiteboard, April 2021) pulled in PMs; Dev Mode (Config 2023, a paid add-on at ~$25-35/seat in early 2024) pulled in engineers; Figma Slides (June 2024) plus Draw, Sites, and Buzz (May 2025) pulled in marketers and writers. Per the 2025 S-1, 76% of customers use 2+ products and ~70% of Organization/Enterprise customers first landed on the cheaper Professional plan. FY2025 results (Dec 31, 2025) reported 136% net dollar retention, with over 80% of Figma Make weekly active users on Full seats also using Figma Design."
    goal: "Expansion"
    learning: "Once you own a collaboration surface, the cheapest revenue is a second product sold to the same logo. Each targets a role the core tool never monetized (engineers, PMs, marketers), so account value grows without re-acquiring the customer. Map the roles sitting next to your core user and build what each needs in the same file."
    when_it_works: "Works when your products share one collaboration surface and one identity/billing layer, so adopting product two is one click for an existing account. It stalls if the new products need their own sales motion, or if buyers cap total spend regardless of product count."
    metric_moved: "net dollar retention"
    result: "136% net dollar retention as of Dec 31, 2025 (FY2025 results); 76% of customers used 2+ products per the 2025 S-1, with ~70% of Org/Enterprise accounts having started on Professional."
    tradeoff: "Multi-product breadth dilutes per-seat price and splits R&D across more surfaces; several of these products (FigJam, Slides, Dev Mode) entered crowded markets where Figma is not the category leader, so attach rate depends on the core design monopoly rather than each product winning on its own."
    tier: "Verified"
    source_type: "press"
    source_url: "https://investor.figma.com/news-events/news/news-details/2026/Figma-Announces-Fourth-Quarter-and-Fiscal-Year-2025-Financial-Results/default.aspx"
    attribution: "Figma FY2025 results press release (136% NDR; Figma Make/Design cross-use). Multi-product and land-from-Professional stats from Figma's 2025 Form S-1."
    tags:
      - "multi-product"
      - "land-and-expand"
      - "seat-expansion"
      - "cross-sell"
      - "bottom-up-plg"
  - title: "Give viewing away free and unlimited, then meter editing into role-priced seats"
    summary: "Figma keeps viewers free and unlimited so a designer's file spreads across the org at zero cost, then charges only when someone needs to act on it. The March 2025 pricing overhaul split paid access into role-priced seats: Full (design/edit, up to $90/seat Enterprise), Dev (inspect and handoff for engineers, $25-35/seat), and Collab (comment/FigJam/Slides for stakeholders, as low as $3-5/seat). Two-thirds of Figma's ~13M monthly users are non-designers and engineers alone are ~30%; each role that graduates from viewer to actor becomes a priced seat, a core driver behind 136% net dollar retention (Dec 31, 2025)."
    goal: "Expansion"
    learning: "Charge for the action and give viewing away free with no seat limit, so your artifact saturates an account. Carve paid seats by what each role does (edit vs. inspect vs. comment) so a cheap stakeholder seat sits next to an expensive power seat. Expansion comes from viewers converting to actors inside accounts you never re-sell."
    when_it_works: "Works when your artifact is inherently multiplayer and viewing has real value, so free viewers proliferate and create pull. It backfires if free viewers get everything they need, or if admins resent surprise seat charges; Figma had to add admin approval over auto-upgrades in 2025 after backlash over seat creep."
    metric_moved: "net dollar retention"
    result: "136% net dollar retention as of Dec 31, 2025; two-thirds of ~13M MAUs are non-designers and engineers are ~30% of users, the pool that converts from free viewer to paid Dev/Collab seats."
    tradeoff: "Role-based seat metering is confusing and drew public complaints about hidden collaboration costs and seat creep; Figma traded simplicity and goodwill for granular monetization, and the new structure required admin gating to keep accounts from feeling nickel-and-dimed."
    tier: "Verified"
    source_type: "press"
    source_url: "https://help.figma.com/hc/en-us/articles/27468498501527-Updates-to-Figma-s-pricing-seats-and-billing-experience"
    attribution: "Figma Help Center, March 2025 seats/billing update (Full/Dev/Collab seat tiers, free viewers). NDR figure from Figma FY2025 results press release."
    tags:
      - "free-viewers"
      - "seat-expansion"
      - "usage-based-seats"
      - "land-and-expand"
      - "bottom-up-plg"
