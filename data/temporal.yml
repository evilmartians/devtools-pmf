  - title: "Use usage-based pricing on the operation the customer can't avoid running"
    summary: "Temporal Cloud uses usage-based pricing built on one unit, the Action: the billable operation behind starting a Workflow, sending a Signal, or recording a Heartbeat. It starts at $50 per million Actions and steps down through volume tiers automatically, with no renegotiation. Because customers wire Temporal into production workflows, the meter climbs on its own as their traffic grows. Temporal's March 2025 release reports 184% Net Dollar Retention and Cloud revenue up 4.4x in 18 months across 2,500+ customers, existing accounts running more workflows rather than new logos."
    goal: "Expansion"
    learning: "If your product sits in the execution path of something that scales with the customer's traffic, put usage-based pricing on the underlying operation rather than on seats. Pick a unit they cannot avoid touching as they use you more, make volume discounts automatic so growth never triggers a renegotiation, and revenue compounds with their success without a sales motion."
    when_it_works: "It breaks when the metered unit is something engineers can optimize away. Temporal publishes cost-optimization guidance, so a finance-pressured customer can batch, cache, or restructure workflows to cut Actions, and a churned high-volume workload is a revenue cliff rather than a gentle decline. It also only works if the unit maps to value the customer accepts; meter something they see as overhead and they self-host the open-source core to escape the bill."
    metric_moved: "net dollar retention"
    result: "Net Dollar Retention of 184% and Temporal Cloud revenue up 4.4x over 18 months across 2,500+ customers, driven by existing accounts increasing Action volume rather than by new logos alone."
    tradeoff: "You hand your revenue line to the customer's traffic, which you do not control. Forecasting gets harder, a single large workload going quiet dents the quarter, and the free open-source path caps how aggressively you can price each Action before customers leave the Cloud."
    tier: "Verified"
    source_type: "press"
    source_url: "https://temporal.io/news/temporal-technologies-secures-valuation-to-fuel-durable-execution"
    attribution: "Temporal official press release (March 2025) for the 184% NDR, 4.4x revenue, and 2,500+ customers; Temporal Cloud pricing documentation (https://docs.temporal.io/cloud/pricing) for the Actions metering and volume tiers."
    tags:
      - "usage-based-pricing"
      - "expansion-revenue"
      - "consumption-billing"
      - "land-and-expand"
      - "mission-critical"
  - title: "Land the one workflow nobody will let break, then let it spread"
    summary: "At Netflix, Temporal entered in 2021 to make Spinnaker deployments reliable, cutting transient deploy failures from ~4% to 0.0001%. Netflix's engineering blog (Dec 2025) reports adoption has since 'skyrocketed' to hundreds of use cases, doubling year over year into Open Connect CDN, media processing, and Flink. Once one team trusts Temporal as the backbone, neighboring teams adopt it for their own critical paths; the same pattern runs at Snap, Coinbase, Twilio, and Stripe. On consumption pricing, each new internal team is pure expansion."
    goal: "Expansion"
    learning: "Win the single workload nobody will let break, then let internal proof sell for you. Reliability one team vouches for spreads across an org faster than any account manager, because the next team's critical path looks like the first. Pick a beachhead where your differentiator, durable execution surviving failures, is most load-bearing; the account then expands team by team."
    when_it_works: "It depends on the product being genuinely mission-critical and a champion carrying it to the next team; you cannot force the spread. Expansion is slow, gated by how many critical workflows the customer has and their appetite to standardize. An org with few high-stakes workflows, or one that blocks a single backbone for diversity, never expands past the land."
    metric_moved: "expansion"
    result: "Netflix went from one Spinnaker use case (2021) to hundreds doubling year over year, the inside-account expansion behind Temporal's company-wide 184% Net Dollar Retention."
    tradeoff: "Becoming the durable backbone means the customer's reliability now depends on you: an incident in your platform is an incident in their most critical systems, and the trust that drove the spread is the fastest to destroy. A flagship account that standardizes deeply also becomes a revenue concentration risk if it ever re-platforms."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://netflixtechblog.com/how-temporal-powers-reliable-cloud-operations-at-netflix-73c69ccb5953"
    attribution: "Netflix Technology Blog, 'How Temporal Powers Reliable Cloud Operations at Netflix' (December 2025), for the Spinnaker-to-hundreds-of-use-cases expansion; Temporal press release (March 2025) for the 184% NDR linking expansion to revenue."
    tags:
      - "land-and-expand"
      - "mission-critical"
      - "lock-in"
      - "expansion-revenue"
      - "data-gravity"
