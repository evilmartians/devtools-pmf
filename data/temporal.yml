plays:
  - title: "Build your engine as OSS inside a big employer first"
    summary: "Maxim Fateev and Samar Abbas built Cadence as an MIT-licensed workflow engine on GitHub while at Uber starting in 2015, growing it from zero to 100+ internal use cases over three years with no external traction for the first two. Because the repo was public, it leaked out of Uber organically and was adopted as foundational infra by Netflix, Coinbase, and HashiCorp on their own. That unsolicited outside pull, including Mitchell Hashimoto independently finding Cadence, is what told the founders the problem was universal and justified leaving to found Temporal in 2019."
    goal: "Acquisition"
    learning: "If you can build your core engine as open source inside a company that already has the problem at scale, do it: real internal usage hardens the product, and the moment outside companies adopt it unprompted you have proof the market is universal, which is your signal to commercialize. Watch who adopts it without you asking."
    when_it_works: "Works when the core is genuinely reusable infrastructure that other engineering orgs hit the same way, and you can tolerate a multi-year window with no external traction before the pull appears."
    metric_moved: "community adoption / market validation"
    result: "Organic spread of Cadence beyond Uber validated the market before any company existed; the open core later reached 183K weekly active OSS developers and 7M+ deployed clusters, feeding 2,500+ Cloud customers and 184% NDR."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/temporal-technologies"
    attribution: "Contrary Research company breakdown; corroborated by Amplify Partners and Madrona founder interviews"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "github"
      - "community-led"
      - "market-validation"
  - title: "Implement the framework's abstract base class to become the default runtime"
    summary: "When OpenAI shipped its Agents SDK, the Runner that executes every agent was deliberately an abstract base class. Temporal implemented that class so each agent invocation automatically becomes a Temporal Activity and the whole loop becomes a durable Workflow, with zero explicit Activity definitions written by the developer. The user wraps their existing agent in a @workflow.defn class and gets crash recovery, auto-retries, and rate-limit survival for free, so trying Temporal costs almost no code change inside the SDK developers are already adopting."
    goal: "Acquisition"
    learning: "Find the extension seam a popular framework already exposes (an abstract class, a plugin hook, a driver interface) and implement it, so adopting you is wrapping existing code rather than rewriting a stack. Owning the seam quietly makes you the default runtime for everyone already on that framework."
    when_it_works: "Works when a fast-growing framework exposes a clean extension point and your value (durability, observability, etc.) is orthogonal to what the framework does, so you slot in without competing with it."
    metric_moved: "AI-workload growth / installs"
    result: "Public preview July 2025, GA in the Python SDK March 23, 2026; AI-native companies account for 1.86 trillion of Temporal's 9.1 trillion lifetime Cloud actions, with OpenAI (Codex, ChatGPT Images), Replit, and Lovable running agents on Temporal."
    tier: "Verified"
    source_type: "press"
    source_url: "https://temporal.io/blog/announcing-openai-agents-sdk-integration"
    attribution: "Temporal engineering blog, OpenAI Agents SDK integration announcement"
    tags:
      - "integrations"
      - "default-runtime"
      - "extension-point"
      - "ai-agents"
      - "low-switching-cost"
  - title: "DM 600 OSS users in one month to mine the roadmap"
    summary: "Temporal treated its open-source Slack as a research and relationship channel, not a support queue. Head of Product Ryland Goldstein (employee #5) personally messaged 600 users in a single month to learn how they actually ran Temporal in production. The community skewed senior, engineers from top-tier companies running mission-critical systems, so these conversations directly shaped the roadmap and seeded the highest-quality enterprise Cloud accounts, while Goldstein layered on transparency reports and detailed release notes to keep the loop warm."
    goal: "Activation"
    learning: "Have a senior person (founder or head of product) personally DM your active OSS or free users at high volume in a tight window to learn exactly how they run you in production. The senior the user base, the more each conversation both fixes your roadmap and pre-qualifies your best paid accounts."
    when_it_works: "Works when your free/OSS users are senior engineers deploying you for real, so individual conversations surface production truth and map cleanly to future enterprise buyers."
    metric_moved: "community growth / roadmap-fit"
    result: "Direct outreach to 600 Slack users in one month fed a roadmap and community that grew 25-50% MoM; 50K+ new OSS developers and 300+ new customers joined in the year to Feb 2022."
    tier: "Reported"
    source_type: "journalism"
