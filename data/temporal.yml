plays:
  - title: "Build your engine in the open before commercializing"
    summary: "Maxim Fateev and Samar Abbas built Cadence as an open-source workflow engine on GitHub inside Uber starting in 2015, growing it from zero to 100+ internal use cases in three years with no external traction for the first two years. Because it was open, the project leaked out of Uber organically into engineering-driven companies like HashiCorp, Netflix, and Coinbase, who adopted it as foundational infrastructure. That outside pull (and a conversation with Mitchell Hashimoto, who had found Cadence on his own) is what convinced them to leave and found Temporal as the commercial successor in 2019."
    metric_moved: "community"
    result: "Cadence's open, organic spread beyond Uber created the demand that justified founding Temporal; the OSS project later hit 183K weekly active developers and 7M+ deployed clusters, feeding 2,500+ Cloud customers."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/temporal-technologies"
    attribution: "Contrary Research company breakdown; corroborated by Amplify Partners and Madrona founder interviews"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "github"
      - "community-led"
      - "transparency"
  - title: "Ship a native integration into the framework devs already use"
    summary: "Rather than asking AI developers to rewrite their stack, Temporal shipped a first-party integration with OpenAI's Agents SDK so that every agent invocation runs as a Temporal Activity and the whole orchestration becomes a durable Workflow with no architectural changes. Developers 'code the happy path' in normal Python and get crash-proof, auto-retrying, rate-limit-surviving execution for free. This met the surging wave of agent builders inside the SDK they were already adopting, positioning Temporal as the default durability layer for production agents."
    metric_moved: "growth"
    result: "Announced as public preview July 2025, reached General Availability in the Python SDK March 23, 2026; AI-native companies account for 1.86 trillion of Temporal's 9.1 trillion lifetime Cloud actions, with OpenAI (Codex/ChatGPT Images), Replit, and Lovable running agents on Temporal."
    tier: "Verified"
    source_type: "press"
    source_url: "https://temporal.io/blog/announcing-openai-agents-sdk-integration"
    attribution: "Temporal engineering blog, OpenAI Agents SDK integration announcement"
    tags:
      - "integrations-marketplace"
      - "default-on"
      - "developer-advocacy"
      - "docs-as-marketing"
  - title: "DM hundreds of OSS users to learn and convert them"
    summary: "Early on, Temporal treated its open-source Slack as a research and relationship channel. Head of Product Ryland Goldstein (employee #5) personally messaged over 600 users on Slack to understand how they were actually deploying Temporal in production. The community skewed senior, engineers from top-tier companies running mission-critical systems, so these conversations both shaped the roadmap and seeded the highest-quality enterprise Cloud accounts."
    metric_moved: "community"
    result: "Direct outreach to 600+ Slack users fed a roadmap and community that grew 25-50% MoM; 50K+ new OSS developers and 300+ new customers joined in the year to Feb 2022."
    tier: "Reported"
    source_type: "journalism"
