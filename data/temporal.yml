plays:
  - title: "Open-source your core inside the company that already has the problem at scale"
    summary: "Maxim Fateev and Samar Abbas built Cadence as an MIT-licensed workflow engine on GitHub at Uber starting in 2015, growing it from zero to 100+ internal use cases over three years with no external traction for the first two. Because the repo was public, it leaked out of Uber and was adopted as foundational infra by Netflix, Coinbase, and HashiCorp on their own. That unsolicited pull, including Mitchell Hashimoto independently finding Cadence, told the founders the problem was universal and justified leaving to found Temporal in 2019."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Build your engine as OSS inside an employer that hits the problem in production: real internal load hardens it, and the first outside org that adopts it unprompted is your proof the market is universal. Treat the adopter list as your signal to leave and commercialize."
    when_it_works: "Works when the core is genuinely reusable infrastructure that other engineering orgs hit the same way."
    metric_moved: "community adoption / market validation"
    result: "Organic spread of Cadence beyond Uber validated the market before any company existed; the open core later reached 183K weekly active OSS developers and 7M+ deployed clusters, feeding 2,500+ Cloud customers and 184% NDR."
    tradeoff: "The engine you build belongs to the employer, so commercializing it meant leaving Uber and re-implementing Cadence as Temporal from scratch, after enduring a two-plus-year window of zero external traction with no guarantee the organic pull would ever come."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/temporal-technologies"
    attribution: "Contrary Research company breakdown; corroborated by Amplify Partners and Madrona founder interviews"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "github"
      - "community-led"
      - "market-validation"
  - title: "Own the extension seam a hot framework already exposes"
    summary: "When OpenAI shipped its Agents SDK, the Runner that executes every agent was deliberately an abstract base class. Temporal implemented it, so each agent invocation becomes a Temporal Activity and the whole loop becomes a durable Workflow with zero explicit Activity definitions written by the developer. Wrap an existing agent in a @workflow.defn class and you get crash recovery, auto-retries, and rate-limit survival for free, so trying Temporal costs almost no code change inside the SDK developers already adopt."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Implement the abstract class, plugin hook, or driver interface a fast-growing framework already exposes, so adopting you means wrapping existing code that stays in place. Owning that seam makes you the default runtime for everyone already on it."
    when_it_works: "Works when a fast-growing framework exposes a clean extension point and your value (durability, observability, etc.) is orthogonal to what the framework does, so you slot in without competing with it."
    metric_moved: "AI-workload growth / installs"
    result: "Public preview July 2025, GA in the Python SDK March 23, 2026; AI-native companies account for 1.86 trillion of Temporal's 9.1 trillion lifetime Cloud actions, with OpenAI (Codex, ChatGPT Images), Replit, and Lovable running agents on Temporal."
    tradeoff: "By slotting into OpenAI's extension seam you bind your runtime's reach to a framework you don't control, inheriting its design decisions and momentum, so if OpenAI redraws the Runner abstraction or the SDK loses adoption your default-runtime position evaporates with it."
    tier: "Verified"
    source_type: "press"
    source_url: "https://temporal.io/blog/announcing-openai-agents-sdk-integration"
    attribution: "Temporal engineering blog, OpenAI Agents SDK integration announcement"
    tags:
      - "integrations"
      - "default-runtime"
      - "extension-point"
      - "ai-agents"
      - "low-switching-cost"
  - title: "Your head of product should personally DM hundreds of free users a month"
    summary: "Temporal treated its open-source Slack as a research and relationship channel. Head of Product Ryland Goldstein (employee #5) personally messaged 600 users in one month to learn how they ran Temporal in production. The community skewed senior, engineers from top-tier companies running mission-critical systems, so these conversations shaped the roadmap and seeded the highest-quality enterprise Cloud accounts. Goldstein layered on transparency reports and detailed release notes to keep the loop warm."
    goal: "Activation"
    learning: "Put a founder or head of product on direct, high-volume DMs to your active OSS users in a tight window, asking exactly how they run you in production. The more senior the user base, the more each conversation both corrects your roadmap and pre-qualifies your best enterprise accounts."
    when_it_works: "Works when your free/OSS users are senior engineers deploying you for real."
    metric_moved: "community growth / roadmap-fit"
    result: "Direct outreach to 600 Slack users in one month fed a roadmap and community that grew 25-50% MoM; 50K+ new OSS developers and 300+ new customers joined in the year to Feb 2022."
    tradeoff: "This is senior-person manual labor that doesn't scale, making the head of product the bottleneck, so the channel breaks the moment the community outgrows what one person can personally reach."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/temporal-technologies"
    attribution: "Contrary Research, citing Temporal Head of Product Ryland Goldstein"
    tags:
      - "slack-community"
