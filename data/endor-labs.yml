plays:
  - title: "In a market that competes on finding more, win by finding less"
    summary: "Every SCA tool flags every CVE in every dependency, burying teams in thousands of unactionable alerts. Endor Labs built its wedge around function-level reachability: it maps the application call graph and shows only vulnerabilities whose affected code is actually invoked, cutting alerts by an average of 92%. That single demonstrable result became a fast land motion that expanded module-by-module into SAST, container, secrets, and malware scanning across the platform."
    goal: "Expansion"
    learning: "When incumbents drown buyers in alerts, build your wedge on the noise you delete: ship a mechanism that filters (call-graph reachability shows only vulnerabilities in code that actually runs), put the cut on one number you can demo (92% fewer alerts), then land on that proof and expand module by module."
    when_it_works: "Works when the incumbent category has an acute false-positive or alert-fatigue problem that its own tools keep making worse."
    metric_moved: "nrr"
    result: "92% average SCA alert reduction as the buying trigger; 166% NRR and 30x ARR growth in the 18 months since Series A; 5M+ apps protected, 1M+ scans/week."
    tradeoff: "Suppressing 92% of alerts means you are explicitly vouching that the hidden CVEs are unreachable, so any vulnerability your call-graph misses (reflection, dynamic dispatch, runtime config) becomes a breach you told the customer to ignore, and a false negative in security carries far heavier liability than the false positives you eliminated."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/endor-labs-raises-93m-series-b-to-secure-the-ai-code-revolution-302435409.html"
    attribution: "Endor Labs Series B press release (PR Newswire, Apr 23, 2025): '166% Net Revenue Retention' and '30x ARR growth' since Series A; Endor Labs blog 'Endor Labs Achieves 92% Reduction in SCA Alerts' for the noise-reduction mechanism."
    tags:
      - "land-and-expand"
      - "wedge"
      - "reachability"
      - "appsec"
  - title: "Turn your proprietary dataset into a free tool timed to the hype cycle"
    summary: "Weeks into the ChatGPT frenzy in April 2023, Endor Labs shipped DroidGPT: a free conversational tool where a developer asks 'what are the best logging packages for Java' and gets answers overlaid with Endor's proprietary popularity, quality, and security risk scores for each package. It exposed the company's core risk dataset as a standalone research experience that rode the generative-AI news cycle, putting Endor in front of developers at the moment they pick dependencies, long before any sales conversation. The launch earned broad devtools and security press pickup."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "If you own a differentiated dataset, wrap a thin free tool around a question developers already Google (which package should I use?), overlay your scores on the answer, and ship it against a live news wave so the press distributes it for you; you seed your scoring as the default at the moment of choice, before sales ever calls."
    when_it_works: "Works when the free tool surfaces real, repeat-use value; a one-time gimmick buys a press spike and no durable channel."
    metric_moved: "organic"
    result: "Earned-media pickup across DevOps.com, DEVOPSdigest, CloudWars, Global Security Mag, and Bio-IT World; brand placed with developers via a free, self-serve package-research tool. No signup/conversion figures disclosed."
    tradeoff: "Timing the free tool to a hype cycle buys a one-time press spike that decays with the news wave rather than a durable owned channel, and exposing your proprietary risk scores in an ungated tool hands competitors both the playbook and a sample of the dataset that is supposed to be your moat."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://cloudwars.com/cybersecurity/how-endor-labs-applies-generative-ai-to-secure-open-source-software-development/"
    attribution: "CloudWars, 'How Endor Labs Applies Generative AI to Secure Open-Source Software Development' (Apr 2023); corroborated by DevOps.com 'Endor Labs Taps ChatGPT to Identify Secure Open Source Software' and DEVOPSdigest DroidGPT launch coverage."
    tags:
      - "free-tool"
      - "data-as-marketing"
      - "developer-advocacy"
      - "news-jacking"
  - title: "Engineer your research report around one number journalists can't resist quoting"
    summary: "Endor Labs stood up a named research team, Station 9, that publishes a recurring 'State of Dependency Management' report built on original analysis of public sources it uniquely understands: the OSV vulnerability database, npm/PyPI metadata, and tests of LLMs against malware. Each edition ships one fear-relevant headline statistic engineered to be repeatable, e.g. '80% of AI-suggested dependencies contain risks' (2025) and 'LLMs correctly classify malware in only 5% of cases' (2023). The security and devtools press amplify the stat for free, and the report doubles as gated top-of-funnel feeding the sales motion."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Stand up a named research team and run a recurring report off a public dataset you read better than anyone, building each edition around a single anxiety-inducing stat tied to the trend of the moment ('80% of AI-suggested dependencies contain risks'); the number becomes a citation magnet the press repeats for free, and the gated report captures the leads it pulls in."
    when_it_works: "Works when you can credibly own the interpretation of the dataset and sustain a predictable cadence; a vague report with no quotable number gets no pickup."
    metric_moved: "organic"
    result: "Repeated earned-media pickup (SiliconANGLE, PR Newswire syndication, The Software Report) off self-published research; established Endor as the cited authority on open-source/dependency risk."
    tradeoff: "Engineering each report around the most anxiety-inducing number rewards alarmism over rigor, so the headline stat invites methodology scrutiny and, if it is ever challenged or debunked, erodes the exact category authority the research program was built to earn."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://siliconangle.com/2023/07/19/endor-labs-report-warns-ai-llms-struggle-classify-malware-risk/"
    attribution: "SiliconANGLE, 'Endor Labs report warns AI and LLMs struggle to classify malware risk' (Jul 2023); Endor Labs PR Newswire '2025 State of Dependency Management Report Finds 80% of AI-Suggested Dependencies Contain Risks' (2025)."
    tags:
      - "content-research"
      - "data-pr"
      - "category-authority"
      - "lead-gen"
