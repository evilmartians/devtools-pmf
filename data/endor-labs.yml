plays:
  - title: "Lead with reachability to kill the noise wedge"
    summary: "Application security tools drown teams in alerts by flagging every vulnerable dependency, whether or not the vulnerable code is ever actually called. Endor Labs built its entire wedge around function-level reachability analysis: it maps the call graph and shows only the vulnerabilities that are reachable in your code, letting teams ignore or de-prioritize 80%+ of alerts. This single, demonstrable pain-killer (cut the noise) became the land motion, then expanded across modules into a platform, producing 166% net revenue retention and ~30x ARR growth in the 18 months after Series A."
    metric_moved: "nrr"
    result: "166% NRR and ~30x ARR growth since Series A; 80-92% alert noise reduction cited as the core buying trigger."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/endor-labs-raises-93m-series-b-to-secure-the-ai-code-revolution-302435409.html"
    attribution: "Endor Labs Series B press release (PR Newswire, Apr 23, 2025): '166% Net Revenue Retention' and '30x ARR growth'; Dark Reading 'Startup Spotlight: Endor Labs Focuses on Reachability' for the noise-reduction wedge."
    tags:
