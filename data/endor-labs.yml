  - title: "Ship recurring original research as earned media"
    summary: "Endor Labs stood up a named research team (Station 9) that publishes recurring, data-driven reports built on original analysis of the Open Source Vulnerability database, npm metadata, and practitioner surveys, like the annual 'State of Dependency Management' and the '14x malware surge' study. Each report produces a quotable, fear-relevant statistic (LLMs correctly classify malware in only 5% of cases; 90%+ of OSV malware advisories filed in a single year) that the security and devtools press amplify for free. The reports double as top-of-funnel content that establishes category authority and feeds the sales-led motion."
