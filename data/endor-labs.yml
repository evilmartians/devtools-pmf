      - "developer-advocacy"
  - title: "Launch a free conversational AI tool on the hype wave"
    summary: "In April 2023, weeks into the ChatGPT frenzy, Endor Labs shipped DroidGPT: a conversational tool that lets developers ask natural-language questions like 'what are the best logging packages for Java' and get answers overlaid with Endor's proprietary risk and quality scores. It packaged the company's core dataset as a standalone, developer-facing experience that rode the generative-AI news cycle, putting Endor in front of developers researching open-source packages well before any sales conversation. The launch generated broad earned-media pickup across the devtools and security press."
    metric_moved: "organic"
    result: "Widely covered launch (DevOps.com, DevOpsDigest, CloudWars, Bio-IT World, Global Security Mag) timed to the ChatGPT wave; positioned the brand with developers via a free, self-serve research experience."
