plays:
  - title: "Ship the free OSS tool first, sell the wrapped product later"
    summary: "Before charging a cent, the founders shipped GPT Engineer as a free open-source CLI. It exploded to 52,000+ GitHub stars (briefly tripping GitHub's abuse detection) and a 27,000-person waitlist. They then rebranded the polished, hosted version as Lovable and opened the gate to that pre-built audience: the beta hit #1 on Product Hunt and #1 on Hacker News on day one, converted hundreds of paying users overnight, and reached $4M ARR in week 4."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Release the rough, free, open-source version of your core engine first to accumulate stars and a waitlist as proof and audience, then launch the hosted, paid product into that captive crowd so day one already has demand. The OSS repo is your distribution asset, not a side project."
    when_it_works: "When your core capability is demonstrable in a standalone CLI/library that developers will star and share, and the hosted version adds enough convenience to be worth paying for."
    metric_moved: "organic signups / launch-day ARR"
    result: "52,000+ GitHub stars and a 27,000-person waitlist converted into a #1 Product Hunt / #1 Hacker News launch and $4M ARR in 4 weeks."
    tradeoff: "By open-sourcing the core engine to win 52K stars, you give away the very capability you later charge for, so the hosted product must out-convenience a tool anyone can self-host or fork, and you must abandon the GPT Engineer brand and OSS community you built the audience on to rebrand as a closed paid product."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://catalaize.substack.com/p/lovables-path-from-open-source-to"
    attribution: "Catalaize, 'How Lovable Reached 2.3M Users'; launch outcomes corroborated by productgrowth.blog and Hacker News (news.ycombinator.com/item?id=40228787)"
    tags:
      - "open-source"
      - "github"
      - "product-hunt"
      - "hacker-news"
      - "community-led"
      - "word-of-mouth"
  - title: "Put a one-click 'remix this' button on every shared project"
    summary: "Lovable built launched.lovable.dev, a Product-Hunt-style gallery where users post the apps they built, and the top-ranked apps each week win free usage credits. Every showcased app carries an 'Edit with Lovable' button, so anyone browsing can fork that exact project and instantly become a signed-up builder. The credit prize gamifies submissions (316 projects in a single week) while the remix button turns each shared app into a self-serve signup funnel."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Make every artifact your users create publicly forkable with a single 'remix into your own account' button, and reward the best public submissions with free credits. The output your users are already proud to share becomes both social proof and a one-click signup path."
    when_it_works: "When users produce shareable, self-explanatory artifacts and the marginal cost of letting a viewer fork one into a new account is near zero."
    metric_moved: "viral signups / new projects per day"
    result: "316 projects submitted in one week to the showcase; the remix/share loop helped drive 100,000+ new projects created per day by July 2025."
    tradeoff: "Free credits plus near-zero-friction forking means you eat the LLM compute cost of every curious tire-kicker who remixes an app and never pays, and making every user's creation publicly forkable commoditizes their work so nothing they build on you carries any defensible moat."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://overtheanthill.substack.com/p/lovable"
    attribution: "Over the Anthill (Anthony Tan), 'Lovable: Everyone is a Builder'; remix/credits mechanics corroborated by productgrowth.blog and Lovable docs"
    tags:
      - "viral-loop"
      - "templates-starters"
      - "community-led"
      - "product-hunt"
      - "free-tier"
  - title: "Hire builders, not closers, and let the founder be the funnel"
    summary: "Lovable scaled past $75M ARR with no salespeople: the entire early team was high-agency engineers, not account executives. Distribution came from the founder building in public, posting setbacks and wins across X, LinkedIn, Discord, and podcasts (his rule: 'LinkedIn content should read like Twitter'). With only builders on payroll, revenue-per-employee ran roughly 10x the SaaS benchmark."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "If your product activates self-serve, spend your first hires on engineers and make the founder's build-in-public presence the demand engine instead of a sales team. Post raw progress (numbers, failures, decisions) where developers already hang out, in a casual register, so authenticity carries the reach."
    when_it_works: "When the product is genuinely self-serve PLG with sub-minute time-to-value, so deals close without a human; it breaks for products needing security review, procurement, or hand-holding."
    metric_moved: "ARR per employee"
    result: "$75M ARR in 7 months with ~18 employees and zero sales hires; ~$2-2.5M ARR per employee, ~10x the typical SaaS benchmark."
    tradeoff: "Routing all demand through the founder's build-in-public presence makes growth hostage to one person's attention and credibility, and staffing zero sellers locks you out of the procurement, security-review, and hand-holding motions needed to actually convert the Fortune 500 interest into enterprise contracts."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://medium.com/@SaaS22/lovables-playbook-growth-community-and-zero-sales-hires-e890e73141d7"
    attribution: "SaaS22, 'Lovable's Playbook: Growth, Community, and Zero Sales Hires' (quotes Anton Osika); corroborated by Lenny's Newsletter interview"
    tags:
      - "transparency"
      - "developer-advocacy"
