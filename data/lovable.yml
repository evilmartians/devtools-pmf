plays:
  - title: "Seed a viral open-source repo before launch"
    summary: "Before commercializing, the founders shipped GPT Engineer as a free open-source CLI that exploded to 52,000+ GitHub stars (so much traffic GitHub briefly mistook it for an attack). That community produced a 27,000-person waitlist and an army of advocates. When the rebranded Lovable product launched, it went #1 on both Product Hunt and Hacker News on day one with organic demand already built in."
    metric_moved: "organic"
    result: "52,000+ GitHub stars and a 27,000-person waitlist seeded the launch; Lovable hit #1 on Product Hunt and Hacker News, then $4M ARR in 4 weeks."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://catalaize.substack.com/p/lovables-path-from-open-source-to"
    attribution: "Catalaize, 'Lovable's path from open source to 2.3M users' (corroborated by Lenny's Newsletter interview with Anton Osika)"
    tags:
      - "open-source"
      - "github"
      - "product-hunt"
      - "hacker-news"
      - "community-led"
      - "word-of-mouth"
  - title: "Build an in-product 'Edit with Lovable' viral loop"
    summary: "Lovable launched a community showcase (launched.lovable.dev), a Product-Hunt-style gallery where users post apps they built and the top-ranked apps win free usage credits weekly. Every shared app carries an 'Edit with Lovable' button, so browsers can remix any project and instantly become signed-up builders. Build, share, remix, sign up, build again becomes a self-sustaining acquisition loop with hundreds of apps submitted per week."
    metric_moved: "growth"
    result: "Hundreds of apps submitted weekly to the showcase; remix/share loop helped drive 100,000+ new projects created per day by July 2025."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://overtheanthill.substack.com/p/lovable"
    attribution: "Over the Anthill (Anthony Tan), 'Lovable: Everyone is a Builder'; loop mechanics corroborated by Lovable docs on public remixing"
    tags:
      - "viral-loop"
      - "templates-starters"
      - "community-led"
      - "product-hunt"
      - "free-tier"
  - title: "Run 12 growth engines, hire zero salespeople"
    summary: "Instead of a sales team, Lovable invested in omnipresence across 12 channels at once: X, LinkedIn, Discord, YouTube, Reddit, GitHub, Product Hunt, podcasts, events, partnerships, ads, and Google. The founder treated build-in-public authenticity (sharing setbacks and wins, 'LinkedIn content should read like Twitter') as the core fuel. With no closers and only builders on payroll, the lean team kept revenue-per-employee near $2-2.5M, roughly 10x the SaaS benchmark."
    metric_moved: "arr"
    result: "$75M ARR in 7 months with ~18 employees and zero sales hires; ~$2-2.5M ARR per employee."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://medium.com/@SaaS22/lovables-playbook-growth-community-and-zero-sales-hires-e890e73141d7"
    attribution: "SaaS22, 'Lovable's Playbook: Growth, Community, and Zero Sales Hires' (quotes Anton Osika)"
    tags:
