plays:
  - title: "Make your primitive cheap enough for agents to spawn"
    summary: "Neon engineered serverless Postgres so a fully isolated instance spins up in 500ms or less and auto-suspends to zero cost when idle, making a database cheap and programmatic enough to create via a single API call. AI coding platforms (Replit Agent, Vercel v0, Create.xyz) then wired Neon in as the database their agents provision automatically per project. By 2025, 80% of databases and 97% of branches on Neon were created by agents, not humans, making Neon the default database of the agent ecosystem and driving the ~$1B Databricks acquisition."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Re-engineer your core unit so it is fast to spin up (sub-second) and costs nothing when idle, then expose it as a one-call API: that makes you the resource an autonomous agent will spawn by default, turning each agent into a high-volume distribution channel a human sales motion could never reach."
    when_it_works: "Works when your product is a discrete resource an agent or platform provisions per-task and your unit economics survive thousands of mostly-idle instances via scale-to-zero."
    metric_moved: "agent-provisioned databases (80% of all DBs, 97% of branches)"
    result: "80% of databases and 97% of branches provisioned by AI agents; acquired by Databricks for ~$1B (May 2025) at ~40x estimated ARR, explicitly for its agent fit."
    tradeoff: "Pricing the database so cheap that agents spawn it by default means the vast majority of instances sit suspended at zero cost and earn nothing, so headline volume (700K+ DBs, 80% agent-created) decouples from revenue and monetization rests on the thin slice running real workloads, leaving ARR at only ~$25M."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.databricks.com/company/newsroom/press-releases/databricks-agrees-acquire-neon-help-developers-deliver-ai-systems"
    attribution: "Databricks press release (May 14, 2025), Ali Ghodsi: \"The era of AI-native, agent-driven applications is reshaping what a database must do\""
    tags:
      - "usage-based-pricing"
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "default-on"
      - "ai-agents"
  - title: "Embed as the default DB inside other platforms"
    summary: "Instead of building a sales team, Neon ran a partner program that let SaaS platforms embed Neon as their built-in Postgres. Vercel chose Neon to power Vercel Postgres, and Retool used Neon's API plus scale-to-zero to give every end user a dedicated database, managing 300K+ Neon projects with a single engineer because idle databases auto-suspend and cost nothing. These embeds exposed Neon to hundreds of thousands of developers with zero direct acquisition spend, helping it scale from ~100 to 3,000 new databases/day in 2023 with no sales team."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Find platforms whose users each need their own copy of your primitive, then hand them an API plus scale-to-zero so they can resell you as a built-in feature: you get distribution to all their end users for free, and the cost of idle tenants stays on no one because unused instances suspend to zero."
    when_it_works: "Works when host platforms have a multi-tenant need for your primitive and your idle cost is near-zero, so a partner can offer dedicated instances per end-user without operational or cost overhead."
    metric_moved: "new databases/day (100 -> 3,000 in 2023), partner-embedded reach"
    result: "Retool runs 300K+ databases with 1 engineer; partner embeds (Vercel, Retool, Replit) drove scaling from ~100 to 3,000 new databases/day in 2023 with no sales team."
    tradeoff: "Letting partners like Vercel and Retool resell you as their built-in Postgres hands them ownership of the end-user relationship, brand, and billing, turning you into an interchangeable infrastructure layer they can re-bid or swap out while you never reach those developers directly."
    tier: "Verified"
    source_type: "press"
    source_url: "https://neon.com/blog/how-retool-uses-retool-and-the-neon-api-to-manage-300k-postgres-databases"
    attribution: "Neon blog (Retool case study); Retool engineer: \"scale-to-zero allows us to offer dedicated databases without worrying about the cost of idle resources\""
    tags:
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "free-tier"
      - "land-and-expand"
  - title: "Ship git-like branching as the wedge feature"
    summary: "Neon separated storage and compute to offer copy-on-write database branching: every developer, PR, and CI run gets an isolated full copy of the data in seconds without paying to duplicate storage. This made the database behave like git and gave each developer a production-grade environment, a workflow traditional Postgres and RDS could not match. The branching primitive became the standout differentiator that hooked developers and later enabled the per-agent and per-tenant architectures where 97% of branches are agent-created."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Pick the one workflow developers already love from an adjacent tool (here, git branching) and rebuild your category around that exact mental model via a cheap copy-on-write primitive: a familiar, free-to-try motion the incumbent structurally cannot copy becomes your wedge and your headline differentiator."
    when_it_works: "Works when an architectural choice (e.g. separating storage and compute) lets you offer a beloved workflow the incumbent's architecture cannot, making the feature a genuine moat rather than a copyable bullet point."
    metric_moved: "organic differentiation; 97% of branches agent-created"
    result: "Branching became Neon's headline differentiator versus Supabase/RDS and underpinned the per-branch agent workflows where 97% of branches are agent-created."
    tradeoff: "Separating storage and compute to deliver copy-on-write branching produces a system far harder to operate than standard Postgres, and the explosive growth the wedge drove broke Neon's infrastructure about a year post-launch, forcing them to deliberately slow feature work and hire a VP Eng from MongoDB and VP Product from GitHub to rebuild reliability."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://thenewstack.io/neon-branching-in-serverless-postgresql/"
    attribution: "The New Stack, \"Neon: Branching in Serverless PostgreSQL\"; Neon GitHub repo description (\"code-like database branching\")"
    tags:
      - "open-source"
      - "developer-advocacy"
      - "bottom-up-plg"
      - "wedge-feature"
