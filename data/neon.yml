    note: "Neon scaled from ~100 to 3,000 databases/day (2023) with no sales team; growth driven by open source, GitHub, Hacker News, and platform partnerships (Vercel, Retool, Replit). No disclosed numeric organic share; qualitative PLG claim, graded Estimated."
plays:
  - title: "Make your database provisionable by AI agents"
    summary: "Neon built an API-first serverless Postgres that spins up a fully isolated instance in 500ms or less with scale-to-zero, so creating a database is cheap and programmatic. AI coding platforms (Replit Agent, Vercel v0, Create.xyz) wired Neon in as the default database their agents provision automatically. By 2025, 80% of databases and 97% of branches on Neon were created by AI agents rather than humans, turning Neon into the default database of the agent ecosystem and driving the ~$1B Databricks acquisition."
    metric_moved: "growth"
    result: "80% of databases and 97% of branches provisioned by AI agents; acquired by Databricks for ~$1B (May 2025) at ~40x ARR, explicitly for its AI-agent fit."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.databricks.com/company/newsroom/press-releases/databricks-agrees-acquire-neon-help-developers-deliver-ai-systems"
    attribution: "Databricks press release (May 14, 2025), Ali Ghodsi: \"The era of AI-native, agent-driven applications is reshaping what a database must do\""
    tags:
      - "usage-based-pricing"
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "default-on"
  - title: "Embed as the default DB inside other platforms"
    summary: "Instead of building a sales team, Neon ran a partner program that let SaaS platforms embed Neon as their built-in Postgres. Vercel chose Neon to power Vercel Postgres, and Retool used Neon's API plus scale-to-zero to give every end user a dedicated database. Retool manages 300K+ Neon projects with a single engineer because idle databases auto-suspend and cost nothing. These partnerships exposed Neon to hundreds of thousands of developers with zero direct acquisition spend."
    metric_moved: "growth"
    result: "Retool runs 300K+ databases with 1 engineer; partner embeds (Vercel, Retool, Replit) drove scaling from ~100 to 3,000 new databases/day in 2023 with no sales team."
    tier: "Verified"
    source_type: "press"
    source_url: "https://neon.com/blog/how-retool-uses-retool-and-the-neon-api-to-manage-300k-postgres-databases"
    attribution: "Neon blog (Retool case study); Retool engineer: \"scale-to-zero allows us to offer dedicated databases without worrying about the cost of idle resources\""
    tags:
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "free-tier"
      - "land-and-expand"
  - title: "Ship git-like branching as the wedge feature"
    summary: "Neon separated storage and compute to offer copy-on-write database branching: every developer, PR, and CI run gets an isolated full copy of the data in seconds without paying to duplicate storage. This made the database behave like git and gave each developer a production-grade environment, a workflow traditional Postgres could not match. The branching primitive became the standout differentiator that hooked developers and later enabled per-agent and per-tenant database architectures."
    metric_moved: "organic"
    result: "Branching became Neon's headline differentiator versus Supabase/RDS; underpinned the per-branch agent workflows where 97% of branches are agent-created."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://thenewstack.io/neon-branching-in-serverless-postgresql/"
    attribution: "The New Stack, \"Neon: Branching in Serverless PostgreSQL\"; Neon GitHub repo description (\"code-like database branching\")"
    tags:
      - "open-source"
      - "developer-advocacy"
      - "bottom-up-plg"
