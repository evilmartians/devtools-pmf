plays:
  - title: "Ship adjacent modules that share your first product's data collector"
    summary: "LogicMonitor landed enterprises with one product, agentless infrastructure monitoring, then shipped log management, cloud/multi-cloud monitoring, and Edwin AI/AIOps as modules that switch on inside the same account using the same already-deployed Collector. Because the data-collection layer was already installed, expanding to a second product was a config change, not a new deployment. 80% of customers now run more than one product, and that adoption shows up directly as NRR over 110% and 650%+ organic growth since 2018."
    goal: "Expansion"
    learning: "Make your beachhead product install a shared data-collection layer (agent, collector, integration) once, then build later products as modules that light up against that same layer, so cross-sell to an existing account is a toggle rather than a second deployment and procurement cycle."
    when_it_works: "Works when your first product already sits on the customer's infrastructure or data and the adjacent products consume the same stream, so expansion carries near-zero integration cost for the buyer."
    metric_moved: "nrr"
    result: "80% multi-product adoption, NRR >110%, 650%+ organic scaling since Vista's 2018 investment, $300M+ ARR."
    tradeoff: "Routing every product through one shared collector means that layer becomes a single point of failure and a hard architectural constraint, so the modules can never evolve faster than the collector allows and any limit or outage in it degrades the whole platform at once."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.logicmonitor.com/press/logicmonitor-disrupts-ai-landscape-revolutionizes-data-centers"
    attribution: "LogicMonitor press release, Nov 20, 2024 (CEO Christina Kosmowski + Vista Equity Partners)"
    tags:
      - "land-and-expand"
      - "multi-product"
      - "expansion"
  - title: "Make partners self-serve onboarding so they lead with you"
    summary: "Direct enterprise observability sales are expensive, so LogicMonitor built the product so MSPs can onboard a new client in hours, not months, via agentless Collectors, automatic dependency mapping, thousands of ready-made monitoring templates, and multi-tenant isolation with white-labeled dashboards. It then wrapped that with a Bronze/Silver/Gold partner program (upfront discounts, deal protection, referral fees, MDF, and a Partner Academy with sales/technical certs) so partners profit by leading with LogicMonitor. The channel now touches over 80% of global business."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "If you want a channel to carry distribution, the lever is not just margin tiers but ripping onboarding friction out of the product: give partners agentless setup, templates, and multi-tenant white-labeling so they can stand up a new client in hours, which makes leading with you the most profitable use of their time."
    when_it_works: "Works when resellers/MSPs make money on the deployment and management labor, so collapsing your setup time from months to hours directly improves their margins and makes them favor you."
    metric_moved: "growth"
    result: "Channel ecosystem touches over 80% of LogicMonitor's global business; MSPs onboard clients in hours instead of months."
    tradeoff: "Letting partners own onboarding for 80%+ of your business hands the channel your end-customer relationships, pricing power, and feedback loop, leaving you dependent on intermediaries who can redirect their installed base to a competitor."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.logicmonitor.com/press/logicmonitor-ignites-partner-success-with-revamped-program-built-for-growth"
    attribution: "LogicMonitor press release, Jan 2025 (CRO Will Corkery)"
    tags:
      - "channel-partners"
      - "msp"
      - "onboarding"
      - "distribution"
