    source_url: "https://www.logicmonitor.com/press/logicmonitor-disrupts-ai-landscape-revolutionizes-data-centers"
    attribution: "LogicMonitor press release, Nov 20, 2024 (CEO Christina Kosmowski + Vista Equity Partners)"
    tags:
      - "land-and-expand"
  - title: "Build a tiered channel program partners lead with"
    summary: "Selling enterprise observability is expensive direct, so LogicMonitor routed growth through resellers and MSPs. In early 2025 it revamped its partner program into a bronze/silver/gold tier structure with upfront discounts, referral fees, deal protection, co-branded marketing funds, and a Partner Academy for sales and technical certification. The explicit goal was to get partners to 'lead with LogicMonitor' rather than treat it as a side line. The channel now touches over 80% of global business."
    metric_moved: "growth"
    result: "Channel ecosystem touches over 80% of LogicMonitor's global business; MSPs onboard new clients in hours, not months."
