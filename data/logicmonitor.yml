plays:
  - title: "Expand one monitoring wedge into a multi-product platform"
    summary: "LogicMonitor landed enterprises with a single hybrid infrastructure monitoring product, then broadened the suite into full hybrid observability (cloud, logs, AIOps) and cross-sold it into the installed base. The result is a textbook land-and-expand engine: 80% of customers now adopt more than one product, and that expansion shows up directly in retention. Founders can copy the pattern by treating the first product as a beachhead and shipping adjacent modules existing accounts can switch on."
    metric_moved: "nrr"
