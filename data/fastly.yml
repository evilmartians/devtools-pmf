plays:
  - title: "Your most-requested feature is sitting in your support inbox"
    summary: "Fastly was an enterprise CDN with no self-serve on-ramp, and free frictionless signup was its developer community's single most-repeated request for years. In June 2024 it shipped free developer accounts (deploy in minutes via starter kits) that were production-grade, running a real workload: over 200GB and 2M requests/month, plus WASM compute, real-time logging, TLS certs, and always-on DDoS. Fastly called it the all-time most popular request from developers, removing the sales-contact barrier to seed bottom-up adoption."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Find the single ask your community has repeated for years, then ship exactly that, and size the free tier to run a real workload (Fastly gave away 200GB, 2M requests, WASM compute, and DDoS) so a developer hits value before any sales touch."
    when_it_works: "Works when your product is enterprise-priced but technically usable by a solo developer."
    metric_moved: "Self-serve signups / top-of-funnel developer adoption"
    result: "Launched the company's most-requested feature ever, converting an enterprise-sales-only CDN into a product a hobbyist or startup can adopt with no contact, no card."
    tradeoff: "Giving away 200GB, 2M requests, WASM compute, and always-on DDoS per month means you eat real CDN and compute bandwidth cost on every freeloader who never converts, so the free tier only pays off if a meaningful slice graduates to paid before the giveaway eats your gross margin."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.fastly.com/blog/its-free-instant-and-yours-fastlys-free-developer-accounts-are-here"
    attribution: "Fastly official blog, 'It's free, instant, and yours! Fastly's free developer accounts are here' (June 2024)"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "self-serve"
      - "developer-advocacy"
      - "ship-the-ask"
  - title: "An acquired developer community decays the moment you stop funding it"
    summary: "Fastly's edge Compute served enterprise developers but had no on-ramp for hobbyists, so in May 2022 it acquired Glitch (a 'yes code' web IDE with 1.8M developers, where Google, Stripe, and Etsy had prototyped) and wired Compute@Edge into the Glitch UI to build a prototype-then-graduate-to-enterprise pipeline. The funnel only pays off if you keep funding the playground: Fastly let Glitch's legacy architecture rot, abuse mounted, and in July 2025 it killed Glitch app hosting entirely, three years after the deal. The top-of-funnel evaporated because nobody owned the maintenance cost."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Buy a beloved playground for instant top-of-funnel only if you budget the ongoing platform engineering and wire a clear path from the toy tier into your paid product."
    when_it_works: "Works when the acquired community's product maps directly onto your paid offering."
    metric_moved: "Top-of-funnel developer reach (later lost)"
    result: "Acquired a 1.8M-developer top-of-funnel, then let it decay and shut down app hosting in July 2025, closing the funnel."
    tradeoff: "Acquiring a 1.8M-developer playground buys instant top-of-funnel but saddles you with the permanent engineering bill to keep its aging architecture modern and fight abuse. Fastly proved the downside: it let Glitch rot and shut down app hosting in July 2025, closing the funnel."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.fastly.com/blog/fastly-announces-acquisition-of-glitch-a-future-of-yes-code-at-the-edge"
    attribution: "Fastly official blog, 'Fastly announces acquisition of Glitch' (May 2022); shutdown reported by The Register, 'Glitch hits kill switch on app web hosting' (May 2025)"
    tags:
      - "community-led"
      - "acquisition"
      - "bottom-up-plg"
      - "land-and-expand"
      - "cautionary-tale"
  - title: "Give away the runtime to own the standard"
    summary: "Edge compute needed sub-millisecond cold starts and secure multi-tenant isolation that containers couldn't provide. Fastly open-sourced Lucet (its WebAssembly AOT compiler and runtime, ~35 microsecond startup, no cold starts) and co-founded the Bytecode Alliance in November 2019 with Mozilla, Intel, and Red Hat. By stewarding the open WASI/WebAssembly server-side standard alongside name-brand peers, Fastly made itself the credible default home for WASM-at-the-edge."
    goal: "Acquisition"
    track: "Open-source"
    learning: "When your differentiator is a runtime or protocol, open-source the core and co-found a standards body with name-brand peers (Fastly took Lucet to the Bytecode Alliance with Mozilla, Intel, and Red Hat) so the ecosystem treats your implementation as the reference and your real moat becomes operational scale."
    when_it_works: "Works when you are early in a nascent category and your durable advantage already lives in operational scale, leaving the runtime code itself cheap to give away."
    metric_moved: "Developer trust / mindshare as the default WASM-edge platform"
    result: "Became a founding steward of server-side WebAssembly; Lucet runs ~35 microsecond startup with no cold starts and seeded the WASI standard Fastly's product runs on."
    tradeoff: "Open-sourcing Lucet and co-founding a standards body with Mozilla, Intel, and Red Hat hands your runtime to every competitor and forces decisions through multi-vendor consensus, so you trade a proprietary moat for category authority and must now defend your business on operational scale alone."
    tier: "Verified"
    source_type: "press"
    source_url: "https://hacks.mozilla.org/2019/11/announcing-the-bytecode-alliance/"
    attribution: "Mozilla Hacks, 'Announcing the Bytecode Alliance' (Nov 2019), with Fastly CTO Tyler McMullen quoted"
    tags:
      - "open-source"
      - "standards-body"
      - "developer-advocacy"
      - "category-creation"
      - "github"
