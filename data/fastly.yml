plays:
  - title: "Ship the most-requested free tier developers begged for"
    summary: "Free, no-friction signup was the single loudest, most-repeated ask from Fastly's developer community for years. In June 2024 Fastly launched free developer accounts that let anyone set up a site or app in a few minutes and deploy with a few clicks via starter kits. The tier is genuinely usable (well over 200GB and 2M requests/month, plus WASM compute, real-time logging, TLS, and always-on DDoS), turning an enterprise CDN into something a hobbyist or startup can adopt without sales contact."
    metric_moved: "growth"
    result: "Launched the 'all-time most popular request from developers,' removing the signup barrier to seed bottom-up adoption of an enterprise edge/CDN platform."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.fastly.com/blog/its-free-instant-and-yours-fastlys-free-developer-accounts-are-here"
    attribution: "Fastly official blog, 'It's free, instant, and yours! Fastly's free developer accounts are here' (June 2024)"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "templates-starters"
      - "hacker-news"
  - title: "Acquire a beloved dev playground as your top-of-funnel"
    summary: "Fastly's edge Compute already served enterprise developers, but it had no easy on-ramp for hobbyists and small teams. In May 2022 Fastly acquired Glitch, a 'yes code' web IDE with 1.8M developers, and integrated Compute@Edge directly into the Glitch interface. This created an explicit developer-to-enterprise funnel: creators prototype for free on Glitch, then graduate the same projects into enterprise-grade edge production on Fastly."
    metric_moved: "growth"
    result: "Added a 1.8M-developer community as a hobbyist-to-enterprise pipeline; companies like Google, Stripe, and Etsy already prototyped on Glitch."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.fastly.com/blog/fastly-announces-acquisition-of-glitch-a-future-of-yes-code-at-the-edge"
    attribution: "Fastly official blog, 'Fastly announces acquisition of Glitch' (May 2022)"
    tags:
      - "community-led"
      - "bottom-up-plg"
      - "land-and-expand"
      - "developer-advocacy"
      - "free-tier"
  - title: "Open-source your core runtime to set the standard"
    summary: "To make edge compute viable, Fastly needed sub-millisecond cold starts and secure multi-tenant isolation that containers couldn't deliver. Rather than keep it proprietary, Fastly open-sourced Lucet, its WebAssembly AOT compiler and runtime that powers Compute@Edge, and co-founded the Bytecode Alliance in 2019 with Mozilla, Intel, and Red Hat. Backing the open WASI/WebAssembly standard built developer trust and made Fastly a credible, default home for WASM-at-the-edge workloads."
    metric_moved: "community"
    result: "Established Fastly as a founding steward of the WebAssembly server-side standard; Lucet delivers ~35 microsecond startup with no cold starts."
    tier: "Verified"
    source_type: "press"
    source_url: "https://hacks.mozilla.org/2019/11/announcing-the-bytecode-alliance/"
    attribution: "Mozilla Hacks, 'Announcing the Bytecode Alliance' (Nov 2019), with Fastly CTO Tyler McMullen quoted"
    tags:
