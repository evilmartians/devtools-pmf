plays:
  - title: "Ship your #1 community ask as a usable free tier"
    summary: "Fastly was an enterprise CDN with no self-serve on-ramp, and free no-friction signup was the single most-repeated request from its developer community for years. In June 2024 it shipped free developer accounts (deploy in minutes via starter kits) that were genuinely production-grade rather than a crippled demo: over 200GB and 2M requests/month, plus WASM compute, real-time logging, TLS certs, and always-on DDoS. Fastly called it the all-time most popular request from developers, removing the sales-contact barrier to seed bottom-up adoption."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Mine your support and community channels for the single most-repeated ask, then ship exactly that, and make the free tier large enough to run a real workload (not a toy demo) so trying you replaces a sales call instead of forcing one."
    when_it_works: "Works when your product is enterprise-priced but technically usable solo, and you can afford to give away enough capacity that a developer reaches real value before any sales touch."
    metric_moved: "Self-serve signups / top-of-funnel developer adoption"
    result: "Launched the company's most-requested feature ever, converting an enterprise-sales-only CDN into a product a hobbyist or startup can adopt with no contact, no card."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.fastly.com/blog/its-free-instant-and-yours-fastlys-free-developer-accounts-are-here"
    attribution: "Fastly official blog, 'It's free, instant, and yours! Fastly's free developer accounts are here' (June 2024)"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "self-serve"
      - "developer-advocacy"
      - "ship-the-ask"
  - title: "Buy a developer community as a funnel, but own its upkeep"
    summary: "Fastly's edge Compute served enterprise developers but had no on-ramp for hobbyists, so in May 2022 it acquired Glitch (a 'yes code' web IDE with 1.8M developers, where Google, Stripe, and Etsy had prototyped) and wired Compute@Edge into the Glitch UI to create a prototype-free-then-graduate-to-enterprise pipeline. The acquired community is a real distribution asset, but the funnel only pays off if you keep funding the playground: Fastly let Glitch's legacy architecture rot, abuse mounted, and in July 2025 it killed Glitch app hosting entirely, three years after the deal. The top-of-funnel evaporated because the maintenance cost was never owned."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Acquiring a beloved developer playground can hand you instant top-of-funnel, but only budget the deal if you will also fund the ongoing platform upkeep and a clear path from the toy tier into your paid product; an unmaintained acquired community rots and the funnel closes."
    when_it_works: "Pays off only when the acquired community's product directly maps onto your paid offering AND you commit ongoing engineering to keep it modern; skip it if it is a side-project you will neglect."
    metric_moved: "Top-of-funnel developer reach (later lost)"
    result: "Acquired a 1.8M-developer top-of-funnel; let it decay and shut down app hosting in July 2025, the funnel closing rather than converting."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.fastly.com/blog/fastly-announces-acquisition-of-glitch-a-future-of-yes-code-at-the-edge"
    attribution: "Fastly official blog, 'Fastly announces acquisition of Glitch' (May 2022); shutdown reported by The Register, 'Glitch hits kill switch on app web hosting' (May 2025)"
    tags:
      - "community-led"
      - "acquisition"
      - "bottom-up-plg"
      - "land-and-expand"
      - "cautionary-tale"
  - title: "Open-source your runtime to make your standard the default"
    summary: "Edge compute needed sub-millisecond cold starts and secure multi-tenant isolation that containers couldn't deliver, so rather than keep the moat proprietary, Fastly open-sourced Lucet (its WebAssembly AOT compiler and runtime, ~35 microsecond startup, no cold starts) and co-founded the Bytecode Alliance in November 2019 with Mozilla, Intel, and Red Hat. By stewarding the open WASI/WebAssembly server-side standard alongside name-brand peers, Fastly made itself the credible default home for WASM-at-the-edge instead of one vendor's lock-in."
    goal: "Acquisition"
    track: "Open-source"
    learning: "When your differentiator is a runtime or protocol, open-source the core and co-found a standards body with respected peers so the ecosystem treats your implementation as the reference, converting a proprietary feature into category authority that pulls developers to you."
    when_it_works: "Works when you are early in a nascent category and your real moat is operational scale, not the runtime itself, so giving away the runtime costs little and the standard-setter halo is worth more."
    metric_moved: "Developer trust / mindshare as the default WASM-edge platform"
    result: "Became a founding steward of server-side WebAssembly; Lucet delivers ~35 microsecond startup with no cold starts and seeded the WASI standard Fastly's product runs on."
    tier: "Verified"
    source_type: "press"
    source_url: "https://hacks.mozilla.org/2019/11/announcing-the-bytecode-alliance/"
    attribution: "Mozilla Hacks, 'Announcing the Bytecode Alliance' (Nov 2019), with Fastly CTO Tyler McMullen quoted"
    tags:
      - "open-source"
      - "standards-body"
      - "developer-advocacy"
      - "category-creation"
      - "github"
