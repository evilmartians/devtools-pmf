plays:
  - title: "Launch with one obsessively-crafted tweet thread"
    summary: "Bolt.new launched in October 2024 with no PR, no blog post, and no press article. Eric Simons and his team shipped a single tweet thread anchored by a slick ~43-second screencast demo, with follow-up tweets walking through concrete example prompts. Eric: 'we put out a tweet thread. That was it. There's no blog posts, there's no press article. Nothing.' The thread went viral and spread organically to Hacker News, Reddit, YouTube, and TikTok, driving 0-to-$20M ARR in two months."
    metric_moved: "organic"
    result: "Single tweet thread drove true cross-channel virality and $0 to ~$20M ARR in ~2 months; day-one launch alone added ~$60K ARR."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.thespl.it/p/zero-to-20m-arr-in-two-months-inside"
    attribution: "Eric Simons (co-founder/CEO) on The Peel podcast with Turner Novak"
    tags:
      - "twitter-x"
      - "word-of-mouth"
      - "viral-loop"
      - "founder-led-sales"
  - title: "Make the first screen a bare prompt box"
    summary: "Bolt.new stripped its landing experience to a single text box: no login, no credit card, no marketing jargon, no signup wall. A visitor types the app they want, hits enter, and ~30 seconds later has a running web application. Eric Simons framed this as the core differentiator versus competitors where 'there's a bajillion things going on.' The near-zero barrier to the 'wow' moment meant nearly every new visitor produced something useful in their first session, which is what converted viral traffic into revenue."
    metric_moved: "ttfv"
    result: "Time-to-first-app under ~60 seconds with zero signup friction; turned viral traffic into one of the fastest activation-to-revenue curves on record (0 to $4M ARR in 4 weeks)."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.thespl.it/p/zero-to-20m-arr-in-two-months-inside"
    attribution: "Eric Simons (co-founder/CEO) on The Peel podcast with Turner Novak"
    tags:
      - "onboarding-redesign"
      - "free-tier"
      - "bottom-up-plg"
      - "default-on"
  - title: "Post eye-popping ARR numbers publicly"
    summary: "Rather than staying quiet, Bolt.new's founder and its investors repeatedly broadcast its raw growth metrics ('$20M ARR in 2 months', '$40M ARR in 5 months') across X and LinkedIn. Each milestone became its own news event, generating fresh buzz, inbound press, and creator demos. The metrics themselves became a distribution channel, feeding the same organic loop that launched the product."
    metric_moved: "growth"
    result: "Repeated public milestone posts compounded the launch virality and kept Bolt.new in the AI-coding conversation through its run to ~$40M ARR / 1M+ MAU."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.growthunhinged.com/p/boltnew-growth-journey"
    attribution: "Growth Unhinged (Kyle Poyar) growth breakdown; corroborated by Contrary Research"
    tags:
      - "transparency"
      - "founder-led-sales"
      - "linkedin"
      - "twitter-x"
      - "word-of-mouth"
