plays:
  - title: "Launch with one screencast, skip the press entirely"
    summary: "Bolt.new launched in October 2024 with no PR, no blog post, and no press outreach: just a single tweet thread anchored by a ~43-second screencast that showed a prompt turning into a running app in real time, with follow-up tweets walking through specific example prompts. Eric Simons: 'we put out a tweet thread. That was it. There's no blog posts, there's no press article. Nothing.' The thread jumped on its own to Hacker News, Reddit, YouTube, and TikTok, generating $60K ARR on day one and $4M in four weeks."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "If your product creates a visible wow in under a minute, anchor your launch on a single tight screencast that shows the prompt-to-result transformation end to end so a viewer pictures themselves doing it, then post it as one tweet thread and let the channels carry it. A self-evident demo out-travels any PR budget."
    when_it_works: "Works when the product delivers a fast, screen-recordable result that is instantly impressive to a non-expert; fails for products whose value is slow, abstract, or only legible to specialists."
    metric_moved: "signups / ARR"
    result: "Single tweet thread drove cross-channel virality and $0 to ~$20M ARR in ~2 months; day one alone added ~$60K ARR."
    tradeoff: "A launch that travels on its own is a one-shot, uncontrollable spike you can't repeat on demand, and it dumps unmetered viral traffic onto your infrastructure with no warning (Bolt maxed out Anthropic's GPU capacity at peak), while leaving you with no owned audience or press relationships to fall back on next time."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.thespl.it/p/zero-to-20m-arr-in-two-months-inside"
    attribution: "Eric Simons (co-founder/CEO) on The Peel podcast with Turner Novak"
    tags:
      - "twitter-x"
      - "word-of-mouth"
      - "viral-loop"
      - "launch"
      - "demo-video"
  - title: "Show the result before you ask for anything"
    summary: "Bolt.new's landing page is a single text box: no login, no credit card, no marketing copy, no signup wall. A visitor types the app they want, hits enter, and a running web application appears in roughly 30 seconds, only hitting the signup/paywall after the value is already on screen. Eric Simons framed this as the differentiator against tools where 'there's a bajillion things going on.' Because 60-70% of users are non-developers, removing every barrier before the aha moment is what converted viral traffic into the fastest activation-to-revenue curve on record."
    goal: "Activation"
    learning: "Move every gate, login, payment, and config, to after the user has seen their first real result, and build the entire first screen around the one action that produces it. The cost of trying you drops to zero, and you only ask for commitment once the value is already on screen."
    when_it_works: "Works when you can deliver genuine first value without knowing who the user is and your compute/abuse costs survive anonymous usage; fails when value requires account data or anonymous use is too expensive to give away."
    metric_moved: "time-to-first-value / activation"
    result: "Time-to-first-app under ~60 seconds with zero pre-value friction; $0 to $4M ARR in 4 weeks, 60-70% of users non-developers."
    tradeoff: "Handing real, compute-heavy results to anonymous visitors before any commitment means you pay the full LLM and WebContainers cost of every tire-kicker and abuser who never converts, which is why gross margins sit at only ~40%."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.thespl.it/p/zero-to-20m-arr-in-two-months-inside"
    attribution: "Eric Simons (co-founder/CEO) on The Peel podcast with Turner Novak"
    tags:
      - "onboarding-redesign"
      - "time-to-value"
      - "no-signup"
      - "bottom-up-plg"
      - "activation"
  - title: "Let support cost stay flat while users 100x"
    summary: "Instead of staffing a support org to match its explosive user growth, Bolt.new pushed roughly 90% of customer support through AI agents, running ~100K paying customers with about 3 support staff. The lean structure let a 25-35 person company reach ~$40M ARR, roughly $1.1M revenue per employee. Because Bolt itself is an AI product, dogfooding AI on the support surface both saved headcount and kept margins defensible against heavy WebContainers/LLM compute costs."
    goal: "Revenue"
    learning: "When usage outruns hiring, route the high-volume repetitive tier to an AI agent grounded in your own docs and product context, and reserve humans for escalations only. Track deflection rate as a first-class metric so support headcount stays flat as the user base scales."
    when_it_works: "Works when most support tickets are repetitive how-to questions answerable from existing docs/product context; fails for high-stakes or highly bespoke support where a wrong AI answer is costly."
    metric_moved: "support cost / revenue-per-employee"
    result: "~90% of support handled by AI with ~3 support staff for ~100K customers; ~$1.1M ARR per employee at ~$40M ARR."
    tradeoff: "Deflecting 90% of tickets to a bot for a user base that is 60-70% non-developers routes your least technical, most-confused users into an automated layer that can answer confidently wrong, and the ~3-person human team forfeits the high-volume support surface as a direct product-feedback channel."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://summation.buzzsprout.com/1783651/episodes/18152899-bolt-new-ceo-eric-simons-one-of-the-fastest-growing-ai-companies-in-the-world"
    attribution: "Eric Simons (co-founder/CEO) on the World of DaaS / Summation podcast with Auren Hoffman"
    tags:
      - "ai-support"
      - "support-automation"
      - "lean-team"
      - "unit-economics"
      - "margins"
