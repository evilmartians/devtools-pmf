plays:
  - title: "Give every business user a free family account"
    summary: "1Password bundles a complimentary 1Password Families membership (up to 5 people, a ~$71.88/year value) into every Business subscription. Employees use it at home, their family members fall in love with the product, and they then recommend 1Password to their own workplaces. This turns each enterprise seat into a consumer-side acquisition loop while making the seat itself stickier."
    metric_moved: "growth"
    result: "Cited by the CEO/advisor as a core driver in building to a $6.8B company and $400M+ ARR; B2B grew to 75%+ of revenue while the free family loop seeds new bottom-up demand. The perk is a documented ~$71.88/year value per employee."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/7-drivers-in-building-to-a-7-billion-company-with-1password-ceo-jeff-shiner-and-1password-advisor-carilu-dietrich-pod-556-video/"
    attribution: "SaaStr podcast/recap with 1Password CEO Jeff Shiner and advisor Carilu Dietrich; perk value via 1Password Support (support.1password.com/link-family)"
    tags:
      - "free-tier"
      - "viral-loop"
      - "word-of-mouth"
      - "land-and-expand"
      - "bottom-up-plg"
  - title: "Embed secrets into developer workflows to land bottom-up"
    summary: "Rather than relying on a low-intent free tier, 1Password acquired SecretHub (2021) and shipped Secrets Automation, CLI shell plugins, SSH-key management, and VS Code integration so developers store and inject secrets at runtime instead of pasting plaintext into repos. Developers adopt it for their own daily workflow, which pulls the platform into the organization from the bottom up."
    metric_moved: "growth"
    result: "1M+ developers now use the platform; it secures 1.3B+ human and machine credentials, anchoring 1Password as developer infrastructure rather than optional tooling."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://softwareanalyst.substack.com/p/inside-1passwords-enterprise-identity"
    attribution: "Software Analyst Research, 'Inside 1Password's Enterprise Identity Transformation'; developer/credential counts via 1Password Nov 2025 press release"
    tags:
      - "developer-advocacy"
      - "bottom-up-plg"
      - "integrations-marketplace"
      - "land-and-expand"
  - title: "Bootstrap to profitability before raising growth capital"
    summary: "1Password ran profitable from launch in 2005 and took no outside funding for ~14 years, only raising in 2019. By proving durable unit economics first, it raised from a position of strength: a $620M Series C at a $6.8B valuation in 2022, while staying free cash flow positive through $400M+ ARR."
    metric_moved: "funding_round"
    result: "$620M Series C at $6.8B valuation (largest round by a Canadian company at the time), reached after 14 years bootstrapped and while remaining free cash flow positive."
