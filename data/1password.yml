plays:
  - title: "Bundle a free family plan into every paid seat"
    summary: "1Password gives every 1Password Business seat a complimentary 1Password Families membership (up to 5 people, a $71.88/year retail value) that the employee owns personally and keeps even after they leave the company. Employees use it at home, their spouses and kids get hooked, and those people then push 1Password at their own employers. Each enterprise seat becomes a consumer-side acquisition loop and the seat itself gets stickier because the password manager is now woven into the employee's personal life."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Give every paid business seat a free personal-use version of your product that the user owns individually and keeps after they leave. Personal usage spreads your tool to their household and their next employer, turning one B2B seat into an outbound acquisition channel while deepening retention on the seat you already sold."
    when_it_works: "Works when your product has genuine standalone personal value (so people use it at home) and individuals influence what their employer buys; it does nothing for tools that only make sense inside a company."
    metric_moved: "growth / new-account acquisition"
    result: "Cited by CEO Jeff Shiner as a core driver to $400M+ ARR; B2B grew to 75%+ of revenue while the free family loop seeds new bottom-up demand. The perk is a documented $71.88/year value per employee."
    tradeoff: "You permanently give away a $71.88/year retail product to every business seat and let the employee keep it even after they leave, so you carry ongoing per-seat COGS and support load for non-paying households and cannibalize your own consumer revenue on a bet that those households later influence a purchase you can't directly attribute."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/7-drivers-in-building-to-a-7-billion-company-with-1password-ceo-jeff-shiner-and-1password-advisor-carilu-dietrich-pod-556-video/"
    attribution: "SaaStr podcast/recap with 1Password CEO Jeff Shiner and advisor Carilu Dietrich; perk value and ownership terms via 1Password Support (support.1password.com/link-family)"
    tags:
      - "free-tier"
      - "viral-loop"
      - "word-of-mouth"
      - "land-and-expand"
      - "bottom-up-plg"
  - title: "Acqui-hire your way into the developer daily workflow"
    summary: "Instead of waiting for a low-intent free tier to convert, 1Password acqui-hired SecretHub in April 2021 (a CLI-first secrets tool that was already handling ~5M enterprise secrets a month) and used its team to ship Secrets Automation, CLI shell plugins, SSH-key management, and a VS Code integration. Developers adopt these for their own daily workflow, injecting secrets at runtime instead of pasting plaintext into repos, which pulls the whole platform into the organization bottom-up rather than waiting for a top-down security mandate."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "To break into a new buyer (developers), buy or build the unglamorous tool they already touch every day (CLI, IDE plugin, runtime injection) rather than bolting a slick UI onto your existing product. Owning the daily workflow earns organic bottom-up adoption that a marketing-led free tier cannot."
    when_it_works: "Pays off when the new audience has a clear daily ritual you can embed into and an existing team you can acquire to ship it credibly; weak if you have no native distribution point in their workflow."
    metric_moved: "developer adoption / bottom-up account penetration"
    result: "1M+ developers now use the platform, which secures 1.3B+ human and machine credentials, anchoring 1Password as developer infrastructure rather than optional tooling."
    tradeoff: "Buying SecretHub and rebuilding the product around CLI, SSH, and runtime secrets injection meant paying upfront to absorb a separate team and codebase and then committing to maintain low-margin developer infrastructure that fights entrenched incumbents like HashiCorp Vault and AWS Secrets Manager, far from your consumer roots, with bottom-up adoption you can't guarantee."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2021/04/13/1password-acquires-secrethub-and-launches-new-enterprise-secrets-management-tool/"
    attribution: "TechCrunch, '1Password acquires SecretHub and launches Secrets Automation' (Apr 13, 2021); developer/credential counts via 1Password Nov 2025 press release"
    tags:
      - "developer-advocacy"
      - "bottom-up-plg"
