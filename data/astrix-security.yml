plays:
  - title: "Name the unnamed problem with analysts, then own it"
    summary: "In 2021 the risk Astrix solved (machine-to-machine access via API keys, OAuth apps, service accounts) had no analyst category and no buyer vocabulary. Instead of fighting inside a crowded segment, Astrix worked directly with industry analysts to coin 'non-human identities (NHIs)' and ran a sustained education campaign on the risks NHIs pose. By 2023 NHI was a recurring conference topic and Astrix was the recognized originator, converting that authority into a Gartner Cool Vendor nod and an RSA Innovation Sandbox finalist slot pitching to 2,000+ attendees."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "If the pain you solve has no name a buyer can Google, co-author the term with analysts and publish the education before competitors do; the originator of a category becomes its default vendor as buyers wake up to it."
    when_it_works: "Works when the underlying risk is real and rising but currently invisible to buyers, so an education campaign creates the demand rather than just chasing it."
    metric_moved: "category authority / inbound demand"
    result: "Coined and owned the 'non-human identity' category; 2023 RSA Innovation Sandbox finalist (top 10, 2,000+ live attendees) and 2023 Gartner Cool Vendor in Identity-First Security."
    tradeoff: "You fund the entire market-education bill yourself and on your own timeline, and once the term catches on it becomes shared vocabulary every competitor (Oasis and others) can adopt, so you pay to build a category rivals get to sell into for free."
    tier: "Verified"
    source_type: "press"
    source_url: "https://pulse2.com/astrix-security-profile-alon-jackson-interview/"
    attribution: "CEO Alon Jackson (Pulse2 interview): 'We worked with analysts to coin the term non-human identities (NHIs), and started educating this new market about NHIs and the risks they pose.' Corroborated by Astrix's RSA Innovation Sandbox 2023 recap."
    tags:
      - "category-creation"
      - "analyst-relations"
      - "content-seo"
      - "conference-talk"
  - title: "Lead with a free scan that surfaces unknown risk"
    summary: "Before Astrix had a UI, they built a lightweight scanner that read an enterprise's environment and returned a spreadsheet listing the non-human identity exposures it found. They handed this as a 'quick taste' to prospects, betting even enterprise security buyers expect a 'taste, try, and buy' experience. The findings list created urgency by surfacing concrete risks the buyer didn't know they had, short-circuiting the long enterprise eval cycle."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Build a read-only assessment that scans the prospect's real environment and hands back a list of specific problems they didn't know existed; discovered risk sells faster than a feature demo because it makes inaction the riskier choice."
    when_it_works: "Works when your product can surface concrete, prospect-specific findings cheaply and the buyer can't easily see those problems on their own today."
    metric_moved: "logos / sales-cycle length"
    result: "Landed first global enterprise (thousands of employees) within two weeks of formally founding, on nothing but an Excel of findings; grew to 10-20 founder-led customers before Series A."
    tradeoff: "You must grant prospects a working read-only scan of their live environment and hand over concrete findings before any commitment, which exposes how your detection works and lets some buyers act on the discovered risks without ever buying."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.sramanamitra.com/2025/08/20/building-a-venture-scale-cyber-security-startup-in-the-age-of-ai-alon-jackson-ceo-of-astrix-security-part-2/"
    attribution: "CEO Alon Jackson (Sramana Mitra interview): the spreadsheet was 'a basic tool that we would give to different enterprises, a quick taste of what we can do for them, very, very quickly... if you can't show value instantly, it's very hard to run enterprise tools... people expect a taste, try, and buy experience.'"
    tags:
      - "free-assessment"
      - "founder-led-sales"
      - "wedge"
      - "land-and-expand"
  - title: "Re-anchor your category onto the dominant funding wave"
    summary: "Because AI agents are themselves non-human identities, Astrix reframed its NHI category as the security layer for the 'agentic workforce' rather than a niche SaaS-token-hygiene tool, and shipped an AI Agent Control Plane (Dec 2024) to make the claim concrete. The reframing aligned a real existing product with the most-funded theme in tech and pulled in strategically loaded investors. It raised a $45M Series B led by Menlo's Anthology Fund (Menlo's $100M fund with Anthropic), with Workday Ventures joining, and the AI positioning ultimately set up Cisco's ~$400M acquisition."
    goal: "Revenue"
    learning: "If your existing product is a true subset of a surging trend, re-anchor your category language onto that wave and ship one flagship feature that proves the claim; you reach the trend's investors and acquirers without rebuilding the company."
    when_it_works: "Works when the reframe is technically honest (the trend genuinely runs through your product), not a bolted-on AI label, so investors and buyers don't see through it."
    metric_moved: "valuation / strategic investor access"
    result: "$45M Series B (Dec 2024, Menlo/Anthology Fund with Anthropic, Workday Ventures joining); ~5x revenue growth since Series A; led to Cisco intent-to-acquire (~$400M, May 2026)."
    tradeoff: "By tying your positioning to the agentic-AI hype cycle you don't control, you inherit its volatility (a cooling of the narrative deflates your valuation story) and you move from owning a quiet niche into the crowded, far-better-funded 'AI security' arena where your category lead no longer protects you."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/astrix-security-raises-45m-series-b-to-redefine-identity-security-for-the-ai-era-302327052.html"
    attribution: "Astrix Series B announcement (PR Newswire) and Calcalist coverage; Menlo Ventures Anthology Fund (with Anthropic) led the round."
    tags:
      - "positioning"
      - "category-creation"
      - "changelog-marketing"
      - "fundraising"
