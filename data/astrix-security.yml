plays:
  - title: "Coin the category, then teach the market"
    summary: "When Astrix started in 2021, there was no name for the problem they solved: security leaders didn't understand what machine-to-machine access risk was, and no analyst category existed. Rather than fight inside an existing crowded segment, Astrix worked with analysts to coin the term 'non-human identities (NHIs)' and ran a sustained market-education campaign around the risks NHIs pose. By 2023 NHI was a recurring topic at security conferences and Astrix was the recognized originator, giving them first-mover authority as buyers woke up to the category."
    metric_moved: "organic"
    result: "Coined and owned the 'non-human identity' category; named one of 10 RSA Innovation Sandbox 2023 finalists, presenting to 2,000+ attendees, and a 2023 Gartner Cool Vendor in Identity-First Security."
    tier: "Verified"
    source_type: "press"
    source_url: "https://pulse2.com/astrix-security-profile-alon-jackson-interview/"
    attribution: "CEO Alon Jackson (Pulse2 interview): 'We worked with analysts to coin the term non-human identities (NHIs), and started educating this new market about NHIs and the risks they pose to organizations.' Corroborated by Astrix's RSA Innovation Sandbox 2023 recap blog."
    tags:
      - "content-seo"
      - "conference-talk"
      - "founder-led-sales"
      - "developer-advocacy"
  - title: "Ship a free assessment as enterprise bait"
    summary: "Before Astrix even had a UI, they built a lightweight tool that scanned an enterprise's environment and returned a spreadsheet of the non-human identity exposures it found. They handed this 'quick taste' to prospects to prove value instantly, betting that even enterprise security buyers now expect a 'taste, try, and buy' experience. The free finding-list created urgency by surfacing real risks the buyer didn't know they had, and it short-circuited the long enterprise eval cycle."
    metric_moved: "growth"
    result: "Landed their first global enterprise (thousands of employees) within two weeks of formally founding the company, using only an Excel spreadsheet of findings; grew to 10-20 founder-led customers before Series A."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.sramanamitra.com/2025/08/20/building-a-venture-scale-cyber-security-startup-in-the-age-of-ai-alon-jackson-ceo-of-astrix-security-part-2/"
    attribution: "CEO Alon Jackson (Sramana Mitra interview series): the spreadsheet was 'a basic tool that we would give to different enterprises, a quick taste of what we can do for them, very, very quickly,' and 'if you can't show value instantly, it's very hard to run enterprise tools... people expect a taste, try, and buy experience.'"
    tags:
      - "free-tier"
      - "founder-led-sales"
      - "design-partners"
      - "land-and-expand"
  - title: "Re-anchor your category onto the AI wave"
    summary: "AI agents are non-human identities, so Astrix reframed its NHI category as the security layer for the 'agentic workforce' and the AI era, rather than a niche SaaS-token-hygiene tool. They launched an AI Agent Control Plane (Dec 2024) and pitched themselves as essential as enterprises deploy autonomous agents. The timing aligned them with the most-funded theme in tech and pulled in a strategically loaded investor set."
    metric_moved: "funding_round"
    result: "$45M Series B (Dec 2024) led by Menlo Ventures via the Anthology Fund (its $100M fund with Anthropic), with Workday Ventures joining; ~5x revenue growth since Series A. The AI repositioning ultimately led to Cisco's intent-to-acquire (~$400M, May 2026)."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/astrix-security-raises-45m-series-b-to-redefine-identity-security-for-the-ai-era-302327052.html"
    attribution: "Astrix Series B announcement (PR Newswire) and Calcalist coverage; Menlo Ventures Anthology Fund (with Anthropic) led the round."
