plays:
  - title: "Don't win the platform's users. Become its default."
    summary: "Semgrep (then r2c) had a strong open-source scanner but underinvested in marketing. Rather than fight for top-of-funnel awareness, it worked with GitLab to embed the engine directly into GitLab SAST. In GitLab 14, Semgrep became the default SAST analyzer for JavaScript, Python, and TypeScript, replacing Bandit and ESLint; by GitLab 15.4 those older analyzers reached end-of-support, so Semgrep was the only path. This put the engine in front of GitLab's entire security-scanning base on by default, with no per-user acquisition cost."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "If you own a best-in-class primitive, get a larger platform to ship it as their default implementation instead of fighting them for top-of-funnel; once their old defaults hit end-of-support, you inherit their entire base at zero acquisition cost."
    when_it_works: "Works when you own a best-in-class component that a bigger platform would rather embed than build, and the platform controls a defaults-driven distribution surface."
    metric_moved: "growth"
    result: "Default (and by GitLab 15.4 the sole) SAST analyzer for JS/Python/TypeScript across all GitLab 14+ installations, reaching GitLab's full base without per-user acquisition cost."
    tradeoff: "Riding GitLab's defaults wins distribution but hands GitLab the user relationship, UI, and billing, so Semgrep reaches the platform's whole base without owning, monetizing, or being known to any of those users."
    tier: "Verified"
    source_type: "press"
    source_url: "https://semgrep.dev/blog/2021/introducing-semgrep-for-gitlab/"
    attribution: "Semgrep 'Introducing Semgrep for GitLab' blog; corroborated by GitLab SAST analyzer docs (Bandit/ESLint end-of-support in 15.4)"
    tags:
      - "integrations-marketplace"
      - "default-on"
      - "open-source"
      - "bottom-up-plg"
  - title: "Let outsiders build the coverage you can't afford to"
    summary: "Semgrep's value scales with the breadth of languages and rules it supports, which is expensive to build in-house. It opened a community rules registry and let external contributors add language support and detection rules, with the Semgrep team reviewing submissions. A security researcher can ship a custom rule for a newly discovered vulnerability in days, where competitors take months to add coverage. This expanded Semgrep from 8 to 17 languages in eight months and grew the registry past 2,000 community rules."
    goal: "Acquisition"
    track: "Open-source"
    learning: "When your value is breadth you can't fund building alone, open a contribution registry and review submissions; outside experts racing to detect new threats first ship coverage in days, and that speed becomes your moat against incumbents who take months."
    when_it_works: "Works when coverage is modular, contributors have their own reason to create units (rules, integrations, plugins), and you can curate quality at scale."
    metric_moved: "community"
    result: "8 to 17 languages in 8 months via external contributors; 2,000+ community rules in the registry; open-source tool to 2M+ users (Apr 2023)."
    tradeoff: "An open registry turns crowdsourced coverage into a public good competitors can read and copy, while saddling Semgrep with the perpetual burden of reviewing and curating outside submissions for quality."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/semgrep"
    attribution: "Contrary Research business breakdown; corroborated by Semgrep Series B blog and semgrep/semgrep-rules registry"
    tags:
      - "open-source"
      - "community-led"
      - "github"
      - "templates-starters"
  - title: "Turn your steepest learning curve into your viral loop"
    summary: "Writing static-analysis rules has a steep learning curve that blocks adoption. Semgrep built a free, no-install browser Playground where anyone writes and tests a rule against sample code and sees matches instantly, re-scanning on every keystroke (Turbo Mode). Users save and share rules via a permalink, and any rule embeds as a live, runnable widget (semgrep.dev/embed/editor?snippet=ID). Every shared or embedded rule link is a working demo that pulls new developers in, so onboarding doubles as a viral loop."
    goal: "Activation"
    learning: "Put your hardest authoring step in a zero-install browser sandbox and make every output a shareable, embeddable, live-running link; the artifacts users create to learn the product become demos that recruit the next users."
    when_it_works: "Works when your product has a steep authoring or configuration step and its outputs are small, self-contained, and interesting enough that people want to share them."
    metric_moved: "ttfv"
    result: "Zero-install, shareable rule editor (free for OSS and commercial use) that compresses time-to-first-rule to minutes and turns each shared/embedded rule into a runnable demo."
    tradeoff: "Giving away a free, no-install Playground that runs the hardest capability forever surrenders the authoring experience as a paid surface and lets users and rivals extract value without ever entering the funnel."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://semgrep.dev/docs/playground/"
    attribution: "Semgrep Playground official docs; sharing/embed mechanism per Semgrep docs (semgrep.dev/embed/editor?snippet=)"
    tags:
      - "docs-as-marketing"
      - "free-tier"
      - "developer-advocacy"
      - "viral-loop"
