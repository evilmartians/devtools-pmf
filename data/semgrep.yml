plays:
  - title: "Become the default SAST analyzer inside GitLab"
    summary: "Semgrep (then r2c) had a strong open-source scanner but historically underinvested in marketing. Instead of fighting for top-of-funnel awareness, it worked with the GitLab team to embed Semgrep directly into GitLab SAST. As of the GitLab 14 release, Semgrep became the default SAST analyzer for JavaScript, Python, and TypeScript, replacing Bandit and ESLint. This put the engine in front of GitLab's entire security-scanning user base by default rather than requiring developers to discover and adopt it."
    metric_moved: "growth"
    result: "Default SAST analyzer for JS/Python/TypeScript across all GitLab 14+ installations, a distribution channel reaching GitLab's full base without per-user acquisition cost."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://semgrep.dev/blog/2021/r2c-series-b-funding/"
    attribution: "Semgrep (r2c) Series B announcement blog post"
    tags:
      - "integrations-marketplace"
      - "default-on"
      - "open-source"
      - "bottom-up-plg"
  - title: "Crowdsource your rules registry to scale coverage"
    summary: "Semgrep's value depends on the breadth of languages and rules it supports, which is expensive to build in-house. It opened a community rules registry and let external contributors add language support and detection rules. This crowdsourced engine work expanded Semgrep from 8 to 17 supported languages in eight months and grew the registry into thousands of community rules that power the bulk of scans, turning users into co-builders of the product moat."
    metric_moved: "community"
    result: "8 to 17 languages in 8 months via external collaborators; community registry grew to 2,000+ rules and the open-source tool to 2M+ users (Apr 2023)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://research.contrary.com/company/semgrep"
    attribution: "Contrary Research business breakdown; corroborated by Semgrep Series B blog"
    tags:
      - "open-source"
      - "community-led"
      - "github"
      - "templates-starters"
  - title: "Ship a free in-browser playground to teach the product"
    summary: "Writing static-analysis rules has a steep learning curve that blocks adoption. Semgrep built a free, no-install Playground editor where anyone can write and test a rule against sample code in the browser and instantly see matches. It runs scans live on every keystroke (Turbo Mode) and lets users save and share rules via a URL. The tool doubles as onboarding and as a viral artifact: every shared rule link is a working demo of Semgrep that pulls new developers in."
    metric_moved: "ttfv"
    result: "Zero-install, shareable rule editor (free for commercial and OSS users) that compresses time-to-first-rule to minutes and creates shareable demo links."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://semgrep.dev/docs/playground/"
    attribution: "Semgrep Playground official docs"
    tags:
      - "docs-as-marketing"
      - "free-tier"
      - "developer-advocacy"
      - "viral-loop"
