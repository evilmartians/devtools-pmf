plays:
  - title: "Open the community Slack before you incorporate"
    summary: "dbt was an open-source side project of a 2-person analytics consultancy. In June 2016, three months after the first commit and a month before incorporation, the founders opened a Slack to talk to a handful of GitHub early adopters and consulting clients. They never tied signups to revenue (CMO Janessa Lantz: 'We do not understand how Slack signups impact revenue'), tracking awareness, contribution, and advocacy instead. That Slack grew ~10% month-over-month for 5.5 years to 100,000+ members and became roughly 80% of inbound leads."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Stand up a public chat for your first users before you have a product team or a revenue model, and never wire it to attribution. The friction-free gathering place compounds into your cheapest acquisition channel."
    when_it_works: "Works when your product serves a coherent practitioner role whose members benefit from talking to each other as much as to you."
    metric_moved: "inbound leads (~80% community-sourced)"
    result: "Slack grew from ~12 members to 100,000+ at consistent ~10% MoM over 5.5 years; ~80% of inbound leads sourced from community."
    tradeoff: "By refusing to instrument the Slack for attribution, dbt could never prove the channel's revenue contribution or defend its budget with hard numbers, funding a 100,000-member community on faith that it mattered."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs (timeline, ~10% MoM over 5.5 years, ~80% inbound, Janessa Lantz quote); corroborated by First Round Review profile of Tristan Handy"
    tags:
      - "open-source"
      - "slack-community"
      - "community-led"
      - "bottom-up-plg"
  - title: "Make your tool a hiring credential and adopters recruit for you"
    summary: "dbt's strongest growth lever was self-interested advocacy. Data leads who used dbt hosted local meetups pushing other companies to adopt it, so they could hire engineers who already knew the tool. dbt Labs seeded this city by city: one or two anchor companies (Casper in NY pulling in Kickstarter, Venmo, SeatGeek; Monzo in London pulling in other fintechs) spawned a meetup and word-of-mouth. dbt stayed off the stage, letting users present their own work. It grew to 50+ user groups across 29 countries and 20,000+ members with almost no paid marketing."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Turn your product into a skill employers hire for, so every adopting team has a selfish reason to evangelize: a company that wants a labor pool already fluent in your tool pulls its peers in for you. Seed one or two anchor companies per city, then stay off the stage and let users run the meetups."
    when_it_works: "Works when practitioners move between employers often enough that prior tool experience becomes a hiring filter."
    metric_moved: "organic adoption (companies using dbt, 3x YoY)"
    result: "Scaled to ~1,000 companies by 2019 at 3x YoY on near-zero paid marketing; 50+ user groups, 29 countries, 20,000+ members."
    tradeoff: "Letting users run the meetups and present their own work means surrendering control of your messaging on stage, and the hiring-credential flywheel only ignites where adoption is already dense enough to create a local labor market, so it does nothing in cold cities or early markets."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/dbt-labs-path-to-product-market-fit/"
    attribution: "First Round Review, 'dbt Labs' path to product-market fit,' quoting CEO Tristan Handy; geographic seeding detail from Community Inc. deep-dive"
    tags:
      - "word-of-mouth"
      - "community-led"
      - "user-groups"
      - "developer-advocacy"
  - title: "Adopt the job title your community already coined"
    summary: "The 'analytics engineer' role was named by a practitioner, Michael Kaminsky, then at Harry's, not by dbt. dbt Labs amplified the term the community already used: it renamed its newsletter to The Analytics Engineering Roundup, launched The Analytics Engineering Podcast, and centered its Coalesce conference on the role. The title spread into job postings and LinkedIn profiles, and because dbt was the canonical tool, adopting the identity meant adopting dbt. They later certified the skill, producing ~950 Certified Analytics Engineers."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Watch for a role or workflow your users have already named, then pour every owned channel (newsletter, podcast, conference, certification) into that exact term. A title the market invented spreads on its own, and if you are the canonical tool, adopting the identity means adopting you."
    when_it_works: "Works when practitioners want to claim the emerging title as a professional identity they put on their resume."
    metric_moved: "category adoption / organic growth"
    result: "'Analytics engineer' became a standard job title at thousands of companies with dbt as its canonical tool; ~950 certified."
    tradeoff: "Amplifying a term the community invented rather than coining your own means you never own the definition, so you cannot control how the 'analytics engineer' role is scoped and your category's fortunes ride on a label you have no authority to direct."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs ('The community created it'); Michael Kaminsky / Harry's attribution and ~950 certified from same source"
    tags:
      - "category-creation"
      - "newsletter"
      - "podcast"
      - "community-led"
      - "conference"
  - title: "Invite your competitors to moderate your community"
    summary: "As dbt's Slack scaled, the team made it vendor-agnostic: competing and adjacent vendors (Mode Analytics, Snowflake, Databricks) ran and moderated their own channels inside dbt's Slack. That turned a product community into the neutral town square of the modern data stack, so practitioners stayed regardless of which tools they used, with dbt at the center of every conversation. The result was a 100,000+ member hub no single-vendor community could match."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Give adjacent and competing vendors their own moderated channels inside your community so it becomes the neutral town square of the whole stack. Practitioners stay regardless of what they run, and you hold home-field advantage at the center of every conversation."
    when_it_works: "Works when your product sits inside a multi-tool stack where practitioners want one neutral place to discuss everything."
    metric_moved: "community size / inbound leads"
    result: "dbt's Slack became the neutral hub of the modern data stack, reaching 100,000+ members and ~80% of inbound leads."
    tradeoff: "Handing channels to Mode, Snowflake, and Databricks inside your own Slack gives direct competitors a standing platform to reach your most engaged practitioners and pitch against you in the room you pay to host."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs (competing vendors Mode, Snowflake, Databricks moderated channels within dbt's Slack)"
    tags:
      - "slack-community"
      - "ecosystem"
      - "community-led"
      - "category-creation"
