plays:
  - title: "Open the community Slack before you incorporate"
    summary: "dbt was an open-source side project of a 2-person analytics consultancy. In June 2016, three months after the first commit and a month before the company even incorporated, the founders opened a Slack instance, originally just to talk to a handful of GitHub early adopters and consulting clients. They never tied Slack signups to revenue (CMO Janessa Lantz: 'We do not understand how Slack signups impact revenue'), and instead tracked awareness, contribution, and advocacy. That Slack grew ~10% month-over-month for 5.5 straight years to 100,000+ members and became the source of roughly 80% of inbound leads."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Stand up a public chat space for your earliest users before you have a product team or a revenue model, and resist instrumenting it for attribution: a low-friction place to gather practitioners compounds into your cheapest acquisition channel only if you let it grow without choking it for ROI proof."
    when_it_works: "Works when your product serves a coherent practitioner role whose members benefit from talking to each other, not just to you."
    metric_moved: "inbound leads (~80% community-sourced)"
    result: "Slack grew from ~12 members to 100,000+ at consistent ~10% MoM over 5.5 years; ~80% of inbound leads sourced from community."
    tradeoff: "By refusing to instrument the Slack for attribution, dbt accepted that it could never prove the channel's revenue contribution or defend its budget with hard numbers, funding a 100,000-member community on faith that it mattered."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs (timeline, ~10% MoM over 5.5 years, ~80% inbound, Janessa Lantz quote); corroborated by First Round Review profile of Tristan Handy"
    tags:
      - "open-source"
      - "slack-community"
      - "community-led"
      - "bottom-up-plg"
  - title: "Let your customers' hiring needs sell for you"
    summary: "dbt's strongest growth lever was self-interested advocacy. Data leads who already used dbt hosted local meetups to push other companies to adopt it, specifically so they could hire engineers who already knew the tool. dbt Labs seeded this city by city: one or two companies adopting in a new city (Casper in NY pulling in Kickstarter, Venmo, SeatGeek; Monzo in London pulling in other fintechs) spawned a local meetup and a wave of word-of-mouth. dbt deliberately stayed off the stage at these events, letting users present their own work. This grew to 50+ user groups across 29 countries and 20,000+ members with almost no paid marketing."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Make your product a hiring credential so that every adopting team has a selfish reason to evangelize it: when an employer wants a labor pool that already knows your tool, they will recruit their peers for you. Then get out of the way and let users, not your staff, run the meetups."
    when_it_works: "Works when your tool defines a skill employers hire for, so adopters benefit from a larger trained talent pool."
    metric_moved: "organic adoption (companies using dbt, 3x YoY)"
    result: "Scaled to ~1,000 companies by 2019 at 3x YoY on near-zero paid marketing; 50+ user groups, 29 countries, 20,000+ members."
    tradeoff: "Letting users run the meetups and present their own work means surrendering control of your messaging on stage, and the hiring-credential flywheel only ignites where adoption is already dense enough to create a local labor market, so it does nothing in cold cities or early markets."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/dbt-labs-path-to-product-market-fit/"
    attribution: "First Round Review, 'dbt Labs' path to product-market fit,' quoting CEO Tristan Handy; geographic seeding detail from Community Inc. deep-dive"
    tags:
      - "word-of-mouth"
      - "community-led"
      - "user-groups"
      - "developer-advocacy"
  - title: "Adopt the job title your community already coined"
    summary: "The 'analytics engineer' role was named by a practitioner (Michael Kaminsky, then at Harry's), not by dbt. Rather than invent a category, dbt Labs amplified the term the community was already using: it renamed its newsletter to The Analytics Engineering Roundup, launched The Analytics Engineering Podcast, and centered its Coalesce conference on the role. The title spread into job postings and LinkedIn profiles, and because dbt was the canonical tool for the role, adopting the identity meant adopting dbt. They later certified the skill, producing ~950 Certified Analytics Engineers."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Watch your community for an emerging job title or workflow they have already named, then pour your owned media (newsletter, podcast, conference, certification) into that exact term instead of coining your own: a category the market invented spreads on its own and binds the role's identity to your product."
    when_it_works: "Works when practitioners are already organically naming a new role or practice your product enables, so you amplify rather than manufacture it."
    metric_moved: "category adoption / organic growth"
    result: "'Analytics engineer' became a standard job title at thousands of companies with dbt as its canonical tool; ~950 certified."
    tradeoff: "Amplifying a term the community invented rather than coining your own means you never own the definition, so you cannot control how the 'analytics engineer' role is scoped and your category's fortunes ride on a label you have no authority to direct."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs ('The community created it'); Michael Kaminsky / Harry's attribution and ~950 certified from same source"
    tags:
      - "category-creation"
      - "newsletter"
      - "podcast"
      - "community-led"
      - "conference"
  - title: "Invite your competitors to moderate your community"
    summary: "As dbt's Slack scaled, the team made it vendor-agnostic rather than a dbt-only walled garden: competing and adjacent vendors (Mode Analytics, Snowflake, Databricks) ran and moderated their own channels inside dbt's Slack. This turned a single product community into the neutral town square of the modern data stack, so practitioners had a reason to live there regardless of which tools they used, and dbt sat at the center of every conversation. The result was a 100,000+ member hub that no single-vendor community could match."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Open channels inside your own community for adjacent and even competing vendors: hosting the whole ecosystem (not just your fans) makes your space the default gathering place, and you keep home-field advantage at the center of every conversation."
    when_it_works: "Works when your product sits inside a multi-tool stack where practitioners want one neutral place to discuss everything."
    metric_moved: "community size / inbound leads"
    result: "dbt's Slack became the neutral hub of the modern data stack, reaching 100,000+ members and ~80% of inbound leads."
    tradeoff: "Handing channels to Mode, Snowflake, and Databricks inside your own Slack gives direct competitors a standing platform to reach your most engaged practitioners and pitch against you in the room you pay to host."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs (competing vendors Mode, Snowflake, Databricks moderated channels within dbt's Slack)"
    tags:
      - "slack-community"
      - "ecosystem"
      - "community-led"
      - "category-creation"
