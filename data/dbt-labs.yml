plays:
  - title: "Spin up a community Slack before the company"
    summary: "dbt was an open-source side project of a tiny analytics consultancy. Three months after the first commit, and a month before they even incorporated, the founders spun up a Slack instance for the handful of external early adopters who found dbt on GitHub. That Slack became the gravity well: it doubled in size every year, grew at roughly 10% month-over-month for 5.5 years, and reached 100,000 members while generating about 80% of inbound leads."
    metric_moved: "community"
    result: "Community grew from ~100 members to 100,000+, doubling yearly, and drove ~80% of inbound leads."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs; corroborated by First Round Review profile of Tristan Handy"
    tags:
      - "open-source"
      - "slack-community"
      - "community-led"
      - "bottom-up-plg"
  - title: "Let your users host meetups to recruit more users"
    summary: "dbt's strongest growth lever was self-interested advocacy: data leads who already used dbt hosted local meetups to convince other companies to adopt it, specifically so they could hire engineers who already knew the tool. dbt Labs amplified this into a city-by-city pattern (NY, London, SF, Berlin and more), where a couple of companies adopting in a new city spawned a local meetup and a wave of word-of-mouth adoption. This required almost no paid marketing."
    metric_moved: "organic"
    result: "Word-of-mouth scaled dbt to ~1,000 users by 2019 at 3x YoY; 50+ user groups across 29 countries, 20,000+ members."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/dbt-labs-path-to-product-market-fit/"
    attribution: "First Round Review, 'dbt Labs' path to product-market fit,' quoting CEO Tristan Handy; corroborated by Community Inc."
    tags:
      - "word-of-mouth"
      - "community-led"
      - "conference-talk"
      - "developer-advocacy"
  - title: "Adopt the category your community already coined"
    summary: "The 'analytics engineer' role emerged from community conversation (first published by a practitioner, not by dbt). Rather than invent a category, dbt Labs recognized and amplified the term the community was already using: renaming its newsletter to The Analytics Engineering Roundup, launching The Analytics Engineering Podcast, and centering its Coalesce conference on the role. The term became self-reinforcing, appearing in job titles and LinkedIn profiles and binding adoption of the role to adoption of dbt."
    metric_moved: "growth"
    result: "'Analytics engineer' became a standard job title at thousands of companies, with dbt as its canonical tool."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/community-growth-dbt-labs"
    attribution: "Community Inc. deep-dive on dbt Labs ('The community created it')"
    tags:
