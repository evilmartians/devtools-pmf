plays:
  - title: "Run the demo inside the prospect's own live cloud environment"
    summary: "Cybersecurity sales normally drag 12-18 months because agents must be installed across production before anyone sees value. Wiz connected agentlessly to a prospect's cloud control plane via read-only API during the call itself, surfacing real, prioritized risks in that customer's own environment within 10-15 minutes. The 'you've got to see this' reaction turned the security champion into an internal seller who showed leadership a concrete win, collapsing the cycle. Wiz productized this as a standing '15-minute live demo' series."
    goal: "Activation"
    learning: "Connect read-only to the prospect's cloud control plane via API during the call and surface a real, prioritized risk in their own environment inside 15 minutes; the no-install, no-production-touch wedge makes trying you free, and a live finding nobody knew about turns the champion into your internal seller before procurement starts."
    when_it_works: "Works when your architecture can pull real, meaningful data from the buyer's environment through a read-only API alone, with no agent install required."
    metric_moved: "ttfv"
    result: "Up and running in 10-15 minutes with first findings in ~30 minutes; helped reach ~45% of the Fortune 100 and the fastest $1M-to-$100M ARR in cybersecurity history (18 months)."
    tradeoff: "Agentless connection only sees what the cloud control plane exposes through the API, so you trade deep runtime and in-memory threat detection for the no-install speed and must bolt on agents later to close the visibility gap."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://softwareanalyst.substack.com/p/the-wiz-playbook-how-they-dominated"
    attribution: "Software Analyst Substack 'The Wiz Playbook'; corroborated by Wiz '15-minute live demo' series (wiz.io/events) and Wiz Academy evaluation FAQ"
    tags:
      - "founder-led-sales"
      - "time-to-value"
      - "agentless"
      - "champion-led"
  - title: "Founders close the first few million in ARR before any sales hire"
    summary: "Wiz skipped freemium and self-serve entirely. From day one the founders personally ran top-down sales to Fortune 500 CISOs, learning the exact ICP, positioning, and objections firsthand. They closed roughly the first couple million in ARR themselves and only then brought in a CRO and a repeatable motion, backed by reference logos like Morgan Stanley, DocuSign, Slack, and BMW."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Keep founders personally selling to the economic buyer until they have closed the first couple million, so they absorb the real objections, ICP, and winning pitch firsthand; only then hand a CRO a playbook that's been validated in the room."
    when_it_works: "Works for high-ACV, top-down enterprise products where one founder can credibly hold a conversation with the economic buyer; it fails for low-ACV self-serve, where raw volume is the bottleneck."
    metric_moved: "arr"
    result: "Founders closed ~the first couple million in ARR before hiring their first salesperson; Wiz then ran $1M to $100M ARR in 18 months, the fastest in cybersecurity history."
    tradeoff: "Routing every early deal through the founders makes them the hard ceiling on growth and the motion non-transferable, so you eventually face a risky, expensive CRO handoff to convert a founder's instinct into a playbook a sales org can run."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cybersecuritypulse.net/p/wizs-32b-sales-engine-from-founder"
    attribution: "Cybersecurity Pulse 'Wiz's $32B Sales Engine: From Founder-Led to Channel-Led Growth'; founder-closed first couple million corroborated by Cybersecurity Pulse '$32B GTM Playbook'"
    tags:
      - "founder-led-sales"
      - "design-partners"
      - "enterprise"
  - title: "Make the hyperscaler marketplace your reps' default close path"
    summary: "Even as a purely sales-led vendor, Wiz made AWS, Azure, and GCP marketplaces a default close path. Transacting through a marketplace lets the buyer pay with pre-committed cloud spend instead of fighting for net-new budget, and inherits the hyperscaler's procurement, security review, and co-sell incentives. Wiz operationalized this across the entire sales org, with co-selling baked into how reps work deals."
    goal: "Revenue"
    learning: "List on AWS/Azure/GCP and route deals through the marketplace by default: buyers pay down pre-committed cloud spend, and you inherit the hyperscaler's procurement, security review, and co-sell motion for free."
    when_it_works: "Works when your buyers carry large pre-committed cloud spend and your product is a natural co-sell for a hyperscaler."
    metric_moved: "sales-cycle"
    result: "Reported that 99% of Wiz sellers closed at least one deal through a cloud marketplace; independent benchmarks show marketplace deals close ~40% faster with ~27% more deals won."
    tradeoff: "Closing through AWS/Azure/GCP marketplaces surrenders a platform cut of revenue and ties your deal flow to buyers' cloud-commit cycles while deepening dependence on hyperscalers who are also potential competitors and acquirers."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cybersecuritypulse.net/p/wizs-32b-sales-engine-from-founder"
    attribution: "Cybersecurity Pulse 'Wiz's $32B Sales Engine' (99% figure); marketplace cycle/win-rate benchmarks corroborated by Forrester TEI / AWS Marketplace data"
    tags:
      - "integrations-marketplace"
      - "co-sell"
