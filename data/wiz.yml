plays:
  - title: "Turn agentless deploy into a 15-minute live demo"
    summary: "Cybersecurity sales normally drag 12-18 months because agents must be installed across production before anyone sees value. Wiz connected agentlessly to a prospect's cloud control plane via read-only API during the call itself, surfacing real, prioritized risks in that customer's own environment within 10-15 minutes. The 'you've got to see this' reaction turned the security champion into an internal seller who showed leadership a concrete win, collapsing the cycle. Wiz productized this as a standing '15-minute live demo' series."
    goal: "Activation"
    learning: "Make your demo run inside the prospect's own data, not a sandbox: connect read-only and show them a real problem they didn't know they had within the first 15 minutes, so the buyer becomes your champion before any procurement step. The wedge is no install and no risk, so trying you costs them nothing."
    when_it_works: "Works when you can reach real customer data through an API without touching production, and the findings are alarming enough that a champion will carry them upstairs."
    metric_moved: "ttfv"
    result: "Up and running in 10-15 minutes with first findings in ~30 minutes; helped reach ~45% of the Fortune 100 and the fastest $1M-to-$100M ARR in cybersecurity history (18 months)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://softwareanalyst.substack.com/p/the-wiz-playbook-how-they-dominated"
    attribution: "Software Analyst Substack 'The Wiz Playbook'; corroborated by Wiz '15-minute live demo' series (wiz.io/events) and Wiz Academy evaluation FAQ"
    tags:
      - "founder-led-sales"
      - "time-to-value"
      - "agentless"
      - "champion-led"
  - title: "Have founders sell to CISOs until first millions, then hire a CRO"
    summary: "Wiz skipped freemium and self-serve entirely. From day one the founders personally ran top-down sales to Fortune 500 CISOs, learning the exact ICP, positioning, and objections firsthand rather than delegating discovery. They closed roughly the first couple million in ARR themselves and only then brought in a CRO and a repeatable motion, backed by reference logos like Morgan Stanley, DocuSign, Slack, and BMW."
    goal: "Acquisition"
    learning: "Do not hire salespeople until the founders have personally closed the first few million in ARR: the founder needs to feel the exact objections, ICP, and winning pitch firsthand so the playbook you hand a CRO is real, not theoretical. Premature sales hires sell a story nobody has validated."
    when_it_works: "Works for high-ACV, top-down enterprise products where one founder can credibly hold a conversation with the economic buyer; fails for low-ACV self-serve where the bottleneck is volume, not credibility."
    metric_moved: "arr"
    result: "Founders closed ~the first couple million in ARR before hiring their first salesperson; Wiz then ran $1M to $100M ARR in 18 months, the fastest in cybersecurity history."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cybersecuritypulse.net/p/wizs-32b-sales-engine-from-founder"
    attribution: "Cybersecurity Pulse 'Wiz's $32B Sales Engine: From Founder-Led to Channel-Led Growth'; founder-closed first couple million corroborated by Cybersecurity Pulse '$32B GTM Playbook'"
    tags:
      - "founder-led-sales"
      - "design-partners"
      - "enterprise"
  - title: "Route enterprise deals through cloud marketplaces to skip procurement"
    summary: "Even as a purely sales-led vendor, Wiz made AWS, Azure, and GCP marketplaces a default close path rather than a side door. Transacting through a marketplace lets the buyer pay with pre-committed cloud spend instead of fighting for net-new budget, and inherits the hyperscaler's procurement, security review, and co-sell incentives. Wiz operationalized this across the entire sales org, with co-selling baked into how reps work deals."
    goal: "Revenue"
    learning: "List on AWS/Azure/GCP marketplaces and make it your reps' default close path: it lets buyers spend committed cloud budget instead of opening a new vendor-approval fight, and hands you the hyperscaler's procurement and co-sell motion for free. Treat it as the main door, not a checkbox."
    when_it_works: "Works when your buyers carry large pre-committed cloud spend and your product is a natural co-sell for a hyperscaler; little benefit if customers have no cloud commit to burn down."
    metric_moved: "sales-cycle"
    result: "Reported that 99% of Wiz sellers closed at least one deal through a cloud marketplace; independent benchmarks show marketplace deals close ~40% faster with ~27% more deals won."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cybersecuritypulse.net/p/wizs-32b-sales-engine-from-founder"
    attribution: "Cybersecurity Pulse 'Wiz's $32B Sales Engine' (99% figure); marketplace cycle/win-rate benchmarks corroborated by Forrester TEI / AWS Marketplace data"
