plays:
  - title: "Use agentless deploy as a proof-of-value weapon"
    summary: "Cybersecurity sales cycles normally run 12-18 months because deploying agents across production is slow and risky. Wiz connected agentlessly to a customer's cloud control plane via API, surfacing real, prioritized risks within 10-15 minutes of a demo. The instant 'you've got to see this' reaction let security champions show leadership quick wins and fast-tracked purchases, compressing enterprise sales cycles dramatically."
    metric_moved: "ttfv"
    result: "Up and running in 10-15 minutes with first findings in ~30 minutes; helped win nearly half of the Fortune 100 and scale to $350M+ ARR in under 4 years."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://softwareanalyst.substack.com/p/the-wiz-playbook-how-they-dominated"
    attribution: "Software Analyst Substack, 'The Wiz Playbook'; corroborated by Wiz Academy evaluation FAQ (wiz.io) and TechOperators 'What Wiz Got Right'"
    tags:
      - "founder-led-sales"
      - "land-and-expand"
      - "word-of-mouth"
      - "default-on"
  - title: "Have founders sell to CISOs until PMF, then scale"
    summary: "Wiz skipped freemium and self-service entirely. From day one the founders personally sold top-down to Fortune 500 CISOs, learning the exact positioning and ICP themselves. Only after the founders had closed the first few million in ARR did they bring in a CRO and hit the gas on a repeatable sales motion, with early reference logos like Morgan Stanley, DocuSign, Slack and BMW."
    metric_moved: "arr"
    result: "Founders sold the first few million in ARR before scaling; Wiz then went $1M to $100M ARR in 18 months, the fastest in cybersecurity history."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cybersecuritypulse.net/p/wizs-32b-sales-engine-from-founder"
    attribution: "Cybersecurity Pulse, 'Wiz's $32B Sales Engine: From Founder-Led to Channel-Led Growth'"
    tags:
      - "founder-led-sales"
      - "design-partners"
      - "land-and-expand"
  - title: "Close enterprise deals through cloud marketplaces"
    summary: "Even as a purely sales-led enterprise vendor, Wiz made cloud marketplaces (AWS, Azure, GCP) a core channel. Transacting through marketplaces let buyers spend pre-committed cloud budgets and inherit the hyperscalers' procurement and trust, cutting the friction of a net-new security purchase. Wiz operationalized this across the whole sales org rather than treating it as a side door."
    metric_moved: "growth"
