plays:
  - title: "Open-source the core database for free marketing"
    summary: "After scrapping their platform-as-a-service vision in 2009, MongoDB released the database itself as free open-source software (initially AGPL). Co-founder Dwight Merriman framed it explicitly as a distribution strategy: 'By being open source, we're going to get a lot of cheap or free marketing.' The free Community Edition became the grassroots wedge that seeded developer adoption inside companies, eventually surpassing 265M+ downloads by 2023 and feeding the paid Atlas funnel."
    metric_moved: "organic"
    result: "Free open-source distribution drove 265M+ downloads by 2023 and built the bottom-up base; ~88% of MongoDB's customers are now self-serve (53,100+ Atlas vs 7,500+ direct-sales as of Jan 2025)."
    tier: "Reported"
    source_type: "estimate"
    source_url: "https://sequoiacap.com/podcast/crucible-moments-mongodb/"
    attribution: "Dwight Merriman (co-founder) on Sequoia's Crucible Moments podcast: 'The product was open source, so we were really trying to execute an open source go-to-market plan... we're going to get a lot of cheap or free marketing.'"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "free-tier"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Demo your product at language-specific meetups"
    summary: "With only ~12 employees pre-Series A, MongoDB skipped traditional sales and instead went city-by-city to local programming meetups, doing live demos tailored to each community's language. As Merriman described it, they would 'go to the Python meetup group and do a demo, MongoDB from Python,' then replicate that for other languages and cities, later scaling into regional Mongo SF / Mongo NYC conferences. This grassroots developer evangelism produced strong month-over-month download growth that convinced Sequoia to invest in 2010."
    metric_moved: "community"
    result: "Drove remarkable month-over-month download growth with just 12 employees; the developer traction led to Sequoia's 2010 investment and seeded MongoDB's developer community."
    tier: "Reported"
    source_type: "estimate"
    source_url: "https://sequoiacap.com/podcast/crucible-moments-mongodb/"
    attribution: "Dwight Merriman (co-founder) on Sequoia's Crucible Moments podcast, describing language-specific meetup demos ('go to the Python meetup group and do a demo, MongoDB from Python') across cities."
    tags:
      - "conference-talk"
      - "developer-advocacy"
      - "community-led"
      - "bottom-up-plg"
      - "word-of-mouth"
  - title: "Seed a no-credit-card free tier that walks into the cloud"
    summary: "When CEO Dev Ittycheria saw developers self-deploying MongoDB in the cloud, the company launched Atlas (June 2016) as a fully managed service with a free M0 cluster that requires no payment or credit card and stands up in ~3 minutes. The free tier removed all DevOps friction for prototypes, then expanded naturally as workloads moved to production. Atlas grew from a side bet into 73% of total revenue by FY2026 and a $1B+ run-rate business."
    metric_moved: "arr"
    result: "Atlas grew to ~73% of MongoDB's total revenue by FY2026 (a $1B+ run-rate business); free-tier-led self-serve now accounts for ~88% of customers, and 25% of $1M+ customers originated self-serve."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.mongodb.com/docs/atlas/tutorial/deploy-free-tier-cluster/"
    attribution: "MongoDB Atlas docs (free M0 cluster, ~3 min, no credit card) and FY2025/FY2026 filings (Atlas 73% of revenue; 53,100+ Atlas vs 7,500+ direct-sales customers); Atlas origin per Sequoia Crucible Moments podcast."
    tags:
      - "free-tier"
      - "freemium"
      - "bottom-up-plg"
      - "usage-based-pricing"
      - "land-and-expand"
