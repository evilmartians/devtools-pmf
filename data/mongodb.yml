plays:
  - title: "Open-source the core as a free marketing channel"
    summary: "After scrapping their platform-as-a-service vision in 2009, 10gen released the database itself as free open-source software (initially AGPL). Co-founder Dwight Merriman framed it explicitly as distribution, not ideology: 'By being open source, we're going to get a lot of cheap or free marketing.' Free Community Edition became the grassroots wedge that seeded developer adoption inside companies and fed the paid Atlas funnel, surpassing 265M+ downloads by 2023."
    goal: "Acquisition"
    track: "Open-source"
    learning: "If your product is infrastructure a developer installs, treat the free open-source edition as a paid marketing line item: the goal is not contributors but unpriced top-of-funnel distribution that lands inside companies before any salesperson does. Budget your monetization for the managed/hosted layer on top, not the core."
    when_it_works: "Works when the core is something developers self-install and run, and you can monetize an operational layer (hosting, scale, support) on top rather than the bits themselves."
    metric_moved: "organic"
    result: "265M+ downloads by 2023; ~88% of MongoDB's customers are now self-serve (53,100+ Atlas vs 7,500+ direct-sales as of Jan 2025)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sequoiacap.com/podcast/crucible-moments-mongodb/"
    attribution: "Dwight Merriman (co-founder), Sequoia 'Crucible Moments' podcast: 'The product was open source, so we were really trying to execute an open source go-to-market plan... we're going to get a lot of cheap or free marketing.'"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "free-tier"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Demo your product inside each language community's meetup"
    summary: "Pre-Series A with ~12 employees and no sales team, MongoDB skipped conferences and went city-by-city to local programming meetups, doing a live demo tailored to each community's language: 'go to the Python meetup group and do a demo, MongoDB from Python,' then replicate for Ruby, PHP, Java, and other cities. They showed the database from inside the audience's own stack instead of giving a generic database talk. The month-over-month download growth this produced is what convinced Sequoia to invest in 2010."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Find the rooms where your buyers already gather (language meetups, framework Discords, niche subreddits) and demo your product from inside their stack, e.g. '<product> from <their language>,' rather than pitching the product abstractly. The same demo re-skinned per community lets a tiny team manufacture word-of-mouth city by city before you can afford sales."
    when_it_works: "Works when adoption is bottom-up and your users cluster into identifiable communities by language, framework, or city that you can physically or virtually walk into and demo to."
    metric_moved: "community"
    result: "Drove strong month-over-month download growth with only ~12 employees; the developer traction led directly to Sequoia's 2010 investment and seeded the MongoDB community (later scaling into Mongo SF / Mongo NYC)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sequoiacap.com/podcast/crucible-moments-mongodb/"
    attribution: "Dwight Merriman (co-founder), Sequoia 'Crucible Moments' podcast, describing language-specific meetup demos ('go to the Python meetup group and do a demo, MongoDB from Python') across cities."
    tags:
      - "conference-talk"
      - "developer-advocacy"
      - "community-led"
      - "bottom-up-plg"
      - "word-of-mouth"
  - title: "Make the free tier need no credit card and stand up in 3 minutes"
    summary: "When CEO Dev Ittycheria saw developers already self-deploying MongoDB in the cloud, the company launched Atlas (June 2016) with a free M0 cluster that requires no payment, no credit card, and stands up in ~3 minutes. Removing all DevOps and procurement friction for prototypes meant workloads started on the free tier and expanded into production naturally, with the same self-serve accounts later growing into seven-figure enterprise spend."
    goal: "Activation"
    learning: "Strip the credit card, the sales call, and the setup wizard out of your free tier so a developer reaches a running instance in minutes; the friction you remove at the prototype stage is what lets that same account expand into a large paid workload later, often faster than sales-sourced accounts. Measure time-to-first-running-instance, not just signup count."
    when_it_works: "Works when usage grows with the workload (usage-based pricing) so a free prototype that succeeds organically becomes large paid consumption without a renegotiation."
    metric_moved: "arr"
    result: "Atlas grew to ~73% of total revenue by FY2026 ($1B+ run-rate); ~88% of customers are self-serve, and 25% of $1M+ customers originated self-serve, reaching $1M ARR ~15% faster than direct-sales-sourced accounts."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.mongodb.com/docs/atlas/tutorial/deploy-free-tier-cluster/"
    attribution: "MongoDB Atlas docs (free M0 cluster, ~3 min, no credit card); FY2025/FY2026 filings (Atlas ~73% of revenue; 53,100+ Atlas vs 7,500+ direct-sales customers); SaaStr ('5 Interesting Learnings from MongoDB at $2.4B ARR': 25% of $1M+ customers self-serve-originated, reaching $1M 15% faster)."
    tags:
      - "free-tier"
      - "freemium"
      - "bottom-up-plg"
      - "usage-based-pricing"
      - "land-and-expand"
  - title: "Make customers rewrite the app, not just move the data"
    summary: "When enterprises migrate off legacy relational databases, the easy sell is a like-for-like 'lift and shift' that swaps the database but leaves the application untouched, leaving you trivially replaceable. MongoDB CEO Dev Ittycheria instead pushes 'lift and transform': customers remodel their data into MongoDB's document model and rewrite the application's data-access layer against it, and MongoDB ships a free Relational Migrator to lower the cost of that rewrite. Once the application code itself is coupled to the document model, ripping MongoDB out means re-architecting the app, not just exporting tables, so customers standardize on it for mission-critical workloads and rarely leave."
    goal: "Retention"
    learning: "When you displace an incumbent, refuse the like-for-like swap and design the migration so the customer's application logic, not just their data, becomes coupled to your model; then build and give away the migration tooling that makes that deeper rewrite cheap enough to commit to. The switching cost you want to create is 're-architect the app,' not 'export the data.'"
    when_it_works: "Works when your product sits under an application and a genuinely different data/programming model gives real developer productivity gains, so the rewrite is justified on merit. It backfires if you are a drop-in replacement with no model difference, since then the rewrite is pure friction customers will refuse."
    metric_moved: "retention"
    result: "Net ARR expansion rate consistently above 120% (121% in Q4 FY2026, 128% at IPO); enterprises decommission legacy systems and standardize on MongoDB as a mission-critical platform, with one customer citing ~$50M in savings after consolidating onto it."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://diginomica.com/dont-think-lift-and-shift-when-it-comes-cloud-migration-it-needs-be-lift-and-transform-says-mongodb"
    attribution: "Dev Ittycheria (CEO), diginomica: 'I would more frame it as lift and transform' (vs lift-and-shift). Corroborated by diginomica 'mission-critical ready' interview ('customers truly view us as a strategic platform, and that's why you're seeing more and more customers standardize on MongoDB') and MongoDB's Relational Migrator product, which maps relational schemas to the document model and rewrites SQL data-access code. NRR figures from MongoDB FY2026 10-K / Q4 FY2026 results."
    tags:
      - "switching-costs"
      - "lock-in"
      - "migration"
      - "data-gravity"
      - "enterprise-sales"
      - "net-revenue-retention"
      - "system-of-record"
