plays:
  - title: "Open-source your detections to beat black-box rivals"
    summary: "Email security was dominated by opaque, vendor-controlled black boxes that security teams could not inspect or tune. Sublime launched as 'the first open email security platform,' shipping a free, MIT-licensed, self-hostable platform plus a public detection-rules repo written in its Message Query Language (MQL), so practitioners could read, edit, and trust every rule. The transparent, detection-as-code positioning resonated with security engineers and built a 2,500-organization waitlist during private beta, with early users including Spotify and Fortune 500s."
    metric_moved: "community"
    result: "Launched with a 2,500-org beta waitlist; open repos now sit at ~365 stars (sublime-rules) and ~262 stars (sublime-platform), seeding a practitioner community that fed enterprise adoption."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2023/02/21/sublime-nabs-9-8m-for-an-anti-phishing-email-security-platform-built-on-collective-crowdsourced-rules/"
    attribution: "TechCrunch (Feb 2023) on Sublime's $9.8M raise and open-platform launch; star counts from github.com/sublime-security"
    tags:
      - "open-source"
      - "transparency"
      - "docs-as-marketing"
      - "github"
      - "community-led"
      - "bottom-up-plg"
  - title: "Crowdsource detection rules from your own users"
    summary: "Rather than carrying the entire detection burden in-house, Sublime treated its detection library like an open-source project on GitHub, inviting the security community to contribute rules. Josh Kamdjou's framing: 'Defenders know their networks better than anyone, but we weren't arming them as a community.' Roughly one-third of the rules in the core feed are community-contributed, and those community rules have blocked tens of thousands of phishing attacks across users, turning the customer base into a force-multiplying detection R&D team."
    metric_moved: "community"
    result: "~1/3 of detection rules are community-contributed (Sublime wrote ~2/3); community-authored rules blocked tens of thousands of phishing attacks across the user base."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2023/02/21/sublime-nabs-9-8m-for-an-anti-phishing-email-security-platform-built-on-collective-crowdsourced-rules/"
    attribution: "Josh Kamdjou (CEO) via TechCrunch and Decibel VC profile; one-third community-contributed rule stat"
    tags:
      - "open-source"
      - "community-led"
      - "github"
      - "viral-loop"
      - "developer-advocacy"
  - title: "Give away a free self-hosted tier that lands enterprise"
    summary: "Sublime made the platform free to self-host (Cloud is free up to the first 10 mailboxes), letting individual security practitioners deploy it in minutes via a one-line installer and adopt it bottom-up without a sales conversation. That free, practitioner-led entry drove growth 'largely by word of mouth' inside the infosec community on Twitter, then expanded into paid enterprise deals. The motion produced 100% YoY ARR growth in H1 2025 and 100% enterprise customer retention since inception, with customers like Spotify, Snowflake, Netflix, and Zscaler."
    metric_moved: "growth"
    result: "100% YoY ARR growth (H1 2025) and 100% enterprise retention since inception, en route to a $150M Series C at a ~$926M valuation (Oct 2025)."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/sublime-security-raises-150m-in-series-c-funding-as-industry-first-ai-agents-accelerate-growth-302596266.html"
    attribution: "Sublime Series C press release (PR Newswire, Oct 2025) for ARR growth/retention; free-tier + word-of-mouth detail from TechCrunch (Feb 2023)"
    tags:
