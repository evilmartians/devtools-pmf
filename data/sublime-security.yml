plays:
  - title: "Open-source your detections to beat black-box rivals"
    summary: "Email security was owned by opaque vendors whose detection logic security teams could not read, audit, or tune. Sublime launched as 'the first open email security platform,' shipping a free, self-hostable platform plus a public sublime-rules repo where every rule is written in a readable Message Query Language (MQL) that practitioners can inspect, fork, and modify. Making the detection logic legible (not the product free) was the wedge: it removed the 'vendor detection bottleneck' and built a 2,500-organization beta waitlist including Fortune 500s."
    goal: "Acquisition"
    learning: "If your category is dominated by black-box incumbents, make your core logic readable and editable as code (a named, documented rule language buyers can audit), so trust becomes your wedge instead of price."
    when_it_works: "Works when buyers are technical practitioners who distrust unauditable vendor logic and have the skill to read and tune rules themselves."
    metric_moved: "community"
    result: "Launched with a 2,500-org beta waitlist; public repos now sit at ~365 stars (sublime-rules) and ~262 stars (sublime-platform), seeding a practitioner community that fed enterprise adoption."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2023/02/21/sublime-nabs-9-8m-for-an-anti-phishing-email-security-platform-built-on-collective-crowdsourced-rules/"
    attribution: "TechCrunch (Feb 2023) on Sublime's $9.8M raise and open-platform launch; MQL detail from docs.sublime.security; star counts from github.com/sublime-security"
    tags:
      - "open-source"
      - "transparency"
      - "detection-as-code"
      - "github"
      - "community-led"
      - "bottom-up-plg"
  - title: "Turn your users into your detection R&D team"
    summary: "Instead of writing every detection in-house, Sublime ran its rule library like an open-source project on GitHub and let customers contribute the rules they wrote for attacks they were seeing in their own inboxes. CEO Josh Kamdjou's framing: 'Defenders know their networks better than anyone, but we weren't arming them as a community.' Because every user writes MQL rules for their own threats anyway, sharing them upstream is nearly free, and roughly one-third of the rules in the core feed now come from the community."
    goal: "Retention"
    learning: "When your users already produce a reusable artifact while solving their own problem (rules, configs, integrations), give them a one-step path to publish it upstream so every customer's work compounds into product value for the next."
    when_it_works: "Works when the artifact users create for themselves is generic enough to help others and the contribution friction is near-zero (same format, public repo, no gatekeeping)."
    metric_moved: "community"
    result: "~1/3 of detection rules are community-contributed (Sublime authored ~2/3); community-authored rules have blocked tens of thousands of phishing attacks across the user base."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2023/02/21/sublime-nabs-9-8m-for-an-anti-phishing-email-security-platform-built-on-collective-crowdsourced-rules/"
    attribution: "Josh Kamdjou (CEO) via TechCrunch (Feb 2023); one-third community-contributed rule stat"
    tags:
      - "open-source"
      - "community-led"
      - "github"
      - "user-generated-content"
      - "developer-advocacy"
  - title: "Give a free self-hosted tier with a mailbox cap"
    summary: "Sublime made the platform free to self-host via a one-line Docker installer, letting an individual security practitioner deploy it in minutes and adopt it bottom-up with no sales call. The free tier is deliberately capped (Docker deployment supported up to ~600 mailboxes; Cloud free up to the first 10 mailboxes), which lands the product inside a team while the cap creates a natural upgrade trigger as deployment scales. The motion spread largely by word of mouth in the infosec community and converted into paid enterprise deals at Spotify, Snowflake, Netflix, and Zscaler."
    goal: "Acquisition"
    learning: "Make your free tier genuinely self-deployable in minutes (one-line installer, no sales call) but cap it on the dimension that scales with the buyer's real usage, so adoption happens bottom-up and the cap itself becomes the upgrade trigger."
    when_it_works: "Works when a single practitioner can deploy and get value alone, and there is a usage dimension (mailboxes, seats, volume) that grows past the cap as the org commits."
    metric_moved: "growth"
    result: "100% YoY ARR growth (H1 2025) and 100% enterprise customer retention since inception, en route to a $150M Series C at a ~$926M valuation (Oct 2025)."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/sublime-security-raises-150m-in-series-c-funding-as-industry-first-ai-agents-accelerate-growth-302596266.html"
    attribution: "Sublime Series C press release (PR Newswire, Oct 2025) for ARR growth/retention; one-line Docker installer and 600-mailbox cap from docs.sublime.security; word-of-mouth detail from TechCrunch (Feb 2023)"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "word-of-mouth"
      - "land-and-expand"
      - "self-hosted"
