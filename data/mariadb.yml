plays:
  - title: "Ship as the default in Linux distros"
    summary: "MariaDB was a MySQL fork with no installed base of its own. Rather than fight for individual installs, it courted Linux distribution maintainers, who were anxious about Oracle's stewardship of MySQL after the 2010 Sun acquisition. openSUSE 12.3 and Fedora 19 made MariaDB the default in 2013, followed by CentOS 7, RHEL 7 (June 2014), SUSE Linux Enterprise 12, Arch, Mageia, Manjaro, and Debian 9 (2017). Becoming the bundled default meant every fresh server install shipped MariaDB instead of MySQL, driving adoption to billions of downloads without a per-user marketing spend."
    metric_moved: "organic"
    result: "Default database across Fedora, RHEL, CentOS, SUSE, Arch, and Debian; 3B+ downloads to date."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://en.wikipedia.org/wiki/MariaDB"
    attribution: "Wikipedia (MariaDB), citing distro release notes: openSUSE 12.3 and Fedora 19 (2013), CentOS 7 and RHEL 7 (June 2014), Debian 9 (2017)"
    tags:
      - "open-source"
      - "integrations-marketplace"
      - "word-of-mouth"
      - "bottom-up-plg"
  - title: "Mirror the incumbent's version numbers for trust"
    summary: "To win users away from MySQL, MariaDB positioned itself as a true drop-in replacement: same library binary protocol, file structures, and APIs, so migration required minimal code or config changes. It deliberately mirrored MySQL's version numbers (5.1, 5.2, 5.3, 5.5) to signal byte-for-byte compatibility and lower switching risk. Once adoption was established, it jumped to a 10.x series in 2014 to signal independent development. The compatibility-first positioning removed the biggest objection to adopting a fork."
    metric_moved: "growth"
    result: "Near-zero-friction migration path from MySQL; adopted as default by every major distro through the 2010s."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://en.wikipedia.org/wiki/MariaDB"
    attribution: "Wikipedia (MariaDB): versions 5.1-5.5 'mirrored MySQL ... to signal drop-in compatibility'; moved to 10.x in 2014 to signal independence"
    tags:
      - "open-source"
      - "onboarding-redesign"
      - "land-and-expand"
