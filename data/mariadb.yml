plays:
  - title: "Win the maintainers who own the default slot"
    summary: "MariaDB was a MySQL fork with no installed base of its own. Instead of fighting for individual installs, it courted Linux distribution maintainers who were anxious about Oracle's stewardship of MySQL after the 2010 Sun acquisition, positioning itself as the safe, community-governed successor. openSUSE 12.3 and Fedora 19 made it the default in 2013, then CentOS 7 and RHEL 7 (June 2014), SUSE Linux Enterprise, Arch, Mageia, Manjaro, and Debian 9 (2017). Every fresh server install now shipped MariaDB instead of MySQL, with no per-user marketing spend."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "When a packaging layer (Linux distros, package managers, app stores, framework defaults) sits between you and end users, sell to the handful of maintainers who control the default slot: one integration converts into millions of zero-CAC installs."
    when_it_works: "Works when a small set of gatekeepers controls a default-install bundle and the incumbent has given them a reason to defect (acquisition, license change, governance fear)."
    metric_moved: "organic"
    result: "Default database across Fedora, RHEL, CentOS, SUSE, Arch, and Debian; 3B+ downloads to date."
    tradeoff: "Winning the default slot floods you with free installs you neither own nor can bill (3B+ downloads converted to only ~700 paying customers), so the distro maintainers and cloud vendors capture the user relationship while you inherit the monetization gap that ended in going-concern warnings and a 95% value collapse."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://en.wikipedia.org/wiki/MariaDB"
    attribution: "Wikipedia (MariaDB), citing distro release notes: openSUSE 12.3 and Fedora 19 (2013), CentOS 7 and RHEL 7 (June 2014), Debian 9 (2017)"
    tags:
      - "open-source"
      - "integrations-marketplace"
      - "distribution"
      - "bottom-up-plg"
  - title: "Encode your drop-in promise where users already look"
    summary: "To pull users off MySQL, MariaDB kept the same binary protocol, file structures, and APIs so migration was a near-zero-change swap. The non-obvious move: it deliberately numbered its early releases 5.1, 5.2, 5.3, 5.5 to match MySQL's exact version numbers, using the version string itself as a promise of byte-for-byte drop-in compatibility. Once it had earned trust and installed base, it jumped to a 10.x series in 2014 to signal it was now developing independently."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Launching as a drop-in replacement? Bake the compatibility promise into surfaces buyers read before they test: match the incumbent's version numbers, mirror its CLI flags, ingest its config file unchanged, so the swap reads as risk-free up front. Once you have trust and installed base, rebrand the versioning to claim your own roadmap."
    when_it_works: "Works when you are a true drop-in replacement and the buyer's main objection is the risk of switching."
    metric_moved: "growth"
    result: "Near-zero-friction migration path from MySQL; adopted as default by every major Linux distro through the 2010s."
    tradeoff: "Encoding a byte-for-byte drop-in promise locks you into MySQL's comparison and bug-for-bug compatibility, constraining your own roadmap and leaving you selling a 'free and identical' product that buyers have little reason to pay for, as Widenius conceded when he said 'religion doesn't put meat on the table.'"
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://en.wikipedia.org/wiki/MariaDB"
    attribution: "Wikipedia (MariaDB): versions 5.1-5.5 mirrored MySQL to signal drop-in compatibility; moved to 10.x in 2014 to signal independence"
    tags:
      - "open-source"
      - "positioning"
      - "migration"
      - "drop-in-replacement"
