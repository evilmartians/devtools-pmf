plays:
  - title: "Rebuild a prospect's docs, then cold-email the finished version"
    summary: "With no brand or sales team, Mintlify's founders picked target companies, spent hours rebuilding each one's documentation on Mintlify, and only then sent a cold email leading with the revamped, ready-to-ship docs as the pitch. The prospect saw a working before/after instead of a feature list, so the only decision left was to switch on what already existed. They ran this from customer 10 to past 1,000 before the manual build became infeasible."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "For a switching-cost product, do the prospect's migration before you pitch them: cold-email a working, finished version of their own asset rebuilt on your tool, so the buyer evaluates a result instead of a promise and trying you requires zero effort."
    when_it_works: "Works when output quality is visibly judgeable up front and you can rebuild a prospect's asset in hours, so labor per lead stays below the deal value at low volume."
    metric_moved: "customer count (10 to 1,000+)"
    result: "Scaled from 10 to 100+ and then past 1,000 customers; founders called pre-building docs for strangers 'an unreasonable use of our time' that 'worked surprisingly well'."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.mintlify.com/blog/things-that-do-not-scale"
    attribution: "Mintlify blog, 'How we grew Mintlify by doing things that don't scale'; corroborated by DevTools Brew #58 (Morgan Perry)"
    tags:
      - "founder-led-sales"
      - "docs-as-marketing"
      - "do-things-that-dont-scale"
      - "cold-outreach"
  - title: "Hand-migrate and edit early customers' docs yourself"
    summary: "Switching docs platforms is high-friction, so the founders absorbed it: they spent hours-to-days per customer manually migrating existing docs and even copyediting the customer's content, positioning themselves as the company's technical writers to mask an early product. That white-glove service won the first 10 customers (starting with YC batchmate Hyperbeam, plus a roommate and founder friends), and watching what they did by hand became the spec for the self-serve onboarding they later productized."
    goal: "Activation"
    learning: "Do new customers' migration by hand before you build any onboarding flow: the manual steps you keep repeating are the exact spec for self-serve, and offering to be their 'technical writer' lets a thin product win on service while you learn what to automate."
    when_it_works: "Works in the first ~100 customers when the product is still rough and the activation work is concrete enough to later codify into software."
    metric_moved: "first 10 customers; onboarding time-to-value"
    result: "Landed first 10 customers and removed switching friction; the manual service became unsustainable past ~1,000 customers and was converted into self-serve onboarding."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.mintlify.com/blog/things-that-do-not-scale"
    attribution: "Mintlify blog, 'How we grew Mintlify by doing things that don't scale'; first-10-customers detail from Hahnbee Lee LinkedIn"
    tags:
      - "founder-led-sales"
      - "design-partners"
      - "onboarding-redesign"
      - "do-things-that-dont-scale"
  - title: "Auto-generate an MCP server from every customer's docs"
    summary: "As AI coding assistants became the new discovery surface, Mintlify made each customer's hosted docs generate a Model Context Protocol (MCP) server, so AI tools can search the docs and call the customer's API in real time, and the server gets listed in AI registries (Cursor.directory, Windsurf.run, mcp.run, OpenTools). Mintlify then launched its own curated registry, mcpt, aggregating those customer servers in one place. Every docs site Mintlify hosts becomes a distribution node inside the AI ecosystem, reframing docs from a cost center into the highest-intent surface in the customer's funnel."
    goal: "Acquisition"
    track: "Integrations & ecosystem"
    learning: "Ship a default-on feature that turns each customer's deployment into a listing in the registries where your buyers' buyers now search (AI tool directories, MCP registries), so your install base compounds into a distribution network you don't have to staff."
    when_it_works: "Works when your product already sits on a high-intent surface (docs, APIs, embeds) that downstream tools want to consume, and an emerging registry standard exists to list into."
    metric_moved: "AI-surface discoverability / organic distribution"
    result: "Each docs site becomes discoverable across four AI tool registries plus Mintlify's mcpt; structured Mintlify docs cited as making AI agents '64% more precise' and '39% more discoverable' with half the tokens; reinforces hold on AI-native customers (Anthropic, Cursor, Pinecone)."
    tier: "Estimated"
    source_type: "press"
    source_url: "https://www.mintlify.com/blog/generate-mcp-servers-for-your-docs"
    attribution: "Mintlify blog, 'Generate MCP servers from your docs', 'mcpt: The curated registry for MCP servers', and 'Documentation is your AI interface'"
    tags:
      - "integrations-marketplace"
      - "docs-as-marketing"
      - "default-on"
      - "ai-distribution"
      - "mcp"
