plays:
  - title: "Rebuild a prospect's docs before cold-emailing them"
    summary: "Mintlify needed to go from its first 10 customers to 100 without a brand or sales team. The founders researched target companies, spent hours rebuilding each company's documentation on Mintlify, and only then sent a cold email showcasing the finished, revamped docs as the pitch. By removing all activation energy and leading with a working proof of concept, this converted cold prospects into customers and carried them past 1,000 customers before they retired the manual approach."
    metric_moved: "growth"
    result: "Scaled from 10 to 100+ customers, then past 1,000 customers, using pre-built docs as cold outreach; founders called it 'an unreasonable use of our time' that 'worked surprisingly well'."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.mintlify.com/blog/things-that-do-not-scale"
    attribution: "Mintlify blog, 'How we grew Mintlify by doing things that don't scale'; corroborated by DevTools Brew #58 (Morgan Perry)"
    tags:
      - "founder-led-sales"
      - "docs-as-marketing"
      - "do-things-that-dont-scale"
  - title: "Do white-glove migrations to win early switchers"
    summary: "Switching documentation platforms is high-friction, so Mintlify's founders personally absorbed that cost for early customers. They spent multiple days doing tedious manual migration of existing docs and even reviewed and edited customers' content to guarantee best-in-class output despite how early the product was. This drove their first 10 customers (3 YC section-mates, a roommate, founder friends, and YC-launch inbound) and directly informed the self-serve onboarding they later productized."
    metric_moved: "growth"
    result: "Landed first 10 customers (starting with YC batchmate Hyperbeam) and removed switching friction; manual service became unsustainable past ~1,000 customers and was turned into self-serve onboarding."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.mintlify.com/blog/things-that-do-not-scale"
    attribution: "Mintlify blog, 'How we grew Mintlify by doing things that don't scale'; first-10-customers detail from Hahnbee Lee LinkedIn"
    tags:
      - "founder-led-sales"
      - "design-partners"
      - "onboarding-redesign"
      - "do-things-that-dont-scale"
  - title: "Auto-generate an MCP server from every customer's docs"
    summary: "As AI coding assistants became the new discovery surface, Mintlify made each customer's documentation auto-generate a Model Context Protocol (MCP) server, so AI tools can query the docs in real time and the docs get listed in AI registries (Cursor.directory, Windsurf.run, mcp.run, OpenTools). This turns every hosted docs site into a distribution node inside the AI ecosystem and reframes documentation as the highest-intent surface in the funnel rather than a cost center."
    metric_moved: "organic"
    result: "Positions each docs site for discovery in AI tool registries; Mintlify frames docs as a GTM channel and 'your AI interface', reinforcing its hold on AI-native customers (Anthropic, Cursor, Windsurf)."
    tier: "Estimated"
    source_type: "press"
    source_url: "https://www.mintlify.com/blog/generate-mcp-servers-for-your-docs"
    attribution: "Mintlify blog, 'Generate MCP servers from your docs' and 'Documentation is your AI interface'"
    tags:
      - "integrations-marketplace"
      - "docs-as-marketing"
      - "default-on"
