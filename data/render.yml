plays:
  - title: "Build a migration guide and credits for the incumbent's refugees"
    summary: "When Salesforce killed Heroku's free tier (Nov 2022), Render aimed squarely at the displaced users instead of waiting for them to find it. They shipped a dedicated 'Why and How to Migrate from Heroku' guide, a step-by-step docs migration path (Procfile to services, Postgres, Redis), a render.yaml blueprint to recreate infra as code, a side-by-side Render vs Heroku comparison, and a migration-credits program to cover switching costs. CEO Anurag Goel publicly framed Heroku's free-tier removal as Salesforce no longer caring about top-of-funnel growth, positioning Render as the mature alternative."
    metric_moved: "growth"
    result: "Heroku's decline became Render's primary early PMF trigger; the platform scaled to 4.5M+ developers and 250K+ new signups/month, with named migrations like ReadMe moving entire production environments."
    tier: "Verified"
    source_type: "press"
    source_url: "https://render.com/blog/migrate-heroku-why-how"
    attribution: "Render blog 'Why (and How) to Migrate from Heroku'; CEO commentary in The New Stack 'Where Can Heroku Free Tier Users Go?'"
    tags:
      - "docs-as-marketing"
      - "content-seo"
      - "land-and-expand"
      - "free-tier"
  - title: "Make your generous free tier the default on-ramp"
    summary: "Render ran a pure product-led motion with no marketing or sales team through early growth, leaning on the most generous free tier among Heroku alternatives: free web services, free Postgres, free Redis, and unlimited static sites with no credit card required. Git-based auto-deploy from GitHub/GitLab/Bitbucket and fast time-to-first-deploy let developers ship in seconds, embedding Render in everyday workflows and driving low CAC, self-serve conversion, and usage-based expansion as projects grew."
    metric_moved: "free_to_paid"
    result: "Self-serve PLG with no sales team scaled Render past 4.5M+ developers across 190+ countries; revenue grew more than 100% YoY into 2026."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://snapdeploy.dev/blog/best-heroku-alternatives-2026"
    attribution: "SnapDeploy 'Heroku Alternatives' tested review; Render 'About' page and businessmodelcanvastemplate.com PLG analysis"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "usage-based-pricing"
      - "default-on"
  - title: "Get recommended by the chatbots developers ask for advice"
    summary: "Render found that LLM assistants became an unplanned distribution channel: when developers ask ChatGPT and other chatbots where to deploy an app, Render shows up in the answers. CEO Anurag Goel said 'Chatbots have effectively, almost singlehandedly, grown our business.' The effect compounded as AI builders looked for simple deploy targets, with OpenAI's Codex app letting users deploy directly to Render and thousands of AI companies migrating onto the platform."
    metric_moved: "organic"
    result: "Chatbot recommendations became a primary growth driver feeding 250K+ new signups/month; Render reached a $1.5B valuation on a $100M Series C extension (Feb 2026) with revenue up over 100% YoY."
