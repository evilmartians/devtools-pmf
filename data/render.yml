plays:
  - title: "Ship the migration kit the day the incumbent breaks"
    summary: "When Salesforce killed Heroku's free tier (Nov 2022), Render did not wait for displaced users to find it. It shipped a 'Why and How to Migrate from Heroku' guide, a render.yaml blueprint that recreates a Heroku app's services/Postgres/Redis as infra-as-code, a side-by-side Render vs Heroku comparison page, and a migration-credits program to cover switching costs. CEO Anurag Goel publicly framed the cut as Salesforce abandoning top-of-funnel growth, positioning Render as the mature successor."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "When a sticky incumbent degrades (kills a free tier, hikes prices, drops a feature), ship within days: a migration guide, an automated importer (a config file or one-click tool that recreates their setup on you so switching becomes a one-step import), and credits that zero out switching cost. Publicly name their move as abandonment so your comparison reads as the safe choice."
    when_it_works: "Works when a sticky incumbent in your category visibly degrades and your product can mechanically reproduce their primitives (services, DB, cache)."
    metric_moved: "signups / migrations"
    result: "Heroku's decline became Render's primary early PMF trigger; the platform scaled to 4.5M+ developers and 250K+ new signups/month, with named production migrations like ReadMe."
    tradeoff: "By anchoring acquisition to Heroku's collapse and building a Heroku-shaped import path, Render tied its growth to a finite, one-time displacement pool and inherited Heroku's mental model and baggage as the baseline it gets measured against, which is why the migration well was only the 'initial' trigger before AI had to become the second."
    tier: "Verified"
    source_type: "press"
    source_url: "https://render.com/blog/migrate-heroku-why-how"
    attribution: "Render blog 'Why (and How) to Migrate from Heroku'; CEO Anurag Goel commentary in The New Stack 'Where Can Heroku Free Tier Users Go?'"
    tags:
      - "docs-as-marketing"
      - "migration"
      - "incumbent-displacement"
      - "switching-costs"
  - title: "Be the one-sentence answer LLMs give to 'where do I deploy this?'"
    summary: "Render found that AI assistants became an unplanned, dominant distribution channel: when developers ask ChatGPT and other chatbots where to deploy an app, Render shows up in the answer. CEO Anurag Goel said 'Chatbots have effectively, almost singlehandedly, grown our business.' The effect compounded because Render is simple to explain (git push to deploy) and heavily documented, so it is the low-friction answer LLMs reach for; OpenAI's Codex app now even deploys preview apps directly to Render."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Make your product the simplest one-line answer to a question developers type into chatbots, then saturate the open web with task-shaped tutorials and docs, because models recommend whatever is easiest to describe and best documented. Close the loop with a one-click deploy path from the AI tools (Codex, agents) developers already live in."
    when_it_works: "Works when your product solves a question developers literally type into chatbots."
    metric_moved: "organic signups"
    result: "Chatbot recommendations became a primary growth driver feeding 250K+ new signups/month; Render reached a $1.5B valuation on a $100M Series C extension (Feb 2026) with revenue up over 100% YoY."
    tradeoff: "Letting chatbots become the channel that 'almost singlehandedly grew our business' means the dominant growth driver is one Render neither owns nor can steer, so model providers can re-rank, deprecate, or route to their own deploy targets at will, and staying the simple one-sentence answer caps Render out of the complex, higher-margin workloads an LLM won't surface."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techstartups.com/2026/02/17/render-raises-100m-at-1-5b-valuation-as-ai-boom-fuels-cloud-infrastructure-shift/"
    attribution: "Tech Startups, quoting CEO Anurag Goel (Feb 17, 2026); OpenAI Codex deploy integration via developers.openai.com"
    tags:
      - "llm-distribution"
      - "word-of-mouth"
      - "docs-as-marketing"
      - "integrations"
