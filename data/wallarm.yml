plays:
  - title: "Open-source the test that fails the incumbent"
    summary: "Wallarm sells commercial API/WAF security and open-sourced GoTestWAF, a vendor-neutral Go tool that fires OWASP and API attack payloads (REST, GraphQL, gRPC, SOAP) at any WAF, RASP, or API gateway and scores its detection and bypass rate. Security teams evaluating an incumbent run it, the report surfaces gaps in the tool they already pay for, and that gap opens a Wallarm conversation. The repo reached ~1.8k GitHub stars, and CEO Ivan Novikov reported ~100 uses a week and ~5 enterprise prospects a week raising it on sales calls."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Ship a free, vendor-neutral benchmark that scores every product in your category on the one dimension you win, and let buyers point it at the tool they already pay for. The failing grade is a self-qualified inbound lead that arrives already convinced there's a problem."
    when_it_works: "Works when your category has a measurable pass/fail dimension (detection rate, latency, coverage) where incumbents visibly underperform."
    metric_moved: "organic"
    result: "~1.8k GitHub stars; reported ~100 uses/week and surfaced by ~5 enterprise prospects/week on sales calls."
    tradeoff: "Because the benchmark is vendor-neutral, it grades you too, so you commit to staying top-scoring on the one dimension it measures while publicly handing competitors the exact test to tune against and qualifying buyers for every vendor in the category, Wallarm among them."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.helpnetsecurity.com/2021/12/20/gotestwaf-web-application-security/"
    attribution: "Help Net Security (Dec 2021) quoting CEO Ivan Novikov; star count verified at github.com/wallarm/gotestwaf (1.8k); weekly-usage figures attributed to Novikov in Daily Swig/Help Net coverage."
    tags:
      - "open-source"
      - "developer-advocacy"
      - "github"
      - "community-led"
      - "competitive-benchmark"
      - "lead-magnet"
  - title: "Get your brand running in their stack before sales calls"
    summary: "Wallarm shipped API Firewall, a lightweight open-source reverse proxy in Go that validates live traffic against an OpenAPI v3 schema, packaged as a drop-in Docker image. Developers building cloud-native API protection pull it for free and wire it into their deployment, planting the Wallarm brand inside the runtime stack long before any sales conversation. The image has crossed 1B+ Docker pulls, developer mindshare that feeds Wallarm's enterprise sales-assisted motion from below."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Package a useful free utility as a drop-in (Docker image, CLI, library) that becomes a standing dependency in the user's deploy pipeline, so you own developer mindshare from inside the runtime. Pick a tool adjacent to what you charge for, so adoption pulls users toward the paid product."
    when_it_works: "Works when your buyers run a self-hosted or cloud-native stack that a small tool can take root in."
    metric_moved: "organic"
    result: "API Firewall surpassed 1B+ Docker Hub pulls since 2021, building upstream developer mindshare for the enterprise motion."
    tradeoff: "You take on an unbounded, perpetual maintenance and security-patch obligation for a free deploy-pipeline dependency whose billion-pull adoption buys mindshare but brings no direct revenue, and the more useful it is, the longer users stay on the free tier."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.wallarm.com/wallarm-open-source-projects"
    attribution: "Wallarm Open Source Projects page: API Firewall, '1B+ pulls from Docker Hub' (verified via WebFetch, June 2026)."
    tags:
      - "open-source"
      - "free-tier"
      - "developer-advocacy"
      - "bottom-up-plg"
      - "docker"
      - "workflow-embedding"

  - title: "Price security to scale with the customer's API surface, then let their AI buildout do the expanding for you"
    summary: "Wallarm's April 9, 2025 release reported 134% Net Retention Revenue across enterprise accounts for 2024, tied to 'expanding API usage.' Wallarm lands on a slice of an enterprise's traffic and meters protection against the live API surface it discovers from real traffic itself. As one enterprise SaaS customer scaled to 'thousands of APIs, tens of thousands of endpoints,' coverage and spend grew with it; Miro expanded the deployment to 'support new tech stacks and protocols' against billions of monthly requests. Novikov: 'A significant contributor to those outcomes is the result of enterprise adoption of AI, leading to an increasing diversity of industries using APIs.' With 99% of customers in production, expansion compounds on a footprint that is already load-bearing."
    goal: "Expansion"
    learning: "If your product attaches to a surface the customer is already growing (traffic, endpoints, seats, data volume), tie pricing to that surface so account revenue rises without a new sales cycle. Discover the surface from live behavior so coverage tracks reality and shadow growth becomes billable growth."
    when_it_works: "Works when the customer's underlying surface genuinely expands and your discovery catches it automatically. It stalls if the customer's API estate is flat, if buyers cap usage to control cost, or if pricing is seat-based and decoupled from the surface."
    metric_moved: "net retention revenue"
    result: "134% Net Retention Revenue in enterprise accounts for 2024, with nearly zero enterprise churn, attributed in the official release to 'AI expansion and expanding API usage.'"
    tradeoff: "Revenue is hostage to the customer's own growth curve. In a year when enterprises freeze API or AI investment, surface-metered expansion flattens, and you have built less direct upsell muscle to compensate."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.wallarm.com/press-releases/driven-by-ai-expansion-wallarm-closed-2024-with-record-growth-and-retention-of-134-across-enterprise-accounts"
    attribution: "Wallarm official press release, April 9, 2025, quoting CEO Ivan Novikov."
    tags:
      - "land-and-expand"
      - "api-security"
      - "usage-based-pricing"
      - "net-retention"
      - "ai-expansion"
  - title: "Ship a new protection module into your installed base the moment a platform shift opens fresh attack surface"
    summary: "When enterprises started deploying AI agents that call APIs, Wallarm extended its API protection into Agentic AI Protection, monitoring AI interactions and blocking AI-specific attacks like prompt injection, jailbreaks, and API logic abuse, plus 'the industry's first Penetration Testing Service for Agentic AI Systems.' The release names 'AI expansion' as a driver of 2024's 134% NRR alongside expanding API usage. Because the agents are themselves API traffic, the module sells into accounts already in production (99% of customers), so a platform shift becomes upsell. Novikov, on the $55M Series C (July 31, 2025): the round funds 'extending its offering to protect APIs in the AI era.'"
    goal: "Expansion"
    learning: "When a technology shift creates a new threat or workload adjacent to what you already secure, build the coverage and sell it into the customers you have. The installed base is pre-qualified, already deployed, and feels the new risk first, so a timely module becomes expansion revenue."
    when_it_works: "Works when the new surface is adjacent to your existing footprint and your current buyer owns the new risk. It fails if the new capability belongs to a different team with its own budget, or if the platform shift is hype customers are not yet deploying in production."
    metric_moved: "expansion"
    result: "Contributed to 134% enterprise NRR for 2024 (the release credits 'AI expansion'); momentum carried into a $55M Series C led by Toba Capital in July 2025 to extend the platform into the AI era."
    tradeoff: "Chasing each platform shift with a new module risks shipping ahead of real demand and spreading R&D thin. If agentic-AI deployment lags the marketing, you carry the build cost before the expansion revenue arrives."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.prnewswire.com/news-releases/wallarm-announces-55-million-in-series-c-to-transform-api-security-for-the-ai-era-302516432.html"
    attribution: "Wallarm Series C press release via PR Newswire, July 31, 2025, quoting CEO Ivan Novikov; corroborated by the April 9, 2025 record-growth release."
    tags:
