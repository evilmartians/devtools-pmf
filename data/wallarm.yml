plays:
  - title: "Open-source a tool that grades your competitors"
    summary: "Wallarm sells commercial API/WAF security, then open-sourced GoTestWAF, a vendor-neutral Go tool that fires OWASP and API attack payloads (REST, GraphQL, gRPC, SOAP) at ANY WAF, RASP, or API gateway and scores its detection and bypass rate. Security teams evaluating any incumbent run it, the report surfaces gaps in the tool they already pay for, and that gap becomes the opening for a Wallarm conversation. The repo reached ~1.8k GitHub stars and CEO Ivan Novikov reported it was used ~100 times a week and raised by ~5 enterprise prospects a week on sales calls."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Ship a free, vendor-neutral benchmark tool that scores any product in your category (including the incumbent the buyer already runs) on the exact dimension you win on; the failing grade it produces is a self-generated, self-qualified inbound lead that arrives pre-convinced there's a problem."
    when_it_works: "Works when your category has a measurable pass/fail dimension (detection rate, latency, coverage) where incumbents visibly underperform and you can prove it with an honest, reusable test."
    metric_moved: "organic"
    result: "~1.8k GitHub stars; reported ~100 uses/week and surfaced by ~5 enterprise prospects/week on sales calls."
    tradeoff: "Because the benchmark is vendor-neutral, it grades you too, so you commit to staying perpetually best-in-class on the one dimension it measures while publicly handing competitors the exact test to tune against and qualifying buyers for any vendor, not just Wallarm."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.helpnetsecurity.com/2021/12/20/gotestwaf-web-application-security/"
    attribution: "Help Net Security (Dec 2021) quoting CEO Ivan Novikov; star count verified at github.com/wallarm/gotestwaf (1.8k); weekly-usage figures attributed to Novikov in Daily Swig/Help Net coverage."
    tags:
      - "open-source"
      - "developer-advocacy"
      - "github"
      - "community-led"
      - "competitive-benchmark"
      - "lead-magnet"
  - title: "Embed a free OSS utility in the deploy workflow"
    summary: "Wallarm shipped API Firewall, a lightweight open-source reverse proxy (built in Go) that validates live traffic against an OpenAPI v3 schema, packaged as a drop-in Docker image. Developers building cloud-native API protection pull it for free and wire it into their deployment, which plants the Wallarm brand inside the runtime stack long before any sales conversation. The Docker image has crossed 1B+ pulls, a developer-mindshare surface that feeds Wallarm's enterprise sales-assisted motion from below."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Package a genuinely useful free utility as a frictionless drop-in artifact (Docker image, CLI, library) that lives inside the user's deploy pipeline, so your brand is already running in their stack before sales ever calls; pick a tool whose job is adjacent to, but not, the thing you charge for."
    when_it_works: "Works when your buyers run a self-hosted/cloud-native stack where a small tool can become a standing dependency, and the free tool naturally exposes the larger problem your paid product solves."
    metric_moved: "organic"
    result: "API Firewall surpassed 1B+ Docker Hub pulls since 2021, building upstream developer mindshare for the enterprise motion."
    tradeoff: "You take on an unbounded, perpetual maintenance and security-patch obligation for a free deploy-pipeline dependency whose billion-pull adoption is mindshare rather than revenue, and the more useful it is the more users it lets stay free instead of buying the paid product."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.wallarm.com/wallarm-open-source-projects"
    attribution: "Wallarm Open Source Projects page: API Firewall, '1B+ pulls from Docker Hub' (verified via WebFetch, June 2026)."
    tags:
      - "open-source"
      - "free-tier"
      - "developer-advocacy"
      - "bottom-up-plg"
      - "docker"
      - "workflow-embedding"
