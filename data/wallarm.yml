plays:
  - title: "Open-source the test that fails the incumbent"
    summary: "Wallarm sells commercial API/WAF security, then open-sourced GoTestWAF, a vendor-neutral Go tool that fires OWASP and API attack payloads (REST, GraphQL, gRPC, SOAP) at ANY WAF, RASP, or API gateway and scores its detection and bypass rate. Security teams evaluating any incumbent run it, the report surfaces gaps in the tool they already pay for, and that gap becomes the opening for a Wallarm conversation. The repo reached ~1.8k GitHub stars and CEO Ivan Novikov reported it was used ~100 times a week and raised by ~5 enterprise prospects a week on sales calls."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Ship a free, vendor-neutral benchmark that scores every product in your category on the one dimension you win, and let buyers point it at the tool they already pay for. The failing grade is a self-qualified inbound lead that arrives already convinced there's a problem."
    when_it_works: "Works when your category has a measurable pass/fail dimension (detection rate, latency, coverage) where incumbents visibly underperform."
    metric_moved: "organic"
    result: "~1.8k GitHub stars; reported ~100 uses/week and surfaced by ~5 enterprise prospects/week on sales calls."
    tradeoff: "Because the benchmark is vendor-neutral, it grades you too, so you commit to staying perpetually best-in-class on the one dimension it measures while publicly handing competitors the exact test to tune against and qualifying buyers for every vendor in the category, Wallarm among them."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.helpnetsecurity.com/2021/12/20/gotestwaf-web-application-security/"
    attribution: "Help Net Security (Dec 2021) quoting CEO Ivan Novikov; star count verified at github.com/wallarm/gotestwaf (1.8k); weekly-usage figures attributed to Novikov in Daily Swig/Help Net coverage."
    tags:
      - "open-source"
      - "developer-advocacy"
      - "github"
      - "community-led"
      - "competitive-benchmark"
      - "lead-magnet"
  - title: "Get your brand running in their stack before sales calls"
    summary: "Wallarm shipped API Firewall, a lightweight open-source reverse proxy (built in Go) that validates live traffic against an OpenAPI v3 schema, packaged as a drop-in Docker image. Developers building cloud-native API protection pull it for free and wire it into their deployment, which plants the Wallarm brand inside the runtime stack long before any sales conversation. The Docker image has crossed 1B+ pulls, a developer-mindshare surface that feeds Wallarm's enterprise sales-assisted motion from below."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Package a genuinely useful free utility as a frictionless drop-in (Docker image, CLI, library) that becomes a standing dependency in the user's deploy pipeline, so you own developer mindshare from inside the runtime. Pick a tool that sits adjacent to what you charge for so adoption pulls toward the paid product instead of replacing it."
    when_it_works: "Works when your buyers run a self-hosted or cloud-native stack that a small tool can take root in."
    metric_moved: "organic"
    result: "API Firewall surpassed 1B+ Docker Hub pulls since 2021, building upstream developer mindshare for the enterprise motion."
    tradeoff: "You take on an unbounded, perpetual maintenance and security-patch obligation for a free deploy-pipeline dependency whose billion-pull adoption buys mindshare while delivering no direct revenue, and the more useful it is the more users it lets stay free instead of buying the paid product."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.wallarm.com/wallarm-open-source-projects"
    attribution: "Wallarm Open Source Projects page: API Firewall, '1B+ pulls from Docker Hub' (verified via WebFetch, June 2026)."
    tags:
      - "open-source"
      - "free-tier"
      - "developer-advocacy"
      - "bottom-up-plg"
      - "docker"
      - "workflow-embedding"
