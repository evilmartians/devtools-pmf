plays:
  - title: "Ship an open-source tool that tests competitors"
    summary: "Wallarm sells commercial API/WAF security, but it open-sourced GoTestWAF, a Go tool that simulates OWASP and API attacks to grade ANY WAF, NGWAF, RASP, or API gateway, including competitors'. Because the tool is vendor-neutral and genuinely useful, security teams evaluating any WAF run it, which surfaces gaps in incumbent tooling and starts a conversation Wallarm is well-positioned to win. The repo grew to roughly 1.8k GitHub stars and the tool became a recurring topic on sales and marketing calls, with coverage noting it was used about 100 times a week and asked about by around five enterprise companies a week."
    metric_moved: "organic"
    result: "GoTestWAF reached ~1.8k GitHub stars and became a top-of-funnel lead magnet, reportedly used ~100x/week and raised by ~5 enterprise prospects/week on sales calls."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.helpnetsecurity.com/2021/12/20/gotestwaf-web-application-security/"
    attribution: "Help Net Security (Dec 2021) quoting CEO Ivan Novikov: 'We created GoTestWAF to help the security community evaluate the level of API and application security controls they applied.' Star count verified on github.com/wallarm/gotestwaf; weekly-usage figures attributed to Novikov in Daily Swig/Help Net coverage."
    tags:
      - "open-source"
      - "developer-advocacy"
      - "github"
      - "community-led"
      - "bottom-up-plg"
  - title: "Seed a free Docker tool into every cloud-native stack"
    summary: "Wallarm published API Firewall, a lightweight open-source reverse proxy that validates traffic against an OpenAPI v3 schema, and shipped it as an easy Docker image. Developers adopting cloud-native API protection pull it for free, which plants the Wallarm brand inside the deployment workflow well before any sales conversation. Wallarm's own open-source page cites more than 1 billion pulls from Docker Hub, a massive developer-awareness surface feeding its enterprise motion."
    metric_moved: "organic"
    result: "API Firewall surpassed 1B+ pulls from Docker Hub, building developer mindshare upstream of Wallarm's enterprise sales-assisted motion."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.wallarm.com/wallarm-open-source-projects"
    attribution: "Wallarm Open Source Projects page: API Firewall, '1B+ pulls from Docker Hub'."
    tags:
      - "open-source"
