plays:
  - title: "Ship the free Action before you ship the SaaS"
    summary: "Before any paid product existed, CodeRabbit shipped ai-pr-reviewer, an open-source GitHub Action that posted AI review comments directly on pull requests using OpenAI models. Because it installed from the GitHub Marketplace and ran inside the PR workflow developers already lived in, adoption cost nothing and required no behavior change; the repo hit ~2,000 stars and seeded the audience and feedback loop the commercial multi-model product was built on. CodeRabbit then converted that surface into the #1 AI app on the GitHub and GitLab marketplaces."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Build your wedge as a free, installable artifact (GitHub Action, VS Code extension, CLI plugin) inside the marketplace your buyers already live in, before the paid product exists, so trying you costs zero new tabs and zero behavior change. That artifact is both your distribution channel and your tightest feedback loop, which is how you out-iterate everyone on the use case the market is asking for."
    when_it_works: "Works when your product can deliver visible value inside an existing host platform that has its own discovery surface and a captive developer audience."
    metric_moved: "marketplace installs / organic signups"
    result: "ai-pr-reviewer reached ~2,000 GitHub stars; CodeRabbit became the #1 AI app on the GitHub/GitLab marketplaces with 80,000+ installs and 2M+ repos connected, on the way to a $60M Series B."
    tradeoff: "Wedging inside the GitHub/GitLab marketplace means your distribution, ranking, and margins live on a host platform you do not control, which can change its rules, demote you, or ship a competing first-party reviewer like GitHub Copilot Code Review."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://evilmartians.com/events/podcast-harjot-gill-coderabbit"
    attribution: "Harjot Gill on Evil Martians Dev Propulsion Labs, 'using open source for marketing'; ai-pr-reviewer star count from the coderabbitai GitHub org"
    tags:
      - "open-source"
      - "github"
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "developer-advocacy"
  - title: "An unprompted surge is your wedge"
    summary: "CodeRabbit's first real traction came from Japan, where developers spontaneously published 50+ articles about the product on zenn.dev with no outreach, sponsorship, or design-partner program from the company. Harjot Gill read that unsolicited pull as the buy signal, built a tight feedback loop with those users, and out-iterated competitors on the exact code-review use case the market was already demanding, skipping any formal design-partner program. That conviction is what made the founders commit the company to code review."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Instrument where unpaid users cluster on their own: a country, a forum, a single workflow. When a segment writes about you unasked, drop the roadmap, wire a direct feedback loop to those exact users, and out-ship competitors on their use case."
    when_it_works: "Works once you have at least one organic adoption pocket large enough to read a clear signal from."
    metric_moved: "organic word-of-mouth / inbound signups"
    result: "50+ unsolicited zenn.dev articles formed CodeRabbit's first traction; the wedge it confirmed led to >$15M ARR and a $60M Series B in under three years."
    tradeoff: "Betting the roadmap on one self-selected pocket of enthusiasts (Japan) commits the company hard to a use case validated by unusually motivated users, with no guarantee the broader market shares their need, and the signal cannot exist until you already have organic usage so it is useless in the riskiest pre-launch phase."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://evilmartians.com/events/podcast-harjot-gill-coderabbit"
    attribution: "Harjot Gill, Evil Martians Dev Propulsion Labs: 'how CodeRabbit went from viral in Japan to $60M Series B'"
    tags:
      - "word-of-mouth"
      - "community-led"
      - "content-seo"
      - "bottom-up-plg"
  - title: "Give the full paid tier away on public work"
    summary: "CodeRabbit gives its complete Pro feature set away free forever on public repos and backs it with a $1M open-source pledge, distributing $600K+ to maintainers in 2025 ($267K to 74 developers via GitHub Sponsors/Open Collective plus $360K+ in direct collaboration). The strategic payoff is ambient distribution: in 100,000+ OSS projects, including tRPC and Vercel, CodeRabbit's review comments now appear on every contributor's pull request, so developers experience the real product daily and then drag it into their paid day-job repos."
    goal: "Acquisition"
    track: "Open-source"
    learning: "If your product leaves a visible artifact on shared public output (a PR comment, a badge, a generated file), make the complete paid tier free forever on open-source repos so every contributor meets the real product in the wild and drags it into their private paid repos. Pay maintainers directly to keep it default-on; goodwill alone will not hold the surface."
    when_it_works: "Works when your free OSS users and paying buyers are the same people in different contexts."
    metric_moved: "OSS-seeded installs / contributor-driven paid signups"
    result: "100,000+ OSS projects use CodeRabbit free; $600K+ distributed to maintainers in 2025 ($1M pledged), driving 2M+ repos connected and 13M+ PRs reviewed."
    tradeoff: "Giving the complete Pro tier away free forever on 100K+ public repos and paying $600K+ to maintainers to keep it default-on means eating real LLM inference cost on millions of unpaid PRs as a standing distribution expense, justified only if contributors keep importing it into their private paid repos."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.coderabbit.ai/blog/we-are-committed-to-supporting-open-source-distributed-600000-to-open-source-maintainers-in-2025"
    attribution: "CodeRabbit official blog: $600K+ distributed to OSS maintainers in 2025, free Pro for public repos; $1M pledge per coderabbit.ai/blog/coderabbit-commits-1-million-to-open-source"
    tags:
      - "free-tier"
      - "open-source"
      - "default-on"
      - "community-led"
      - "developer-advocacy"
