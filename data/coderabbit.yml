plays:
  - title: "Ship as an open-source GitHub Action first"
    summary: "Before the commercial SaaS existed, CodeRabbit released ai-pr-reviewer, an open-source GitHub Action that posted AI code-review comments on pull requests using OpenAI models. Living inside the GitHub Marketplace and PR workflow where developers already worked made it trivially discoverable and installable, and the repo accumulated ~2,000 stars. That open-source distribution surface seeded the audience and feedback loop that the paid multi-model product was later built on, and CodeRabbit became the most-installed AI app on the GitHub and GitLab marketplaces."
    metric_moved: "organic"
    result: "ai-pr-reviewer reached ~2,000 GitHub stars; CodeRabbit became the #1 AI app on the GitHub/GitLab marketplaces with 80,000+ installs and 2M+ repos connected."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://evilmartians.com/events/podcast-harjot-gill-coderabbit"
    attribution: "Harjot Gill on Evil Martians Dev Propulsion Labs, 'using open source for marketing'; ai-pr-reviewer star count from coderabbitai GitHub org"
    tags:
      - "open-source"
      - "github"
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "developer-advocacy"
  - title: "Let an organic foreign-market surge pick your wedge"
    summary: "CodeRabbit's first real traction came from Japan, where developers spontaneously wrote 50+ articles about the product on zenn.dev without being asked or paid. Rather than chasing formal design partners, Harjot Gill treated that unprompted community pull as the buy signal, set up a tight feedback loop, and iterated faster than competitors on exactly the use case the market was already pulling. That organic demand gave the founders confidence to build the company around code review."
    metric_moved: "organic"
    result: "50+ unsolicited articles on zenn.dev created CodeRabbit's first traction; the wedge it confirmed led to >$15M ARR and a $60M Series B in under three years."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://evilmartians.com/events/podcast-harjot-gill-coderabbit"
    attribution: "Harjot Gill, Evil Martians Dev Propulsion Labs podcast: 'how CodeRabbit went from viral in Japan to $60M Series B'"
    tags:
      - "word-of-mouth"
      - "community-led"
      - "content-seo"
      - "bottom-up-plg"
  - title: "Give the full paid tier free to OSS, then sponsor maintainers"
    summary: "CodeRabbit makes its full Pro feature set free forever on public repositories and went further by pledging $1M to open source, distributing over $600K to maintainers in 2025 ($267K to 74 developers via GitHub Sponsors/Open Collective plus $360K+ in direct collaboration). Putting the real product into 100,000+ OSS projects means contributors encounter CodeRabbit's review comments on every PR in repos like tRPC and Vercel, turning maintainer goodwill into a top-of-funnel where contributors then bring it into their day jobs."
    metric_moved: "growth"
    result: "100,000+ OSS projects use CodeRabbit free; $600K+ distributed to maintainers in 2025 ($1M total pledged), driving 2M+ repos connected and 13M+ PRs reviewed."
    tier: "Verified"
    source_type: "press"
    source_url: "https://www.coderabbit.ai/blog/we-are-committed-to-supporting-open-source-distributed-600000-to-open-source-maintainers-in-2025"
    attribution: "CodeRabbit official blog: $600K+ distributed to OSS maintainers in 2025, free Pro for public repos; $1M pledge per coderabbit.ai/blog/coderabbit-commits-1-million-to-open-source"
