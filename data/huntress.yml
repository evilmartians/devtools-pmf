plays:
  - title: "Sell through the channel that already owns SMB trust"
    summary: "Closing 150,000 small businesses one at a time was hopeless for a tiny team selling enterprise-grade security. Huntress sold exclusively through Managed Service Providers (the outsourced IT shops SMBs already trust), where each $10K-$20K deal carries Huntress into dozens of the MSP's downstream clients. The channel does the trust-building and account management Huntress could never staff for, turning ~7,500 partners into a distribution layer that reaches 150,000+ SMBs."
    goal: "Acquisition"
    learning: "If your end users buy through an intermediary who already owns the relationship (agencies, MSPs, consultants, resellers), sell to that intermediary, not the end user: one partner deal lands you in dozens of downstream accounts and offloads trust-building and account management you cannot staff for. Pick a segment where the intermediary's economics align with reselling you."
    when_it_works: "When a concentrated layer of intermediaries already aggregates trust and IT decisions for a fragmented, hard-to-reach end market."
    metric_moved: "partner count / ARR"
    result: "Scaled to $100M+ ARR (70% YoY) and 150,000+ SMBs protected via ~7,500 MSP partners, adding 200-250 new partners/month, with no large direct sales force."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.frontlines.io/how-huntress-won-the-smb-cybersecurity-market/"
    attribution: "Kyle Hanslovan (CEO) on Category Visionaries / Frontlines.io"
    tags:
      - "channel-led"
      - "land-and-expand"
      - "distribution"
      - "smb"
  - title: "Run a monthly live-hacking webinar with zero sales pitch"
    summary: "With no ad budget, Huntress turned its founder's NSA-operative background into recurring top-of-funnel education. The monthly 'Tradecraft Tuesday' webinar and live 'Hacking into Microsoft 365' demos show MSPs real attacks (credential theft, MFA bypass, lateral movement) with an explicit no-sales, no-product-talk rule, plus engagement gamification (gifts for asking questions/answering polls in chat). The same content runs as keynotes at MSP trade shows and regional peer groups, reaching 20+ prospects at a time instead of one-on-one."
    goal: "Acquisition"
    learning: "Build a recurring, calendared educational event (monthly live demo or webinar) that dramatizes the painful problem you solve, and enforce a strict no-product-pitch rule so it earns trust instead of triggering ad-blockers; the credibility from teaching the threat pulls in buyers who didn't yet know a solution existed. Run the same act at the conferences and peer groups where your buyers already gather."
    when_it_works: "When your buyer underestimates a real, demonstrable pain and a vivid live demo can make that pain undeniable."
    metric_moved: "pipeline / ARR (zero ad spend)"
    result: "Grew from $0 to ~$5M ARR with zero ad spend, then continued doubling (roughly $10M to $20M to $40M to $72M to $100M+)."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://saasclub.io/podcast/huntress-kyle-hanslovan-429/"
    attribution: "Kyle Hanslovan (CEO), SaaS Club podcast ep. 429; Huntress 'Tradecraft Tuesday' webinar series"
    tags:
      - "education-led"
      - "webinar"
      - "live-demo"
      - "conference"
      - "demand-gen"
      - "community-led"
  - title: "Work inside early customers' offices one day a week"
    summary: "Not understanding the MSP buyer he was selling to, Kyle Hanslovan offered to work for free one day a week inside early MSP partners' offices, and did it for roughly the first two and a half years. Living their actual workflows surfaced exact pain points and language no case study or consultant could provide, which directly shaped both the product and the channel-first GTM."
    goal: "Activation"
    learning: "When you sell to a buyer whose day-to-day you don't actually live, embed inside a few early customers' operations for free (a standing day each week, for months) until their workflows and vocabulary are yours; this beats surveys and advisory calls because you feel the pain in real time and it shapes both product and positioning."
    when_it_works: "When your buyer's workflow is opaque to outsiders and getting the positioning wrong is the main thing blocking sales."
    metric_moved: "product/messaging fit"
    result: "Produced the buyer intimacy and messaging that underpinned the MSP channel model and growth past $100M ARR."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://saasclub.io/podcast/huntress-kyle-hanslovan-429/"
    attribution: "Kyle Hanslovan (CEO), SaaS Club podcast ep. 429; corroborated on Frontlines.io"
    tags:
      - "design-partners"
      - "customer-intimacy"
      - "founder-led-sales"
      - "positioning"
