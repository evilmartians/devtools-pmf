plays:
  - title: "Sell to the intermediary who already owns your customer"
    summary: "Closing 150,000 small businesses one at a time was hopeless for a tiny team selling enterprise-grade security. Huntress sold exclusively through Managed Service Providers (the outsourced IT shops SMBs already trust), where each $10K-$20K deal carries it into dozens of the MSP's downstream clients. The channel does the trust-building and account management Huntress could never staff for, turning ~7,500 partners into a distribution layer reaching 150,000+ SMBs."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "When your end users buy through someone who already owns the relationship (MSPs, agencies, resellers, consultants), make that intermediary your customer. Pick a segment where reselling you fits their economics, sign one partner, and land in their dozens of downstream accounts while they absorb the trust-building and account management you can't staff."
    when_it_works: "When a concentrated layer of intermediaries already aggregates trust and IT decisions for a fragmented, hard-to-reach end market."
    metric_moved: "partner count / ARR"
    result: "Scaled to $100M+ ARR (70% YoY) and 150,000+ SMBs protected via ~7,500 MSP partners, adding 200-250 new partners/month, with no large direct sales force."
    tradeoff: "Selling only through MSPs means you never own the end customer: the partner captures the margin, controls pricing and support quality, and can swap you for a competitor, so your 150,000 SMBs stay loyal to the MSP that fronts you."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.frontlines.io/how-huntress-won-the-smb-cybersecurity-market/"
    attribution: "Kyle Hanslovan (CEO) on Category Visionaries / Frontlines.io"
    tags:
      - "channel-led"
      - "land-and-expand"
      - "distribution"
      - "smb"
  - title: "Teach the threat live, ban the pitch, and let buyers self-qualify"
    summary: "With no ad budget, Huntress turned its founder's NSA-operative background into recurring top-of-funnel education. The monthly 'Tradecraft Tuesday' webinar and live 'Hacking into Microsoft 365' demos show MSPs real attacks (credential theft, MFA bypass, lateral movement) under an explicit no-sales, no-product-talk rule, with gamification (gifts for asking questions or answering polls in chat). The same content runs as keynotes at MSP trade shows and regional peer groups, reaching 20+ prospects at once."
    goal: "Acquisition"
    track: "Community & DevRel"
    learning: "Stand up a calendared monthly live demo that dramatizes the pain you solve, then enforce a hard no-product-talk rule so the session reads as genuine teaching. Making the threat undeniable pulls in buyers who didn't know a fix existed; run the same act at the conferences and peer groups where they already gather."
    when_it_works: "When your buyer underestimates a real, demonstrable pain."
    metric_moved: "pipeline / ARR (zero ad spend)"
    result: "Grew from $0 to ~$5M ARR with zero ad spend, then continued doubling (roughly $10M to $20M to $40M to $72M to $100M+)."
    tradeoff: "A strict no-pitch, founder-performed monthly event is a slow-compounding, content-heavy commitment with no directly attributable pipeline, so it can't be dialed up when you suddenly need revenue and it lives or dies on a credible founder showing up every month."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://saasclub.io/podcast/huntress-kyle-hanslovan-429/"
    attribution: "Kyle Hanslovan (CEO), SaaS Club podcast ep. 429; Huntress 'Tradecraft Tuesday' webinar series"
    tags:
      - "education-led"
      - "webinar"
      - "live-demo"
      - "conference"
      - "demand-gen"
      - "community-led"
  - title: "Embed in your buyer's office until their vocabulary is yours"
    summary: "Not understanding the MSP buyer he was selling to, Kyle Hanslovan offered to work free one day a week inside early MSP partners' offices, and did it for roughly the first two and a half years. Living their workflows surfaced exact pain points and language no case study or consultant could provide, which shaped both the product and the channel-first GTM."
    goal: "Activation"
    learning: "If you sell to a buyer whose daily work you don't live, work free inside a few early accounts one standing day a week for months until their workflows and words are yours. Feeling the pain in real time beats surveys and advisory calls, and shapes both the product and the positioning that unblocks sales."
    when_it_works: "When your buyer's workflow is opaque to outsiders and getting the positioning wrong is the main thing blocking sales."
    metric_moved: "product/messaging fit"
    result: "Produced the buyer intimacy and messaging that underpinned the MSP channel model and growth past $100M ARR."
    tradeoff: "Standing a day a week inside partner offices for roughly two and a half years is unscalable founder time that doesn't compound, spent on a handful of accounts while everything else the founder could be building waits."
    tier: "Reported"
    source_type: "spokesperson"
    source_url: "https://saasclub.io/podcast/huntress-kyle-hanslovan-429/"
    attribution: "Kyle Hanslovan (CEO), SaaS Club podcast ep. 429; corroborated on Frontlines.io"
    tags:
      - "design-partners"
      - "customer-intimacy"
      - "founder-led-sales"
