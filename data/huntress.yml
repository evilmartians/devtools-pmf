plays:
  - title: "Sell through MSPs, not to SMBs directly"
    summary: "Educating and closing 150,000 individual small businesses one at a time was hopeless for a tiny team. Huntress instead sold exclusively through Managed Service Providers, who already owned the trust and IT relationship with thousands of SMBs each. Roughly 4,000 MSP partners now carry Huntress into ~110,000+ SMBs, turning each partner into a force-multiplying distribution channel."
    metric_moved: "growth"
    result: "Channel-first model scaled to $100M+ ARR and 150,000+ SMBs protected via ~7,500 MSP partners, adding 200-250 new partners/month, without a large direct sales force."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.frontlines.io/how-huntress-won-the-smb-cybersecurity-market/"
    attribution: "Kyle Hanslovan (CEO) on Category Visionaries / Frontlines.io"
    tags:
      - "land-and-expand"
      - "founder-led-sales"
      - "word-of-mouth"
  - title: "Lead with education at customer watering holes"
    summary: "With zero ad budget and no SaaS playbook, Kyle Hanslovan found where MSPs already congregated: trade shows and regional peer groups. He gave keynotes and live hacking demos instead of sales pitches, reaching 20 prospects at once rather than one-on-one. 'Huntress never led with sales. We always lead with education first.'"
    metric_moved: "organic"
    result: "Grew from $0 to roughly $5M ARR over ~6 years with zero ad spend, then continued doubling/tripling ($10M to $20M to $40M to $72M to $120M)."
    tier: "Reported"
    source_type: "estimate"
    source_url: "https://saasclub.io/podcast/huntress-kyle-hanslovan-429/"
    attribution: "Kyle Hanslovan (CEO), SaaS Club podcast ep. 429"
    tags:
      - "conference-talk"
      - "developer-advocacy"
      - "community-led"
      - "content-seo"
  - title: "Work inside your customer's office for free"
    summary: "To deeply learn the buyer he barely understood, Kyle Hanslovan offered to work for free one day a week inside MSP offices, doing this for roughly the first two and a half years. Living their workflows revealed exact pain points, client needs, and how to position Huntress as indispensable, insight that shaped both product and the channel GTM."
    metric_moved: "growth"
    result: "Produced the customer intimacy and messaging that underpinned the MSP channel model and growth past $100M ARR."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.frontlines.io/how-huntress-won-the-smb-cybersecurity-market/"
    attribution: "Kyle Hanslovan (CEO) on Category Visionaries / Frontlines.io"
    tags:
      - "design-partners"
      - "founder-led-sales"
      - "dogfooding"
