plays:
  - title: "Gate your waitlist with a survey, invite 10/week"
    summary: "Linear collected ~10,000 emails from a launch-blog signup form, then funneled every signup through a survey that looked optional but asked 'Why do you want to use it and what are your current problems?' Karri Saarinen used the answers to hand-pick the ~10 most motivated, best-fit users each week, rebuilding the product against each fresh cohort's feedback. The beta ran nearly a year; ~10% of the waitlist converted to users and Linear reached ~1,000 DAU with steadily high retention before opening to the public."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Make your waitlist survey the filter, not the formality: ask each signup what problem they're trying to solve, then admit only a small weekly cohort of the most motivated, best-fit responders so every release is shaped by people who actually need you and retention is proven before you scale."
    when_it_works: "Works when demand outstrips your ability to support users and product direction is still uncertain, so deliberate scarcity buys you tight feedback loops; it backfires if you already have PMF and are just throttling growth you could capture."
    metric_moved: "free_to_paid"
    result: "~10,000 waitlist signups; ~10% converted to users over a year-long gated beta; ~1,000 DAU at public launch; profitable within 12 months."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://review.firstround.com/linears-path-to-product-market-fit/"
    attribution: "Karri Saarinen (CEO, Linear) in First Round Review"
    tags:
      - "twitter-x"
      - "design-partners"
      - "founder-led-sales"
      - "bottom-up-plg"
      - "waitlist-gating"
  - title: "Ship a public weekly changelog before you have users"
    summary: "Linear published a public changelog on a weekly/bi-weekly cadence tied to its sprint cycles, posting over 50 updates in the first 12 months, before it had a meaningful user base. The visible shipping pace doubled as proof of execution: most angels and VCs they met were already following along, and most job candidates had read it before applying. Over 1,000 people followed the changelog, some non-users resharing it and widening reach organically."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Turn your release notes into a public, dated, weekly artifact and start it before you have an audience: a visible cadence of shipped work is the cheapest proof-of-execution you have, and it recruits investors, candidates, and users from the same feed."
    when_it_works: "Works when you genuinely ship something visible every week or two and your buyers care about velocity; an empty or sporadic changelog signals the opposite."
    metric_moved: "organic"
    result: "50+ changelogs in 12 months; 1,000+ changelog followers; de-risked the company for investors and candidates while lifetime paid marketing stayed near $35K."
    tier: "Verified"
    source_type: "press"
    source_url: "https://linear.app/now/startups-write-changelogs"
    attribution: "Linear official essay 'Startups, write changelogs'"
    tags:
      - "changelog-marketing"
      - "transparency"
      - "twitter-x"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Disclose profitability and tiny headcount as a flex"
    summary: "Each January on the company anniversary, Saarinen posts a founder-authored milestone update that weaponizes constraints as positioning: 'profitable since 2021, negative lifetime burn,' '50 employees, 14,000 customers, NRR 140%+,' only 4 salespeople serving 18,000+ paying companies. The numbers most founders hide become the proof points, and Linear bundles them with podcast and newsletter appearances across a multi-week window instead of one press day. The motion carried Linear to a $1.25B Series C on ~0.5% of revenue spent on marketing."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Publish the efficiency metrics rivals keep private, profitability, burn, revenue-per-employee, sales headcount, on a predictable annual cadence, and stagger the reveal across podcasts and newsletters over weeks rather than one launch day, so a single milestone produces sustained word-of-mouth instead of a one-day spike."
    when_it_works: "Works when your numbers are genuinely enviable (real profitability or extreme leverage) and your audience respects discipline; broadcasting mediocre metrics just hands competitors ammunition."
    metric_moved: "organic"
    result: "Anniversary posts reached millions of views; sustained near-zero paid acquisition with a 4-person sales team serving 18,000+ paying companies."
    tier: "Reported"
    source_type: "aggregator"
    source_url: "https://www.growthhunt.ai/growth-story/linear"
    attribution: "GrowthHunt growth story; milestone figures corroborated by Karri Saarinen's X/LinkedIn anniversary posts"
    tags:
      - "transparency"
      - "twitter-x"
      - "podcast"
      - "newsletter"
      - "word-of-mouth"
