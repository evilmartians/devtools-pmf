plays:
  - title: "Hand-pick beta users from a survey-gated waitlist"
    summary: "Before launch, Linear's founders used their Twitter following to fill a ~10,000-person waitlist, then gated entry with a survey asking 'Why do you want to use it and what are your current problems?' Each week Karri Saarinen personally invited ~10 of the most motivated, best-fit users (individual builders at small fast-growing companies), running the private beta for roughly a year. Releasing slowly avoided 'burning our reputation' on an unpolished product and gave each cohort distinct feedback to ship against. By public launch they had ~1,000 daily active users and near-total conversion."
    metric_moved: "free_to_paid"
    result: "~10,000 waitlist signups pre-funding; ~1,000 DAU at public launch after a year-long gated beta; profitable within 12 months of launch."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://review.firstround.com/linears-path-to-product-market-fit/"
    attribution: "Karri Saarinen (CEO, Linear) in First Round Review; corroborated by his LinkedIn post on the private beta rollout"
    tags:
      - "twitter-x"
      - "design-partners"
      - "founder-led-sales"
      - "bottom-up-plg"
      - "word-of-mouth"
  - title: "Publish a weekly public changelog before you have users"
    summary: "Linear started shipping a public, weekly changelog before it had a meaningful user base, posting screenshots and demos of every update to Twitter, over 50 changelogs in the first 12 months. The cadence doubled as marketing, recruiting, and fundraising proof: most VCs and angels they met had been following the changelog and were impressed by the visible pace, and most job candidates had read it before applying. Linear later argued in its own essay that startups should write changelogs because visible progress attracts users, talent, and investors simultaneously."
    metric_moved: "organic"
    result: "Drove organic word-of-mouth (1,000+ changelog followers, some non-users sharing posts) and de-risked the company for investors and candidates; total lifetime paid marketing stayed at roughly $35K through Series C."
    tier: "Verified"
    source_type: "press"
    source_url: "https://linear.app/now/startups-write-changelogs"
    attribution: "Linear official essay 'Startups, write changelogs'; corroborated by LastRelease case study"
    tags:
      - "changelog-marketing"
      - "transparency"
      - "twitter-x"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Time milestone disclosures to compound word-of-mouth"
    summary: "Instead of buying ads, Linear leaned on recurring, founder-authored milestone posts on the company anniversary each January (e.g. 'profitable since 2021, negative lifetime burn'; '50 employees, 14,000 customers, NRR 140%+'). The posts disclose constraints like profitability and tiny sales headcount as offensive positioning, regularly hitting millions of views, and are reinforced by bundling big announcements with podcast and newsletter appearances over a multi-week window rather than a single press day. The motion let Linear grow to a $1.25B Series C on roughly $35K of lifetime paid marketing (0.5% of revenue)."
    metric_moved: "organic"
    result: "Anniversary posts reached 2M+ views; sustained near-zero paid acquisition with only a 4-person sales team serving 18,000+ paying companies."
    tier: "Reported"
    source_type: "aggregator"
    source_url: "https://www.growthhunt.ai/growth-story/linear"
    attribution: "GrowthHunt growth story; milestone figures corroborated by Karri Saarinen's own X/LinkedIn anniversary posts"
    tags:
      - "transparency"
      - "twitter-x"
      - "podcast"
      - "newsletter"
      - "word-of-mouth"
