plays:
  - title: "Make the waitlist survey a filter"
    summary: "Linear collected ~10,000 emails from a launch-blog signup form, then ran every signup through a survey that looked optional but asked 'Why do you want to use it and what are your current problems?' Karri Saarinen used the answers to hand-pick the ~10 most motivated, best-fit users each week, rebuilding the product against each cohort's feedback. The gated beta ran nearly a year; ~10% converted to users and Linear reached ~1,000 DAU with high retention before opening to the public."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Funnel every signup through a one-question survey ('what problem are you trying to solve?'), then admit only the ~10 most motivated, best-fit responders each week, so every release is shaped by people who need you and retention is proven before you scale."
    when_it_works: "Works when demand outstrips your ability to support users and product direction is still uncertain; it backfires if you already have PMF and are just throttling growth you could capture."
    metric_moved: "free_to_paid"
    result: "~10,000 waitlist signups; ~10% converted to users over a year-long gated beta; ~1,000 DAU at public launch; profitable within 12 months."
    tradeoff: "Admitting only ~10 hand-picked users a week means a year of suppressed growth and manual founder triage of every signup, so ~9,000 of 10,000 interested emails sit unconverted while you forgo the revenue and network effects that opening the gates earlier would have captured."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://review.firstround.com/linears-path-to-product-market-fit/"
    attribution: "Karri Saarinen (CEO, Linear) in First Round Review"
    tags:
      - "twitter-x"
      - "design-partners"
      - "founder-led-sales"
      - "bottom-up-plg"
      - "waitlist-gating"
  - title: "Ship a public changelog before you have an audience"
    summary: "Linear published a public changelog on a weekly/bi-weekly cadence tied to its sprints, posting 50+ updates in the first 12 months before it had a meaningful user base. The shipping pace doubled as proof of execution: most angels and VCs they met were already following along, and most job candidates had read it before applying. Over 1,000 people followed it, some non-users resharing and widening reach organically."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Publish dated release notes on a weekly cadence tied to your sprints and start before anyone is watching: a visible record of shipped work is the cheapest proof-of-execution you have, and it recruits investors, candidates, and users from one feed."
    when_it_works: "Works when you genuinely ship something visible every week or two and your buyers care about velocity; an empty or sporadic changelog signals the opposite."
    metric_moved: "organic"
    result: "50+ changelogs in 12 months; 1,000+ changelog followers; de-risked the company for investors and candidates while lifetime paid marketing stayed near $35K."
    tradeoff: "A dated public cadence becomes a treadmill you can never visibly slow: any week you ship nothing broadcasts stalled velocity to the same investors and candidates watching, so you owe demo-worthy work on schedule indefinitely and forfeit the option to do quiet, long-horizon work."
    tier: "Verified"
    source_type: "press"
    source_url: "https://linear.app/now/startups-write-changelogs"
    attribution: "Linear official essay 'Startups, write changelogs'"
    tags:
      - "changelog-marketing"
      - "transparency"
      - "twitter-x"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Publish the efficiency metrics your rivals hide"
    summary: "Each January on the company anniversary, Saarinen posts a founder-authored milestone update that turns constraints into positioning: 'profitable since 2021, negative lifetime burn,' '50 employees, 14,000 customers, NRR 140%+,' only 4 salespeople serving 18,000+ paying companies. The numbers most founders hide become the proof points, staggered across podcast and newsletter appearances over a multi-week window. The motion carried Linear to a $1.25B Series C on ~0.5% of revenue spent on marketing."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Disclose profitability, burn, and revenue-per-employee on a fixed annual cadence, then stagger the reveal across podcasts and newsletters over several weeks so a single milestone produces sustained word-of-mouth."
    when_it_works: "Works when your numbers are genuinely enviable (real profitability or extreme leverage) and your audience respects discipline; broadcasting mediocre metrics just hands competitors ammunition."
    metric_moved: "organic"
    result: "Anniversary posts reached millions of views; sustained near-zero paid acquisition with a 4-person sales team serving 18,000+ paying companies."
    tradeoff: "Publishing profitability, burn, and per-employee leverage every year hands competitors your exact playbook and raises the bar you must clear at each anniversary, so the moment any metric softens the same audience reads the silence as decline and the flex curdles into a liability."
    tier: "Reported"
    source_type: "aggregator"
    source_url: "https://www.growthhunt.ai/growth-story/linear"
    attribution: "GrowthHunt growth story; milestone figures corroborated by Karri Saarinen's X/LinkedIn anniversary posts"
    tags:
      - "transparency"
      - "twitter-x"
      - "podcast"
      - "newsletter"
      - "word-of-mouth"
  - title: "Hard-code one opinionated workflow as the default"
    summary: "Most B2B tools win deals by being infinitely configurable, which lets every team invent its own process and creates chaos at scale. Linear bet the other way: it built and published the 'Linear Method,' baking one default way of working (Triage, Cycles, fixed issue states) into the product. Once a team runs its cadence on those opinionated defaults, the tool becomes how the team operates, so switching means re-inventing its entire process. Linear reports 140%+ net revenue retention with near-zero paid marketing and 4 salespeople serving 18,000+ paying companies."
    goal: "Retention"
    learning: "Pick the single best way your customers should work and bake it in as a named, documented default (Triage, Cycles, fixed states); once a team's process lives inside your defaults, switching tools means re-inventing how they operate, which is what makes them stay."
    when_it_works: "Works when you serve a workflow with a genuinely better 'right answer' and your buyers value focus over flexibility."
    metric_moved: "retention"
    result: "Net revenue retention 140%+ (CEO, Jan 2025); minimal churn cited across coverage; profitable since 2021 with ~0.5% of revenue spent on marketing."
    tradeoff: "Hard-coding one default way of working trades away every buyer whose process is idiosyncratic, regulated, or entrenched, capping your addressable market at teams willing to adopt your opinion and guaranteeing churn the instant your opinion conflicts with how a team must actually operate."
    tier: "Verified"
    source_type: "press"
    source_url: "https://linear.app/method"
    attribution: "Linear official 'Linear Method' (principles/practices built into the product); NRR 140%+ from Karri Saarinen (CEO) on X, Jan 2025; opinionated-software framing corroborated by Figma blog 'The Linear Method: Opinionated Software'"
    tags:
