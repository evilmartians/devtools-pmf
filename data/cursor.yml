plays:
  - title: "Fork the incumbent, offer one-click import"
    summary: "Cursor was built as a fork of VS Code rather than a brand-new editor. On first launch it detects an existing VS Code install and offers a one-click import that transfers extensions, themes, keybindings, and all user settings. This made switching feel instantaneous for the vast majority of developers, removing the single biggest barrier to adopting a new IDE and letting Cursor compete on AI features instead of on muscle memory."
    metric_moved: "ttfv"
    result: "Developers keep their entire VS Code setup, making the switch frictionless; the fork let Cursor inherit the VS Code ecosystem while controlling the core AI experience, a key enabler of its word-of-mouth, zero-marketing growth."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://cursor.com/docs/configuration/migrations/vscode"
    attribution: "Cursor official docs: \"VS Code Import\" one-click import of extensions, themes, settings, and keybindings"
    tags:
      - "onboarding-redesign"
      - "bottom-up-plg"
      - "open-source"
      - "default-on"
  - title: "Lead with a mind-reading default autocomplete"
    summary: "Cursor's wedge was Tab, a custom autocomplete model that predicts the next edit (not just the next token) and works the instant you start typing. By Cursor's own account, Tab \"opened the first era of AI-assisted coding\" and excelled at automating low-entropy, repetitive work, producing \"significant leverage for nearly two years.\" The feature delivered an immediate, visceral wow moment that turned trials into daily-active habits and fueled developer evangelism."
    metric_moved: "growth"
    result: "Tab was the PMF trigger and primary feature through 2024-early 2025 (2.5x more users than agents as of March 2025); it anchored Cursor's rise to the fastest SaaS company ever to $100M ARR."
    tier: "Verified"
    source_type: "press"
    source_url: "https://cursor.com/blog/third-era"
    attribution: "Cursor official blog, \"The third era of AI software development\""
    tags:
      - "default-on"
      - "developer-advocacy"
      - "word-of-mouth"
  - title: "Grow entirely on developer word-of-mouth"
    summary: "With a 40-60 person team and no outbound sales organization, Cursor reached hundreds of millions in ARR almost entirely through developer word-of-mouth and bottom-up adoption. A free tier seeded personal use, developers who tried it couldn't go back and recommended it to colleagues, and that compounding recommendation loop walked the tool into teams and enterprises with effectively zero paid marketing."
    metric_moved: "organic"
    result: "Reported $0 marketing spend to $100M ARR; \"growth achieved with minimal traditional sales and marketing\" by a 40-60 person team that \"hadn't built an outbound sales organization.\""
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://digidai.github.io/2025/11/21/michael-truell-cursor-anysphere-fastest-growing-saas-deep-analysis/"
    attribution: "Analysis of Michael Truell / Cursor growth, digidai (Nov 2025)"
    tags:
      - "word-of-mouth"
      - "bottom-up-plg"
      - "free-tier"
      - "community-led"
