plays:
  - title: "Fork the incumbent, import its setup in one click"
    summary: "Instead of building a new IDE from scratch, Cursor forked VS Code so it inherited the entire extension and theme ecosystem. On first launch it detects an existing VS Code install and offers a one-click import that transfers extensions, themes, keybindings, and all settings. Switching cost a developer almost nothing, so Cursor competed on its AI features instead of fighting years of muscle memory."
    goal: "Activation"
    learning: "When you enter a category with a sticky incumbent, build on the incumbent's foundation and ship a one-click import of the user's existing config, so trying you costs them nothing and you compete only on your new value, not on their accumulated habits."
    when_it_works: "Works when the incumbent is open-source or forkable and switching pain is dominated by setup/muscle memory rather than locked-in data or contracts."
    metric_moved: "ttfv"
    result: "Developers keep their full VS Code environment on switch; the fork let Cursor inherit the VS Code ecosystem while owning the AI layer, a key enabler of its zero-marketing, word-of-mouth growth to $1B+ ARR."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://cursor.com/docs/configuration/migrations/vscode"
    attribution: "Cursor official docs: \"VS Code Import\" one-click import of extensions, themes, settings, and keybindings"
    tags:
      - "onboarding-redesign"
      - "bottom-up-plg"
      - "open-source"
      - "default-on"
      - "migration"
  - title: "Make one default feature an instant wow on install"
    summary: "Cursor's wedge was Tab, a custom model that predicts your next edit (not just the next token) and fires the instant you type, with no setup or prompting. By Cursor's own account Tab \"opened the first era of AI-assisted coding\" and gave \"significant leverage for nearly two years.\" The visceral, on-by-default wow moment turned trials into daily habits and made developers evangelize the tool unprompted."
    goal: "Activation"
    learning: "Pick one wedge feature that delivers a visible payoff within seconds of install, turn it on by default with no configuration, and let that single moment carry trial-to-habit conversion and word-of-mouth instead of relying on a broad feature pitch."
    when_it_works: "Works when you can engineer a genuinely surprising result that lands in the first session; it backfires if the wow requires setup, data, or a learning curve before it triggers."
    metric_moved: "growth"
    result: "Tab was the PMF trigger and the primary feature through early 2025 (2.5x more users than agents as of March 2025); it anchored Cursor's rise to the fastest SaaS company ever to $100M ARR (12 months)."
    tier: "Verified"
    source_type: "press"
    source_url: "https://cursor.com/blog/third-era"
    attribution: "Cursor official blog, \"The third era of AI software development\""
    tags:
      - "default-on"
      - "developer-advocacy"
      - "word-of-mouth"
      - "wedge"
  - title: "Engineer a free-tier loop that walks the tool into teams"
    summary: "Cursor ran a deliberate bottom-up loop with no outbound sales for years: a free tier (2,000 completions/month) seeds personal use, the developer hits the contrast with single-line Copilot and upgrades to $20/mo Pro, then mentions it in standup so teammates try it, the manager sees faster shipping, and the org buys a Business plan. The same engineers then surface it at conferences, restarting the loop. A 40-60 person team rode this to scale with effectively $0 paid marketing."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Design the free tier as the first step of an explicit expansion path: make individual value obvious so solo users upgrade, then build the product so paid individuals naturally pull in teammates (visible output, shared workflows), letting bottom-up adoption replace an outbound sales motion."
    when_it_works: "Works when individual value is felt before team value and adoption is visible to peers; it stalls where the buyer is top-down and individual usage stays invisible inside the org."
    metric_moved: "organic"
    result: "Reported $0 marketing spend to $100M ARR and on to $500M ARR with no traditional sales/marketing; 35% free-to-paid conversion (roughly 10x the 1-4% SaaS norm) feeds the loop."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.builderlab.ai/p/growth-machines-the-cursor-story"
    attribution: "\"Growth Machines: The Cursor Story,\" BuilderLab (Pranav Pathak); corroborated by digidai analysis of Michael Truell / Cursor growth (Nov 2025)"
    tags:
      - "word-of-mouth"
      - "bottom-up-plg"
      - "free-tier"
      - "community-led"
      - "land-and-expand"
