plays:
  - title: "Ship a free Community Edition as the wedge"
    summary: "Security automation is normally a sales-led, services-heavy enterprise purchase. Tines instead published a forever-free Community Edition (1 builder, 3 flows, unlimited integrations and viewers, no credit card) so an individual analyst can stand up a real workflow before any procurement conversation. The free tier seeds the product inside an org and lets it walk into the enterprise plan, and Tines reached 400+ customers including Coinbase, Databricks, Reddit and SAP while staying profitable."
    metric_moved: "free_to_paid"
    result: "Free tier became the top-of-funnel for an enterprise motion; 400+ customers by mid-2025, 122% NRR (company-reported), and >1B automated actions per week."
    tier: "Reported"
    source_type: "aggregator"
    source_url: "https://research.contrary.com/company/tines"
    attribution: "Contrary Research company report on Tines; Tines pricing page (tines.com/pricing) for Community Edition terms"
    tags:
      - "free-tier"
      - "freemium"
      - "bottom-up-plg"
      - "land-and-expand"
      - "developer-advocacy"
  - title: "Build a prebuilt workflow library to kill time-to-value"
    summary: "New SOAR users stall because building a first automation from scratch is slow and intimidating. Tines launched a Story Library of 100+ ready-made workflows (ServiceNow tickets, Active Directory access removal, VirusTotal scans) that users import and customize instantly. Eoin Hinchy framed it as redefining world-class onboarding, a place that inspires and helps you automate anything. The library grew to 1,000+ workflows co-built by customers, partners and the Tines team, becoming the default first stop for builders."
    metric_moved: "ttfv"
    result: "Library grew from 100+ at launch to 1,000+ workflows; customers report it is the first place they go and that it cuts build time on new processes."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.tines.com/blog/introducing-the-tines-story-library/"
    attribution: "Tines blog (Eoin Hinchy, Story Library launch); Tines blog '1000th workflow' (Haley Kidd, GE Vernova)"
    tags:
      - "templates-starters"
      - "onboarding-redesign"
      - "docs-as-marketing"
      - "community-led"
      - "integrations-marketplace"
  - title: "Position as HTTP-first 'works with any API'"
    summary: "Legacy security automation tools shipped brittle vendor-specific connectors that gated which tools you could integrate. Tines positioned the platform as no-code but HTTP-first: it works with any API, so teams are never blocked waiting for an official integration. This removed the single biggest adoption objection for security teams with sprawling, disparate toolchains and let unglamorous long-tail use cases get automated, driving deep daily engagement."
    metric_moved: "retention"
    result: "Reported 59% WAU/MAU (company-reported, Netflix/Spotify-tier) and >1B automated actions per week, reflecting daily workflow dependency."
    tier: "Reported"
    source_type: "aggregator"
    source_url: "https://research.contrary.com/company/tines"
    attribution: "Contrary Research company report on Tines ('Tines works with any API'); Tines Almanac for WAU/MAU"
    tags:
