plays:
  - title: "Wedge into procurement with a forever-free Community Edition"
    summary: "Security automation is normally a sales-led, services-heavy enterprise purchase that an individual analyst can never start alone. Tines shipped a forever-free Community Edition (1 team, 3 flows, 25,000 monthly events, unlimited viewers, no credit card) giving a single analyst the full platform builder to stand up a real workflow and build the internal business case before any procurement conversation. The free tier seeds the product inside the org and walks itself into the enterprise plan; Tines reached 400+ customers including Coinbase, Databricks, Reddit and SAP while staying profitable from day one."
    goal: "Acquisition"
    track: "Open-source"
    learning: "In a category sold only top-down through procurement, give the individual practitioner a forever-free tier with enough room to ship one real production-grade workflow, so they build your business case for you before sales ever engages."
    when_it_works: "Works when a single hands-on practitioner inside the buyer can get real value alone and has the standing to champion a later enterprise purchase."
    metric_moved: "free_to_paid"
    result: "Free tier became top-of-funnel for an enterprise motion; 400+ customers by mid-2025, 122% NRR (company-reported), and >1B automated actions per week."
    tradeoff: "A forever-free tier in a top-down category means you fund the hosting, support, and serving of many analysts who never convert, and you stake acquisition on a slow, indirect path where a single practitioner must build your business case and surface an enterprise buyer you don't control."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.tines.com/blog/announcing-the-tines-community-edition/"
    attribution: "Tines blog 'Announcing the Tines Community Edition' (edition limits); Contrary Research company report on Tines (400+ customers, profitability)"
    tags:
      - "free-tier"
      - "freemium"
      - "bottom-up-plg"
      - "land-and-expand"
      - "developer-advocacy"
  - title: "Seed onboarding with a one-click prebuilt workflow library"
    summary: "New SOAR users stall because building a first automation from scratch is slow and intimidating, so they never reach value. Tines launched a Story Library of 100+ ready-made, one-click-import workflows (ServiceNow tickets, Active Directory access removal, VirusTotal scans) that users clone and customize instead of starting blank. The library became the default first stop for builders and grew to 1,000+ workflows co-built by customers and partners; for at least one enterprise customer, onboarding a process dropped from one to two months on Splunk to a single day on Tines."
    goal: "Activation"
    learning: "Replace the blank canvas with a library of one-click-importable, real-world templates covering your top use cases, so a new user's first action is cloning a working flow rather than building from zero."
    when_it_works: "Works when your product is a flexible builder where the blank start is the main friction and common use cases are predictable enough to pre-template."
    metric_moved: "ttfv"
    result: "Library grew from 100+ at launch to 1,000+ workflows; one enterprise cut process onboarding from 1-2 months (Splunk) to 1 day on Tines."
    tradeoff: "Owning a 1,000+ template library is an open-ended maintenance liability where any upstream API or integration change can silently break clones, and one-click imports can anchor users to your prebuilt patterns instead of learning the builder deeply enough to expand on their own."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.tines.com/blog/introducing-the-tines-story-library/"
    attribution: "Tines blog 'Introducing the Story Library'; Tines onboarding/library blog posts (Splunk-to-Tines onboarding time)"
    tags:
      - "templates-starters"
      - "onboarding-redesign"
      - "docs-as-marketing"
      - "community-led"
      - "integrations-marketplace"
  - title: "Neutralize the integration objection by going HTTP-first"
    summary: "Legacy SOAR tools ship vendor-specific app connectors that each wrap a small subset of a tool's API, so teams are gated on which tools they can automate and wait on the vendor for new connectors. Tines reframed itself as having effectively zero connectors and infinite integrations: a generic HTTP Request action talks to any REST or non-REST API directly, so no team is ever blocked. This removes the single biggest adoption objection for security teams with sprawling toolchains, and matters because more than a third of analysts rank API-first as the single most important feature when choosing a SOAR tool."
    goal: "Retention"
    learning: "If incumbents gate users behind a finite list of prebuilt connectors, expose one generic primitive (raw HTTP/API access) that reaches anything, and market the absence of connectors as the feature so buyers are never blocked waiting on you."
    when_it_works: "Works when buyers have long-tail, fragmented tools the incumbent's official connectors won't cover, and a generic primitive can credibly replace them."
    metric_moved: "retention"
    result: "Removed the top adoption blocker for fragmented toolchains; reported 59% WAU/MAU (company-reported) and >1B automated actions per week, reflecting daily dependency."
    tradeoff: "Marketing the absence of connectors pushes the integration labor onto the user, who must understand each tool's raw API, auth, and payloads, so you trade turnkey convenience for self-serve effort that less technical buyers can't absorb without help."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.tines.com/blog/solving-the-integrations-problem/"
    attribution: "Tines blog 'Making SOAR integrations seamless with an API-centric approach' (HTTP-first model, 'more than a third of analysts' stat); Tines Almanac for WAU/MAU"
    tags:
      - "integrations-marketplace"
      - "bottom-up-plg"
      - "developer-advocacy"
