plays:
  - title: "If users embed your code, you never meet them"
    summary: "Shay Banon's first open-source project, Compass, was a Java library, and he concluded 'you can't really build a business around something like that' because a library gets embedded and hidden inside someone else's app, leaving no direct relationship to the user. For Elasticsearch he built a distributed runtime that developers download, run, and operate as clusters, open-sourced under Apache 2.0 in February 2010, two years before the company existed. Because users run the software directly, Elastic owned the connection to every operator, and an ecosystem of community language clients (Go, PHP, Python, Ruby, .NET) grew on top, seeding bottom-up adoption that later converted to paid support and cloud."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Ship your core as something the user runs and operates (a server, daemon, or hosted endpoint), so you own a direct line to every operator and a paid hosted/support layer sits on top. A library disappears into someone else's binary and takes your relationship with it; give people something to run."
    when_it_works: "Works when your core is something a developer must actually run and operate (a database, server, or runtime); a pure client-side library with nothing to operate gains nothing here."
    metric_moved: "Developer adoption / top-of-funnel"
    result: "Apache-licensed Elasticsearch (Feb 2010) drove developer-led adoption that fed a 2018 IPO and $1.483B FY2025 revenue, with Elastic Cloud at $688M (+26% YoY)."
    tradeoff: "A runnable distributed runtime is far heavier to build, document, and support than a library, and it pushes the operational burden of running clusters onto users, so you inherit responsibility for their production reliability and must staff support for self-hosted operators you don't bill."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.binpress.com/podcast-16-shay-banon-elasticsearch/"
    attribution: "Shay Banon on the Binpress Podcast (open-source runtime vs library; ecosystem of community language clients); corroborated by Index Ventures 'Elastic: The Evolution of Open Source' and Changelog Interviews #614"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "community-led"
      - "runtime"
  - title: "Relicensing buys you a fork where you wanted a moat"
    summary: "AWS shipped a managed 'Amazon Elasticsearch Service' that, per Elastic, profited from their work without contributing back and misused the trademark. In January 2021 (the 7.11 release) Elastic moved Elasticsearch and Kibana off permissive Apache 2.0 to dual SSPL plus the Elastic License, stripping the terms cloud providers relied on to resell it as a service. AWS forked the project into OpenSearch and donated it to the Linux Foundation. The defensive goal was met at real cost: OpenSearch drew 496 contributors and 100M+ downloads in year one, parts of the community felt betrayed, and Elastic's stock fell around the fork and took years to recover."
    goal: "Revenue"
    learning: "When a hyperscaler resells your permissive OSS as a managed service without reinvesting, relicense to source-available (SSPL or a custom license) to cut off the free ride."
    when_it_works: "Pays off when your managed/cloud offering is already the better product and your brand is the draw."
    metric_moved: "Cloud revenue defense vs. community goodwill"
    result: "Closed the loophole letting AWS resell Elastic's OSS, protecting Elastic Cloud revenue ($688M, +26% YoY in FY2025); the tradeoff was a credible competing fork (OpenSearch: 496 contributors, 100M+ downloads in year one) and a years-long stock and goodwill hit."
    tradeoff: "Stripping the permissive license to cut off AWS handed a well-resourced rival the opening to fork the last open version into OpenSearch (496 contributors, 100M+ downloads in year one), alienated part of the community who felt betrayed, and triggered a years-long stock and goodwill hit."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.elastic.co/blog/licensing-change"
    attribution: "Elastic licensing-change blog (Shay Banon): cloud providers 'provided them as a service, without contributing back'; AWS response in AWS Open Source Blog 'Stepping up for a truly open source Elasticsearch'; fork outcomes per CHAOSS and socket.dev reporting"
    tags:
      - "open-source"
      - "licensing"
      - "competitive-moat"
      - "hyperscaler"
      - "monetization"
  - title: "Developers Google 'open source X' and source-available falls off the list"
    summary: "After three years on the source-available SSPL and Elastic License, Banon concluded the proprietary tag was quietly costing demand: developers shopping for tools 'just Google open source vector database, see a list, and choose between options because they care about open source,' and source-available products fall off those lists. In 2024 Elastic added the OSI-approved AGPL as a third license for Elasticsearch and Kibana (8.16+), reclaiming the literal 'open source' designation, timed for the moment Elasticsearch was competing to be the runtime for RAG and generative-AI apps where the OSS shortlist matters most."
    goal: "Acquisition"
    track: "Open-source"
    learning: "An OSI-approved license is a discovery channel: buyers in infra, databases, and AI tooling literally search 'open source X' and pick from what surfaces, and source-available products silently drop off. If you went source-available, add a true OSI license (AGPL still deters hosted free-riders) to get back on the shortlists buyers actually screen by."
    when_it_works: "Works when your buyers screen for 'open source' as a hard filter (common in infra, databases, and AI tooling); less impactful where buyers don't care about the license label."
    metric_moved: "Organic discovery / shortlist inclusion"
    result: "Restored the OSI 'open source' label so Elasticsearch reappears in developers' 'open source X' shortlists and discovery searches; Banon framed the AGPL addition as a driver of renewed engagement and adoption."
    tradeoff: "Returning to a true OSI license to get back on the 'open source' shortlists meant publicly conceding the four-year proprietary detour was a mistake and re-opening the door for hosted competitors to legally run your core, the very free-riding the 2021 relicense was meant to stop."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2024/09/29/elastic-founder-on-why-they-returned-to-open-source-four-years-after-going-proprietary/"
    attribution: "Shay Banon interview, TechCrunch (Sept 2024); corroborated by Elastic blog 'Elasticsearch Is Open Source. Again!' and InfoQ 'Elastic Returns to Open Source' (Sept 2024)"
    tags:
      - "open-source"
      - "discovery"
      - "licensing"
      - "developer-advocacy"
      - "content-seo"
