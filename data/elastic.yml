plays:
  - title: "Open-source a runtime, not a library"
    summary: "Shay Banon's earlier project Compass was an open-source Java library, but he concluded 'you can't really build a business around something like that' because libraries get embedded and hidden inside other apps. For Elasticsearch he deliberately built a distributed runtime that developers download and run themselves as clusters, then open-sourced it under Apache 2.0 in February 2010, two years before the company existed. Because anyone could run it directly, Elastic got a connection to every user and let an ecosystem of community language clients (Go, PHP, Python, Ruby, .NET) grow on top, seeding bottom-up adoption that later converted to paid support and cloud."
    metric_moved: "growth"
    result: "Apache-licensed Elasticsearch (Feb 2010) drove developer-led adoption that fed the funnel to a 2018 IPO and eventually $1.483B FY2025 revenue (Elastic Cloud $688M, +26% YoY)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.binpress.com/podcast-16-shay-banon-elasticsearch/"
    attribution: "Shay Banon on the Binpress Podcast (open-source runtime vs library; ecosystem of community language clients); corroborated by Index Ventures 'Elastic: The Evolution of Open Source' and Changelog Interviews #614"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "community-led"
      - "github"
  - title: "Relicense to stop hyperscalers reselling your OSS"
    summary: "AWS sold a managed 'Amazon Elasticsearch Service' that, per Elastic, profited from their work without reinvesting and even attempted to splinter the community and misuse trademarks. In January 2021 (the 7.11 release) Elastic moved Elasticsearch and Kibana off permissive Apache 2.0 to dual licensing under SSPL and the Elastic License, removing the terms cloud providers relied on to free-ride. The move forced AWS to fork the project into OpenSearch rather than resell Elastic's brand and roadmap."
    metric_moved: "growth"
    result: "Closed the loophole that let AWS resell Elastic's OSS as a service; AWS was pushed to create the OpenSearch fork (later donated to the Linux Foundation), protecting Elastic Cloud revenue ($688M, +26% YoY in FY2025)."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.elastic.co/blog/licensing-change"
    attribution: "Elastic licensing-change blog (Shay Banon): cloud providers 'provided them as a service, without contributing back,' trademarks misused, 'outright attempts to splinter our community'; AWS response in AWS Open Source Blog 'Stepping up for a truly open source Elasticsearch'"
    tags:
      - "open-source"
      - "pricing-change"
      - "transparency"
  - title: "Re-earn the OSI 'open source' label to win shortlists"
    summary: "After three years on SSPL and the Elastic License, Banon concluded the proprietary tag was costing visibility because developers shopping for tools 'just Google open source vector database, they see a list, and they choose between them because they care about open source.' In 2024 Elastic added the OSI-approved AGPL as a third license for Elasticsearch and Kibana (8.16+), reclaiming the 'open source' designation. The goal was renewed engagement and adoption, especially as the runtime for RAG and generative-AI apps where the OSS shortlist matters most."
    metric_moved: "organic"
    result: "Restored the OSI 'open source' label so Elasticsearch reappears in developers' 'open source' shortlists; Banon framed the AGPL addition as a driver of more engagement and adoption."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://techcrunch.com/2024/09/29/elastic-founder-on-why-they-returned-to-open-source-four-years-after-going-proprietary/"
    attribution: "Shay Banon interview, TechCrunch (Sept 2024); corroborated by Elastic blog 'Elasticsearch Is Open Source. Again!' and Changelog Interviews #614"
    tags:
      - "open-source"
      - "content-seo"
      - "developer-advocacy"
      - "community-led"
