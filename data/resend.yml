plays:
  - title: "Ship a free OSS tool a month before your paid product"
    summary: "In Dec 2022 Resend shipped React Email, a free open-source library that let developers write email templates as React components instead of hand-coding HTML tables that break across clients, with no Resend account or credit card required. A month later (Jan 2023) it announced Resend, so the developers who had already adopted React Email for their templates now needed a platform to actually send them. The library became the top of the funnel: it grew to ~17k GitHub stars and ~920k-1.4M weekly npm downloads, and Resend rode that pipeline past 1,000,000 users and 2,000+ paying customers by Dec 2025."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Ship a standalone free tool that fixes one painful step of the workflow your paid product sits inside, release it a month earlier with no account required, and the developers who adopt it become a warm, pre-qualified pipeline that needs your platform to complete the job."
    when_it_works: "Works when your paid product has an adjacent unpaid step (authoring, formatting, local dev) that you can solve as a genuinely useful library people adopt on its own merits."
    metric_moved: "organic top-of-funnel users"
    result: "React Email reached ~17k GitHub stars and ~1M weekly npm downloads; Resend grew to 1M+ users and 2,000+ paying customers with no sales team at the start."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://resend.com/handbook/company/how-we-got-here"
    attribution: "Resend company handbook 'How we got here'; Zeno Rocha interview on the Railway blog (blog.railway.com/p/zeno-rocha-resend); metrics corroborated by marketingcrafted.com/case-studies/resend"
    tags:
      - "open-source"
      - "github"
      - "bottom-up-plg"
      - "give-first"
      - "word-of-mouth"
  - title: "Recruit the users who requested a feature as its launch-day beta testers"
    summary: "For its recurring Launch Weeks (five features over five days), Resend picks features that are large-impact, visual, and explicitly requested by many users, then logs in Linear exactly who asked for each one. The feature is built behind a feature flag and soft-launched, and as launch day nears Resend contacts the original requesters to test and refine it, so the public reveal ships to people who already validated it. A week out, a double-opt-in waitlist (confirm your email to join) is promoted on social to pre-build the audience. Launch Week 4 drove a 45% increase in impressions over the prior edition."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Tag every feature request with the person who made it, then on launch recruit those exact requesters as your beta testers and amplifiers, so each shipped feature arrives pre-validated and with a built-in cohort who feels ownership and spreads it."
    when_it_works: "Works when you have a steady stream of named feature requests and can batch shippable, visual features into a recurring event rather than dribbling them out."
    metric_moved: "launch impressions / developer attention"
    result: "Launch Week 4 saw a 45% lift in impressions over the previous edition; the cadence ran through 6+ editions (Launch Week 6, Apr 2026) with an Awwwards-nominated site."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://resend.com/blog/launch-week-behind-the-scenes"
    attribution: "Resend blog, 'Launch Week: Behind the Scenes'"
    tags:
      - "launch-week"
      - "changelog-marketing"
      - "beta-testing"
      - "feature-flags"
      - "community-led"
