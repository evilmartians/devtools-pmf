plays:
  - title: "Launch an open-source tool before the paid product"
    summary: "Before building the email API, Resend shipped React Email (Dec 2022) as a free open-source project that solved the painful problem of building email templates that render across clients. The company incorporated and announced Resend a month later (Jan 2023, 1M+ views), so developers who had already adopted React Email for their templates needed a platform to actually send them. This 'give first, ask later' sequencing turned the OSS library into the top of the funnel: React Email grew to ~17k GitHub stars and 1.4M weekly npm downloads, feeding Resend past 1,000,000 users by Dec 2025."
    metric_moved: "organic"
    result: "React Email reached ~17k stars and 1.4M weekly npm downloads; Resend grew to 1M+ users (Dec 2025) with no sales team at the start."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://resend.com/handbook/company/how-we-got-here"
    attribution: "Resend company handbook, 'How we got here'; corroborated by Zeno Rocha interview on the Railway blog (blog.railway.com/p/zeno-rocha-resend)"
    tags:
      - "open-source"
      - "github"
      - "developer-advocacy"
      - "bottom-up-plg"
      - "word-of-mouth"
  - title: "Run a recurring Launch Week to manufacture attention"
    summary: "Resend runs recurring Launch Weeks, shipping five new features over five days (Audiences, Broadcasts, Automations, AI editor, etc.). Features are chosen to be large-impact, visual, and frequently-requested, built behind feature flags, and the users who requested them are recruited to test before the public reveal. The cadence concentrates product momentum into a single buzz-generating event measured on impressions and usage rather than revenue, and has run through at least six editions (Launch Week 6, Apr 2026)."
    metric_moved: "community"
    result: "Sustained recurring launch moments (6+ Launch Weeks through Apr 2026), an Awwwards-nominated launch site, and repeated developer attention spikes."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://resend.com/blog/launch-week-behind-the-scenes"
    attribution: "Resend blog, 'Launch Week: Behind the Scenes' and 'Launch Week 6: Wrap Up'"
    tags:
      - "launch-week"
      - "changelog-marketing"
      - "community-led"
      - "developer-advocacy"
  - title: "Make developer experience the wedge, skip sales"
    summary: "Resend deliberately had no sales team at launch and instead used Developer Experience (single API call to send, clean docs, fast time-to-value) as the way to differentiate from legacy incumbents like SendGrid and find product-market fit. The bottom-up, self-serve motion carried the company from zero to 100k users (2024) and then to 1M users (Dec 2025) organically, with revenue reportedly 5x-ing in 2025. Only later did they add buyer-experience and templates/pay-as-you-go pricing to move upmarket."
    metric_moved: "growth"
    result: "Grew 0 to 1M users with no initial sales team; revenue 5x'd in 2025; $18M Series A led by a16z (Dec 2024)."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://resend.com/blog/1-million-users"
    attribution: "Resend blog, '1,000,000 users' (Dec 2025): 'When we started Resend, we didn't have a sales team' and focused on DX to find product-market fit"
    tags:
      - "bottom-up-plg"
      - "docs-as-marketing"
      - "self-serve"
      - "freemium"
