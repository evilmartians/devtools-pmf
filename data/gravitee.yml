plays:
  - title: "Ship the richest free open-source edition to fuel downloads"
    summary: "Gravitee released a fully free, Apache 2.0 Community Edition and positioned it as the most feature-packed open-source API management solution on the market, with no proprietary runtime and no lock-in. This let them distribute the software widely and grow organically through the developer community instead of paid acquisition. By mid-2021 the open-source platform was driving 35,000 global downloads per month at 163% year-on-year growth."
    metric_moved: "organic"
    result: "35,000 global downloads/month with 163% YoY growth; ranked #9 fastest-growing commercial open-source startup (COSS index, Jan-Sep 2021)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.eu-startups.com/2021/07/french-open-source-api-management-platform-gravitee-io-scores-e9-3-million-in-fresh-funding/"
    attribution: "EU-Startups (July 2021), corroborated by AlbionVC 'Why we invested' and Gravitee COSS #9 ranking post"
    tags:
      - "open-source"
      - "free-tier"
      - "bottom-up-plg"
      - "community-led"
      - "github"
  - title: "Bootstrap to profitability before raising a dime"
    summary: "Gravitee was founded in 2015 by four technical cofounders frustrated with complex incumbent API tools, and ran entirely bootstrapped with zero outside capital for roughly six years. They reached profitability on the strength of open-source-led organic distribution, then raised an $11M (EUR 9.3M) Series A in 2021 from a position of strength rather than survival. The capital-efficient track record was the explicit reason investors leaned in."
    metric_moved: "funding_round"
    result: "Reached profitability fully bootstrapped, then raised an $11M Series A (2021); total raised later grew to >$125M through a $60M Series C (2025)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://medium.com/thealbionvc/why-we-invested-in-gravitee-io-de3b11192430"
    attribution: "AlbionVC 'Why we invested in Gravitee.io' (Paul Lehair); corroborated by Oxx portfolio page"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "transparency"
  - title: "Build an open-core upgrade path from free to enterprise"
    summary: "Gravitee used a deliberate open-core split: teams start free on the Apache 2.0 Community Edition for the core gateway, then upgrade to the Enterprise Edition as needs grow, unlocking governance features like Alert Engine, a no-code API Designer, monetization, advanced protocol mediation, automated upgrades, and a plugin marketplace. The free edition seeds bottom-up adoption inside an organization; enterprise governance and security needs convert that adoption into paid contracts. This open-source-to-enterprise motion carried them to 200+ customers including Michelin, Roche, and Eurostar and Gartner Magic Quadrant Leader status."
    metric_moved: "growth"
    result: "~$22M ARR (FY24) with ~95% three-year average growth; 200+ enterprise customers; Gartner MQ Leader for API Management (2024)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://venturebeat.com/ai/open-source-api-management-platform-gravitee-raises-11m"
    attribution: "VentureBeat coverage of Gravitee's open-core CE-vs-EE model; product split confirmed via Gravitee docs (docs.gravitee.io/ee)"
