plays:
  - title: "Out-generous incumbents on your free open-source edition"
    summary: "Gravitee shipped a fully free Apache 2.0 Community Edition and deliberately positioned it as the most feature-complete open-source API gateway available, with no proprietary runtime and no lock-in, undercutting incumbents who gated the core behind a license. That generosity turned the OSS distribution itself into the acquisition channel instead of paid ads. By mid-2021 it drove 35,000 downloads per month at 163% year-on-year growth, and ranked #9 fastest-growing commercial open-source startup on the COSS index."
    goal: "Acquisition"
    track: "Open-source"
    learning: "If you compete against an incumbent that gates its core product, make the free open-source core of your product strictly more capable than theirs and explicitly permissive (no proprietary runtime, no lock-in) so the distribution itself becomes your top-of-funnel and developers choose you before sales ever calls."
    when_it_works: "When you sell into a category with an entrenched incumbent that for cost or lock-in reasons cannot match a genuinely permissive, feature-rich free tier."
    metric_moved: "downloads / organic adoption"
    result: "35,000 global downloads/month at 163% YoY growth (mid-2021); #9 on the COSS commercial-open-source index (Jan-Sep 2021)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.eu-startups.com/2021/07/french-open-source-api-management-platform-gravitee-io-scores-e9-3-million-in-fresh-funding/"
    attribution: "EU-Startups (July 2021), corroborated by AlbionVC 'Why we invested' and Gravitee's COSS #9 ranking post"
    tags:
      - "open-source"
      - "free-tier"
      - "bottom-up-plg"
      - "community-led"
      - "github"
  - title: "Draw the paywall at production-scale and async protocols"
    summary: "Gravitee gives away the full core sync API gateway in the free Apache 2.0 Community Edition, then gates the features an enterprise architect needs to run it across an organization at scale: async/event-native protocols (Kafka, MQTT, TCP), enterprise SSO, multi-environment management via Cockpit, the Alert Engine, and advanced observability are Enterprise-Edition only. The free core seeds adoption inside a team; the moment the deployment becomes production-critical and event-driven, the paywall hits exactly where budget exists. That open-core line carried them to 200+ enterprise customers (Michelin, Roche, Eurostar) and ~$22M ARR."
    goal: "Conversion"
    learning: "Make the free tier genuinely complete for a single team's core use case, then draw the paid line precisely at the capabilities a buyer only needs once the deployment is production-critical and org-wide (here: event/async protocols, SSO, multi-environment governance, alerting), so adoption is frictionless but the paywall lands exactly where budget and urgency appear."
    when_it_works: "When there is a clean technical boundary between 'one team gets value' and 'the whole org runs it in production', and the second half is what only an enterprise budget will pay for."
    metric_moved: "free-to-paid enterprise conversion / ARR"
    result: "~$22M ARR (FY24) at ~95% three-year average growth; 200+ enterprise customers; Gartner Magic Quadrant Leader for API Management (2024)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://venturebeat.com/technology/open-source-api-management-platform-gravitee-raises-11m"
    attribution: "VentureBeat coverage of Gravitee's open-core model; CE-vs-EE feature boundary confirmed via Gravitee docs (documentation.gravitee.io, OSS-vs-Enterprise feature comparison)"
    tags:
      - "open-source"
      - "open-core"
      - "freemium"
      - "land-and-expand"
      - "paywall-design"
