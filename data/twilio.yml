plays:
  - title: "Let developers self-serve a magical first SMS"
    summary: "VCs pushed Jeff Lawson to ship an app; he circulated an API instead and gave developers immediate, self-serve trial access with free credits and no credit card. The onboarding was built around a single magical demo: a few lines of code that make a real phone ring or send a real text in minutes. That barrier-free 'quick win' converted curious coders into paying accounts at scale: by Q1 2016 over 900,000 developer accounts had registered and over 90,000 were paying."
    metric_moved: "free_to_paid"
    result: "Over 900,000 registered developer accounts and 90,000+ paying customer accounts as of March 31, 2016 (S-1); ~10% free-to-paid."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.sec.gov/Archives/edgar/data/1447669/000104746916013448/a2227414zs-1.htm"
    attribution: "Twilio S-1 (SEC, June 2016); tactic detailed in McKinsey interview with CEO Jeff Lawson and Every Developer analysis"
    tags:
      - "free-tier"
      - "bottom-up-plg"
      - "developer-advocacy"
      - "docs-as-marketing"
      - "self-serve"
  - title: "Price by usage so accounts expand themselves"
    summary: "Twilio charged pay-as-you-go per message and per minute instead of seats or annual contracts, so a developer could start for cents and spending grew automatically as their app grew. This usage-based model meant revenue from existing customers compounded without new sales motions. The result became the benchmark for developer-first companies."
    metric_moved: "nrr"
    result: "Dollar-based net expansion rate of 155% for FY2015 and 170% in Q1 2016 (S-1)."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.sec.gov/Archives/edgar/data/1447669/000104746916013448/a2227414zs-1.htm"
    attribution: "Twilio S-1 (SEC, June 2016)"
    tags:
      - "usage-based-pricing"
      - "land-and-expand"
      - "bottom-up-plg"
  - title: "Make individual developers the stars, not logos"
    summary: "Rather than plastering enterprise customer logos on its site, Twilio spotlighted individual coders as 'DOers' and ran 'Ask Your Developer' billboards aimed at developers themselves. It backed this with a developer-evangelist squad that was a ubiquitous presence at hackathons, meetups, and conferences for seven years, treating the API as 'another tool in your tool belt' instead of selling hard. This grassroots, developer-flattering positioning built the bottom-up demand that drove adoption."
    metric_moved: "community"
    result: "Sustained developer mindshare; the S-1 referenced 'developers' 157 times, signaling a core, long-term strategy rather than a campaign."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://medium.com/every-developer/how-twilio-became-the-twilio-of-sms-and-voice-1e8f215f9d0c"
    attribution: "Every Developer (Adam DuVander); corroborated by McKinsey interview with CEO Jeff Lawson"
    tags:
