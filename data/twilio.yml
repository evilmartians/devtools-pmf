plays:
  - title: "Let developers ship a working demo before signup friction"
    summary: "VCs pushed Jeff Lawson to ship a finished app; he shipped a raw API instead and built onboarding around one magical moment: a few lines of code that make a real phone ring or send a real SMS in minutes. New accounts got $15 in trial credits and no credit card, and Twilio deliberately deferred the credit card and compliance steps until a developer was ready to launch in production. That barrier-free quick win converted curious coders into paying accounts at scale."
    goal: "Activation"
    learning: "Make the very first thing a developer does produce a real, externally visible result (a phone that actually rings, a message that actually arrives), and push every gate that does not block that first result (credit card, compliance, billing setup) to the moment they go to production. The aha sells the signup; the signup does not sell the aha."
    when_it_works: "Works when your product has a single demonstrable 'it actually worked' moment a developer can hit in minutes with copy-paste code."
    metric_moved: "free_to_paid"
    result: "Over 900,000 registered developer accounts and 90,000+ paying customer accounts as of March 31, 2016 (S-1); roughly 10% free-to-paid."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.sec.gov/Archives/edgar/data/1447669/000104746916013448/a2227414zs-1.htm"
    attribution: "Twilio S-1 (SEC, June 2016); onboarding detail from Twilio engineering blog and McKinsey interview with CEO Jeff Lawson"
    tags:
      - "self-serve"
      - "time-to-value"
      - "bottom-up-plg"
      - "developer-onboarding"
      - "free-credits"
  - title: "Price per API call so spend grows with the app"
    summary: "Twilio charged pay-as-you-go per message and per minute instead of seats or annual contracts, so a developer could start for cents and their bill grew automatically as their app's traffic grew. Revenue from existing customers compounded with their success, with no new sales motion required to capture it. The expansion numbers became the benchmark every usage-based developer company now points to."
    goal: "Expansion"
    learning: "Tie your pricing unit to a metric that rises with the customer's own success (calls, messages, GB, builds), not to seats they have to consciously add. When your bill grows on autopilot as the customer's usage grows, net revenue retention compounds without a renewal conversation or an upsell rep."
    when_it_works: "Works when usage scales with the customer's business outcome and the per-unit cost is small enough that nobody needs approval to start."
    metric_moved: "nrr"
    result: "Dollar-based net expansion rate of 155% for FY2015 and 170% in Q1 2016 (S-1)."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.sec.gov/Archives/edgar/data/1447669/000104746916013448/a2227414zs-1.htm"
    attribution: "Twilio S-1 (SEC, June 2016)"
    tags:
      - "usage-based-pricing"
      - "land-and-expand"
      - "net-revenue-retention"
      - "bottom-up-plg"
  - title: "Run 'Ask Your Developer' to seed exec demand bottom-up"
    summary: "As deal sizes grew, Twilio needed executives (not just coders) to know its name, but selling top-down would betray its developer-first brand. So it rented a billboard on Highway 101 reading 'Ask Your Developer,' lifted directly from pharma ads ('ask your doctor if X is right for you'). The line did double duty: it flattered developers as the in-house experts whose opinion the company should trust, and it planted Twilio in executives' heads in a way that routed the buying conversation back through the developers who already loved the product."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "When you need to reach economic buyers but your brand is built on bottom-up developer love, do not pitch the buyer directly; tell the buyer to ask their own engineers about you. It converts your existing developer fans into your internal sales force and keeps your champion, not your logo, at the center of the deal."
    when_it_works: "Works once you already have genuine developer advocates inside accounts who will vouch for you when an executive asks."
    metric_moved: "community"
    result: "Sustained developer mindshare and word-of-mouth across press, social, and podcasts; the S-1 referenced 'developers' 157 times, signaling a core long-term strategy rather than a one-off campaign."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.mckinsey.com/industries/technology-media-and-telecommunications/our-insights/unleashing-developers-full-talents-an-interview-with-twilios-ceo"
    attribution: "McKinsey interview with CEO Jeff Lawson (billboard origin and intent); corroborated by Every Developer (Adam DuVander)"
