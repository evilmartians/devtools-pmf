plays:
  - title: "Make the phone ring before you ask for a credit card"
    summary: "VCs pushed Jeff Lawson to ship a finished app; he shipped a raw API and built onboarding around one magical moment: a few lines of code that make a real phone ring or send a real SMS in minutes. New accounts got $15 in trial credits and no credit card, and Twilio deferred the credit card and compliance steps until a developer was ready to launch in production. That barrier-free quick win converted curious coders into paying accounts at scale."
    goal: "Activation"
    learning: "Engineer the first action to produce a real, externally visible result, an actual SMS arriving or a phone ringing in minutes from copy-paste code, and hand out trial credits so no card is needed. Push every gate that doesn't block that first result, billing, compliance, card capture, all the way to production. The aha earns the signup."
    when_it_works: "Works when your product has a single demonstrable 'it actually worked' moment a developer can reach unaided."
    metric_moved: "free_to_paid"
    result: "Over 900,000 registered developer accounts and 90,000+ paying customer accounts as of March 31, 2016 (S-1); roughly 10% free-to-paid."
    tradeoff: "Deferring the credit card and compliance gate to production and handing out free credits means you bankroll the support, infrastructure, and abuse-surface of a huge unpaid majority: roughly 90% of those 900,000+ registered accounts never became paying customers, so you carry the cost of the demos that never convert."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.sec.gov/Archives/edgar/data/1447669/000104746916013448/a2227414zs-1.htm"
    attribution: "Twilio S-1 (SEC, June 2016); onboarding detail from Twilio engineering blog and McKinsey interview with CEO Jeff Lawson"
    tags:
      - "self-serve"
      - "time-to-value"
      - "bottom-up-plg"
      - "developer-onboarding"
      - "free-credits"
  - title: "Bill the metric that grows when your customer wins"
    summary: "Twilio charged pay-as-you-go per message and per minute, so a developer could start for cents and their bill grew automatically as their app's traffic grew. Revenue from existing customers compounded with their success, no new sales motion required to capture it. The expansion numbers became the benchmark every usage-based developer company now points to."
    goal: "Expansion"
    learning: "Tie price to consumption: per message, minute, GB, or build, so the bill climbs automatically as the customer's own traffic climbs. Net revenue retention then compounds on autopilot, no renewal call and no upsell rep required to capture it."
    when_it_works: "Works when usage scales with the customer's business outcome and the per-unit cost is small enough that nobody needs approval to start."
    metric_moved: "nrr"
    result: "Dollar-based net expansion rate of 155% for FY2015 and 170% in Q1 2016 (S-1)."
    tradeoff: "Pricing per message and minute surrenders the contracted, predictable revenue investors and forecasting want, because your top line now rides on customers' own traffic and contracts directly when their usage dips, a volatility Twilio's own S-1 flags as a risk."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.sec.gov/Archives/edgar/data/1447669/000104746916013448/a2227414zs-1.htm"
    attribution: "Twilio S-1 (SEC, June 2016)"
    tags:
      - "usage-based-pricing"
      - "land-and-expand"
      - "net-revenue-retention"
      - "bottom-up-plg"
  - title: "Tell the exec to ask their own engineers about you"
    summary: "As deal sizes grew, Twilio needed executives, not just coders, to know its name, but selling top-down would betray its developer-first brand. So it rented a billboard on Highway 101 reading 'Ask Your Developer,' lifted from pharma ads ('ask your doctor if X is right for you'). The line did double duty: it flattered developers as the in-house experts whose opinion the company should trust, and it planted Twilio in executives' heads in a way that routed the buying conversation back through the developers who already loved the product."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "When you need economic buyers but your brand runs on developer love, point them at the engineers who already trust you. It turns your in-house advocates into your sales force and keeps your champion at the center of the deal."
    when_it_works: "Works once you already have genuine developer advocates inside accounts who will vouch for you when an executive asks."
    metric_moved: "community"
    result: "Sustained developer mindshare and word-of-mouth across press, social, and podcasts; the S-1 referenced 'developers' 157 times, signaling a core long-term strategy rather than a one-off campaign."
    tradeoff: "Routing every deal back through the developer champion means you never build your own top-down relationship with the economic buyer, leaving you dependent on internal advocates and exposed whenever procurement, security review, or a new CIO wants to consolidate or renegotiate vendors."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.mckinsey.com/industries/technology-media-and-telecommunications/our-insights/unleashing-developers-full-talents-an-interview-with-twilios-ceo"
    attribution: "McKinsey interview with CEO Jeff Lawson (billboard origin and intent); corroborated by Every Developer (Adam DuVander)"
