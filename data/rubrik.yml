plays:
  - title: "Rename your category to bill against a bigger budget"
    summary: "Rubrik sold backup-and-recovery, a price-pressured IT commodity. In 2016 a customer hit by one of the first ransomware attacks recovered all systems in hours on Rubrik's immutable backups, which CEO Bipul Sinha called 'a huge eye opener.' Rubrik built a ransomware detection-and-recovery product customers initially didn't want (it gave it away free), waited for the threat to spread, then rebranded its entire data-protection install base as 'cyber resilience,' the neglected recovery half of zero-trust. That moved the same product from the backup market into the ~$200B security budget owned by CISOs."
    goal: "Revenue"
    learning: "When your commodity sits on mission-critical data, find the disaster where you're the only thing that saves the customer, then rebrand the category around that scenario so you move from a cost-cutting line item into a high-priority one. Give the new capability away free until the threat makes it undeniable."
    when_it_works: "Works when an external shift (a new threat, regulation, or failure mode) suddenly makes your existing capability mission-critical to a buyer with a much larger budget than your original buyer."
    metric_moved: "arr"
    result: "Repositioning to cyber resilience drove 100%+ ARR growth toward ~$1.1B subscription ARR (FY25) and 99%+ retention, reframing a commodity backup product into a security platform."
    tradeoff: "Moving into the security budget means you now compete against dedicated, better-funded security vendors and answer to a CISO who holds the same product to a far higher bar than the IT buyer ever did, and you must absorb the heavy enterprise sales cost that bar demands (Rubrik's median payback ran 25.4 months)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://greylock.com/greymatter/building-a-cybersecurity-juggernaut/"
    attribution: "Bipul Sinha (CEO), Greylock 'Building a Cybersecurity Juggernaut': 2016 ransomware recovery in hours, ransomware product 'we used to give it away for free'; positioning confirmed in Computer Weekly."
    tags:
      - "repositioning"
      - "category-creation"
      - "founder-led-sales"
  - title: "Change who signs the check while shipping the same product"
    summary: "Rubrik's original buyer was IT Operations: a low-leverage, budget-constrained backup buyer. By bolting security capabilities (anomaly detection, threat hunting on backups, sensitive-data monitoring) onto the same platform, Rubrik shifted the sales conversation up to CISOs and chief risk officers, who own larger budgets and treat data recovery as mission-critical rather than a cost line. The product didn't change owners; the buyer did."
    goal: "Expansion"
    learning: "To escape a budget-constrained buyer, ship the one capability that lets a higher-ranking exec justify the purchase from their own larger budget, then sell the same platform up the org chart."
    when_it_works: "Works when a senior buyer (CISO, CFO, CRO) already cares about the outcome your product produces but doesn't yet know your category is the lever for it."
    metric_moved: "arr"
    result: "CEO: '100% of my conversations in the UK have been with CISOs and CIOs. Five years ago it was IT Operations,' alongside ~$129K average contract value (FY24 S-1) and 1,742 customers over $100K growing ~45% YoY."
    tradeoff: "Selling to the CISO trades a fast, low-stakes IT Operations buyer for longer, more political deal cycles with a steeper proof burden, and that higher-stakes relationship is harder to keep expanding (subscription NRR slid from 133% in FY24 toward 120%+ by FY26)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.thestack.technology/the-big-interview-rubrik-ceo-bipol-sinha/"
    attribution: "Bipul Sinha (CEO) interview, The Stack"
    tags:
      - "founder-led-sales"
      - "land-and-expand"
      - "enterprise-sales"
  - title: "Make NRR survive any single upsell stalling"
    summary: "Rubrik lands a customer on core data protection, then engineers four independent ways the account grows without a new logo: organic data-volume growth, coverage into new environments (cloud, NAS, M365), tier upgrades (Foundation to Business to Enterprise), and add-on security modules (Anomaly Detection, Threat Hunting, Cyber Recovery, Sensitive Data Monitoring). Each account becomes a compounding annuity, and any single vector firing keeps net retention above 100%."
    goal: "Expansion"
    learning: "Engineer at least three independent expansion vectors into the product: organic usage growth, new environments to cover, packaging tiers, and add-on modules riding the same install footprint. Redundancy is what keeps net retention above 100% when one upsell motion dies."
    when_it_works: "Works when the product naturally accumulates data, surface area, or seats over time so consumption rises without an active sales push."
    metric_moved: "nrr"
    result: "133% subscription net dollar retention (FY24 S-1), with average contract value ~$129K growing ~21% annually and $100K+ customers growing ~45% YoY."
    tradeoff: "Engineering four independent expansion vectors means four product surfaces to build, price, package, and maintain, splitting engineering and GTM focus, and the vectors decay together as the install base matures (NRR compressed from 133% to 120%+ at scale)."
    tier: "Verified"
    source_type: "filing"
