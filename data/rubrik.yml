plays:
  - title: "Reposition the boring product as security"
    summary: "Rubrik sold backup-and-recovery, a commoditized IT infrastructure category. When ransomware exploded, the CEO reframed the company as a 'cyber security company' doing data security and recovery, the neglected 'other half' of zero-trust that prevention vendors ignored. They rebranded the same data-protection install base as cyber resilience, which moved them out of a price-pressured backup market into the $200B security budget."
    metric_moved: "growth"
    result: "Repositioning to cyber resilience drove 100%+ ARR growth toward ~4,000 customers and a 99%+ retention rate, and reframed a commodity backup product into a security platform."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.computerweekly.com/news/252520652/Rubrik-charts-data-security-path"
    attribution: "Bipul Sinha (CEO) in Computer Weekly: 'Rubrik is a cyber security company... we focus on data security'"
    tags:
      - "founder-led-sales"
      - "land-and-expand"
  - title: "Sell up the org chart to the CISO"
    summary: "Rubrik's original buyer was IT Operations, a low-leverage, budget-constrained backup buyer. By attaching security capabilities (threat hunting on backups, anomaly detection, data observability) to the same platform, they deliberately moved the sales conversation up to CISOs and chief risk officers who own larger budgets and treat recovery as mission-critical, not a cost center."
    metric_moved: "arr"
    result: "CEO reports '100% of my conversations in the UK have been with CISOs and CIOs. Five years ago it was IT Operations,' alongside ~$200K average deal sizes moving into higher-value enterprise segments."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.thestack.technology/the-big-interview-rubrik-ceo-bipol-sinha/"
    attribution: "Bipul Sinha (CEO) interview, The Stack"
    tags:
      - "founder-led-sales"
      - "land-and-expand"
  - title: "Land on data, expand on modules"
    summary: "Rubrik lands a customer on core data protection, then expands along multiple built-in vectors: organic data-volume growth, coverage into new environments (cloud, NAS, M365), tier upgrades (Foundation to Business to Enterprise), and add-on security modules (Anomaly Detection, Threat Hunting, Cyber Recovery, Sensitive Data Monitoring, Ruby AI). Every account becomes a growing annuity without needing new logos."
    metric_moved: "nrr"
    result: "133% subscription net retention rate (FY24, per S-1), with 1,742 customers over $100K growing ~45% YoY and average contract value ~$128.5K growing 21% annually."
    tier: "Verified"
    source_type: "filing"
    source_url: "https://www.sec.gov/Archives/edgar/data/1943896/000119312524118478/d359771d424b4.htm"
    attribution: "Rubrik 424B4 IPO prospectus (SEC), NRR confirmed verbatim; expansion vectors detailed in hhhypergrowth.com/a-look-at-rubrik"
