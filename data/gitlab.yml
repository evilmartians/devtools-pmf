plays:
  - title: "Seed five free developers, expand to thousands"
    summary: "GitLab refused to monetize individual developers directly. Instead it gave the tool away and turned users into internal champions who pulled GitLab into their employers. The pattern was deliberate: a few developers adopt it, usage spreads team to team, and eventually an executive asks to formalize and pay for it. At Siemens, an initial embedded-software team's adoption expanded to 40,000+ users company-wide."
    metric_moved: "nrr"
    result: "Bottom-up land-and-expand drove dollar-based net retention of 122-130%+, with single accounts like Siemens growing to 40,000+ seats. Total revenue reached $759.2M in FY2025 (up 31% YoY)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/contribution-gitlab"
    attribution: "Community Inc. deep dive on GitLab community growth; Siemens case study"
    tags:
      - "open-source"
      - "bottom-up-plg"
      - "free-tier"
      - "land-and-expand"
      - "word-of-mouth"
  - title: "Run recurring hackathons with merge-request coaches"
    summary: "Most open-source companies see contributions shrink once they commercialize. GitLab grew its community by lowering contribution friction: it staffed dedicated 'merge request coaches' to triage and guide both new and experienced contributors, ran recurring 7-day virtual hackathons with swag rewards, and recognized top contributors via the GitLab Heroes program and monthly MVP designation. Over half of community contributions came from paid-tier users building features they needed themselves."
    metric_moved: "community"
    result: "Grew from ~300 contributions in year one to 250-335+ merge requests per month; a single Q1 2021 hackathon generated 390 merge requests; 3,000+ total contributors by mid-2021."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/contribution-gitlab"
    attribution: "Community Inc. deep dive on GitLab community growth"
    tags:
      - "open-source"
      - "community-led"
      - "developer-advocacy"
      - "viral-loop"
  - title: "Publish your entire company handbook openly"
    summary: "Starting in 2016, GitLab published its full operating handbook publicly under a Creative Commons license: company and product strategy, OKRs, sales and marketing playbooks, hiring process, even an open Kanban board. The 2,000+ page handbook is community-editable via merge requests. Built first to enable remote-first async work, it became a recruiting and sales asset: candidates verify the culture before applying, and prospects feel like insiders, easing the buying decision."
    metric_moved: "organic"
    result: "The 2,000+ page open handbook became a durable inbound and employer-brand engine, cited by candidates as a confidence driver and by customers as a trust signal in the sales process."
    tier: "Reported"
    source_type: "press"
    source_url: "https://about.gitlab.com/blog/our-handbook-is-open-source-heres-why/"
    attribution: "GitLab blog 'Our Handbook is open source: here's why'; corroborated by Community Inc."
    tags:
