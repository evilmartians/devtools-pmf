plays:
  - title: "Never bill the developer; bill the executive they pull in"
    summary: "GitLab deliberately refused to monetize individual developers. It gave the tool away so a handful of engineers would adopt it for their own work, then spread it team to team until the footprint got large enough that an executive asked to formalize and pay. At Siemens, a small embedded-Linux team adopted GitLab in 2013, opened it to the company, and grew it to 40,000+ users. CMO Ashley Kramer frames the motion: 'We start with five developers, the next thing we know there's 50, then 500, and then the executive says I need to understand more about this.'"
    goal: "Expansion"
    learning: "Make your free tier the property of the individual engineer, not the org, and design the product so usage spreads peer-to-peer before any buyer is involved; let the seat count itself become the sales pitch that forces a procurement conversation, rather than chasing the buyer first."
    when_it_works: "Works when the product is adopted by individual practitioners who collaborate (so usage visibly compounds inside one company) and a paid tier exists with admin, security, or compliance features an executive eventually needs."
    metric_moved: "nrr"
    result: "Bottom-up land-and-expand sustained dollar-based net retention of 122-130%+; single accounts like Siemens grew to 40,000+ seats. FY2025 total revenue $759.2M, up 31% YoY."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/contribution-gitlab"
    attribution: "Community Inc. deep dive on GitLab community growth; GitLab CMO Ashley Kramer; Siemens case study (about.gitlab.com/customers/siemens)"
    tags:
      - "bottom-up-plg"
      - "land-and-expand"
      - "free-tier"
      - "word-of-mouth"
      - "net-retention"
  - title: "Staff merge-request coaches to keep contributions growing"
    summary: "Most open-source companies see community contributions shrink once they commercialize. GitLab did the opposite by removing contribution friction at the human level: it staffed dedicated 'merge request coaches', GitLab employees whose explicit job is to triage community MRs and shepherd them to merge, and ran recurring 7-day virtual hackathons (timed to be inclusive across time zones) with swag and MVP recognition. One Q1 2021 hackathon produced 390 merge requests, more than GitLab typically saw in an entire month. Over half of contributions came from paid users building features they themselves needed."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Treat external contributions as a funnel with a conversion step, and assign named insiders whose only job is to unblock and merge outside PRs; pair that with time-boxed contribution events so a one-week burst can out-produce a normal month and convert curious users into invested co-builders."
    when_it_works: "Works for open-source or open-core products where users are technical enough to contribute and the codebase is approachable; the coach headcount only pays off once you have inbound contributors to unblock."
    metric_moved: "community contributions per month"
    result: "Grew from ~300 contributions in year one to 250-335+ merge requests per month; a single Q1 2021 hackathon generated 390 MRs; 3,000+ total contributors by mid-2021."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://community.inc/deep-dives/contribution-gitlab"
    attribution: "Community Inc. deep dive on GitLab community growth; GitLab Hackathon recap (about.gitlab.com/blog/hackathon-recap)"
    tags:
      - "open-source"
      - "community-led"
      - "developer-advocacy"
      - "hackathon"
      - "viral-loop"
  - title: "Open-source your company handbook as a hiring and sales asset"
    summary: "Starting in 2016, GitLab published its full operating handbook publicly under Creative Commons: strategy, OKRs, sales and marketing playbooks, hiring process, even an open Kanban board, all 2,000+ pages community-editable via merge requests. Built first to enable remote-first async work, it doubled as a recruiting and sales asset: candidates self-qualify against the real culture before applying, and prospects read the actual sales and product playbooks so they feel like insiders, lowering buying friction."
    goal: "Acquisition"
    track: "Content & SEO"
    learning: "Publish the internal artifacts you already maintain (how you operate, decide, hire, and sell) as a public, version-controlled resource; radical transparency lets candidates and buyers pre-qualify themselves and arrive already trusting you, turning an internal cost center into a top-of-funnel asset."
    when_it_works: "Works when your operations are something you'd be proud to show and your audience values transparency (developers, remote-first talent); risky if your real internal practices wouldn't survive public scrutiny."
    metric_moved: "organic inbound / employer brand"
    result: "The 2,000+ page open handbook became a durable inbound and employer-brand engine, cited by candidates as a confidence driver and by customers as a trust signal during sales."
    tier: "Reported"
    source_type: "press"
    source_url: "https://about.gitlab.com/blog/our-handbook-is-open-source-heres-why/"
    attribution: "GitLab blog 'Our Handbook is open source: here's why'; corroborated by Community Inc."
    tags:
      - "transparency"
      - "docs-as-marketing"
      - "employer-brand"
      - "content-seo"
      - "developer-advocacy"
  - title: "Treat breadth of stages used as your #1 churn predictor"
    summary: "GitLab sells one platform spanning the whole DevOps lifecycle (plan, code, CI, secure, release, etc.), so a customer can pay yet only use one or two stages, leaving them easy to rip out. After a 2023 Sales Key Review, GitLab stood up a cross-functional Customer Use Case Adoption working group that named 'use case adoption' (how many lifecycle stages an account genuinely uses) its north-star KPI and #1 predictor of churn and contraction. CSMs now score each account on stages where >25% of the company is active (below 25% counts as a pilot, not adoption) and run 'Adoption Landing Zones' to push under-adopting customers into more stages before renewal."
    goal: "Retention"
    learning: "For a multi-module platform, measure retention risk by how many distinct use cases an account actively uses, not by seat count or total spend, and set an explicit usage threshold (GitLab uses >25% of the company per module) so a 'paying but shallow' account flags as at-risk. Then give CSMs a standard playbook to drive each healthy account into one more module before renewal."
    when_it_works: "Works when your product is a broad suite where customers can pay while using only a slice, so single-module accounts are the ones that churn; it adds little for single-purpose tools where there is no breadth to expand into."
    metric_moved: "retention"
    result: "GitLab's handbook designates use case / stage adoption as the #1 (closed) predictor of churn and contraction; the company sustained dollar-based net retention of 120-130%+ while running this retention motion (DBNRR 122% as of Q1 FY2026)."
    tier: "Reported"
    source_type: "press"
    source_url: "https://handbook.gitlab.com/handbook/company/working-groups/customer-use-case-adoption/"
    attribution: "GitLab public Handbook: Customer Use Case Adoption working group ('north star KPI and #1 predictor of Churn & Contraction', post 2023-05-16 Sales Key Review) and Stage Adoption Metrics page (>25% active-usage threshold); DBNRR from GitLab Q1 FY2026 IR release"
