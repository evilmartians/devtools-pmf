plays:
  - title: "Run the service by hand before writing code"
    summary: "Before building any software, Christina Cacioppo ran SOC 2 readiness as a manual consulting service: a color-coded gap-assessment spreadsheet she filled in by hand, even working out of Segment's office to learn the real workflow. She then reused the same spreadsheet for the next customer (Front) without modification, proving the controls and rules generalized across companies. Only once the spreadsheet had repeatedly delivered value did the team start coding; the earliest software was just a form where customers entered AWS credentials and the team manually pulled data and wrote reports."
    metric_moved: "growth"
    result: "Validated PMF with a concierge MVP; reached 600+ customers and stayed cash-flow break-even for ~3 years, crossing $10M ARR before raising a Series A, with no real website or marketing team."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/vantas-path-to-product-market-fit/"
    attribution: "First Round Review, 'Vanta's Path to Product-Market Fit'; corroborated by SaaStr, 'The Early Days: 5 Things Vanta Got Right'"
    tags:
      - "design-partners"
      - "founder-led-sales"
      - "dogfooding"
  - title: "Become the default for one tight founder network"
    summary: "Vanta concentrated on Y Combinator startups, founders Cacioppo could reach directly via YC's internal Bookface forum. The first major customer (Lattice) came through a YC introduction, and YC founders proved unusually willing to take meetings with early companies and refer peers. By making SOC 2 painless for one cohesive community, Vanta became the obvious choice each new batch defaulted to, generating two to three inbound emails per week off a barebones homepage."
    metric_moved: "organic"
    result: "Roughly 1 customer/week post-launch ramping to 2-3/week within six months, reaching 600+ customers with no real website; by 2023 about 75% of the current YC cohort used Vanta."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/vantas-path-to-product-market-fit/"
    attribution: "First Round Review, 'Vanta's Path to Product-Market Fit'; '75% of YC cohort' figure from SaaStr"
    tags:
      - "community-led"
      - "word-of-mouth"
      - "bottom-up-plg"
  - title: "Kill monthly pricing to cut buying friction"
    summary: "An early Vanta seller removed the monthly pricing option entirely, leaving only annual contracts. The reasoning: customers buying compliance are already anxious and uncertain, so adding a monthly-versus-annual decision created friction with no upside. Annual-only also kept customers integrated year-round instead of churning right after their audit."
    metric_moved: "retention"
    result: "Faster deal closure and deeper, continuous product usage rather than audit-time-only engagement."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/the-early-days-5-things-vanta-got-right-and-5-it-got-wrong-getting-to-first-10m-arr/"
    attribution: "SaaStr, 'The Early Days: 5 Things Vanta Got Right, And 5 It Got Wrong, Getting to First $10M ARR'"
    tags:
      - "pricing-change"
      - "land-and-expand"
