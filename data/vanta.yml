plays:
  - title: "Sell the workflow by hand before writing code"
    summary: "Before building software, Christina Cacioppo ran SOC 2 readiness as a manual consulting service: a color-coded gap-assessment spreadsheet she filled in by hand, even setting up desks inside Segment's office for weeks reading dozens of real SOC 2 reports. She then handed the exact same spreadsheet to the next customer (Front) without modification, secretly testing whether Segment's controls and rules generalized. They did. Only after the spreadsheet repeatedly delivered value did the team write code, starting with a bare form where customers entered AWS credentials and the team pulled data and wrote reports by hand."
    goal: "Activation"
    learning: "Before you build, deliver your product's outcome by hand for your first customer, then hand the identical artifact to a second customer in the same category without changes. If it works unmodified, you have proof the problem generalizes and you know exactly which steps are worth automating first."
    when_it_works: "Works when the job is a repeatable expert workflow whose rules are stable across companies, so a manual artifact can be reused and later codified."
    metric_moved: "time-to-value / PMF validation"
    result: "Validated PMF with a concierge MVP, reached 600+ customers and stayed cash-flow break-even for ~3 years, crossing $10M ARR before raising a Series A, with no real website or marketing team."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/vantas-path-to-product-market-fit/"
    attribution: "First Round Review, 'Vanta's Path to Product-Market Fit'; corroborated by SaaStr, 'The Early Days: 5 Things Vanta Got Right'"
    tags:
      - "design-partners"
      - "founder-led-sales"
      - "concierge-mvp"
  - title: "Win one tight founder network until you're the default"
    summary: "Vanta concentrated entirely on Y Combinator startups, founders Cacioppo could DM directly through YC's internal Bookface forum. The first major customer (Lattice) came via a YC intro, and YC founders proved unusually willing to take meetings with tiny companies and refer peers. By making SOC 2 painless for one cohesive community, Vanta became the obvious choice each new batch defaulted to, generating two to three inbound emails per week off a barebones homepage."
    goal: "Acquisition"
    learning: "Pick one tightly-networked community with a shared channel (a forum, Slack, accelerator cohort) and over-serve it until being the default spreads by word of mouth inside it. A dense network where members trust and refer each other beats broad reach you have to pay for."
    when_it_works: "Works when a high-trust community exists where your buyers already talk to each other and the same pain recurs for every new member."
    metric_moved: "inbound signups / referral rate"
    result: "Ramped from ~1 customer/week post-launch to 2-3/week within six months, reaching 600+ customers with no real website; by 2023 about 75% of the active YC cohort used Vanta."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://review.firstround.com/vantas-path-to-product-market-fit/"
    attribution: "First Round Review, 'Vanta's Path to Product-Market Fit'; '75% of YC cohort' figure from SaaStr"
    tags:
      - "community-led"
      - "word-of-mouth"
      - "wedge-market"
  - title: "Remove monthly pricing to force annual commitment"
    summary: "Vanta's first salesperson did something that scared the founders: he killed the monthly pricing option entirely, leaving only annual contracts. The reasoning was that compliance buyers are already anxious and uncertain, so a monthly-versus-annual decision added friction with no upside. Annual-only also kept customers integrated and monitored year-round instead of churning the moment their audit finished."
    goal: "Retention"
    learning: "If your value is continuous but customers think of it as a one-time event, remove the short-term billing option so they commit annually; fewer pricing choices speeds the decision and the lock-in keeps them using you between the moments they think they need you."
    when_it_works: "Works when buyers are anxious and the product delivers ongoing value, so an annual commitment both reduces decision friction and prevents post-event churn."
    metric_moved: "sales cycle / retention"
    result: "Deals closed faster with fewer decision points, and customers used Vanta continuously rather than only at audit time, reframing compliance as ongoing rather than a one-off event."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.saastr.com/the-early-days-5-things-vanta-got-right-and-5-it-got-wrong-getting-to-first-10m-arr/"
    attribution: "SaaStr, 'The Early Days: 5 Things Vanta Got Right, And 5 It Got Wrong, Getting to First $10M ARR'"
    tags:
      - "pricing-change"
      - "annual-contracts"
      - "churn-reduction"
