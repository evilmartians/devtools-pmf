plays:
  - title: "Give away authoritative free datasets as top-of-funnel"
    summary: "VulnCheck published free, machine-readable community datasets (VulnCheck KEV, NVD++, XDB) that are genuinely better than the public/government equivalents: its KEV catalog tracks ~130% more exploited vulnerabilities than CISA and flags them an average of 27 days earlier. Researchers, defenders, and vendors register to use them, creating a wide awareness funnel that feeds the paid enterprise feeds/APIs. The free tier grew to 12,000+ (later 13,000+) registered community users at roughly 550 new users/month, and converted into 50+ paying enterprise/government customers at an implied ~$200K ACV."
    metric_moved: "growth"
    result: "12,000+/13,000+ free community users converting into 50+ paying customers; ARR crossed $10M (Q3 2025) with 557% enterprise and 306% government ARR growth."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.vulncheck.com/blog/q3-2025-momentum"
    attribution: "VulnCheck Q3 2025 momentum blog/press; VulnCheck KEV launch release"
    tags:
      - "free-tier"
      - "open-source"
      - "bottom-up-plg"
      - "community-led"
      - "land-and-expand"
      - "developer-advocacy"
  - title: "Ship a better free alternative when the incumbent breaks"
    summary: "When the NIST National Vulnerability Database stalled and its NVD 2.0 API began dropping requests in early 2024, VulnCheck shipped NVD++ on March 14, 2024 as a free, stable, high-performance drop-in for the same NVD data via API and JSON downloads. CEO Anthony Bettini framed it as reducing the industry's reliance on NIST for timely data. By stepping in exactly when the government source failed, VulnCheck became the default reliable feed for thousands of organizations and seeded its entire community funnel."
    metric_moved: "organic"
    result: "1000s of organizations adopted NVD++; it became a core driver of the 12,000+ community user base."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.vulncheck.com/press/vulncheck-nvd"
    attribution: "VulnCheck NVD++ launch press release (Mar 14, 2024), CEO Anthony Bettini"
    tags:
