plays:
  - title: "Out-cover the free government dataset your buyers already trust"
    summary: "Defenders all use CISA's free Known Exploited Vulnerabilities (KEV) catalog, so VulnCheck shipped VulnCheck KEV: a free, machine-readable superset. At launch it tracked 876 more exploited vulnerabilities (81% more than CISA) and flagged them an average of 27 days before CISA added them; by 2025 the gap had widened to ~130% more coverage. Researchers, vendors, and defenders register to consume the free feeds, building a 12,000-13,000 user community at ~550 new signups/month that funnels into 50+ paying enterprise and government accounts at an implied ~$200K ACV."
    goal: "Acquisition"
    track: "Open-source"
    learning: "Take the canonical free dataset your buyers already wire into their tooling and publish a strict superset of it: more entries, flagged earlier, machine-readable, behind a register-to-access tier. The better free artifact becomes your distribution; the API and live feed are the paid upsell."
    when_it_works: "Works when a widely-used canonical data source is incomplete or slow and your buyers already integrate that data programmatically."
    metric_moved: "community signups / top-of-funnel growth"
    result: "12,000-13,000+ free community users at ~550/month converting into 50+ paying customers; ARR crossed $10M in Q3 2025 with 557% enterprise and 306% government ARR growth."
    tradeoff: "You commit to permanently out-researching a government agency on every new exploit, and you give your best intelligence away to 12,000+ free users to net ~50 paying accounts (under 0.5% conversion), so the day CISA closes the coverage gap the free, already-trusted incumbent pulls your community back."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.vulncheck.com/press/vulncheck-kev"
    attribution: "VulnCheck KEV launch press release (Feb 2024) and Q3 2025 momentum blog; coverage in SiliconANGLE"
    tags:
      - "free-tier"
      - "open-data"
      - "bottom-up-plg"
      - "community-led"
      - "land-and-expand"
  - title: "Ship a drop-in replacement the week the incumbent breaks"
    summary: "In early 2024 NIST's National Vulnerability Database stalled (>90% of new CVEs unanalyzed by May) and its NVD 2.0 API began timing out and returning 503s under strict rate limits. On March 14, 2024 VulnCheck shipped NVD++: a free, stable drop-in for the same NVD data via API and downloadable JSON, with CEO Anthony Bettini framing it as cutting the industry's reliance on a failing government source. Because it was a true API-compatible swap launched at the moment of pain, thousands of organizations adopted it and it seeded the community funnel."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "When a dependency your buyers rely on visibly degrades, ship an API-compatible mirror within days and name the failure by name. Matching the interface makes adoption a config swap, and the outage supplies the urgency you would otherwise have to manufacture."
    when_it_works: "Works when an incumbent or upstream source is publicly failing and you can move within the window before it recovers or someone else fills the gap."
    metric_moved: "community adoption / organic signups"
    result: "Thousands of organizations adopted NVD++; became a core driver of the 12,000+ community user base feeding the paid funnel."
    tradeoff: "The adoption was manufactured by NIST's outage and the API-compatible swap cuts both ways, so once NIST recovers users can leave as cheaply as they arrived, while you are now on the hook to mirror and maintain someone else's data format and API for free indefinitely."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.vulncheck.com/press/vulncheck-nvd"
    attribution: "VulnCheck NVD++ launch press release (Mar 14, 2024), CEO Anthony Bettini; NIST backlog corroborated by Socket.dev and Action1"
    tags:
      - "free-tier"
      - "drop-in-replacement"
      - "developer-advocacy"
      - "word-of-mouth"
      - "community-led"
