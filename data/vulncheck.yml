plays:
  - title: "Out-cover the government dataset everyone already trusts"
    summary: "Defenders all use CISA's free Known Exploited Vulnerabilities (KEV) catalog, so VulnCheck shipped VulnCheck KEV: a free, machine-readable superset. At launch it tracked 876 more exploited vulnerabilities (81% more than CISA) and flagged them an average of 27 days before CISA added them; by 2025 the gap had widened to ~130% more coverage. Researchers, vendors, and defenders register to consume the free feeds, building a 12,000-13,000 user community at ~550 new signups/month that funnels into 50+ paying enterprise and government accounts at an implied ~$200K ACV."
    goal: "Acquisition"
    learning: "Find the free, authoritative dataset your buyers already depend on, then publish a strictly-superset version (more coverage, earlier, machine-readable) under a register-to-access community tier; the better free artifact becomes your distribution channel and the paid feed/API is the upsell."
    when_it_works: "Works when there is a widely-used canonical data source that is incomplete or slow, your buyers integrate that data programmatically, and you can credibly produce a measurably better version on an ongoing basis."
    metric_moved: "community signups / top-of-funnel growth"
    result: "12,000-13,000+ free community users at ~550/month converting into 50+ paying customers; ARR crossed $10M in Q3 2025 with 557% enterprise and 306% government ARR growth."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.vulncheck.com/press/vulncheck-kev"
    attribution: "VulnCheck KEV launch press release (Feb 2024) and Q3 2025 momentum blog; coverage in SiliconANGLE"
    tags:
      - "free-tier"
      - "open-data"
      - "bottom-up-plg"
      - "community-led"
      - "land-and-expand"
  - title: "Ship a drop-in replacement the week the incumbent breaks"
    summary: "In early 2024 NIST's National Vulnerability Database stalled (>90% of new CVEs unanalyzed by May) and its NVD 2.0 API began timing out and returning 503s under strict rate limits. On March 14, 2024 VulnCheck shipped NVD++: a free, stable, high-performance drop-in for the exact same NVD data via API and downloadable JSON, with CEO Anthony Bettini explicitly framing it as cutting the industry's reliance on a failing government source. Because it was a true API-compatible swap launched at the moment of pain, thousands of organizations adopted it and it seeded the community funnel."
    goal: "Acquisition"
    learning: "When a dependency your buyers rely on visibly degrades, ship an API-compatible drop-in within days and name the failure directly; switching cost is near zero because their integration does not change, and the outage manufactures the urgency to try you."
    when_it_works: "Works when an incumbent or upstream source is publicly failing, you can match its interface so adoption is a config swap, and you can move within the window before the incumbent recovers or someone else fills the gap."
    metric_moved: "community adoption / organic signups"
    result: "Thousands of organizations adopted NVD++; became a core driver of the 12,000+ community user base feeding the paid funnel."
    tier: "Reported"
    source_type: "press"
    source_url: "https://www.vulncheck.com/press/vulncheck-nvd"
    attribution: "VulnCheck NVD++ launch press release (Mar 14, 2024), CEO Anthony Bettini; NIST backlog corroborated by Socket.dev and Action1"
    tags:
      - "free-tier"
      - "drop-in-replacement"
      - "developer-advocacy"
      - "word-of-mouth"
      - "community-led"
