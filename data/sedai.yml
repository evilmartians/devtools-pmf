plays:
  - title: "Ramp autonomy through Crawl-Walk-Run modes"
    summary: "Selling an 'autonomous' cloud platform meant enterprise buyers feared handing production over to an AI. Sedai defused that with a default Crawl-Walk-Run progression: new accounts start in Datapilot (observe only, no changes), graduate to Copilot (Sedai proposes changes the team approves), and flip to Autopilot (fully autonomous) only once trust is earned. By default the system makes no changes until the customer explicitly raises the mode, so buyers can say yes without betting production on day one."
    metric_moved: "ttfv"
    result: "Setup takes ~5-15 minutes to connect cloud and APM tools; the observe-then-approve-then-automate ramp let Fortune 500 firms (Palo Alto Networks, Experian, KnowBe4) adopt autonomous actions, with 25M+ production actions executed and zero customer-reported incidents."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://docs.sedai.io/get-started/onboarding/readme/understanding-operation-modes"
    attribution: "Sedai official docs, 'Understanding Operation Modes' (Datapilot/Copilot/Autopilot Crawl-Walk-Run); corroborated by Sedai Series B blog (June 16, 2025)"
    tags:
      - "onboarding-redesign"
      - "default-on"
      - "land-and-expand"
      - "transparency"
  - title: "Run POCs against the buyer's live production cloud"
    summary: "Instead of slide decks, Sedai's enterprise motion centers on proof-of-concept deployments where the platform runs against the prospect's real production environment and demonstrates measured savings before any commitment. Connecting to live infrastructure turns the POC itself into the sales argument: prospects watch dollars and engineering hours come back. Paired with land-and-expand into adjacent teams, this concentrated the GTM on POCs that convert."
    metric_moved: "arr"
    result: "Sedai self-reported 7X revenue growth in 2024 and a 92% POC-to-customer conversion rate, citing Fortune 500 customers saving $5M+ annually and reclaiming 22,000+ engineering hours."
    tier: "Estimated"
    source_type: "press"
    source_url: "https://sedai.io/blog/sedai-expands-its-self-driving-cloud-to-power-autonomous-enterprise-infrastructure-with-20m-series-b"
    attribution: "Sedai Series B announcement (June 16, 2025). The 7X and 92% figures are self-reported by Sedai and not independently verified, hence Estimated."
    tags:
      - "design-partners"
      - "land-and-expand"
      - "founder-led-sales"
      - "dogfooding"
  - title: "Educate buyers to create the category"
    summary: "Because 'autonomous' cloud management was a new category, Sedai treated buyer education as part of GTM, drawing a sharp line between automation (static rules) and autonomy (learning agents) so prospects understood what they were buying. Founder Suresh Mathew frames category education as the work that precedes selling, and uses candid buyer conversations to refine the roadmap, for example adding ECS support after prospect conversations, which he credits with accelerating deals."
    metric_moved: "growth"
    result: "Mathew reports a 2.5X ROI from buyer-feedback engagements and strong word-of-mouth among cloud-cost buyers: 'From Sagetap you may get five deals. From outside of Sagetap, because of those conversations, you may get another five.' Customer-driven roadmap additions (ECS alongside Lambda) accelerated deal closure."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.sagetap.io/resource/suresh-mathew-ceo-of-sedai"
    attribution: "Suresh Mathew (Founder/CEO, Sedai) interview on Sagetap; direct quotes on category creation, buyer education, and roadmap-driven deal acceleration"
