plays:
  - title: "Let the buyer hold the throttle on autonomy"
    summary: "Selling an 'autonomous' platform that takes real actions in production terrifies enterprise buyers, so saying yes feels like betting the cluster on day one. Sedai removed that risk by making the default mode observe-only: new accounts start in Datapilot (analyzes monitoring data, changes nothing), graduate to Copilot (proposes changes the team approves one by one), and only flip to Autopilot once trust is earned. Crucially, the system makes zero changes until the customer explicitly raises the mode, so the buyer controls the throttle and can adopt without risk."
    goal: "Activation"
    learning: "When your product takes irreversible actions on someone's production systems, ship it defaulting to watch-only and gate each escalation (watch to suggest to act) behind an explicit per-stage opt-in. Take read-write access up front so raising the mode never means re-integrating, and let trust accrue on the buyer's timeline."
    when_it_works: "Works when the buyer's fear is loss-of-control over production and your value compounds with autonomy, so a staged trust ramp converts skeptics rather than a single all-or-nothing switch."
    metric_moved: "ttfv"
    result: "Fortune 500 firms (Palo Alto Networks, Experian, KnowBe4) ramped to full autonomy; 25M+ production actions executed with zero customer-reported incidents. Onboarding asks for read-write access up front so upgrading modes never requires re-integration."
    tradeoff: "Defaulting to a mode that changes nothing and requiring an explicit per-stage opt-in means the product can stall indefinitely in low-value watch mode, deferring both customer value and your revenue until the buyer chooses, on their own timeline, to grant the autonomy you actually monetize."
    tier: "Verified"
    source_type: "spokesperson"
    source_url: "https://docs.sedai.io/get-started/onboarding/readme/understanding-operation-modes"
    attribution: "Sedai official docs, 'Understanding Operation Modes' (Datapilot/Copilot/Autopilot, Datapilot is the default); corroborated by Sedai Series B blog (June 16, 2025)"
    tags:
      - "onboarding-redesign"
      - "default-off"
      - "land-and-expand"
      - "transparency"
  - title: "Make the trial generate the buyer's own ROI number"
    summary: "Instead of demos and slides, Sedai's enterprise close is a POC where the platform connects to the prospect's real production environment and surfaces the actual dollars and engineering hours it would reclaim. The POC stops being a feature tour and becomes the business case: the prospect watches their own savings number accrue against their own infrastructure, so the buying decision is already proven before procurement starts."
    goal: "Conversion"
    learning: "If your product yields a quantifiable outcome (dollars saved, hours reclaimed), wire the trial into the prospect's real production data so the evaluation computes their personalized savings against their own infrastructure. The close becomes confirming a number they already watched accrue, not believing your pitch."
    when_it_works: "Works when value is quantifiable per-customer and you can safely connect to live data, so the prospect's own numbers become the sales argument; weak when the product needs months of usage before any value shows."
    metric_moved: "poc_conversion"
    result: "Sedai self-reports 7X revenue growth in 2024 and a 92% POC-to-customer conversion rate, citing Fortune 500 customers saving $5M+ annually and reclaiming 22,000+ engineering hours. (Both figures originate from Sedai's own Series B press release and are unverified.)"
    tradeoff: "Wiring the trial into a prospect's real production cloud with read-write access forces a heavy, bespoke security and integration review per deal that doesn't scale, and hands the buyer a live kill switch the moment any savings number underwhelms."
    tier: "Estimated"
    source_type: "press"
    source_url: "https://sedai.io/blog/sedai-expands-its-self-driving-cloud-to-power-autonomous-enterprise-infrastructure-with-20m-series-b"
    attribution: "Sedai Series B announcement (June 16, 2025). The 7X and 92% figures are self-reported by Sedai and not independently verified."
    tags:
      - "design-partners"
      - "land-and-expand"
      - "founder-led-sales"
      - "production-poc"
  - title: "Founder demos buy flattery; intent buyers sell you your roadmap"
    summary: "Creating the 'autonomous cloud' category meant Sedai's pitches drew polite praise that never closed, because passionate founder demos make buyers say the product looks good regardless. CEO Suresh Mathew shifted to a buyer-intent marketplace (Sagetap) where prospects arrive specifically to evaluate and give feedback, then mined those candid conversations for the exact missing capabilities blocking deals, adding ECS support on top of Lambda after a few such conversations. He treats the feedback, not the demo, as the asset: filling the named gaps is what flips conversations into closed deals."
    goal: "Acquisition"
    track: "Word-of-mouth & outbound"
    learning: "Stop reading enthusiasm off your own demos, where buyers won't argue with your passion. Put the product in front of buyers who showed up to evaluate (a peer marketplace or paid eval panel), then ship the exact blocker they name, because the gap stalling this deal is usually stalling the others too."
    when_it_works: "Works when you are creating or entering an unfamiliar category where buyers can't self-articulate fit, so structured high-intent feedback reveals the specific capability gaps blocking deals."
    metric_moved: "deals_closed"
    result: "Mathew reports 2.5X ROI from the buyer-feedback engagements and a word-of-mouth multiplier: 'From Sagetap you may get five deals. From outside of Sagetap, because of those conversations, you may get another five.' Roadmap additions sourced from those calls (ECS alongside Lambda) directly accelerated closes."
    tradeoff: "Treating each evaluator's named blocker as your roadmap means you build reactively toward whatever the last prospect demanded (ECS after Lambda), letting buyers fragment your priorities away from a coherent product vision, while leaning on a third-party marketplace cedes control of the channel feeding you those deals."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.sagetap.io/resource/suresh-mathew-ceo-of-sedai"
    attribution: "Suresh Mathew (Founder/CEO, Sedai) interview on Sagetap; direct quotes on category creation, buyer-intent feedback, ECS roadmap addition, 2.5X ROI, and the 'five deals plus five' word-of-mouth effect"
    tags:
      - "buyer-intent"
      - "founder-led-sales"
      - "word-of-mouth"
      - "roadmap-feedback"
