plays:
  - title: "Launch by live-demoing the impossible in 5 minutes"
    summary: "Solomon Hykes had dotCloud's unreleased internal container tool and a 5-minute PyCon 2013 lightning talk he assumed would be a side room of 30 people. PyCon ran lightning talks on the main stage, so he live-spun up 5, 10, 15, 20 containers in seconds in front of ~800 developers who had never seen anything package and ship that fast. The video went viral on Hacker News, where skeptics called it vaporware because it was not yet open source, so the team open-sourced Docker two weeks later and converted the talk into a launch."
    goal: "Acquisition"
    track: "Launches & build-in-public"
    learning: "Lead your launch with a live, real-time demo of something the audience believes is slow or impossible, doing it in seconds in front of them, rather than a pitch deck or blog post; the visible speed delta is the viral payload. Ship the open or free version within days of the demo so the skeptics who try to debunk you become your first installers instead."
    when_it_works: "Works when your product produces a visceral, watchable speed or capability gap over the status quo that can be shown end-to-end in a few minutes to a technical audience."
    metric_moved: "developer install base / awareness"
    result: "A single 5-minute talk became Docker's de facto launch; open-source release two weeks later seeded the fastest infrastructure adoption curve in history (20M+ developer install base)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://snyk.io/blog/the-docker-project-turns-10/"
    attribution: "Snyk 'The Docker project turns 10!' retrospective; talk corroborated by PyVideo recording of Hykes' PyCon 2013 lightning talk"
    tags:
      - "conference-talk"
      - "live-demo"
      - "open-source"
      - "hacker-news"
      - "word-of-mouth"
  - title: "Charge the developer, not the ops buyer above them"
    summary: "After near-death in 2019 (Docker sold its Enterprise division to Mirantis and cut from ~400 staff to 60), CEO Scott Johnston rebooted with zero salespeople. His diagnosis: monetization sat with ops while the bottoms-up love and daily usage sat with individual developers, so Docker stopped asking ops for a check and put low-priced tiers (Pro $5-9, Team $15, Business $24 per user/month) on the developer's own credit card as a self-serve wedge for seat expansion. Aligning the price point with the person actually getting value, and pricing it low enough to expense without approval, drove the turnaround."
    goal: "Revenue"
    learning: "Identify which role in the buying org actually gets daily value from your product and sell to that person directly with a price low enough to land on a personal or team card without procurement, instead of routing through the budget-holder one layer up. The wedge is letting the individual user say yes alone, then expanding by seat once usage spreads."
    when_it_works: "Works when the daily user has discretionary spend authority at a low price point and the value is felt by them, not only by the manager who holds the budget."
    metric_moved: "nrr / arr"
    result: "ARR grew from roughly $6-11M (late 2020) to ~$135M (end 2022); net dollar retention reportedly improved from 80% to 120%, achieved with no enterprise sales team for the first 18 months."
    tier: "Estimated"
    source_type: "aggregator"
    source_url: "https://sacra.com/p/docker-plg-pivot/"
    attribution: "Sacra 'Docker's PLG pivot' analysis; the 80%->120% NDR and exact ARR figures originate from investor Tribe Capital and are single-sourced via Sacra (treat as directional)"
    tags:
      - "bottom-up-plg"
      - "founder-led-restart"
      - "credit-card-self-serve"
      - "land-and-expand"
  - title: "Gate the already-loved free tool behind a company-size line"
    summary: "Docker Desktop ran free across a 20M+ developer install base, including inside large enterprises that depended on it daily. In August 2021 Docker kept it free for individuals, small businesses, education, and open source, but required a paid subscription for any company with 250+ employees or over $10M revenue. Because developers were already hooked, this converted latent free usage into recurring revenue with no sales motion, and a new $21/month Business tier (SSO, centralized management, supply-chain security) gave enterprises the features to justify the line item."
    goal: "Conversion"
    learning: "Once a free tool has deep daily dependence inside large companies, draw the paywall on an objective company-size threshold (headcount or revenue) rather than on features, so adoption stays viral among individuals while enterprises that already rely on you are forced to convert. Pair the mandate with enterprise-only features (SSO, central management, compliance) so the required spend looks like a justified upgrade, not a tax."
    when_it_works: "Works when you have entrenched free usage inside large orgs that would be painful to rip out, and a defensible size threshold that leaves your viral individual base untouched."
    metric_moved: "free_to_paid"
    result: "Docker publicly estimated the change would roughly double its paid subscriber base; it helped drive a ~30x increase in subscription revenue from 2020 to 2023 and 1M+ paid seats by 2024."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.theregister.com/software/2021/08/31/docker-desktop-no-longer-free-for-large-companies/983136"
    attribution: "The Register coverage of Docker's 2021 subscription change, quoting CEO Scott Johnston; threshold confirmed by Docker pricing docs"
    tags:
      - "freemium"
      - "pricing-change"
      - "company-size-gate"
      - "enterprise-monetization"
