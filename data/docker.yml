plays:
  - title: "Demo the magic in a 5-minute lightning talk"
    summary: "Solomon Hykes had an unreleased internal tool and a 5-minute PyCon 2013 lightning talk slot he expected would be a back room of 10-30 people. Instead it was the main stage in front of several hundred, where he live-spun up 5, 10, 15, 20 containers in seconds. The demo went viral on Hacker News (where skeptics called it vaporware because it was not yet open source), so the team sprinted, open-sourced Docker two weeks later, and turned an accidental talk into a launch. Docker became the fastest-adopted infrastructure technology in history."
    metric_moved: "growth"
    result: "A single 5-minute talk became Docker's de facto launch; rapid open-source release followed two weeks later and seeded the fastest infrastructure adoption curve in history (20M+ developer install base)."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://snyk.io/blog/the-docker-project-turns-10/"
    attribution: "Snyk 'The Docker project turns 10!' retrospective; corroborated by PyVideo and Hykes interviews"
    tags:
      - "conference-talk"
      - "open-source"
      - "word-of-mouth"
      - "hacker-news"
  - title: "Monetize the developers, not the ops buyer"
    summary: "After near-death in 2019 (Docker sold its Enterprise division to Mirantis and cut from ~400 staff to 60), it rebooted with zero salespeople and a pure self-serve PLG motion. The insight from CEO Scott Johnston was to stop asking ops for a check and instead capture the credit card of the individual developer with low-priced tiers ($5/$9/$24 per user/month) as a wedge for seat expansion. Aligning monetization with the part of the org actually getting value drove a fast turnaround."
    metric_moved: "nrr"
    result: "Net dollar retention improved from 80% to 120%; ARR grew from roughly $11M (late 2020) to ~$135M (end 2022), about 254% YoY, with no enterprise sales team."
    tier: "Reported"
    source_type: "aggregator"
    source_url: "https://sacra.com/p/docker-plg-pivot/"
    attribution: "Sacra 'Docker's PLG pivot' analysis (NDR and ARR figures originate from investor Tribe Capital, single-sourced)"
    tags:
      - "bottom-up-plg"
      - "free-tier"
      - "founder-led-sales"
      - "land-and-expand"
  - title: "Make the free tool paid above a size threshold"
    summary: "Docker Desktop had a 20M+ developer install base running free. In August 2021 Docker kept it free for individuals, small businesses, education, and open source, but required a paid subscription for any company with 250+ employees or over $10M revenue. This converted latent free usage inside large enterprises into recurring revenue without a sales motion, since developers already depended on the tool daily. The new $21/month Business tier added SSO, centralized management, and supply-chain security to justify the enterprise price."
    metric_moved: "free_to_paid"
    result: "Docker projected the change would roughly double its paid subscriber base; the mandate unlocked latent revenue and helped drive a ~30x increase in subscription revenue from 2020 to 2023."
    tier: "Verified"
    source_type: "journalism"
    source_url: "https://www.theregister.com/software/2021/08/31/docker-desktop-no-longer-free-for-large-companies/983136"
    attribution: "The Register coverage of Docker's 2021 subscription change, quoting CEO Scott Johnston"
    tags:
      - "freemium"
      - "pricing-change"
      - "free-tier"
      - "land-and-expand"
