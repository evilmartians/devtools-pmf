plays:
  - title: "Make your biggest cost center the unmetered free hook"
    summary: "DDoS protection was sold metered, and vendors surge-billed or dropped customers during large attacks, so the scariest unknown in security was the post-attack invoice. In September 2017 Cloudflare announced Unmetered Mitigation: unlimited, unmetered DDoS protection on every plan including Free, with Matthew Prince's public promise to never up-bill or terminate based on attack size, backed by 15+ Tbps of capacity. Removing the worst unknown bill pulled sites onto the network, where they were later monetized and improved attack data for everyone."
    goal: "Acquisition"
    learning: "Identify the unpredictable, fear-inducing surcharge buyers hate most in your category and make it unlimited and free with a public no-upcharge guarantee; the certainty itself is the acquisition hook, and your fixed-cost scale is what lets you absorb it while rivals cannot."
    when_it_works: "Works when you have a structural cost advantage (here, owned network capacity) so the give-away is near-zero marginal cost for you but a feared variable bill for buyers at competitors."
    metric_moved: "free signups / top-of-funnel users"
    result: "Turned the free tier into cloud infra's strongest acquisition magnet; by IPO (Jun 2019) ~2M total users fed ~75K paying customers."
    tier: "Verified"
    source_type: "press"
    source_url: "https://blog.cloudflare.com/unmetered-mitigation/"
    attribution: "Cloudflare blog, 'Unmetered Mitigation' (Sep 25, 2017); Matthew Prince: 'we will never jack up your bill after the attack.'"
    tags:
      - "free-tier"
      - "freemium"
      - "bottom-up-plg"
      - "default-on"
      - "land-and-expand"
  - title: "Delete the incumbent's most-hated fee, not their features"
    summary: "Object storage's most hated, least predictable charge is AWS S3 egress at ~9 cents/GB. On September 28, 2021 Cloudflare launched R2, an S3-API-compatible store with zero egress fees, so migration became a pure economic decision rather than a feature comparison. A 10TB/month egress workload drops from roughly $891/month on S3 to about $0 on R2, making any egress-heavy app a no-brainer to move."
    goal: "Acquisition"
    learning: "When a sticky incumbent monetizes through one widely-resented line item, attack that exact charge to zero and stay API-compatible so switching is a spreadsheet decision; you win the migration on economics before the incumbent can respond on features."
    when_it_works: "Works when the hated fee is a meaningful share of the buyer's bill and you can offer drop-in API compatibility so trying you costs almost no engineering effort."
    metric_moved: "developer adoption / workload migration"
    result: "R2 became a flagship developer product, serving trillions of requests per month by 2025 and anchoring the 'full-stack on Cloudflare' narrative for 2M+ Workers developers."
    tier: "Verified"
    source_type: "press"
    source_url: "https://blog.cloudflare.com/introducing-r2-object-storage/"
    attribution: "Cloudflare blog, 'Announcing Cloudflare R2 Storage' (Sep 28, 2021): 'zero-cost egress for stored objects, no matter your request rate.'"
    tags:
      - "pricing-change"
      - "usage-based-pricing"
      - "bottom-up-plg"
      - "developer-advocacy"
  - title: "Give away your best paid feature to manufacture a launch moment"
    summary: "Cloudflare's Birthday Week began by accident in 2011 when TechCrunch Disrupt asked them to announce something on their anniversary; packaging a routine IPv6 launch around that date drew outsized attention and started the tradition. The crystallizing move came in 2014, when for their third birthday they took Universal SSL, the single biggest differentiator between free and paid, and gave it away free to the whole Internet. Concentrating gift-style launches into one annual, anticipated week manufactures a predictable press and signup spike instead of dribbling releases out."
    goal: "Acquisition"
    learning: "Pick a recurring calendar anchor and headline it by giving away the feature that was previously your strongest paid differentiator; the generosity earns the coverage and the fixed date trains press and developers to show up, turning scattered releases into one compounding annual spike."
    when_it_works: "Works once you have enough product surface to fill a multi-launch week and a give-away valuable enough that handing it out is itself newsworthy."
    metric_moved: "press coverage / developer signups"
    result: "Birthday Week has run annually for 15+ years (through 2025) as Cloudflare's signature launch moment, reliably driving concentrated press, community, and developer attention each cycle."
    tier: "Reported"
    source_type: "press"
    source_url: "https://blog.cloudflare.com/birthday-week-2025-wrap-up/"
    attribution: "Cloudflare blog 'Birthday Week 2025 wrap-up'; Matthew Prince on Cloudflare TV recounting the 2011 accidental origin and the 2014 Universal SSL give-away."
    tags:
      - "launch-week"
      - "developer-advocacy"
      - "community-led"
      - "content-seo"
