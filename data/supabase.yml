plays:
  - title: "Run a recurring ship-every-day Launch Week"
    summary: "Coming out of Y Combinator, Supabase missed the demo-day forcing function, so they recreated it internally: pick a week every 3-4 months and ship one new product or feature every single day. Instead of saving up for one big announcement, the daily drumbeat compounds attention across the week and gives engineers a shipping rhythm. The format worked so well it became a quarterly growth engine and is now copied across devtools."
    metric_moved: "organic"
    result: "Paul Copplestone says the first Launch Week increased top-of-funnel traffic by ~30%; Launch Weeks became a standing quarterly growth engine."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.felicis.com/blog/paul-copplestone-supabase"
    attribution: "Paul Copplestone (CEO) interview, Felicis blog"
    tags:
      - "launch-week"
      - "changelog-marketing"
      - "developer-advocacy"
      - "community-led"
  - title: "Position as the open-source X-alternative"
    summary: "Supabase launched on Hacker News in December 2020 with one line: 'an open source Firebase alternative.' Anchoring to a product every developer already understood gave instant comprehension and free search intent, while building on PostgreSQL (trusted, known) removed adoption risk. The framing did the explaining for them and seeded a whole 'Firebase vs Supabase' content category developers still search."
    metric_moved: "organic"
    result: "Show HN launch drove early traction; community grew to 1.7M+ registered developers and 81K+ GitHub stars (doubling in two years) by April 2025."
    tier: "Verified"
    source_type: "aggregator"
    source_url: "https://news.ycombinator.com/item?id=25289254"
    attribution: "Supabase 'open source Firebase alternative' Show HN, Dec 2020"
    tags:
      - "open-source"
      - "hacker-news"
      - "content-seo"
      - "word-of-mouth"
  - title: "Become the default backend AI app builders auto-provision"
    summary: "As AI 'vibe coding' tools (Bolt.new, Lovable, Replit, v0) exploded, Supabase got itself wired in as the default backend these tools provision automatically. A user describing an app in Lovable or Bolt gets a Supabase database, RLS, and auth set up for them without ever choosing Supabase. This turned a third-party adoption surge into Supabase's own top-of-funnel: new databases arrive without the developer making an explicit choice."
    metric_moved: "growth"
    result: "Databases launched on Supabase grew 600%+ in a year with 60%+ created 'by some sort of AI tool'; fueled run to ~$70M ARR (250% YoY) and a $5B Series E."
