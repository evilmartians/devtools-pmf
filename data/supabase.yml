plays:
  - title: "Manufacture a quarterly demo-day with daily ships"
    summary: "Leaving Y Combinator, Supabase lost the demo-day deadline that forces a team to ship. They rebuilt it as Launch Week: pick a week every 3-4 months and release one product or feature every single day instead of hoarding everything for one announcement. The daily cadence compounds attention across the week and forces engineers to ship and to practice talking about what they built. The first one lifted top-of-funnel traffic ~30%, and Launch Weeks became a standing quarterly growth engine now copied across devtools."
    goal: "Acquisition"
    learning: "Replace the deadline you lost (demo day, a launch) with a self-imposed recurring shipping event, and split one big announcement into a daily drip across a week so each day earns its own attention spike instead of one diluted peak."
    when_it_works: "Works when you have a steady stream of real shippable improvements and an audience that follows changelogs; falls flat if the 'launches' are filler with no substance."
    metric_moved: "top-of-funnel traffic"
    result: "First Launch Week raised top-of-funnel traffic ~30%; became a recurring quarterly growth engine and an industry-standard format."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.felicis.com/blog/paul-copplestone-supabase"
    attribution: "Paul Copplestone (CEO), Felicis blog interview"
    tags:
      - "launch-week"
      - "changelog-marketing"
      - "shipping-cadence"
      - "community-led"
  - title: "Anchor your category to a tool every dev already knows"
    summary: "Supabase launched on Hacker News in December 2020 with one line: 'an open source Firebase alternative.' Anchoring to a product every developer already understood gave instant comprehension and inherited Firebase's search intent, while building on PostgreSQL (a trusted, familiar primitive) removed the perceived risk of adopting something new. The framing did the explaining for them and seeded a durable 'Firebase vs Supabase' content category developers still search."
    goal: "Acquisition"
    learning: "Position as 'the open-source [incumbent everyone knows] alternative' and build on a primitive developers already trust, so your one-liner inherits the incumbent's search demand and erases the risk of betting on an unknown."
    when_it_works: "Works when there is a large, well-known incumbent developers are frustrated with and you can credibly stand on a trusted underlying primitive; weak if no obvious anchor exists or you are the category creator."
    metric_moved: "signups / search intent"
    result: "Show HN launch drove early traction; grew to 1.7M+ registered developers and 81K+ GitHub stars by April 2025."
    tier: "Verified"
    source_type: "aggregator"
    source_url: "https://news.ycombinator.com/item?id=25289254"
    attribution: "Supabase 'open source Firebase alternative' Show HN, Dec 2020"
    tags:
      - "positioning"
      - "open-source"
      - "hacker-news"
      - "content-seo"
  - title: "Become the default backend AI app builders auto-provision"
    summary: "As AI 'vibe coding' tools (Bolt.new, Lovable, Replit, v0) exploded, Supabase got itself wired in as the default backend those tools provision automatically. A user describing an app in Lovable or Bolt gets a Supabase database, RLS, and auth set up for them without ever choosing Supabase. This converted a third-party adoption surge into Supabase's own top-of-funnel: new databases arrive without the developer making an explicit choice."
    goal: "Acquisition"
    learning: "Embed yourself as the default that adjacent tools auto-provision so users adopt you without ever deciding to, then partner hardest with the fastest-growing distribution surface in your space (today, AI app builders) before competitors lock the default slot."
    when_it_works: "Works when there are fast-growing platforms that must wire in a component like yours and being the path-of-least-resistance default beats being the explicitly-chosen best; useless if no such host platforms exist."
    metric_moved: "new databases / signups"
    result: "Databases on Supabase grew 600%+ in a year with 60%+ created 'by some sort of AI tool'; fueled the run to ~$70M ARR (250% YoY) and a $5B Series E."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://sacra.com/research/supabase-at-70m-arr-growing-250-yoy/"
    attribution: "Sacra research, 'Supabase at $70M ARR growing 250% YoY'"
