plays:
  - title: "Sell a platform consumption pool, not modules"
    summary: "Instead of selling Falcon security modules one at a time, CrowdStrike introduced Falcon Flex: a single committed-spend contract that gives the customer frictionless access to the whole portfolio to draw down as needed. This made it trivial for accounts to turn on more modules, and many came back to expand the pool ('re-Flex') well before the original term ended. The model became CrowdStrike's primary expansion and net-retention engine at multi-billion ARR scale."
    metric_moved: "nrr"
    result: "By Q4 FY2026, 1,600+ Flex customers averaging >$1M ARR each; Flex ARR crossed $1.69B (+120% YoY). 380+ customers 're-Flexed' (about 23% of the base), typically within 7 months, lifting ARR ~26% on average (and ~48% for those who re-Flexed multiple times). One account grew from a single threat-intel module to 25 modules on an $86M contract."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://finance.yahoo.com/news/falcon-flex-drive-crowdstrikes-next-145000704.html"
    attribution: "Zacks/Yahoo Finance analysis of CrowdStrike Q4 FY2026 results; figures echo CrowdStrike IR disclosures"
    tags:
      - "land-and-expand"
      - "usage-based-pricing"
      - "pricing-change"
      - "integrations-marketplace"
  - title: "Ship one agent so upsells need no redeployment"
    summary: "CrowdStrike runs every Falcon module on a single lightweight sensor already installed on the customer's endpoints. New capabilities (identity protection, AI detection, etc.) are activated in software on that existing agent rather than requiring a fresh deployment. This collapses the friction of both trials and upsells: a prospect can switch a module on at scale during an evaluation, and an existing customer can buy a new module that goes live across tens of thousands of hosts instantly."
    metric_moved: "nrr"
    result: "Module adoption climbed to customers using ~5 modules on average, with 48% on 6+, 32% on 7+, and 22% on 8+ (as of Apr 30, 2025). Example: an automotive financial-services customer added AI detection to 30,000+ hosts in a seven-figure deal as a 'seamless upsell off the existing sensor.' Net retention held at 115% with 97% gross retention."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.bankinfosecurity.com/crowdstrike-ceo-george-kurtz-identity-be-as-big-as-xdr-a-19945"
    attribution: "George Kurtz (CEO/founder) interview, BankInfoSecurity; module-attach and host-expansion figures from CrowdStrike IR/earnings"
    tags:
      - "land-and-expand"
      - "default-on"
