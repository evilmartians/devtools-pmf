plays:
  - title: "Replace per-module pricing with a committed spend pool"
    summary: "CrowdStrike was selling Falcon security modules one SKU at a time, which slowed expansion because each new module was a fresh negotiation. They launched Falcon Flex: one committed-spend contract that grants frictionless access to the whole portfolio, drawn down as the customer needs. Accounts turned on more modules without procurement friction and repeatedly came back to top up the pool ('re-Flex') before the term ended."
    goal: "Expansion"
    learning: "Package your portfolio as a single committed-spend pool the customer draws down at will, so adding your next feature is a self-serve drawdown instead of a new procurement cycle; price the commitment, not the SKUs, and let buyers top up the pool early when they exhaust it."
    when_it_works: "Works when you have a multi-product portfolio one buyer can consolidate on and a committed-spend budget large enough that pool economics beat per-seat or per-module billing."
    metric_moved: "nrr"
    result: "By Q4 FY2026, 1,600+ Flex customers averaging >$1M ARR each; Flex ARR crossed $1.69B (+120% YoY). About 380 customers (~23% of the Flex base) re-Flexed, typically within 7 months, lifting ARR ~26% on average and ~48% for repeat re-Flexers. One account grew from a single threat-intel module to 25 modules on an $86M contract."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://finance.yahoo.com/news/falcon-flex-drive-crowdstrikes-next-145000704.html"
    attribution: "Zacks/Yahoo Finance analysis of CrowdStrike Q4 FY2026 results; figures echo CrowdStrike IR disclosures"
    tags:
      - "land-and-expand"
      - "usage-based-pricing"
      - "pricing-change"
      - "consumption-pool"
  - title: "Ship one agent so upsells need zero redeployment"
    summary: "Every Falcon module runs on a single lightweight sensor already installed on the customer's endpoints. New capabilities like identity protection and AI detection are switched on in software on that existing agent rather than requiring a fresh rollout. That collapses upsell friction: a new module goes live across tens of thousands of hosts instantly, with no new install, security review, or change-management ticket."
    goal: "Expansion"
    learning: "Build new capabilities so they activate on the footprint the customer has already deployed and approved, turning each upsell into a software toggle rather than a fresh install plus security review; the deployment you already earned becomes the distribution channel for everything you sell next."
    when_it_works: "Works when your product has an installed agent or footprint with real switching cost, so new modules ride on infrastructure the customer has already vetted and rolled out."
    metric_moved: "nrr"
    result: "Customers averaged ~5 modules, with 48% on 6+, 32% on 7+, and 22% on 8+ (as of Apr 30, 2025). An automotive financial-services customer added AI detection to 30,000+ hosts in a seven-figure deal as a seamless upsell off the existing sensor. Net retention held at 115% with 97% gross retention."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.bankinfosecurity.com/crowdstrike-ceo-george-kurtz-identity-be-as-big-as-xdr-a-19945"
    attribution: "George Kurtz (CEO/founder) interview, BankInfoSecurity; module-attach and host-expansion figures from CrowdStrike IR/earnings"
    tags:
      - "land-and-expand"
      - "single-agent"
      - "default-on"
      - "zero-friction-upsell"
