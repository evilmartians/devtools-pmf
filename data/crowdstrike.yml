plays:
  - title: "Replace per-module pricing with a committed spend pool"
    summary: "CrowdStrike was selling Falcon security modules one SKU at a time, which slowed expansion because each new module was a fresh negotiation. They launched Falcon Flex: one committed-spend contract that grants frictionless access to the whole portfolio, drawn down as the customer needs. Accounts turned on more modules without procurement friction and repeatedly came back to top up the pool ('re-Flex') before the term ended."
    goal: "Expansion"
    learning: "Package your portfolio as a single committed-spend pool the customer draws down at will, so adding your next feature is a self-serve drawdown instead of a new procurement cycle; price the commitment, not the SKUs, and let buyers top up the pool early when they exhaust it."
    when_it_works: "Works when you have a multi-product portfolio one buyer can consolidate on and a committed-spend budget large enough that pool economics beat per-seat or per-module billing."
    metric_moved: "nrr"
    result: "By Q4 FY2026, 1,600+ Flex customers averaging >$1M ARR each; Flex ARR crossed $1.69B (+120% YoY). About 380 customers (~23% of the Flex base) re-Flexed, typically within 7 months, lifting ARR ~26% on average and ~48% for repeat re-Flexers. One account grew from a single threat-intel module to 25 modules on an $86M contract."
    tradeoff: "Pricing the commitment instead of the SKUs means you surrender per-module revenue visibility and trade clean recognized revenue for a deferred drawdown balance, so reported ARR now hinges on customers actually consuming and re-upping the pool rather than on what they bought."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://finance.yahoo.com/news/falcon-flex-drive-crowdstrikes-next-145000704.html"
    attribution: "Zacks/Yahoo Finance analysis of CrowdStrike Q4 FY2026 results; figures echo CrowdStrike IR disclosures"
    tags:
      - "land-and-expand"
      - "usage-based-pricing"
      - "pricing-change"
      - "consumption-pool"
  - title: "Ship one agent so upsells need zero redeployment"
    summary: "Every Falcon module runs on a single lightweight sensor already installed on the customer's endpoints. New capabilities like identity protection and AI detection are switched on in software on that existing agent rather than requiring a fresh rollout. That collapses upsell friction: a new module goes live across tens of thousands of hosts instantly, with no new install, security review, or change-management ticket."
    goal: "Expansion"
    learning: "Build new capabilities so they activate on the footprint the customer has already deployed and approved, turning each upsell into a software toggle rather than a fresh install plus security review; the deployment you already earned becomes the distribution channel for everything you sell next."
    when_it_works: "Works when your product has an installed agent or footprint with real switching cost, so new modules ride on infrastructure the customer has already vetted and rolled out."
    metric_moved: "nrr"
    result: "Customers averaged ~5 modules, with 48% on 6+, 32% on 7+, and 22% on 8+ (as of Apr 30, 2025). An automotive financial-services customer added AI detection to 30,000+ hosts in a seven-figure deal as a seamless upsell off the existing sensor. Net retention held at 115% with 97% gross retention."
    tradeoff: "Concentrating every module on one always-on sensor makes a single bad update a fleet-wide single point of failure, exactly the architecture that let the July 2024 push brick 8.5M machines at once."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.bankinfosecurity.com/crowdstrike-ceo-george-kurtz-identity-be-as-big-as-xdr-a-19945"
    attribution: "George Kurtz (CEO/founder) interview, BankInfoSecurity; module-attach and host-expansion figures from CrowdStrike IR/earnings"
    tags:
      - "land-and-expand"
      - "single-agent"
      - "default-on"
      - "zero-friction-upsell"
  - title: "Pay back an outage as commitment, not cash"
    summary: "On July 19, 2024 a faulty CrowdStrike sensor update bricked 8.5M Windows machines worldwide and handed customers a credible reason to churn at renewal. Instead of writing refund checks, CrowdStrike offered 'customer commitment packages': discounts paired with subscription extensions and additional Falcon modules, structured so the make-good only paid out if the customer re-committed and signed a longer term. The compensation became a renewal and consolidation event rather than a cash outflow, and gross retention barely moved."
    goal: "Retention"
    learning: "When you owe customers a make-good after an incident, pay it as credit toward an extended term and deeper product adoption rather than as a refund: tie the compensation to a re-commitment so the apology doubles as a renewal that deepens the account instead of a cash loss that resets it."
    when_it_works: "Works when you are an embedded system-of-record with high switching cost and a multi-product portfolio, so customers prefer staying-and-getting-more over the pain of ripping you out; it fails if a cheaper substitute exists or the make-good is so small relative to customer damages that it reads as insulting."
    metric_moved: "retention"
    result: "Gross retention held above 97% in the first full quarter after the outage, down less than half a percentage point. The packages carried an estimated ~$60M ARR/revenue impact across H2 FY2025 and, per CFO Burt Podbere, drove 'longer-term deals and increased adoption'; net retention stayed in the 112-115% range. CEO George Kurtz framed them as 'a proactive and concerted investment' to build loyalty."
    tradeoff: "Settling the make-good as discounts plus extensions and extra modules trains your largest, most-damaged customers to expect to be paid in deeper lock-in and lower effective prices, compressing margin and net retention on those accounts for the length of the longer terms you signed."
    tier: "Reported"
    source_type: "journalism"
    source_url: "https://www.cybersecuritydive.com/news/crowdstrike-retains-customers/734203/"
    attribution: "Cybersecurity Dive and AJC reporting on CrowdStrike Q3 FY2025 earnings; CFO Burt Podbere and CEO George Kurtz on-record quotes about 'customer commitment packages' (discounts, subscription extensions, additional offers) and the ~$60M ARR impact"
    tags:
      - "retention"
      - "incident-recovery"
      - "system-of-record"
      - "make-good"
      - "renewal"
      - "switching-cost"
      - "cybersecurity"
