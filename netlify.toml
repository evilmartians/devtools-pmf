# Netlify deploy config for the DevTools Cookbook site.
# Root `npm ci` installs js-yaml (the data generator the site prebuild runs);
# then the site is built. Deploys at the site root, so the absolute /fonts and
# /og.png paths work as-is. Before launch, set `site` in site/astro.config.mjs
# and SITE_URL in site/src/pages/index.astro to the final domain.
[build]
  command = "npm ci && npm --prefix site ci && npm --prefix site run build"
  publish = "site/dist"

[build.environment]
  NODE_VERSION = "20"
