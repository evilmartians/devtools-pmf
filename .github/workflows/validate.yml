name: Validate data

on:
  pull_request:
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/**"
      - "package.json"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run validate
